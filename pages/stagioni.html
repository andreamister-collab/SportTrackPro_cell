<div class="card">
    <div class="header">
        <h2>STAGIONI</h2>
        <button class="btn" id="btn-add-stagione">+ Nuova Stagione</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Periodo</th>
                <th>Stato</th>
                <th>Azioni</th>
            </tr>
        </thead>
        <tbody id="list-stagioni">
            <tr><td colspan="4">Caricamento...</td></tr>
        </tbody>
    </table>
</div>

<script type="module">
import { client } from '../db.js';

/* ---------- FUNZIONI ---------- */
async function initStagioni() {
    const { data, error } = await client
        .from('seasons')
        .select('id,name,start_date,end_date,is_active')
        .order('start_date', {ascending:false});

    const tbody = document.getElementById('list-stagioni');
    if (error) {
        tbody.innerHTML = `<tr><td colspan="4" style="color:#b91c1c">${error.message}</td></tr>`;
        return;
    }

    tbody.innerHTML = data?.length
        ? data.map(s => `
            <tr>
                <td>${s.name}</td>
                <td>${formatDate(s.start_date)} → ${formatDate(s.end_date)}</td>
                <td><span class="badge ${s.is_active?'badge-active':'badge-inactive'}">${s.is_active?'ATTIVA':'INATTIVA'}</span></td>
                <td>
                    <button class="btn btn-action" data-action="activate" data-id="${s.id}">${s.is_active?'Disattiva':'Rendi Attiva'}</button>
                    <button class="btn btn-action" style="background:#f59e0b" data-action="edit" data-id="${s.id}" data-name="${s.name}">Modifica</button>
                    <button class="btn btn-action" style="background:#ef4444" data-action="delete" data-id="${s.id}">Elimina</button>
                </td>
            </tr>
        `).join('')
        : '<tr><td colspan="4">Nessun dato.</td></tr>';

    document.querySelectorAll('#list-stagioni .btn-action').forEach(btn => {
        btn.addEventListener('click', () => {
            const action = btn.dataset.action;
            const id = btn.dataset.id;
            const name = btn.dataset.name;
            if(action === 'activate') setActiveStagione(id);
            if(action === 'edit') editStagione(id, name);
            if(action === 'delete') deleteStagione(id);
        });
    });
}

async function addStagione() {
    const annoInizio = prompt('Anno inizio (es. 2025)');
    if(!annoInizio) return;

    const annoFine = prompt('Anno fine (es. 2026)');
    if(!annoFine) return;

    const name = `${annoInizio}/${annoFine}`;
    const start_date = `01/08/${annoInizio}`;
    const end_date = `31/07/${annoFine}`;

    const { error } = await client.from('seasons').insert({
        name,
        start_date: convertITDate(start_date),
        end_date: convertITDate(end_date),
        is_active: false
    });

    if(error) alert('Errore: ' + error.message);
    else initStagioni();
}

/* ---------- LA TUA VERSIONE OTTIMIZZATA ---------- */
async function setActiveStagione(id) {
    // 1. Disattiva tutte le stagioni attualmente attive
    const { error: err1 } = await client
        .from('seasons')
        .update({ is_active: false })
        .eq('is_active', true);

    if (err1) {
        alert('Errore disattivazione: ' + err1.message);
        return;
    }

    // 2. Attiva la stagione selezionata
    const { error: err2 } = await client
        .from('seasons')
        .update({ is_active: true })
        .eq('id', id);

    if (err2) alert('Errore attivazione: ' + err2.message);
    else initStagioni();
}

async function editStagione(id, currentName) {
    const [curInizio, curFine] = currentName.split('/');
    const annoInizio = prompt('Anno inizio', curInizio);
    if(!annoInizio) return;

    const annoFine = prompt('Anno fine', curFine);
    if(!annoFine) return;

    const name = `${annoInizio}/${annoFine}`;
    const start_date = `01/08/${annoInizio}`;
    const end_date = `31/07/${annoFine}`;

    const { error } = await client.from('seasons')
        .update({ name, start_date: convertITDate(start_date), end_date: convertITDate(end_date) })
        .eq('id', id);

    if(error) alert('Errore: ' + error.message);
    else initStagioni();
}

async function deleteStagione(id) {
    if(!confirm('Sei sicuro di voler eliminare questa stagione?')) return;

    const { error } = await client.from('seasons').delete().eq('id', id);
    if(error) alert('Errore: ' + error.message);
    else initStagioni();
}

function convertITDate(itDate) {
    const [d,m,y] = itDate.split('/');
    return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
}
function formatDate(sqlDate) {
    const [y,m,d] = sqlDate.split('-');
    return `${d}/${m}/${y}`;
}

/* ---------- AVVIO ---------- */
document.getElementById('btn-add-stagione').addEventListener('click', addStagione);
initStagioni();
</script>

<style>
.badge { display:inline-block; padding:0.25rem 0.5rem; border-radius:999px; font-size:0.75rem; font-weight:600; }
.badge-active { background:#dcfce7; color:#166534; }
.badge-inactive { background:#f1f5f9; color:#475569; }
</style>
