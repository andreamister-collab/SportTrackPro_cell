<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportTrackPro - Gestione</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --card: #ffffff; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        #login-wrap { background: var(--card); padding: 2rem; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; max-width: 380px; }
        #app { display: none; width: 95%; max-width: 1000px; background: var(--card); min-height: 80vh; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin: 20px; align-self: flex-start; }

        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.4rem; font-weight: 600; font-size: 0.9rem; color: #475569; }
        input { width: 100%; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        
        button { width: 100%; padding: 0.75rem; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #1d4ed8; }
        .btn-logout { background: #ef4444; width: auto; padding: 0.4rem 1rem; margin-top: 10px; }

        #error-msg { color: #b91c1c; background: #fee2e2; padding: 0.75rem; border-radius: 6px; margin-top: 1rem; display: none; font-size: 0.85rem; border: 1px solid #fecaca; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
        .card-data { border: 1px solid #e2e8f0; padding: 1.2rem; border-radius: 8px; background: #f8fafc; }
        ul { list-style: none; padding: 0; }
        li { padding: 0.6rem; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; }
        li:last-child { border: none; }
        .status-active { color: #16a34a; font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="login-wrap">
        <h2 style="text-align: center; margin-bottom: 1.5rem;">SportTrackPro</h2>
        <form id="login-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Inserisci username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit">Accedi</button>
            <div id="error-msg"></div>
        </form>
    </div>

    <div id="app">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f1f5f9; padding-bottom: 1rem;">
            <div>
                <h2 id="welcome-title" style="margin:0;">Dashboard</h2>
                <p id="user-info" style="margin:0; color: #64748b; font-size: 0.9rem;"></p>
            </div>
            <button class="btn-logout" id="btn-logout">Logout</button>
        </div>

        <div class="grid">
            <div class="card-data">
                <h3>Stagioni</h3>
                <ul id="list-seasons"><li>Caricamento...</li></ul>
            </div>
            <div class="card-data">
                <h3>Società</h3>
                <ul id="list-societa"><li>Caricamento...</li></ul>
            </div>
        </div>
    </div>

    <script type="module">
        import { SUPABASE_URL, SUPABASE_KEY } from './config.js';

        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let CURRENT_USER = null;

        // Gestione Login Gemini
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errDiv = document.getElementById('error-msg');
            errDiv.style.display = 'none';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const { data: userRow, error: userErr } = await client
                    .from('users')
                    .select('id, username, email, name, role')
                    .eq('username', username)
                    .maybeSingle();

                if (userErr) throw new Error("Errore Database: " + userErr.message);
                if (!userRow) throw new Error("Utente non trovato.");

                const { data: authData, error: authError } = await client.auth.signInWithPassword({
                    email: userRow.email,
                    password: password
                });

                if (authError) throw new Error("Password errata.");

                CURRENT_USER = { ...authData.user, ...userRow };
                initDashboard();

            } catch (err) {
                errDiv.innerText = err.message;
                errDiv.style.display = 'block';
            }
        });

        function initDashboard() {
            document.getElementById('login-wrap').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('user-info').innerText = `Loggato come: ${CURRENT_USER.name} (${CURRENT_USER.role})`;
            loadData();
        }

        async function loadData() {
            const [resSeasons, resSocieta] = await Promise.all([
                client.from('seasons').select('*').order('name', { ascending: false }),
                client.from('societa').select('*').order('name')
            ]);

            const listSeasons = document.getElementById('list-seasons');
            if (resSeasons.data) {
                listSeasons.innerHTML = resSeasons.data.length 
                    ? resSeasons.data.map(s => `<li>${s.name} ${s.is_active ? '<span class="status-active">ATTIVA</span>' : ''}</li>`).join('')
                    : '<li>Nessun dato.</li>';
            }

            const listSocieta = document.getElementById('list-societa');
            if (resSocieta.data) {
                listSocieta.innerHTML = resSocieta.data.length
                    ? resSocieta.data.map(soc => `<li>${soc.name} <small>${soc.city || ''}</small></li>`).join('')
                    : '<li>Nessun dato.</li>';
            }
        }

        // Logout gestito internamente al modulo
        document.getElementById('btn-logout').addEventListener('click', async () => {
            await client.auth.signOut();
            location.reload();
        });
    </script>
</body>
</html>
