// Helper: get current category IDs assigned to user u with given role
function getUserCatIds(userId, role) {
  if (role === 'genitore') {
    return S.athletes.filter(a=>(a.parentIds||[]).includes(userId)).map(a=>a.id);
  }
  if (role === 'presidente') {
    const u = S.users.find(x=>x.id===userId);
    return u?.societyId ? [u.societyId] : [];
  }
  const key = {
    responsabile: 'managerIds', dirigente: 'directorIds',
    allenatore: 'coachIds', professionista: 'professionalIds'
  }[role];
  if (!key) return [];
  return S.categories.filter(c=>(c[key]||[]).includes(userId)).map(c=>c.id);
}

// Helper: update category arrays when user role/assignments change
function syncUserCatAssignments(userId, role, newCatIds) {
  const key = {
    responsabile: 'managerIds', dirigente: 'directorIds',
    allenatore: 'coachIds', professionista: 'professionalIds'
  }[role];

  // Genitore: l'associazione è sugli atleti (parentIds), non sulle categorie
  if (role === 'presidente') {
    // Per presidente: newCatIds[0] è il societyId selezionato
    const user = S.users.find(u => u.id === userId);
    if (user) {
      user.societyId = newCatIds[0] || null;
      sbSync('users', user);
    }
    return;
  }

  if (role === 'genitore') {
    // Raccogli tutti gli atleti che cambiano stato (aggiunti + rimossi)
    const toUpdate = new Set();

    // Rimuovi il genitore da tutti gli atleti
    S.athletes.forEach(a => {
      const had = (a.parentIds||[]).includes(userId);
      a.parentIds = (a.parentIds||[]).filter(i => i !== userId);
      if (had) toUpdate.add(a.id);
    });

    // Aggiungi il genitore agli atleti selezionati
    newCatIds.forEach(aid => {
      const ath = S.athletes.find(a => a.id === aid);
      if (ath) {
        if (!ath.parentIds) ath.parentIds = [];
        if (!ath.parentIds.includes(userId)) ath.parentIds.push(userId);
        toUpdate.add(ath.id);
      }
    });

    // Sincronizza solo gli atleti modificati
    toUpdate.forEach(aid => {
      const ath = S.athletes.find(a => a.id === aid);
      if (ath) {
        console.log('[genitore] sync atleta', ath.firstName, 'parentIds:', ath.parentIds);
        sbSync('athletes', ath);
      }
    });
    return;
  }

  if (!key) return;
  // Rimuovi utente da TUTTE le categorie per questo ruolo
  S.categories.forEach(c => { c[key] = (c[key]||[]).filter(i=>i!==userId); });
  // Aggiungi utente alle categorie selezionate
  newCatIds.forEach(cid => {
    const cat = S.categories.find(c=>c.id===cid);
    if (cat) {
      if (!cat[key]) cat[key]=[];
      if (!cat[key].includes(userId)) cat[key].push(userId);
    }
  });
  // Sincronizza TUTTE le categorie modificate su Supabase
  const affectedCats = S.categories.filter(c =>
    newCatIds.includes(c.id) || (c[key]||[]).length >= 0
  );
  affectedCats.forEach(cat => sbSync('categories', cat));
}

// ── PASSWORD STRENGTH ENGINE ──────────────────────────────────
function pwStrength(pw) {
  if (!pw) return { score: 0, label: '', color: '', checks: {} };
  const checks = {
    length:   pw.length >= 10,
    upper:    /[A-Z]/.test(pw),
    lower:    /[a-z]/.test(pw),
    digit:    /[0-9]/.test(pw),
    symbol:   /[^A-Za-z0-9]/.test(pw),
    noRepeat: !/(.)(\1{2,})/.test(pw),
    length14: pw.length >= 14,
  };
  const score = Object.values(checks).filter(Boolean).length;
  const map = [
    { min:0, label:'',           color:'#CBD5E0', bar:0   },
    { min:1, label:'Molto debole', color:'#DC2626', bar:14  },
    { min:2, label:'Debole',       color:'#EF4444', bar:28  },
    { min:3, label:'Discreta',     color:'#F59E0B', bar:45  },
    { min:4, label:'Sufficiente',  color:'#F59E0B', bar:60  },
    { min:5, label:'Buona',        color:'#10B981', bar:78  },
    { min:6, label:'Forte',        color:'#059669', bar:90  },
    { min:7, label:'Molto forte',  color:'#047857', bar:100 },
  ];
  const level = [...map].reverse().find(m => score >= m.min) || map[0];
  return { score, label: level.label, color: level.color, bar: level.bar, checks };
}

function pwStrengthHTML(inputId, confirmId) {
  return `
    <div id="pw-strength-bar-wrap" style="margin-top:6px;display:none">
      <div style="height:5px;border-radius:99px;background:var(--mist-3);overflow:hidden;margin-bottom:5px">
        <div id="pw-strength-bar" style="height:100%;width:0%;border-radius:99px;transition:width .3s,background .3s"></div>
      </div>

      </div>

function _updatePwStrengthUI(pw, inputId) {
  const wrap = document.getElementById('pw-strength-bar-wrap');
  const bar  = document.getElementById('pw-strength-bar');
  const lbl  = document.getElementById('pw-strength-label');
  const chk  = document.getElementById('pw-strength-checks');
  if (!wrap) return;
  if (!pw) { wrap.style.display='none'; return; }
  wrap.style.display = 'block';
  const s = pwStrength(pw);
  bar.style.width      = s.bar + '%';
  bar.style.background = s.color;
  lbl.textContent      = s.label;
  lbl.style.color      = s.color;
  const parts = [];
  if (!s.checks.length)   parts.push('≥10 car.');
  if (!s.checks.upper)    parts.push('MAIUSC.');
  if (!s.checks.lower)    parts.push('minusc.');
  if (!s.checks.digit)    parts.push('numero');
  if (!s.checks.symbol)   parts.push('simbolo');
  if (!s.checks.noRepeat) parts.push('no ripetizioni');
  chk.textContent = parts.length ? 'Manca: ' + parts.join(', ') : '✅ Tutti i requisiti soddisfatti';
}

function _updatePwConfirmUI(pw, conf) {
  const el = document.getElementById('pw-confirm-msg');
  if (!el || !conf) { if(el) el.style.display='none'; return; }
  el.style.display = 'block';
  if (pw === conf) {
    el.innerHTML = '<span style="color:var(--green)">✅ Le password coincidono</span>';
  } else {
    el.innerHTML = '<span style="color:var(--red)">❌ Le password non coincidono</span>';
  }
}

function pwIsStrong(pw) {
  const s = pwStrength(pw);
  // Richiede score ≥ 5: lunghezza, maiusc, minusc, numero, simbolo
  return s.checks.length && s.checks.upper && s.checks.lower && s.checks.digit && s.checks.symbol;
}

function pwErrorMsg(pw) {
  const s = pwStrength(pw);
  const missing = [];
  if (!s.checks.length)  missing.push('almeno 10 caratteri');
  if (!s.checks.upper)   missing.push('una lettera maiuscola');
  if (!s.checks.lower)   missing.push('una lettera minuscola');
  if (!s.checks.digit)   missing.push('un numero');
  if (!s.checks.symbol)  missing.push('un carattere speciale (!@#$%...)');
  return missing.length ? 'Password troppo debole. Aggiungi: ' + missing.join(', ') + '.' : '';
}

// ── GENERATORE PASSWORD SICURA ────────────────────────────────
function generateSecurePassword() {
  const upper   = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
  const lower   = 'abcdefghjkmnpqrstuvwxyz';
  const digits  = '23456789';
  const symbols = '!@#$%&*?+';
  const all     = upper + lower + digits + symbols;
  const arr     = crypto.getRandomValues(new Uint32Array(14));
  let pw = '';
  // Garantisce almeno uno di ogni classe
  pw += upper [arr[0]  % upper.length];
  pw += lower [arr[1]  % lower.length];
  pw += digits[arr[2]  % digits.length];
  pw += symbols[arr[3] % symbols.length];
  for (let i = 4; i < 14; i++) pw += all[arr[i] % all.length];
  // Shuffle
  return pw.split('').sort(() => Math.random() - 0.5).join('');
}

function fillGeneratedPassword(inputId) {
  const pw  = generateSecurePassword();
  const inp = document.getElementById(inputId);
  if (!inp) return;
  inp.value = pw;
  inp.type  = 'text';
  setTimeout(() => { if(inp) inp.type = 'password'; }, 3000);
  _updatePwStrengthUI(pw, inputId);
  const conf = document.getElementById(inputId === 'usr-pass' ? 'usr-pass-confirm' : 'pw-confirm');
  if (conf && conf.value) _updatePwConfirmUI(pw, conf.value);
  // Copy to clipboard
  navigator.clipboard?.writeText(pw).then(()=>toast('Password generata e copiata negli appunti 📋','success'))
    .catch(()=>toast('Password generata — copiala prima che scompaia','warning'));
}

function saveUser(id) {
  const name       = document.getElementById('usr-name').value.trim();
  const username   = document.getElementById('usr-uname').value.trim();
  const password   = document.getElementById('usr-pass').value;
  const pwConfirm  = document.getElementById('usr-pass-confirm')?.value || '';
  const role       = document.getElementById('usr-role').value;
  const profession = document.getElementById('usr-prof').value.trim();
  const phone      = document.getElementById('usr-phone').value.trim();
  const email      = document.getElementById('usr-email').value.trim();
  const catSelect  = document.getElementById('usr-cats');
  const catIds     = catSelect ? Array.from(catSelect.selectedOptions).map(o=>o.value) : [];

  if (!name || !username) { toast('Nome e username obbligatori','error'); return; }

  // ── Validazione password ─────────────────────────────────────
  if (password) {
    const pwErr = pwErrorMsg(password);
    if (pwErr) { toast(pwErr, 'error'); return; }
    if (password !== pwConfirm) { toast('Le password non coincidono','error'); return; }
  } else if (!id) {
    toast('La password è obbligatoria per i nuovi utenti','error');
    return;
  }

  if (!id && S.users.some(u=>u.username===username)) {
    toast('Username già esistente','error'); return;
  }

  let userId = id;
  if (id) {
    // ── MODIFICA UTENTE ESISTENTE ──
    const u = S.users.find(x=>x.id===id);
    const oldRole = u.role;
    if (oldRole !== role) {
      const oldKey = {responsabile:'managerIds',dirigente:'directorIds',allenatore:'coachIds',professionista:'professionalIds'}[oldRole];
      if (oldKey) S.categories.forEach(c=>{ c[oldKey]=(c[oldKey]||[]).filter(i=>i!==id); });
    }
    Object.assign(u, {name, username, role, profession, phone, email});

    // Aggiorna profilo su Supabase
    sbSync('users', u);

    // Nota: il reset password di altri utenti richiede service_role (Supabase Dashboard)
    if (password && DB_MODE === 'supabase') {
      toast('⚠️ Profilo aggiornato. Per cambiare la password usa Supabase Dashboard → Authentication → Users', 'warning');
    }

    // Ricorda quali categorie erano associate prima
    const prevCatIds = getUserCatIds(userId, role);
    syncUserCatAssignments(userId, role, catIds);
    // Sincronizza SOLO le categorie che sono cambiate (aggiunte o rimosse)
    if (role !== 'genitore') {
      const changedCatIds = new Set([...prevCatIds, ...catIds]);
      changedCatIds.forEach(cid => {
        const cat = S.categories.find(c => c.id === cid);
        if (cat) sbSync('categories', cat);
      });
    }
    saveState(); closeModal(); buildAdminConfigTab('users'); buildSidebarNav();
    toast('Utente aggiornato ✅','success');

  } else {
    // ── NUOVO UTENTE — usa signUp diretto (anon key) ──
    const authEmail = email || (username.includes('@') ? username : username + '@sporttrackpro.it');

    if (DB_MODE === 'supabase') {
      const btn = document.querySelector('.modal .btn-accent');
      if (btn) { btn.disabled = true; btn.textContent = 'Creazione in corso…'; }

      rpcCreateUser({
        email:      authEmail,
        password:   password,
        name:       name,
        username:   username,
        role:       role,
        profession: profession || '',
        phone:      phone || '',
        society_id: currentUser.societyId || null,
      }).then(result => {
        userId = result.id;

        // Aggiorna stato locale
        S.users.push({
          id: userId, username, role, name,
          profession, phone, email: authEmail,
          societyId: currentUser.societyId || null
        });
        syncUserCatAssignments(userId, role, catIds);
        // Sincronizza categorie/atleti modificati dopo creazione
        if (role !== 'genitore') {
          catIds.forEach(cid => {
            const cat = S.categories.find(c => c.id === cid);
            if (cat) sbSync('categories', cat);
          });
        }
        saveState();
        closeModal(); buildAdminConfigTab('users'); buildSidebarNav();
        toast('✅ Utente "' + name + '" creato — può accedere con: ' + authEmail, 'success');

      }).catch(err => {
        if (btn) { btn.disabled = false; btn.textContent = '💾 Salva Utente'; }
        toast('❌ Errore: ' + err.message, 'error');
      });

      return;

    } else {
      // Modalità locale (fallback)
      userId = uid();
      S.users.push({ id: userId, username, password, role, name, profession, phone, email: authEmail });
      syncUserCatAssignments(userId, role, catIds);
      saveState(); closeModal(); buildAdminConfigTab('users'); buildSidebarNav();
      toast('Utente aggiunto (modalità locale)','success');
    }
  }
}

function deleteUser(id) {
  const u = S.users.find(x=>x.id===id);
  if (!u) return;
  if (u.role === 'admin') { toast('Non puoi eliminare questo utente','error'); return; }
  if (!confirm(`Eliminare l'utente "${u.name}" anche da Supabase Auth?`)) return;

  S.users = S.users.filter(x=>x.id!==id);
  S.categories.forEach(c => {
    c.directorIds    = (c.directorIds||[]).filter(i=>i!==id);
    c.managerIds     = (c.managerIds||[]).filter(i=>i!==id);
    c.coachIds       = (c.coachIds||[]).filter(i=>i!==id);
    c.professionalIds= (c.professionalIds||[]).filter(i=>i!==id);
  });
  saveState();

function buildStaffViewConfig() {
  // For non-admin: show read-only staff list per accessible category
  const accIds = getAccessibleCategoryIds();
  const cats = S.categories.filter(c => accIds.includes(c.id));
  if (!cats.length) return '<div class="empty-state"><div class="icon">👥</div><h3>Nessuna categoria</h3></div>';

  const roleRow = (u, role) => {
    if (!u) return '';
    const rd = ROLES[role]||{label:role,icon:'👤',gradient:'#999'};
    const cls = {responsabile:'badge-purple',dirigente:'badge-green',allenatore:'badge-gold',professionista:'badge-teal'}[role]||'badge-gray';
    return `<div class="athlete-row" style="cursor:default;margin-bottom:4px">
      <div class="user-avatar" style="background:${rd.gradient};width:34px;height:34px;font-size:.7rem">${initials(u.name)}</div>
      <div class="athlete-info">
        <div class="name">${esc(u.name)}</div>
        <div class="meta">${esc(u.profession||rd.label)} · ${esc(u.email||'')}</div>
      </div>
      <span class="badge ${cls}">${rd.icon} ${rd.label}</span>
    </div>`;
  };

  return cats.map(cat => {
    const team = S.teams.find(t=>t.id===cat.teamId);
    const soc  = S.societies.find(s=>s.id===cat.societyId);
    const allStaff = [
      ...(cat.managerIds||[]).map(id=>({u:S.users.find(x=>x.id===id),role:'responsabile'})),
      ...(cat.directorIds||[]).map(id=>({u:S.users.find(x=>x.id===id),role:'dirigente'})),
      ...(cat.coachIds||[]).map(id=>({u:S.users.find(x=>x.id===id),role:'allenatore'})),
      ...(cat.professionalIds||[]).map(id=>({u:S.users.find(x=>x.id===id),role:'professionista'})),
    ].filter(x=>x.u);
    return `<div class="card" style="margin-bottom:16px">
      <div class="card-title">
        <div class="icon" style="background:var(--accent-l);color:var(--accent)">🏷️</div>
        ${esc(cat.name)}
        <span class="badge badge-gray text-sm" style="margin-left:8px">${esc(soc?.name||'')} · ${esc(team?.name||'')}</span>
      </div>
      ${allStaff.map(({u,role})=>roleRow(u,role)).join('')}
      ${allStaff.length===0?'<div class="text-muted text-sm">Nessuno staff assegnato</div>':''}
    </div>`;
  }).join('');
}

// ── Activity Types CRUD ────────────────────────────────────
function saveActivityTypes() {
  const current = getActivityTypesMap();
  const updated = {};
  Object.keys(current).forEach(k => {
    const emoji  = document.getElementById('act-emoji-'+k)?.value.trim() || current[k].emoji;
    const label  = document.getElementById('act-label-'+k)?.value.trim() || current[k].label;
    const color  = document.getElementById('act-color-'+k)?.value || current[k].color;
    updated[k] = { label, emoji, color, cls: 'act-'+k };
  });
  S.activityTypes = updated;
  saveState(); sbSyncConfig('activityTypes', updated);
  buildAdminConfigTab('activities');
  toast('Tipi di attività salvati ✅', 'success');
}

function addActivityType() {
  const key   = document.getElementById('new-act-key').value.trim().toUpperCase().replace(/\s/g,'');
  const emoji = document.getElementById('new-act-emoji').value.trim() || '📋';
  const label = document.getElementById('new-act-label').value.trim();
  const color = document.getElementById('new-act-color').value;
  if (!key || !label) { toast('Chiave e nome obbligatori','error'); return; }
  const current = getActivityTypesMap();
  if (current[key]) { toast('Chiave già esistente','error'); return; }
  if (!S.activityTypes) S.activityTypes = { ...ACTIVITY_TYPES_DEFAULT };
  else if (Object.keys(S.activityTypes).length === 0) S.activityTypes = { ...ACTIVITY_TYPES_DEFAULT };
  S.activityTypes[key] = { label, emoji, color, cls: 'act-'+key };
  saveState(); sbSyncConfig('activityTypes', S.activityTypes);
  buildAdminConfigTab('activities');
  toast('Tipo attività "'+label+'" aggiunto ✅', 'success');
}

function deleteActivityType(key) {
  if (!confirm('Eliminare il tipo "'+key+'"? Le sessioni già create non verranno modificate.')) return;
  if (!S.activityTypes) S.activityTypes = { ...ACTIVITY_TYPES_DEFAULT };
  delete S.activityTypes[key];
  saveState(); sbSyncConfig('activityTypes', S.activityTypes);
  buildAdminConfigTab('activities');
  toast('Tipo eliminato', 'success');
}

function resetActivityTypes() {
  if (!confirm('Ripristinare i tipi di attività predefiniti?')) return;
  S.activityTypes = null;
  saveState(); sbSyncConfig('activityTypes', null);
  buildAdminConfigTab('activities');
  toast('Tipi ripristinati ai default');
}

// ── Performance Params CRUD ───────────────────────────────
function savePerfParams() {
  const current = getPerfParams().map(normPerfParam);
  const updated = current.map(({key}) => {
    const label = document.getElementById('perf-label-'+key)?.value.trim() || key;
    return { key, label };
  });
  S.perfParams = updated;
  saveState(); sbSyncConfig('perfParams', updated);
  buildAdminConfigTab('activities');
  toast('Parametri performance salvati ✅', 'success');
}

function addPerfParam() {
  const key   = document.getElementById('new-perf-key').value.trim().toLowerCase().replace(/\s/g,'_');
  const label = document.getElementById('new-perf-label').value.trim();
  if (!key || !label) { toast('Chiave e etichetta obbligatorie','error'); return; }
  const current = getPerfParams().map(normPerfParam);
  if (current.some(p => p.key === key)) { toast('Parametro già esistente','error'); return; }
  if (!S.perfParams) S.perfParams = PERF_PARAMS_DEFAULT.map(k => ({ key:k, label:PERF_LABELS_DEFAULT[k]||k }));
  S.perfParams.push({ key, label });
  saveState(); sbSyncConfig('perfParams', S.perfParams);
  buildAdminConfigTab('activities');
  toast('Parametro "'+label+'" aggiunto ✅', 'success');
}

function deletePerfParam(key) {
  if (!confirm('Eliminare il parametro "'+key+'"? I dati già registrati non verranno modificati.')) return;
  const current = getPerfParams().map(normPerfParam);
  S.perfParams = current.filter(p => p.key !== key);
  saveState(); sbSyncConfig('perfParams', S.perfParams);
  buildAdminConfigTab('activities');
  toast('Parametro eliminato');
}

function resetPerfParams() {
  if (!confirm('Ripristinare i parametri performance predefiniti?')) return;
  S.perfParams = null;
  saveState(); sbSyncConfig('perfParams', null);
  buildAdminConfigTab('activities');
  toast('Parametri ripristinati ai default');
}

    const statusBadge = s.active

function addSeasonFromConfig() {
  const start = parseInt(document.getElementById('cfg-seas-start').value);
  const end   = parseInt(document.getElementById('cfg-seas-end').value);
  if (!start || !end || end <= start) { toast('Anno inizio e fine non validi','error'); return; }
  const name = start+'/'+end;
  if ((S.seasons||[]).some(s => s.name===name)) { toast('Stagione già esistente','error'); return; }
  if (!S.seasons) S.seasons = [];
  const newSeas = { id: uid(), name, startYear: start, endYear: end, active: false };
  S.seasons.push(newSeas);
  saveState(); sbSync('seasons', newSeas); rebuildSeasonSelector(); buildAdminConfigTab('seasons');
  toast('Stagione '+name+' aggiunta','success');
}

  if (!canAccessCategory(selectedCategoryId)) { el.innerHTML = '<div class="empty-state"><p>Accesso non autorizzato</p></div>'; return; }
  const activeSeas  = getActiveSeason();
  const catTeamsAth = getCategoryTeams(selectedCategoryId);
  const multiTeamAth= catTeamsAth.length > 1;
  const athletes = getCategoryAthletesForSeason(selectedCategoryId, activeSeas?.id).sort((a,b)=>(a.lastName||'').localeCompare(b.lastName||''));
  setTopbar('Atleti', cat?.name||'');
  el.innerHTML = `
    <div class="page-header">
      <div class="header-row">
        <div><h2>Roster Atleti</h2><p>Categoria: <b>${esc(cat?.name||'')}</b> · ${athletes.length} atleti${activeSeas ? ' · <span class="season-badge">⚽ '+esc(activeSeas.name)+'</span>' : ''}</p></div>
        ${canEdit(selectedCategoryId) ? `<button class="btn btn-accent" onclick="openAthleteModal()">+ Aggiungi Atleta</button>` : '<span class="badge badge-teal">🔒 Sola lettura</span>'}

      <select onchange="filterAthletes()" id="ath-sort">
        <option value="name">Ordina per cognome</option>
        <option value="number">Per numero</option>
        ${multiTeamAth ? `<option value="team">Per squadra</option>` : ''}
        <option value="pres">Per presenze</option>
      </select>
    </div>
    <div class="card" style="padding:0">
      <div class="table-wrap">

          <thead><tr>
            <th>#</th><th>Atleta</th><th>Squadra</th><th>Data Nascita</th><th>Ruolo</th><th>Presenze</th><th>% Pres.</th>
            <th>Tecnica</th><th>Fisico</th><th>Tattica</th><th>Mentale</th><th>Comun.</th>
            <th>Note</th><th>Azioni</th>
          </tr></thead>
          <tbody id="ath-tbody"></tbody>
        </table>

  `;
  renderAthleteTable(athletes);
};
function renderAthleteTable(athletes) {
  const tbody = document.getElementById('ath-tbody');
  if (!tbody) return;
  const sessions = getCategorySessions(selectedCategoryId);
  tbody.innerHTML = athletes.map(ath => {
    const atts = getAthleteAttendances(ath.id);
    const sessAtts = atts.filter(a => sessions.some(s=>s.id===a.sessionId));
    const pres = sessAtts.filter(a=>a.status==='P').length;
    const pr = pct(pres, sessions.length);
    const perf = getAthleteAvgPerf(ath.id);
    const pBadge = (v) => v > 0 ? `<div class="stars" style="justify-content:center">${[1,2,3,4,5].map(i=>`<span style="color:${i<=Math.round(v)?'var(--gold)':'var(--mist-3)'}">★</span>`).join('')}</div>` : '<span class="text-muted">—</span>';
    return `<tr>
      <td class="fw-700" style="font-family:var(--font-mono)">${ath.number||'—'}</td>
      <td>
        <div style="display:flex;align-items:center;gap:8px;cursor:pointer" onclick="openAthleteProfile('${ath.id}')">
          ${athleteAvatar(ath, 32)}
          <div><div class="fw-600">${esc(ath.lastName)} ${esc(ath.firstName)}</div></div>
        </div>
      </td>
      <td>${ath.teamId ? `<span class="badge badge-gray" style="font-size:.73rem">${esc(S.teams.find(t=>t.id===ath.teamId)?.name||'—')}</span>` : '<span class="text-muted text-sm">—</span>'}</td>
      <td>${fmtDate(ath.dob)}</td>
      <td>${esc(ath.role||'—')}</td>
      <td class="fw-700">${pres}/${sessions.length}</td>
      <td>${ratingBadge(pr)} <span class="fw-700 text-sm">${pr}%</span></td>
      <td>${pBadge(perf.tecnica)}</td>
      <td>${pBadge(perf.fisico)}</td>
      <td>${pBadge(perf.tattica)}</td>
      <td>${pBadge(perf.mentale)}</td>
      <td>${pBadge(perf.comunicazione)}</td>
      <td style="max-width:120px" class="text-sm text-muted truncate">${esc(ath.notes||'—')}</td>
      <td style="display:flex;gap:4px;flex-wrap:wrap">
        <button class="btn btn-ghost btn-sm" onclick="openAthleteProfile('${ath.id}')">👤</button>
        ${canEdit(selectedCategoryId)?`<button class="btn btn-ghost btn-sm" onclick="openAthleteModal('${ath.id}')">✏️</button>`:''}
        ${canEdit(selectedCategoryId)?`<button class="btn btn-danger btn-sm" onclick="deleteAthlete('${ath.id}')">🗑️</button>`:''}
      </td>
    </tr>`;
  }).join('');
  if (!athletes.length) tbody.innerHTML = `<tr><td colspan="13"><div class="empty-state"><div class="icon">👥</div><h3>Nessun atleta</h3><p>Aggiungi il primo atleta al roster.</p>${canEdit(selectedCategoryId)?`<button class="btn btn-accent" onclick="openAthleteModal()">+ Aggiungi Atleta</button>`:''}</div></td></tr>`;
}
function filterAthletes() {
  const q          = (document.getElementById('ath-search')?.value||'').toLowerCase();
  const sort       = document.getElementById('ath-sort')?.value||'name';
  const teamFilter = document.getElementById('ath-team-filter')?.value||'';
  const seas       = getActiveSeason();
  let athletes = getCategoryAthletesForSeason(selectedCategoryId, seas?.id)
    .filter(a => (a.firstName+' '+a.lastName+' '+(a.role||'')+' '+(a.nickname||'')).toLowerCase().includes(q));
  if (teamFilter) athletes = athletes.filter(a => (a.teamId||'')===teamFilter);
  if (sort==='number') athletes.sort((a,b)=>(a.number||0)-(b.number||0));
  else if (sort==='team') athletes.sort((a,b)=>(S.teams.find(t=>t.id===a.teamId)?.name||'').localeCompare(S.teams.find(t=>t.id===b.teamId)?.name||''));
  else if (sort==='pres') athletes.sort((a,b)=>getAthletePresenceRate(b.id,selectedCategoryId)-getAthletePresenceRate(a.id,selectedCategoryId));
  else athletes.sort((a,b)=>(a.lastName||'').localeCompare(b.lastName||''));
  renderAthleteTable(athletes);
}

  const sel = selectedIds || [];
  return `<select id="ath-parents" multiple style="min-height:80px;padding:6px;border:1.5px solid var(--mist-3);border-radius:var(--radius);width:100%;font-size:.88rem">

function saveAthlete(id) {
  const firstName  = document.getElementById('ath-fname').value.trim();
  const lastName   = document.getElementById('ath-lname').value.trim();
  const categoryId = document.getElementById('ath-cat')?.value || selectedCategoryId || '';
  const teamId     = document.getElementById('ath-team')?.value || '';

  if (!firstName||!lastName) { toast('Nome e cognome obbligatori','error'); return; }
  if (!categoryId) { toast('Seleziona una categoria','error'); return; }

  // Permission check: admin can always edit; others need canEdit on the target category
  if (currentUser.role !== 'admin' && !canEdit(categoryId)) {
    toast('Non hai i permessi per questa categoria','error'); return;
  }

  const parentSelect = document.getElementById('ath-parents');
  const parentIds = parentSelect ? Array.from(parentSelect.selectedOptions).map(o => o.value) : [];

  const data = {
    firstName, lastName, categoryId, teamId,
    nickname:  document.getElementById('ath-nick')?.value.trim() || '',
    dob:       document.getElementById('ath-dob').value,
    number:    parseInt(document.getElementById('ath-num').value)||null,
    role:      document.getElementById('ath-role')?.value.trim() || '',
    notes:     document.getElementById('ath-notes')?.value.trim() || '',
    parentIds: parentIds,
  };

  if (id) {
    const existing = S.athletes.find(x=>x.id===id);
    if (!existing) { toast('Atleta non trovato','error'); return; }
    Object.assign(existing, data);
    toast('Atleta aggiornato ✅','success');
  } else {
    S.athletes.push({ id: uid(), ...data });
    toast('Atleta aggiunto ✅','success');
  }
  const savedAth = id ? S.athletes.find(x=>x.id===id) : S.athletes[S.athletes.length-1];
  saveState(); sbSync('athletes', savedAth); closeModal();
  // Refresh the right view depending on context
  if (currentView === 'admin-athletes') {
    viewBuilders['admin-athletes'](document.getElementById('view-admin-athletes'));
  } else {
    // Reset selectedCategoryId to the saved category if it changed
    if (categoryId && categoryId !== selectedCategoryId) selectedCategoryId = categoryId;
    showView('athletes');
  }
}
function deleteAthlete(id) {
  if (!confirm('Eliminare questo atleta e tutte le presenze?')) return;
  S.athletes = S.athletes.filter(x=>x.id!==id);
  S.attendances = S.attendances.filter(x=>x.athleteId!==id);
  saveState();
  sbSync('athletes', id, true);
  sbSyncDeleteWhere('attendances','athlete_id',id);
  sbSyncDeleteWhere('athlete_seasons','athlete_id',id);
  showView('athletes'); toast('Atleta eliminato');
}

function createSession() {
  const date   = document.getElementById('sess-date').value;
  const type   = document.getElementById('sess-type').value;
  const notes  = document.getElementById('sess-notes').value.trim();
  const catId  = document.getElementById('ns-cat')?.value || selectedCategoryId || '';
  const teamId = document.getElementById('ns-team')?.value || '';
  if (!date) { toast('Data obbligatoria','error'); return; }
  if (!catId) { toast('Seleziona una categoria','error'); return; }
  if (!canEditSessions(catId)) { toast('Non hai i permessi','error'); return; }
  const sess = { id: uid(), categoryId: catId, date, type, notes, createdBy: currentUser.id, societyId: currentUser.societyId || null };
  if (teamId) sess.teamId = teamId;
  S.sessions.push(sess);
  // Sync filter state
  if (!window._sessState) window._sessState = {};
  window._sessState.catId = catId;
  window._sessState.type  = type;
  if (catId !== selectedCategoryId) { selectedCategoryId = catId; buildSidebarNav(); }
  saveState(); sbSync('sessions', sess); closeModal();
  toast('Sessione creata ✅','success');
  openSessionEdit(sess.id);
}

  saveState();
  sbSync('sessions', id, true);
  sbSyncDeleteWhere('attendances','session_id',id);
  sbSyncDeleteWhere('performances','session_id',id);
  renderSessionsList(); toast('Sessione eliminata');
}

// Clean click handler using data attributes — avoids nested template literal issues
function attClick(btn) {
  if (btn.disabled) return;
  const sessId = btn.dataset.sessid;
  const athId  = btn.dataset.athid;
  const st     = btn.dataset.st;
  setAttStatus(sessId, athId, st);
}

function setAttStatus(sessId, athleteId, status) {
  let att = S.attendances.find(a => a.sessionId===sessId && a.athleteId===athleteId);
  if (!att) {
    att = { id: uid(), sessionId: sessId, athleteId, status, perf: { tecnica:0, fisico:0, tattica:0, mentale:0, comunicazione:0 }, notes: '' };
    S.attendances.push(att);
  } else {
    att.status = status;
  }
  saveState(); sbSync('attendances', att);
  // update UI
  ['P','A','G'].forEach(s => {
    const btn = document.getElementById(`btn-${s}-${athleteId}`);
    if (btn) { btn.className = `att-cell ${s===status?`att-${s}`:'att-empty'}`; }
  });
  const perfSec = document.getElementById(`perf-section-${athleteId}`);
  if (perfSec) perfSec.style.display = status==='P' ? 'block' : 'none';
}
function setStarPerf(star) {
  const v = parseInt(star.dataset.v);
  const p = star.dataset.param;
  const aid = star.dataset.aid;
  const sessId = star.dataset.sessid;
  let att = S.attendances.find(a => a.sessionId===sessId && a.athleteId===aid);
  if (!att) return;
  if (!att.perf) att.perf = {};
  att.perf[p] = v;
  // Salva anche in performances table su Supabase
  const perfObj = { id: att.id, sessionId: att.sessionId, athleteId: att.athleteId, params: att.perf, notes: att.notes||'' };
  saveState(); sbSync('performances', perfObj);
  const stars = document.querySelectorAll(`#stars-${aid}-${p} .star`);
  stars.forEach((s,i) => s.classList.toggle('on', i<v));
}
function setAttNote(sessId, athleteId, val) {
  const att = S.attendances.find(a => a.sessionId===sessId && a.athleteId===athleteId);
  if (att) { att.notes = val; saveState(); sbSync('attendances', att); }
}
function markAll(sessId, status) {
  const athletes = getCategoryAthletes(selectedCategoryId);
  athletes.forEach(ath => setAttStatus(sessId, ath.id, status));
  toast(`Tutti segnati: ${STATUS_LABELS[status]}`, 'success');
}

function buildAthDashTable(athStats, filter) {
  let data = athStats;
  if (filter==='best') data = athStats.filter(x=>x.pr>=70);
  if (filter==='risk') data = athStats.filter(x=>x.pr<55);
  const _multiT = getCategoryTeams(selectedCategoryId).length > 1;
  const _noTeamFilter = !window._dashTeam;
  return `<table>
    <thead><tr><th>Atleta</th><th>Ruolo</th>${_multiT && _noTeamFilter ? '<th>Squadra</th>' : ''}<th>Presenze %</th>${getPerfParams().map(normPerfParam).map(({label})=>`<th>${esc(label)}</th>`).join('')}<th>Overall</th><th>Azione</th></tr></thead>
    <tbody>${data.map(({a,pr,perf})=>{
      const stars = v => v>0?`<span style="color:var(--gold)">${'★'.repeat(Math.round(v))}</span><span style="color:var(--mist-3)">${'★'.repeat(5-Math.round(v))}</span>`:'<span class="text-muted">—</span>';
      const teamName = a.teamId ? S.teams.find(t=>t.id===a.teamId)?.name||'—' : '—';
      return `<tr>
        <td style="cursor:pointer" onclick="openAthleteProfile('${a.id}')">
          <div style="display:flex;align-items:center;gap:8px">${athleteAvatar(a,28)}<span class="fw-600">${esc(a.lastName)} ${esc(a.firstName)}</span></div>
        </td>
        <td class="text-sm">${esc(a.role||'—')}</td>
        ${_multiT && _noTeamFilter ? `<td><span class="badge badge-gray" style="font-size:.72rem">${esc(teamName)}</span></td>` : ''}
        <td>${ratingBadge(pr)} <span class="fw-700">${pr}%</span></td>
        ${getPerfParams().map(normPerfParam).map(({key})=>`<td>${stars(perf[key]||0)}</td>`).join('')}
        <td>${stars(perf.overall)}</td>
        <td><button class="btn btn-ghost btn-sm" onclick="openAthleteProfile('${a.id}')">Profilo</button></td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}
function showAthletesDashTab(filter) {
  const _seas = window._dashSeas || getActiveSeason()?.id;
  const _team = window._dashTeam || undefined;
  const athletes = getCategoryAthletesForSeason(selectedCategoryId, _seas, _team);
  const athStats = athletes.map(a => {
    const pr = getAthletePresenceRate(a.id, selectedCategoryId);
    const perf = getAthleteAvgPerf(a.id);
    return { a, pr, perf };
  }).sort((x,y)=>y.pr-x.pr);
  const c = document.getElementById('ath-dash-table');
  if (c) c.innerHTML = buildAthDashTable(athStats, filter);
}

viewBuilders['athlete-profile'] = (el) => {
  const id = window._athProfileId;
  const ath = S.athletes.find(a=>a.id===id);
  if (!ath) { el.innerHTML = '<div class="empty-state"><p>Atleta non trovato</p></div>'; return; }
  const cat = S.categories.find(c=>c.id===ath.categoryId);
  const sessions = getCategorySessions(ath.categoryId);
  const atts = getAthleteAttendances(id);
  const sessAtts = atts.filter(a=>sessions.some(s=>s.id===a.sessionId));
  const pres = sessAtts.filter(a=>a.status==='P').length;
  const ass = sessAtts.filter(a=>a.status==='A').length;
  const giust = sessAtts.filter(a=>a.status==='G').length;
  const pr = pct(pres, sessions.length);
  const perf = getAthleteAvgPerf(id);
  const color = avatarColor((ath.firstName||'')+(ath.lastName||''));
  setTopbar(ath.lastName+' '+ath.firstName, cat?.name||'');

  // per-type stats
  const typeStats = getActivityTypes().map(([k,v]) => {
    const typeSess = sessions.filter(s=>s.type===k);
    const typeAtts = atts.filter(a=>typeSess.some(s=>s.id===a.sessionId));
    const tp = pct(typeAtts.filter(a=>a.status==='P').length, typeSess.length);
    return { key:k, act:v, sessions: typeSess.length, presRate: tp };
  });

  // session history
  const history = sessions.map(s => {
    const att = atts.find(a=>a.sessionId===s.id);
    return { s, att };
  }).reverse();

  el.innerHTML = `
    <div style="display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap;margin-bottom:24px">
      <div style="width:90px;height:90px;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;font-size:2.2rem;font-weight:800;color:white;flex-shrink:0">
        ${initials((ath.firstName||'')+(ath.lastName||''))}
      </div>
      <div style="flex:1;min-width:200px">
        <h2 style="font-size:1.8rem;letter-spacing:-.03em">${esc(ath.lastName)} ${esc(ath.firstName)}</h2>
        <div style="font-size:.95rem;color:var(--ink-3);margin-top:4px">#${ath.number||'—'} · ${esc(ath.role||'—')}</div>
        <div style="margin-top:6px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">
          <span class="badge badge-blue" style="font-size:.8rem">🏷️ ${esc(cat?.name||'—')}</span>
          ${ath.teamId ? `<span class="badge badge-gray" style="font-size:.8rem">👕 ${esc(S.teams.find(t=>t.id===ath.teamId)?.name||'—')}</span>` : ''}
          ${ath.nickname ? `<span class="badge badge-gold" style="font-size:.8rem">"${esc(ath.nickname)}"</span>` : ''}
        </div>
        <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
          ${ratingBadge(pr)}
          <span class="badge badge-gray">Nato ${fmtDate(ath.dob)||'—'}</span>
          <span class="badge badge-blue">${pres} presenze</span>
          <span class="badge badge-red">${ass} assenze</span>
          <span class="badge badge-gold">${giust} giust.</span>
        </div>
        ${ath.notes?`<div style="margin-top:12px;padding:10px 14px;background:var(--mist);border-radius:8px;font-size:.88rem;color:var(--ink-3)">📝 ${esc(ath.notes)}</div>`:''}
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${canEdit(ath.categoryId) ? `<button class="btn btn-ghost" onclick="openAthleteModal('${id}')">✏️ Modifica</button>` : ''}
        <button class="btn btn-ghost" onclick="openAthleteSeasonModal('${id}')">⚽ Stagioni</button>
        <button class="btn btn-ghost" onclick="history.back()">← Torna</button>
      </div>
    </div>

    <div class="stats-grid" style="margin-bottom:20px">
      <div class="stat-card blue" style="cursor:pointer" onclick="showView('sessions')" title="Vai a Sessioni"><div class="accent-bar"></div><div class="label">% Presenze</div><div class="value">${pr}%</div><div class="sub">${pres}/${sessions.length}</div></div>
      ${typeStats.filter(t=>t.sessions>0).map(t=>`<div class="stat-card ${t.act.color}" style="cursor:pointer" onclick="showView('sessions')" title="Vai a Sessioni"><div class="accent-bar"></div><div class="label">${t.act.label}</div><div class="value">${t.presRate}%</div><div class="sub">${t.sessions} sess.</div></div>`).join('')}
      <div class="stat-card gold" style="cursor:pointer" onclick="showView('sessions')" title="Vai a Sessioni"><div class="accent-bar"></div><div class="label">Performance</div><div class="value">${perf.overall?perf.overall.toFixed(1):'—'}</div><div class="sub">media overall</div></div>
    </div>

    <div class="grid-2" style="margin-bottom:20px">
      <div class="card">
        <div class="card-title"><div class="icon" style="background:var(--gold-l);color:var(--gold)">⭐</div>Profilo Performance</div>
        <div class="perf-bars">
          ${getPerfParams().map(normPerfParam).map(({key,label}) => perfBar(label, perf[key]||0)).join('')}
        </div>
      </div>
      <div class="card">
        <div class="card-title"><div class="icon" style="background:var(--accent-l);color:var(--accent)">📊</div>Presenze per Tipo</div>
        ${typeStats.map(t => t.sessions>0 ? `
          <div style="margin-bottom:14px">
            <div class="flex items-center justify-between mb-8">${actBadge(t.key)}<span class="fw-700 text-sm">${t.presRate}%</span></div>
            <div class="progress-bar"><div class="progress-fill ${t.presRate>=70?'green':t.presRate>=50?'gold':'red'}" style="width:${t.presRate}%"></div></div>
          </div>` : '').join('')}
        ${typeStats.every(t=>t.sessions===0)?'<div class="text-muted text-sm">Nessuna sessione</div>':''}
      </div>
    </div>

    <div class="card">
      <div class="card-title"><div class="icon" style="background:var(--teal-l);color:var(--teal)">📋</div>Storico Sessioni</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Data</th><th>Tipo</th><th>Stato</th><th>Tecnica</th><th>Fisico</th><th>Tattica</th><th>Mentale</th><th>Comun.</th><th>Note</th></tr></thead>
          <tbody>${history.map(({s,att})=>{
            const st = att?.status||'—';
            const p = att?.perf||{};
            const stCls = st==='P'?'badge-green':st==='A'?'badge-red':st==='G'?'badge-gold':'badge-gray';
            const stars = v => v>0?`<span style="color:var(--gold);font-size:.85rem">${'★'.repeat(v)}</span>`:'—';
            return `<tr>
              <td class="fw-700">${fmtDate(s.date)}</td>
              <td>${actBadge(s.type)}</td>
              <td><span class="badge ${stCls}">${STATUS_LABELS[st]||'—'}</span></td>
              <td>${stars(p.tecnica)}</td>
              <td>${stars(p.fisico)}</td>
              <td>${stars(p.tattica)}</td>
              <td>${stars(p.mentale)}</td>
              <td>${stars(p.comunicazione)}</td>
              <td class="text-sm text-muted">${esc(att?.notes||'')}</td>
            </tr>`;
          }).join('')}</tbody>
        </table>
      </div>
    </div>
  `;
}

  el.innerHTML = `
    <div class="page-header"><div class="header-row"><div><h2>🏛️ Dashboard Società</h2><p>Analisi per società, squadra e atleta</p></div></div></div>
    <div class="tabs" id="soc-tabs">
      ${S.societies.map(s=>`<button class="tab-btn ${s.id===activeSoc?'active':''}" onclick="showSocTab('${s.id}')">${esc(S.sports.find(sp=>sp.id===s.sportId)?.icon||'🏅')} ${esc(s.name)}</button>`).join('')}
    </div>
    <div id="soc-content"></div>
  `;

function showSocTab(socId) {
  window._activeSoc = socId;
  document.querySelectorAll('#soc-tabs .tab-btn').forEach((b,i) => {
    b.classList.toggle('active', S.societies[i]?.id === socId);
  });
  buildSocDashContent(socId);
}
function buildSocDashContent(socId) {
  const c = document.getElementById('soc-content');
  if (!c) return;
  const soc = S.societies.find(s=>s.id===socId);
  const sport = S.sports.find(s=>s.id===soc?.sportId);
  const teams = S.teams.filter(t=>t.societyId===socId);
  const accIds = getAccessibleCategoryIds();
  const cats = S.categories.filter(c=>c.societyId===socId && (currentUser.role==='admin' || accIds.includes(c.id)));
  const allAths = S.athletes.filter(a=>cats.some(c=>c.id===a.categoryId));
  const allSess = S.sessions.filter(s=>cats.some(c=>c.id===s.categoryId));
  const allAtts = S.attendances.filter(a=>allSess.some(s=>s.id===a.sessionId));
  const presAtts = allAtts.filter(a=>a.status==='P').length;
  const globalPct2 = pct(presAtts, allAtts.length||1);

  c.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;padding:18px;background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--mist-2)">
      <div style="font-size:2.5rem">${sport?.icon||'🏅'}</div>
      <div>
        <div style="font-size:1.4rem;font-weight:800;font-family:var(--font-head)">${esc(soc?.name||'')}</div>
        <div class="text-muted">${esc(sport?.name||'—')} · ${esc(soc?.city||'')} · ${esc(soc?.email||'')}</div>
      </div>
    </div>


    <div class="grid-2">
      <div class="card">
        <div class="card-title"><div class="icon" style="background:var(--accent-l);color:var(--accent)">👕</div>Squadre & Categorie</div>
        ${teams.map(team => {
          const teamCats = cats.filter(c=>c.teamId===team.id);
          return `<div style="margin-bottom:16px;padding:14px;background:var(--mist);border-radius:10px">
            <div class="fw-700 mb-16">${esc(team.name)}</div>
            ${teamCats.map(cat=>{
              const st2 = getCategoryStats(cat.id);
              return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--mist-2);cursor:pointer" onclick="showCatDashboard('${cat.id}')">
                <span class="badge badge-blue">${esc(cat.name)}</span>
                <div style="flex:1"><div class="progress-bar"><div class="progress-fill ${st2.presenceRate>=70?'green':st2.presenceRate>=50?'gold':'red'}" style="width:${st2.presenceRate}%"></div></div></div>
                <span class="fw-700 text-sm">${st2.presenceRate}%</span>
                <span class="text-muted text-sm">${st2.athletes} atleti</span>
              </div>`;
            }).join('')}
          </div>`;
        }).join('')}
      </div>
      <div class="card">
        <div class="card-title"><div class="icon" style="background:var(--gold-l);color:var(--gold)">🏆</div>Top Atleti (Presenze)</div>
        ${allAths.map(a=>{
          const cat2 = cats.find(c=>c.id===a.categoryId);
          const pr2 = getAthletePresenceRate(a.id, a.categoryId);
          return { a, cat:cat2, pr:pr2 };
        }).sort((x,y)=>y.pr-x.pr).slice(0,8).map(({a,cat:c2,pr2})=>`
          <div class="athlete-row" style="cursor:pointer" onclick="openAthleteProfile('${a.id}')">
            ${athleteAvatar(a)}
            <div class="athlete-info">
              <div class="name">${esc(a.lastName)} ${esc(a.firstName)}</div>
              <div class="meta">${esc(c2?.name||'—')}</div>
            </div>
            ${ratingBadge(pr2)} <span class="fw-700 text-sm" style="margin-left:4px">${pr2}%</span>
          </div>`).join('')}
      </div>
    </div>
  `;
}

viewBuilders['admin-reports'] = (el) => {
  const isAdmin = currentUser.role === 'admin';
  const accIds = getAccessibleCategoryIds();
  setTopbar(isAdmin ? 'Report Avanzati' : 'Report Squadre','');
  const accSessions = S.sessions.filter(s => isAdmin || accIds.includes(s.categoryId));
  const accSessIds = accSessions.map(s=>s.id);
  const totalAtts = S.attendances.filter(a=>accSessIds.includes(a.sessionId)).length;
  const presentAtts = S.attendances.filter(a=>accSessIds.includes(a.sessionId)&&a.status==='P').length;
  const absentAtts = S.attendances.filter(a=>accSessIds.includes(a.sessionId)&&a.status==='A').length;
  const giustAtts = S.attendances.filter(a=>accSessIds.includes(a.sessionId)&&a.status==='G').length;

  // top athletes across accessible categories
  const allAthStats = S.athletes.filter(a=>isAdmin||accIds.includes(a.categoryId)).map(a=>{
    const cat = S.categories.find(c=>c.id===a.categoryId);
    const pr = getAthletePresenceRate(a.id, a.categoryId);
    const perf = getAthleteAvgPerf(a.id);
    return {a,cat,pr,perf};
  }).sort((x,y)=>y.pr-x.pr);

  el.innerHTML = `
    <div class="page-header"><div class="header-row"><div><h2>📈 Report Avanzati</h2><p>Analisi globale di tutta la società</p></div></div></div>

    <div class="stats-grid">
      <div class="stat-card blue" style="cursor:pointer" onclick="showView('sessions')" title="Vai a Sessioni"><div class="accent-bar"></div><div class="label">Slot Totali</div><div class="value">${totalAtts}</div></div>
      <div class="stat-card green" style="cursor:pointer" onclick="showView('sessions')" title="Vai a Sessioni"><div class="accent-bar"></div><div class="label">Presenze</div><div class="value">${presentAtts}</div><div class="sub">${pct(presentAtts,totalAtts)}%</div></div>
      <div class="stat-card red" style="cursor:pointer" onclick="showView('sessions')" title="Vai a Sessioni"><div class="accent-bar"></div><div class="label">Assenze</div><div class="value">${absentAtts}</div><div class="sub">${pct(absentAtts,totalAtts)}%</div></div>
      <div class="stat-card gold" style="cursor:pointer" onclick="showView('sessions')" title="Vai a Sessioni"><div class="accent-bar"></div><div class="label">Giustificati</div><div class="value">${giustAtts}</div><div class="sub">${pct(giustAtts,totalAtts)}%</div></div>
    </div>

    <div class="card" style="margin-bottom:20px">
      <div class="card-title"><div class="icon" style="background:var(--teal-l);color:var(--teal)">📊</div>Classifica Atleti — Tutti le Categorie</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Pos.</th><th>Atleta</th><th>Categoria</th><th>% Pres.</th><th>Tecnica</th><th>Fisico</th><th>Tattica</th><th>Mentale</th><th>Overall</th><th>Valut.</th></tr></thead>
          <tbody>${allAthStats.map(({a,cat,pr,perf},i)=>{
            const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
            const stars = v=>v>0?`<span style="color:var(--gold)">${'★'.repeat(Math.round(v))}</span><span style="color:var(--mist-3)">${'★'.repeat(5-Math.round(v))}</span>`:'—';
            return `<tr>
              <td class="fw-700 text-sm">${medal||'#'+(i+1)}</td>
              <td style="cursor:pointer" onclick="openAthleteProfile('${a.id}')">
                <div style="display:flex;align-items:center;gap:8px">${athleteAvatar(a,28)}<span class="fw-600">${esc(a.lastName)} ${esc(a.firstName)}</span></div>
              </td>
              <td><span class="badge badge-blue">${esc(cat?.name||'—')}</span></td>
              <td class="fw-700">${pr}%</td>
              <td>${stars(perf.tecnica)}</td>
              <td>${stars(perf.fisico)}</td>
              <td>${stars(perf.tattica)}</td>
              <td>${stars(perf.mentale)}</td>
              <td>${stars(perf.overall)}</td>
              <td>${ratingBadge(pr)}</td>
            </tr>`;
          }).join('')}</tbody>
        </table>
      </div>
    </div>

    <div class="card">

      <div class="table-wrap">

//  BACKUP & RESTORE
// ══════════════════════════════════════════════════════════════════
function exportBackupJSON() {
  const data = JSON.stringify(S, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `backup_sporttrack_${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('✅ Backup esportato con successo', 'success');
}

function importBackupJSON(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const parsed = JSON.parse(e.target.result);
      // Basic validation
      if (!parsed.users || !parsed.athletes === undefined) {
        toast('❌ File non valido: struttura non riconosciuta', 'error');
        return;
      }
      if (!confirm('⚠️ Vuoi sovrascrivere tutti i dati attuali con il backup? L\'operazione non è reversibile.')) {
        input.value = '';
        return;
      }
      S = parsed;
      saveState();
      toast('✅ Backup ripristinato con successo! Ricaricamento...', 'success');
      setTimeout(() => location.reload(), 1500);
    } catch(err) {
      toast('❌ Errore nella lettura del file JSON', 'error');
    }
    input.value = '';
  };
  reader.readAsText(file);
}

// ══════════════════════════════════════════════════════════════════
//  EXCEL EXPORT ENGINE (pure JS, no dependency)
//  Generates real .xlsx files using Open XML format
// ══════════════════════════════════════════════════════════════════

// Minimal XLSX writer — produces valid .xlsx without external libraries
const XLSXWriter = {
  // Escape XML special chars
  xmlEsc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  },

  // Convert column index (0-based) to letter(s)
  colLetter(n) {
    let s = '';
    n++;
    while (n > 0) { s = String.fromCharCode(65 + (n-1)%26) + s; n = Math.floor((n-1)/26); }
    return s;
  },

  // Cell reference
  ref(row, col) { return this.colLetter(col) + row; },

  // Build shared strings table
  buildSST(sheets) {
    const strs = new Map();
    let idx = 0;
    sheets.forEach(sh => sh.rows.forEach(row => row.forEach(cell => {
      if (cell.t === 's' && !strs.has(cell.v)) strs.set(cell.v, idx++);
    })));
    return strs;
  },

  // Cell XML
  cellXML(ref, cell, sst) {
    if (cell.v === null || cell.v === undefined || cell.v === '') return '';
    const s = cell.s || 0;
    if (cell.t === 's') {
      const si = sst.get(cell.v);
      return `<c r="${ref}" t="s" s="${s}"><v>${si}</v></c>`;
    }
    if (cell.t === 'p') { // percent
      const num = typeof cell.v === 'number' ? cell.v : parseFloat(cell.v)||0;
      return `<c r="${ref}" s="${s}"><v>${num/100}</v></c>`;
    }
    // number
    const num = typeof cell.v === 'number' ? cell.v : parseFloat(cell.v)||0;
    return `<c r="${ref}" s="${s}"><v>${num}</v></c>`;
  },

  // Build worksheet XML
  buildWorksheet(sheet, sst) {
    const rows = sheet.rows;
    let xml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">`;

    // Column widths
    if (sheet.colWidths) {
      xml += '<cols>';
      sheet.colWidths.forEach((w,i) => {
        if (w) xml += `<col min="${i+1}" max="${i+1}" width="${w}" customWidth="1"/>`;
      });
      xml += '</cols>';
    }

    xml += '<sheetData>';
    rows.forEach((row, ri) => {
      const rn = ri + 1;
      const ht = sheet.rowHeights?.[ri] || '';
      xml += `<row r="${rn}"${ht ? ` ht="${ht}" customHeight="1"` : ''}>`;
      row.forEach((cell, ci) => {
        const ref = this.ref(rn, ci);
        xml += this.cellXML(ref, cell, sst);
      });
      xml += '</row>';
    });
    xml += '</sheetData></worksheet>';
    return xml;
  },

  // Styles XML — define fills, fonts, borders, xfs
  buildStyles() {
    return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">
  <fonts>
    <font><sz val="10"/><name val="Calibri"/></font>
    <font><b/><sz val="10"/><name val="Calibri"/></font>
    <font><b/><sz val="11"/><name val="Calibri"/><color rgb="FFFFFFFF"/></font>
    <font><sz val="10"/><name val="Calibri"/><color rgb="FF1A56DB"/></font>
    <font><sz val="10"/><name val="Calibri"/><color rgb="FF059669"/></font>
    <font><sz val="10"/><name val="Calibri"/><color rgb="FFDC2626"/></font>
    <font><b/><sz val="10"/><name val="Calibri"/><color rgb="FF1A56DB"/></font>
    <font><b/><sz val="12"/><name val="Calibri"/><color rgb="FFFFFFFF"/></font>
  </fonts>
  <fills>
    <fill><patternFill patternType="none"/></fill>
    <fill><patternFill patternType="gray125"/></fill>
    <fill><patternFill patternType="solid"><fgColor rgb="FF1A3A5C"/></patternFill></fill>
    <fill><patternFill patternType="solid"><fgColor rgb="FFD6E4F0"/></patternFill></fill>
    <fill><patternFill patternType="solid"><fgColor rgb="FFEAF2FF"/></patternFill></fill>
    <fill><patternFill patternType="solid"><fgColor rgb="FFD1FAE5"/></patternFill></fill>
    <fill><patternFill patternType="solid"><fgColor rgb="FFFEE2E2"/></patternFill></fill>
    <fill><patternFill patternType="solid"><fgColor rgb="FFFFF3CD"/></patternFill></fill>
    <fill><patternFill patternType="solid"><fgColor rgb="FFE2E8F0"/></patternFill></fill>
    <fill><patternFill patternType="solid"><fgColor rgb="FF2C3E50"/></patternFill></fill>
  </fills>
  <borders><border><left/><right/><top/><bottom/><diagonal/></border>
    <border><left style="thin"><color auto="1"/></left><right style="thin"><color auto="1"/></right><top style="thin"><color auto="1"/></top><bottom style="thin"><color auto="1"/></bottom><diagonal/></border>
  </borders>
  <cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs>
  <cellXfs>
    <xf numFmtId="0" fontId="0" fillId="0" borderId="1" xfId="0"><alignment wrapText="0"/></xf>
    <xf numFmtId="0" fontId="1" fillId="2" borderId="1" xfId="0"><alignment horizontal="center"/></xf>
    <xf numFmtId="0" fontId="2" fillId="2" borderId="1" xfId="0"><alignment horizontal="center"/></xf>
    <xf numFmtId="0" fontId="1" fillId="8" borderId="1" xfId="0"><alignment horizontal="center"/></xf>
    <xf numFmtId="0" fontId="0" fillId="4" borderId="1" xfId="0"><alignment horizontal="center"/></xf>
    <xf numFmtId="0" fontId="4" fillId="5" borderId="1" xfId="0"><alignment horizontal="center"/></xf>
    <xf numFmtId="0" fontId="5" fillId="6" borderId="1" xfId="0"><alignment horizontal="center"/></xf>
    <xf numFmtId="0" fontId="0" fillId="7" borderId="1" xfId="0"><alignment horizontal="center"/></xf>
    <xf numFmtId="9" fontId="6" fillId="3" borderId="1" xfId="0"><alignment horizontal="center"/></xf>
    <xf numFmtId="9" fontId="0" fillId="4" borderId="1" xfId="0"><alignment horizontal="center"/></xf>
    <xf numFmtId="0" fontId="1" fillId="9" borderId="1" xfId="0"><alignment horizontal="center"/></xf>
    <xf numFmtId="0" fontId="7" fillId="9" borderId="1" xfId="0"><alignment horizontal="center"/></xf>
  </cellXfs>
</styleSheet>`;
  },

  // Generate ZIP-like .xlsx bytes using a simple approach
  // We'll base64 encode a pre-built minimal xlsx and inject our data
  // Actually we'll write real XML parts and zip them using JSZip-compatible manual approach

  // Simpler: write CSV-like format that Excel can open, but as proper xlsx using
  // the data URI approach with actual XML. We build the full zip manually.

  // Base64 encode string
  b64(str) {
    return btoa(unescape(encodeURIComponent(str)));
  },

  // Create xlsx as a Blob using manual ZIP construction
  // We implement a minimal ZIP writer
  createXLSX(sheets) {
    const sst = this.buildSST(sheets);

    // Build all XML parts
    const parts = {};

    // [Content_Types].xml
    let sheetRels = sheets.map((s,i)=>
      `<Override PartName="/xl/worksheets/sheet${i+1}.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>`
    ).join('');
    parts['[Content_Types].xml'] = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
<Default Extension="xml" ContentType="application/xml"/>
<Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>
<Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/>
<Override PartName="/xl/sharedStrings.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sharedStrings+xml"/>
${sheetRels}
</Types>`;

    // _rels/.rels
    parts['_rels/.rels'] = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/>
</Relationships>`;

    // xl/_rels/workbook.xml.rels
    let wbRels = sheets.map((s,i)=>
      `<Relationship Id="rId${i+1}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet${i+1}.xml"/>`
    ).join('');
    wbRels += `<Relationship Id="rId${sheets.length+1}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/sharedStrings" Target="sharedStrings.xml"/>`;
    wbRels += `<Relationship Id="rId${sheets.length+2}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>`;
    parts['xl/_rels/workbook.xml.rels'] = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">${wbRels}</Relationships>`;

    // xl/workbook.xml
    const sheetElems = sheets.map((s,i)=>
      `<sheet name="${this.xmlEsc(s.name)}" sheetId="${i+1}" r:id="rId${i+1}"/>`
    ).join('');
    parts['xl/workbook.xml'] = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
<sheets>${sheetElems}</sheets></workbook>`;

    // xl/styles.xml
    parts['xl/styles.xml'] = this.buildStyles();

    // xl/sharedStrings.xml
    const sstArr = Array.from(sst.keys());
    parts['xl/sharedStrings.xml'] = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<sst xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" count="${sstArr.length}" uniqueCount="${sstArr.length}">
${sstArr.map(s=>`<si><t xml:space="preserve">${this.xmlEsc(s)}</t></si>`).join('')}
</sst>`;

    // xl/worksheets/sheet*.xml
    sheets.forEach((sh, i) => {
      parts[`xl/worksheets/sheet${i+1}.xml`] = this.buildWorksheet(sh, sst);
    });

    // Build ZIP
    return this.buildZip(parts);
  },

  // Minimal ZIP builder (store, no compression — valid xlsx)
  buildZip(parts) {
    const encoder = new TextEncoder();
    const entries = [];
    const centralDir = [];
    let offset = 0;

    for (const [name, content] of Object.entries(parts)) {
      const nameBytes  = encoder.encode(name);
      const dataBytes  = encoder.encode(content);
      const crc        = this.crc32(dataBytes);
      const localHeader = this.localFileHeader(nameBytes, dataBytes.length, crc);
      entries.push(localHeader, dataBytes);
      centralDir.push(this.centralDirEntry(nameBytes, dataBytes.length, crc, offset));
      offset += localHeader.length + dataBytes.length;
    }

    const cdBytes  = this.concat(centralDir);
    const eocd     = this.endOfCentralDir(centralDir.length, cdBytes.length, offset);
    return new Blob([this.concat(entries), cdBytes, eocd], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  },

  concat(arrays) {
    const total = arrays.reduce((s,a)=>s+a.length,0);
    const out = new Uint8Array(total);
    let off = 0;
    arrays.forEach(a => { out.set(a, off); off += a.length; });
    return out;
  },

  le16(n) { return new Uint8Array([n&0xff,(n>>8)&0xff]); },
  le32(n) { return new Uint8Array([n&0xff,(n>>8)&0xff,(n>>16)&0xff,(n>>24)&0xff]); },

  localFileHeader(name, size, crc) {
    return this.concat([
      new Uint8Array([0x50,0x4b,0x03,0x04]), // sig
      this.le16(20),   // version needed
      this.le16(0),    // flags
      this.le16(0),    // compression (store)
      this.le16(0),    // mod time
      this.le16(0),    // mod date
      this.le32(crc),
      this.le32(size), // compressed
      this.le32(size), // uncompressed
      this.le16(name.length),
      this.le16(0),    // extra
      name
    ]);
  },

  centralDirEntry(name, size, crc, offset) {
    return this.concat([
      new Uint8Array([0x50,0x4b,0x01,0x02]),
      this.le16(20), this.le16(20), this.le16(0), this.le16(0),
      this.le16(0), this.le16(0),
      this.le32(crc), this.le32(size), this.le32(size),
      this.le16(name.length), this.le16(0), this.le16(0),
      this.le16(0), this.le16(0), this.le32(0),
      this.le32(offset), name
    ]);
  },

  endOfCentralDir(count, cdSize, cdOffset) {
    return this.concat([
      new Uint8Array([0x50,0x4b,0x05,0x06]),
      this.le16(0), this.le16(0),
      this.le16(count), this.le16(count),
      this.le32(cdSize), this.le32(cdOffset),
      this.le16(0)
    ]);
  },

  crc32(bytes) {
    let c = 0xFFFFFFFF;
    for (let i = 0; i < bytes.length; i++) {
      c ^= bytes[i];
      for (let j = 0; j < 8; j++) c = (c&1) ? (0xEDB88320 ^ (c>>>1)) : (c>>>1);
    }
    return (c ^ 0xFFFFFFFF) >>> 0;
  },

  // Download blob
  download(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    setTimeout(()=>URL.revokeObjectURL(url), 1000);
  }
};

// Style constants for cells
const XS = {
  TITLE:    { t:'s', s:11 },  // white bold on dark, large
  HDR:      { t:'s', s:1  },  // bold white on navy
  HDR_DARK: { t:'s', s:10 },  // bold on dark section
  SUB_HDR:  { t:'s', s:3  },  // bold on gray
  NORMAL:   { t:'s', s:0  },
  ALT:      { t:'s', s:4  },  // light blue bg
  GREEN:    { t:'s', s:5  },
  RED:      { t:'s', s:6  },
  GOLD:     { t:'s', s:7  },
  PCT:      { t:'p', s:8  },  // percent, blue
  PCT_N:    { t:'p', s:9  },
};

function makeCell(v, style) { return { v: String(v ?? ''), ...style }; }
function numCell(v, s=0)    { return { v: Number(v)||0, t:'n', s }; }
function pctCell(v, s=8)    { return { v: Number(v)||0, t:'p', s }; }
function emptyRow(n)        { return Array(n).fill({ v:'', t:'s', s:0 }); }

// ── Export: Presenze ────────────────────────────────────────
function exportPresenze() {
  const catSel = document.getElementById('exp-cat-1').value;
  const catList = catSel === 'all'
    ? S.categories.filter(c => currentUser.role==='admin' || getAccessibleCategoryIds().includes(c.id))
    : S.categories.filter(c=>c.id===catSel);

  const sheets = catList.map(cat => {
    const athletes = getCategoryAthletes(cat.id).sort((a,b)=>(a.lastName||'').localeCompare(b.lastName||''));
    const sessions = getCategorySessions(cat.id);
    const team = S.teams.find(t=>t.id===cat.teamId);
    const sport = S.sports.find(s=>s.id===cat.sportId);

    const colWidths = [5, 22, 12, 12, ...sessions.map(()=>5), 8, 8, 8, 9, 9, 9];
    const rows = [];

    // Title row
    rows.push([makeCell(`REGISTRO PRESENZE — ${cat.name} (${sport?.name||''} · ${team?.name||''})`, XS.HDR_DARK),
      ...Array(sessions.length+9).fill({v:'',t:'s',s:10})]);

    // Date row
    rows.push([makeCell('#',XS.HDR), makeCell('Atleta',XS.HDR), makeCell('Ruolo',XS.HDR), makeCell('N.',XS.HDR),
      ...sessions.map(s=>makeCell(fmtDate(s.date), XS.HDR)),
      makeCell('P',XS.HDR), makeCell('A',XS.HDR), makeCell('G',XS.HDR),
      makeCell('% Tot.',XS.HDR), makeCell('% All.',XS.HDR), makeCell('% Part.',XS.HDR)
    ]);

    // Type row
    rows.push([makeCell('',XS.SUB_HDR), makeCell('Tipo →',XS.SUB_HDR), makeCell('',XS.SUB_HDR), makeCell('',XS.SUB_HDR),
      ...sessions.map(s=>makeCell((getActivityTypesMap()[s.type]?.label||s.type), XS.SUB_HDR)),
      ...Array(6).fill({v:'',t:'s',s:3})
    ]);

    athletes.forEach((ath, i) => {
      const atts = getAthleteAttendances(ath.id);
      const pres = atts.filter(a=>sessions.some(s=>s.id===a.sessionId)&&a.status==='P').length;
      const ass  = atts.filter(a=>sessions.some(s=>s.id===a.sessionId)&&a.status==='A').length;
      const giust= atts.filter(a=>sessions.some(s=>s.id===a.sessionId)&&a.status==='G').length;
      const tot  = sessions.length;
      const prRate = tot ? pres/tot : 0;
      const aRate  = sessions.filter(s=>s.type==='A').length ? atts.filter(a=>sessions.find(s=>s.id===a.sessionId&&s.type==='A')&&a.status==='P').length / sessions.filter(s=>s.type==='A').length : 0;
      const pRate  = sessions.filter(s=>s.type==='P').length ? atts.filter(a=>sessions.find(s=>s.id===a.sessionId&&s.type==='P')&&a.status==='P').length / sessions.filter(s=>s.type==='P').length : 0;

      const altS = i%2===0 ? XS.ALT : XS.NORMAL;
      rows.push([
        makeCell(ath.number||'', altS),
        makeCell(`${ath.lastName} ${ath.firstName}`, altS),
        makeCell(ath.role||'', altS),
        makeCell(ath.number||'', altS),
        ...sessions.map(s => {
          const att = atts.find(a=>a.sessionId===s.id);
          const st = att?.status||'';
          const cellS = st==='P' ? XS.GREEN : st==='A' ? XS.RED : st==='G' ? XS.GOLD : altS;
          return makeCell(st||'—', cellS);
        }),
        numCell(pres), numCell(ass), numCell(giust),
        pctCell(prRate*100), pctCell(aRate*100), pctCell(pRate*100)
      ]);
    });

    return { name: cat.name.slice(0,31), rows, colWidths };
  });

  const blob = XLSXWriter.createXLSX(sheets);
  XLSXWriter.download(blob, `Presenze_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('File scaricato!', 'success');
}

// ── Export: Performance ────────────────────────────────────
function exportPerformance() {
  const catSel = document.getElementById('exp-cat-2').value;
  const catList = catSel === 'all'
    ? S.categories.filter(c => currentUser.role==='admin' || getAccessibleCategoryIds().includes(c.id))
    : S.categories.filter(c=>c.id===catSel);

  const sheets = catList.map(cat => {
    const athletes = getCategoryAthletes(cat.id).sort((a,b)=>(a.lastName||'').localeCompare(b.lastName||''));
    const sessions = getCategorySessions(cat.id);
    const colWidths = [5, 22, 10, ...sessions.map(()=>6), 8, 8, 8, 8, 8, 9];
    const rows = [];

    rows.push([makeCell(`PERFORMANCE — ${cat.name}`, XS.HDR_DARK), ...Array(sessions.length+9).fill({v:'',t:'s',s:10})]);

    PERF_PARAMS.forEach(param => {
      rows.push([
        makeCell(`▶ ${PERF_LABELS[param].toUpperCase()}`, XS.HDR),
        makeCell('Atleta', XS.HDR),
        makeCell('Ruolo', XS.HDR),
        ...sessions.map(s=>makeCell(fmtDate(s.date), XS.HDR)),
        makeCell('Media', XS.HDR),
        ...Array(5).fill({v:'',t:'s',s:1})
      ]);

      athletes.forEach((ath, i) => {
        const atts = getAthleteAttendances(ath.id);
        const altS = i%2===0 ? XS.ALT : XS.NORMAL;
        const vals = sessions.map(s => {
          const att = atts.find(a=>a.sessionId===s.id);
          return att?.status==='P' ? (att.perf?.[param]||0) : null;
        });
        const nonNull = vals.filter(v=>v!==null&&v>0);
        const avgVal = nonNull.length ? avg(nonNull) : 0;
        rows.push([
          makeCell(ath.number||'', altS),
          makeCell(`${ath.lastName} ${ath.firstName}`, altS),
          makeCell(ath.role||'', altS),
          ...vals.map(v => v !== null ? numCell(v||0) : makeCell('—', altS)),
          numCell(Math.round(avgVal*10)/10),
          ...Array(5).fill({v:'',t:'s',s:0})
        ]);
      });
      rows.push(emptyRow(sessions.length+9));
    });

    return { name: cat.name.slice(0,31), rows, colWidths };
  });

  const blob = XLSXWriter.createXLSX(sheets);
  XLSXWriter.download(blob, `Performance_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('File scaricato!', 'success');
}

  '#5C1A3A','#1A5C5C','#0F2A0F','#2A0F2A','#0F1A2A'
];

const RESULT_LABELS = { W:'Vittoria', D:'Pareggio', L:'Sconfitta', TBD:'Da giocare' };
const HOMEAWAY_LABELS = { home:'Casa 🏠', away:'Trasferta ✈️', neutral:'Campo Neutro ⚽' };

function getCategoryMatches(catId) {
  return (S.matches||[]).filter(m=>m.categoryId===catId).sort((a,b)=>b.date.localeCompare(a.date));
}
function getMatchConvocati(matchId) {
  return (S.convocati||[]).filter(c=>c.matchId===matchId);
}

// ── MATCHES VIEW ─────────────────────────────────────────────
viewBuilders['matches'] = (el) => {

  const ms = window._matchState;
  const activeSeas = getActiveSeason();
  if (!ms.catId && selectedCategoryId) ms.catId = selectedCategoryId;
  if (!ms.seasId) ms.seasId = activeSeas?.id || '';

  const allSeasons = (S.seasons||[]);
  const isAdmin = currentUser.role === 'admin';
  const accessibleCatIds = getAccessibleCategoryIds();
  const availCats = isAdmin ? S.categories : S.categories.filter(c=>accessibleCatIds.includes(c.id));
  const curCat  = S.categories.find(c=>c.id===ms.catId) || S.categories.find(c=>c.id===selectedCategoryId);
  const curSeas = allSeasons.find(s=>s.id===ms.seasId) || activeSeas;
  const catTeams= curCat ? getCategoryTeams(curCat.id) : [];
  const canMgr  = curCat ? canEditSessions(curCat.id) : false;

  const allMatches = curCat ? getCategoryMatchesForSeason(curCat.id, ms.seasId) : [];

  }

  el.innerHTML = `
    <!-- ── FILTRI PARTITE ─────────────────────────────────── -->
    <div style="background:white;border:1px solid var(--mist-2);border-radius:var(--radius-lg);padding:12px 18px;margin-bottom:18px;display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap;box-shadow:var(--shadow-sm)">

      <div class="form-field" style="margin:0;min-width:130px;flex:1">
        <label style="font-size:.73rem">Stagione</label>
        <select onchange="window._matchState.seasId=this.value;viewBuilders['matches'](document.getElementById('view-matches'))">
          ${allSeasons.slice().reverse().map(s=>`<option value="${s.id}" ${s.id===ms.seasId?'selected':''}>${esc(s.name)}${s.active?' ★':''}</option>`).join('')}
        </select>
      </div>

      <div class="form-field" style="margin:0;min-width:130px;flex:1">
        <label style="font-size:.73rem">Categoria</label>
        <select onchange="window._matchState.catId=this.value;window._matchState.teamId='';viewBuilders['matches'](document.getElementById('view-matches'))">

        </select>
      </div>

      ${catTeams.length > 1 ? `
      <div class="form-field" style="margin:0;min-width:110px;flex:1">
        <label style="font-size:.73rem">Squadra</label>
        <select onchange="window._matchState.teamId=this.value;viewBuilders['matches'](document.getElementById('view-matches'))">
          <option value="">Tutte</option>
          ${catTeams.map(t=>`<option value="${t.id}" ${t.id===ms.teamId?'selected':''}>${esc(t.name)}</option>`).join('')}

      </div>` : ''}

      ${canMgr ? `<button class="btn btn-accent" style="margin-bottom:1px" onclick="openMatchModal()">+ Nuova Partita</button>` : ''}
    </div>

    <!-- Header info -->
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">
      <h2 style="font-size:1.2rem;font-weight:800;margin:0">⚽ Partite & Convocati</h2>

      ${ms.teamId ? `<span class="badge badge-gray">👕 ${esc(S.teams.find(t=>t.id===ms.teamId)?.name||'')}</span>` : ''}

    <div class="stats-grid" style="margin-bottom:20px">

      <div class="stat-card teal" style="cursor:pointer" onclick="document.getElementById('matches-list')?.scrollIntoView({behavior:'smooth'})" title="Vai alle partite"><div class="accent-bar"></div>

function buildMatchCard(m, canMgr) {
  const bg = m.bgColor || '#1A3A5C';
  const convs = getMatchConvocati(m.id);
  const convCount = convs.filter(c=>c.status==='convocato').length;
  const riserveCount = convs.filter(c=>c.status==='riserva').length;
  const resultCls = 'match-result-' + (m.result||'TBD');
  const scoreText = m.result && m.result !== 'TBD'
    ? `${m.scoredGoals||0} — ${m.concededGoals||0}`
    : 'Da giocare';
  const resultLabel = RESULT_LABELS[m.result||'TBD']||'';

  return `
  <div class="match-card ${resultCls}" id="match-${m.id}">
    <div class="match-header" style="background:${esc(bg)}">
      <div>
        <div style="font-size:.75rem;opacity:.7;text-transform:uppercase;letter-spacing:.08em">${HOMEAWAY_LABELS[m.homeAway]||''}</div>
        <div style="font-size:1.3rem;font-weight:800;margin:4px 0">vs ${esc(m.opponent)}</div>
        <div style="font-size:.82rem;opacity:.75">📅 ${fmtDate(m.date)} ${m.time?'· 🕐 '+m.time:''}</div>
        ${m.meetTime ? `<div style="font-size:.78rem;opacity:.7;margin-top:4px">🤝 Ritrovo: ${esc(m.meetTime)} · 📍 ${esc(m.meetPlace||'')}</div>` : ''}
      </div>
      <div style="text-align:right">
        <div class="match-score">${scoreText}</div>
        <div style="font-size:.82rem;opacity:.75;margin-top:4px">${resultLabel}</div>
      </div>
    </div>
    <div class="match-body">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <span class="badge badge-blue">👥 ${convCount} convocati</span>
        ${riserveCount > 0 ? `<span class="badge badge-gold">🔄 ${riserveCount} riserve</span>` : ''}
        ${m.notes ? `<span class="text-muted text-sm truncate" style="flex:1">📝 ${esc(m.notes)}</span>` : ''}
        <div style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap">
          <button class="btn btn-accent btn-sm" onclick="openConvocatiView('${m.id}')">👥 Convocati</button>
          ${m.sessionId ? `<button class="btn btn-ghost btn-sm" onclick="openSessionEdit('${m.sessionId}')">📋 Presenze</button>` : ''}
          ${canMgr ? `<button class="btn btn-ghost btn-sm" onclick="openMatchModal('${m.id}')">✏️ Modifica</button>` : ''}
          ${canMgr ? `<button class="btn btn-ghost btn-sm" onclick="exportMatchImage('${m.id}')">🖼️ Esporta</button>` : ''}
          ${canMgr ? `<button class="btn btn-danger btn-sm" onclick="deleteMatch('${m.id}')">🗑️</button>` : ''}
        </div>
      </div>
    </div>
  </div>`;
}
