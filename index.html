function selectMatchColor(el, color) {
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
  const inp = document.getElementById('m-color');
  if (inp) inp.value = color;
  const custom = document.getElementById('m-color-custom');
  if (custom) custom.value = color;
}

function refreshMatchModalTeams(catId) {
  const wrapper = document.getElementById('m-team-wrapper');
  if (!wrapper) return;
  const catTeams = getCategoryTeams(catId);
  wrapper.innerHTML = '<label style="font-size:.78rem">Squadra</label>' +
    '<select id="m-team"><option value="">— Tutta la categoria —</option>' +
    catTeams.map(t=>`<option value="${t.id}">${esc(t.name)}</option>`).join('') +
    '</select>';
}

function saveMatch(id) {
  const opponent  = document.getElementById('m-opp').value.trim();
  const homeAway  = document.getElementById('m-ha').value;
  const date      = document.getElementById('m-date').value;
  const time      = document.getElementById('m-time').value;
  const meetTime  = document.getElementById('m-meet').value;
  const meetPlace = document.getElementById('m-place').value.trim();
  const result    = document.getElementById('m-res').value;
  const gf        = parseInt(document.getElementById('m-gf').value)||0;
  const gs        = parseInt(document.getElementById('m-gs').value)||0;
  const notes     = document.getElementById('m-notes').value.trim();
  const bgColor   = document.getElementById('m-color').value || '#1A3A5C';
  // Read category and team from modal (new fields)
  const modalCatId  = document.getElementById('m-cat')?.value  || '';
  const modalTeamId = document.getElementById('m-team')?.value || '';

  if (!opponent || !date) { toast('Avversario e data obbligatori','error'); return; }
  if (!S.matches) S.matches = [];

  if (id) {
    const existing = S.matches.find(x=>x.id===id);
    if (!existing) { toast('Partita non trovata','error'); return; }
    Object.assign(existing, { opponent, homeAway, date, time, meetTime, meetPlace,
      result, scoredGoals:gf, concededGoals:gs, notes, bgColor });
    // Update category/team if changed via modal
    if (modalCatId) existing.categoryId = modalCatId;
    if (modalTeamId !== undefined) existing.teamId = modalTeamId || undefined;
    // Sync linked session
    if (existing.sessionId) {
      const linkedSess = S.sessions.find(s => s.id === existing.sessionId);
      if (linkedSess) {
        linkedSess.date = date;
        linkedSess.notes = 'Partita vs ' + opponent + (notes ? ' — ' + notes : '');
        if (modalCatId) linkedSess.categoryId = modalCatId;
      }
    }
    const mSaved = S.matches.find(x=>x.id===id);
    if(mSaved.sessionId){ const ls=S.sessions.find(s=>s.id===mSaved.sessionId); if(ls) sbSync('sessions',ls); }
    saveState(); sbSync('matches', mSaved); closeModal();
    toast('Partita aggiornata ✅','success');
    if (currentView === 'convocati') {
      viewBuilders['convocati'](document.getElementById('view-convocati'));
    } else {
      showView('matches');
    }
  } else {
    const catId  = modalCatId  || selectedCategoryId;
    const teamId = modalTeamId || '';
    if (!catId) { toast('Seleziona una categoria','error'); return; }
    const mid    = uid();
    const sessId = uid();
    const sessNotes = 'Partita vs ' + opponent + (notes ? ' — ' + notes : '');
    S.sessions.push({ id: sessId, categoryId: catId, date, type: 'P',
      notes: sessNotes, createdBy: currentUser.id, matchId: mid });
    S.matches.push({ id: mid, opponent, homeAway, date, time, meetTime, meetPlace,
      result, scoredGoals:gf, concededGoals:gs, notes, bgColor,
      categoryId: catId, teamId: teamId||undefined, createdBy: currentUser.id, sessionId: sessId });
    // Sync filter state
    if (!window._matchState) window._matchState = {};
    window._matchState.catId  = catId;
    window._matchState.teamId = teamId;
    if (catId !== selectedCategoryId) { selectedCategoryId = catId; buildSidebarNav(); }
    const newM = S.matches[S.matches.length-1];
    const newSess = S.sessions[S.sessions.length-1];
    saveState(); sbSync('sessions', newSess); sbSync('matches', newM); closeModal();
    toast('Partita aggiunta ✅ — Sessione creata automaticamente','success');
    showView('matches');
  }
}

function deleteMatch(id) {
  if (!confirm('Eliminare questa partita, i convocati e la sessione collegata?')) return;
  const m = S.matches.find(x=>x.id===id);
  // Remove linked session and its attendances
  if (m?.sessionId) {
    S.attendances = (S.attendances||[]).filter(x => x.sessionId !== m.sessionId);
    S.sessions = (S.sessions||[]).filter(x => x.id !== m.sessionId);
  }
  const delMatchSessId = S.matches.find(x=>x.id===id)?.sessionId;
  S.matches = (S.matches||[]).filter(x=>x.id!==id);
  S.convocati = (S.convocati||[]).filter(x=>x.matchId!==id);
  saveState();
  sbSync('matches', id, true);
  sbSyncDeleteWhere('convocati','match_id',id);
  if(delMatchSessId){ sbSync('sessions', delMatchSessId, true); sbSyncDeleteWhere('attendances','session_id',delMatchSessId); }
  showView('matches'); toast('Partita eliminata');
}

viewBuilders['convocati'] = (el) => {

// Clean data-attribute handlers for convocazione
function cvClick(btn) {
  const matchId  = btn.dataset.matchid;
  const athleteId= btn.dataset.athid;
  const status   = btn.dataset.cvst;
  setCvStatus(matchId, athleteId, status);
  // Refresh the full convocati view
  viewBuilders['convocati'](document.getElementById('view-convocati'));
}

function setCvNoteInline(inp) {
  const matchId  = inp.dataset.matchid;
  const athleteId= inp.dataset.athid;
  setCvNote(matchId, athleteId, inp.value);
}

// Create a linked session for an existing match that doesn't have one
function createLinkedSession(matchId) {
  const m = S.matches.find(x=>x.id===matchId);
  if (!m || m.linkedSessionId) return;
  const sessId = uid();
  S.sessions.push({ id: sessId, categoryId: m.categoryId, date: m.date, type: 'P',
    notes: 'Partita vs ' + m.opponent, createdBy: currentUser.id, matchId });
  m.linkedSessionId = sessId;
  const lSess = S.sessions[S.sessions.length-1];
  saveState(); sbSync('sessions', lSess);
  toast('Sessione creata e collegata','success');
  viewBuilders['convocati'](document.getElementById('view-convocati'));
}

// Auto-mark all convocati as Present in the linked session
function markAllConvocatiPresent(matchId) {
  const m = S.matches.find(x=>x.id===matchId);
  if (!m?.linkedSessionId) return;
  const convocati = (S.convocati||[]).filter(c=>c.matchId===matchId && c.status==='convocato').map(c=>c.athleteId);
  convocati.forEach(aid => setAttStatus(m.linkedSessionId, aid, 'P'));
  toast('Convocati segnati come Presenti','success');
  viewBuilders['convocati'](document.getElementById('view-convocati'));
}

function setCvStatus(matchId, athleteId, status) {
  if (!S.convocati) S.convocati = [];
  let cv = S.convocati.find(c=>c.matchId===matchId && c.athleteId===athleteId);
  if (!cv) {
    cv = { id: uid(), matchId, athleteId, status, notes: '' };
    S.convocati.push(cv);
  } else {
    cv.status = status;
  }
  saveState(); sbSync('convocati', cv);
  // Refresh the view
  viewBuilders['convocati'](document.getElementById('view-convocati'));
}

function setCvNote(matchId, athleteId, val) {
  if (!S.convocati) S.convocati = [];
  const cv = S.convocati.find(c=>c.matchId===matchId && c.athleteId===athleteId);
  if (cv) { cv.notes = val; saveState(); sbSync('convocati', cv); }
}

function convocaTutti(matchId) {
  const m = S.matches.find(x=>x.id===matchId);
  if (!m) return;
  getCategoryAthletes(m.categoryId).forEach(a => {
    if (!S.convocati) S.convocati = [];
    let cv = S.convocati.find(c=>c.matchId===matchId && c.athleteId===a.id);
    if (!cv) S.convocati.push({ id: uid(), matchId, athleteId: a.id, status: 'convocato', notes: '' });
    else cv.status = 'convocato';
  });
  const allCvs = (S.convocati||[]).filter(cv=>cv.matchId===matchId);
  saveState(); sbSync('convocati', allCvs);
  viewBuilders['convocati'](document.getElementById('view-convocati'));
  toast('Tutti gli atleti convocati', 'success');
}

function resetConvocati(matchId) {
  if (!confirm('Azzerare tutti i convocati?')) return;
  S.convocati = (S.convocati||[]).filter(c=>c.matchId!==matchId);
  saveState(); sbSyncDeleteWhere('convocati','match_id',matchId);
  viewBuilders['convocati'](document.getElementById('view-convocati'));
  toast('Convocati azzerati');
}

function getActiveSeason() {
  if (!S.seasons || !S.seasons.length) return null;
  return S.seasons.find(s => s.id === S.activeSeason) || S.seasons[S.seasons.length-1];
}

function setActiveSeason(id) {
  S.activeSeason = id;
  saveState();

  // Refresh current view
  const fn = viewBuilders[currentView];
  if (fn) { const el = document.getElementById('view-' + currentView); if (el) { el.innerHTML=''; fn(el); } }
}

function rebuildSeasonSelector() {
  const sel = document.getElementById('season-select');
  if (!sel || !S.seasons) return;
  sel.innerHTML = S.seasons.slice().reverse().map(s =>
    `<option value="${s.id}" ${s.id === S.activeSeason ? 'selected' : ''}>${esc(s.name)}${s.active ? ' ★' : ''}</option>`
  ).join('');
}

// Get athletes in a category for a given season
function getCategoryAthletesForSeason(catId, seasonId, teamId) {
  if (!seasonId) return getCategoryAthletes(catId, teamId);

  // Try to find athletes via athleteSeasons enrollment records first
  let enrollments = (S.athleteSeasons||[]).filter(as => as.categoryId===catId && as.seasonId===seasonId);
  if (teamId) enrollments = enrollments.filter(as => (as.teamId||'') === teamId);

  // FALLBACK: if no enrollment records for this season, use athletes directly via categoryId
  // This handles the case where athletes were added without going through season enrollment
  let athletes;
  if (enrollments.length === 0) {
    athletes = getCategoryAthletes(catId, teamId);
    return athletes;
  }

  const enrolledIds = enrollments.map(as => as.athleteId);
  // Also include athletes directly in category that aren't in athleteSeasons
  // (union of enrolled + direct members)
  const directAthletes = getCategoryAthletes(catId, teamId);
  const allIds = [...new Set([...enrolledIds, ...directAthletes.map(a=>a.id)])];
  athletes = S.athletes.filter(a => allIds.includes(a.id));
  if (teamId) athletes = athletes.filter(a => (a.teamId||'') === teamId);

  return athletes.map(a => {
    const as = enrollments.find(x => x.athleteId===a.id);
    return { ...a, role: as?.role||a.role, number: as?.shirtNumber||a.number,
             teamId: as?.teamId||a.teamId, _asId: as?.id };
  });
}

// Get sessions for a category in a given season
function getCategorySessionsForSeason(catId, seasonId) {
  if (!seasonId) return getCategorySessions(catId);
  const season = S.seasons.find(s => s.id === seasonId);
  if (!season) return getCategorySessions(catId);
  const startDate = `${season.startYear}-07-01`; // July 1st start
  const endDate   = `${season.endYear}-06-30`;   // June 30th end
  return getCategorySessions(catId).filter(s => s.date >= startDate && s.date <= endDate);
}

// Get matches for category in season
function getCategoryMatchesForSeason(catId, seasonId) {
  if (!seasonId) return getCategoryMatches(catId);
  const season = S.seasons.find(s => s.id === seasonId);
  if (!season) return getCategoryMatches(catId);
  const startDate = `${season.startYear}-07-01`;
  const endDate   = `${season.endYear}-06-30`;
  return getCategoryMatches(catId).filter(m => m.date >= startDate && m.date <= endDate);
}

// Get stats for a category in a given season
function getCategoryStatsForSeason(catId, seasonId, teamId) {
  const athletes = getCategoryAthletesForSeason(catId, seasonId, teamId);
  const sessions  = getCategorySessionsForSeason(catId, seasonId); // sessions are CATEGORY-level
  const athIds    = athletes.map(a=>a.id);
  // Filter attendances: sessions in this category/season AND athletes in this team (if filtered)
  const allAtts = S.attendances.filter(a =>
    sessions.some(s => s.id === a.sessionId) &&
    (teamId ? athIds.includes(a.athleteId) : true)
  );
  const present = allAtts.filter(a => a.status === 'P').length;
  // Total slots = athletes × sessions (same sessions for all teams in category)
  const total = athletes.length * sessions.length;
  const byType = {};
  getActivityTypes().forEach(([k]) => { byType[k] = sessions.filter(s => s.type === k).length; });
  return { athletes: athletes.length, sessions: sessions.length,
    presenceRate: total > 0 ? pct(present, total) : 0, byType, present, total };
}

function addNewSeason() {
  const start = parseInt(document.getElementById('new-season-start').value);
  const end   = parseInt(document.getElementById('new-season-end').value);
  if (!start || !end || end <= start) { toast('Anno inizio e fine non validi','error'); return; }
  const name = `${start}/${end}`;
  if ((S.seasons||[]).some(s => s.name === name)) { toast('Stagione già esistente','error'); return; }
  if (!S.seasons) S.seasons = [];
  const newS = { id: uid(), name, startYear: start, endYear: end, active: false };
  S.seasons.push(newS);
  saveState(); sbSync('seasons', newS); rebuildSeasonSelector();
  const elSeas = document.getElementById('seasons-list-area');
  if (elSeas) elSeas.innerHTML = buildSeasonsListHtml(S.seasons.slice().reverse());
  else buildAdminConfigTab('seasons');
  const ns = document.getElementById('new-season-start');
  const ne = document.getElementById('new-season-end');
  if (ns) ns.value = '';
  if (ne) ne.value = '';
  toast('Stagione ' + name + ' aggiunta', 'success');
}

function setSeasonActive(id) {
  S.seasons.forEach(s => s.active = s.id === id);
  S.activeSeason = id;
  saveState(); sbSync('seasons', S.seasons); rebuildSeasonSelector();
  const el = document.getElementById('seasons-list-area');
  if (el) el.innerHTML = buildSeasonsListHtml(S.seasons.slice().reverse());
  else buildAdminConfigTab('seasons');
  toast('Stagione attiva aggiornata','success');
}

function deleteSeason(id) {
  if (!confirm('Eliminare questa stagione?')) return;
  S.seasons = S.seasons.filter(s => s.id !== id);
  saveState(); sbSync('seasons', id, true); rebuildSeasonSelector();
  const el = document.getElementById('seasons-list-area');
  if (el) el.innerHTML = buildSeasonsListHtml(S.seasons.slice().reverse());
  else buildAdminConfigTab('seasons');
  toast('Stagione eliminata');
}

function saveAthleteSeasonEnroll(athleteId) {
  const seasonId  = document.getElementById('as-season').value;
  const categoryId= document.getElementById('as-cat').value;
  const role      = document.getElementById('as-role').value.trim();
  const num       = parseInt(document.getElementById('as-num').value)||null;
  const joinDate  = document.getElementById('as-date').value;
  const notes     = document.getElementById('as-notes').value.trim();
  if (!seasonId || !categoryId) { toast('Stagione e categoria obbligatorie','error'); return; }
  // Update or create
  if (!S.athleteSeasons) S.athleteSeasons = [];
  const existing = S.athleteSeasons.find(as => as.athleteId===athleteId && as.seasonId===seasonId && as.categoryId===categoryId);
  if (existing) {
    Object.assign(existing, { role, shirtNumber: num, joinDate, notes });
    toast('Iscrizione aggiornata','success');
  } else {
    S.athleteSeasons.push({ id: uid(), athleteId, categoryId, seasonId, role, shirtNumber: num, joinDate, notes });
    toast('Iscrizione aggiunta','success');
  }
  const savedAs = existing || S.athleteSeasons[S.athleteSeasons.length-1];
  saveState(); sbSync('athlete_seasons', savedAs); closeModal();
  if (currentView === 'athlete-profile') showView('athlete-profile');
}

async function saveNewPassword() {
  const cur  = document.getElementById('pw-current').value;
  const nw   = document.getElementById('pw-new').value;
  const conf = document.getElementById('pw-confirm').value;

  if (!cur || !nw || !conf) { toast('Compila tutti i campi','error'); return; }

  // Verifica password attuale (locale)
  const u = S.users.find(x => x.id === currentUser.id);
  if (u && u.password && u.password !== cur) {
    toast('❌ Password attuale non corretta','error'); return;
  }

  // Valida nuova password
  const pwErr = pwErrorMsg(nw);
  if (pwErr) { toast(pwErr,'error'); return; }
  if (nw !== conf) { toast('❌ Le password non coincidono','error'); return; }
  if (nw === cur)  { toast('La nuova password deve essere diversa da quella attuale','error'); return; }

  const btn = document.querySelector('.modal .btn-accent');
  if (btn) { btn.disabled = true; btn.textContent = 'Aggiornamento...'; }

  try {
    if (DB_MODE === 'supabase') {
      // Verifica anche in Supabase Auth re-autenticando
      const email = currentUser.email || (currentUser.username + '@sporttrackpro.it');
      const { error: reAuthErr } = await sb.auth.signInWithPassword({ email, password: cur });
      if (reAuthErr) {
        toast('❌ Password attuale non corretta su Supabase Auth','error');
        return;
      }
      await DB.changePassword(nw);
    }
    // Aggiorna stato locale
    if (u) { u.password = nw; currentUser.password = nw; }
    saveState();
    closeModal();
    toast('✅ Password aggiornata con successo','success');
  } catch(e) {
    toast('❌ Errore aggiornamento: ' + (e.message || e),'error');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '🔐 Aggiorna Password'; }
  }
}

// ══════════════════════════════════════════════════════════════════
//  EXPORT CONVOCATI IMMAGINE (Canvas)
// ══════════════════════════════════════════════════════════════════

// Alias per compatibilità
function exportMatchImage(matchId) { exportConvocatiImage(matchId); }

function exportConvocatiImage(matchId) {
  const m = S.matches.find(x=>x.id===matchId);
  if (!m) return;

  const cat      = S.categories.find(c=>c.id===m.categoryId);
  const cvMap    = {};
  (S.convocati||[]).filter(c=>c.matchId===matchId).forEach(c => cvMap[c.athleteId] = c);

  const convocati = getCategoryAthletes(m.categoryId)
    .filter(a => cvMap[a.id]?.status === 'convocato')
    .sort((a,b) => (a.number||99)-(b.number||99));
  const riserve = getCategoryAthletes(m.categoryId)
    .filter(a => cvMap[a.id]?.status === 'riserva')
    .sort((a,b) => (a.number||99)-(b.number||99));

  // Build HTML for the image using a hidden div + html2canvas approach
  // Since we can't load external libs, we'll use Canvas API directly
  const bg = m.bgColor || '#1A3A5C';

  // Calculate canvas height dynamically
  const athPerRow = 3;
  const athRowH   = 56;
  const athRows   = Math.ceil(convocati.length / athPerRow);
  const riserveRows = Math.ceil(riserve.length / athPerRow);
  const headerH   = 188;
  const sectionH  = 40;
  const footerH   = 50;
  const padding   = 24;
  const canvasW   = 800;
  let   canvasH   = headerH + sectionH + athRows * athRowH + padding;
  if (riserve.length > 0) canvasH += sectionH + riserveRows * athRowH + padding;
  canvasH += footerH + padding;

  const canvas = document.createElement('canvas');
  canvas.width  = canvasW;
  canvas.height = Math.max(canvasH, 400);
  const ctx = canvas.getContext('2d');

  // ── Background gradient ───────────────────────────────────
  const grad = ctx.createLinearGradient(0, 0, canvasW, canvasH);
  grad.addColorStop(0, bg);
  grad.addColorStop(1, darkenColor(bg, 0.4));
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvasW, canvasH);

  // ── Subtle pattern overlay ────────────────────────────────
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  for (let x=0; x<canvasW; x+=40) {
    for (let y=0; y<canvasH; y+=40) {
      ctx.beginPath();
      ctx.arc(x, y, 1.5, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // ── Header area ───────────────────────────────────────────
  const p = padding;

  // ── HEADER: SOCIETÀ (large) vs AVVERSARIO (smaller) ────────

  // Resolve society
  const socObj = S.societies.find(s => s.id === cat?.societyId);
  const socName = socObj?.name || cat?.name || '';
  const oppName = m.opponent || '';

  // Measure available width
  const availW = canvasW - p * 2;

  // ── RIGA PRINCIPALE: Società vs Avversario ───────────────
  // We place everything on ONE line, sizing dynamically:
  // Society name: large bold
  // " vs ": medium, muted
  // Opponent: medium

  // Start with big font for society, shrink until it fits ~55% of width
  let socFont = 42;
  ctx.font = `bold ${socFont}px Arial, sans-serif`;
  const maxSocW = availW * 0.54;
  let socFit = socName;
  while (ctx.measureText(socFit).width > maxSocW && socFit.length > 3) {
    socFit = socFit.slice(0, -1);
  }
  if (socFit !== socName) socFit += '…';

  // Draw society name
  ctx.fillStyle = '#FFFFFF';
  ctx.font = `bold ${socFont}px Arial, sans-serif`;
  const socW = ctx.measureText(socFit).width;
  ctx.fillText(socFit, p, p + 64);

  // Draw " vs " separator
  ctx.font = 'bold 18px Arial, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  const vsStr = '  vs  ';
  const vsW = ctx.measureText(vsStr).width;
  ctx.fillText(vsStr, p + socW, p + 56);

  // Draw opponent — fit remaining space
  const oppX   = p + socW + vsW;
  const oppMaxW = canvasW - p - oppX;
  ctx.font = 'bold 26px Arial, sans-serif';
  let oppFit = oppName;
  while (ctx.measureText(oppFit).width > oppMaxW && oppFit.length > 3) {
    oppFit = oppFit.slice(0, -1);
  }
  if (oppFit !== oppName) oppFit += '…';
  ctx.fillStyle = 'rgba(255,255,255,0.82)';
  ctx.fillText(oppFit, oppX, p + 58);

  // Match info line
  ctx.fillStyle = 'rgba(255,255,255,0.68)';
  ctx.font = '14px Arial, sans-serif';
  const infoLine = [
    '📅 ' + fmtDate(m.date),
    m.time ? '🕐 ' + m.time : '',
    HOMEAWAY_LABELS[m.homeAway] || '',
  ].filter(Boolean).join('   ·   ');
  ctx.fillText(infoLine, p, p + 90);

  // Ritrovo info
  if (m.meetTime || m.meetPlace) {
    ctx.fillStyle = 'rgba(255,255,255,0.58)';
    ctx.font = '13px Arial, sans-serif';
    const rLine = [
      m.meetTime ? '🤝 ' + m.meetTime : '',
      m.meetPlace ? '📍 ' + m.meetPlace : ''
    ].filter(Boolean).join('   ·   ');
    ctx.fillText(rLine, p, p + 110);
  }

  // Divider
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(p, p + 126);
  ctx.lineTo(canvasW - p, p + 126);
  ctx.stroke();

  // Count badges
  const badgeData = [
    { label: 'Convocati', value: convocati.length, color: 'rgba(5,150,105,0.8)' },
    { label: 'Riserve',   value: riserve.length,   color: 'rgba(217,119,6,0.8)' },
  ];
  let bx = p;
  badgeData.forEach(b => {
    ctx.fillStyle = b.color;
    roundRect(ctx, bx, p+136, 110, 32, 8, true, false);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 13px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(b.value + ' ' + b.label, bx+55, p+157);
    ctx.textAlign = 'left';
    bx += 122;
  });

  // ── Convocati section ─────────────────────────────────────
  let y = headerH + p;
  drawSectionHeader(ctx, p, y, canvasW - p*2, '✅  CONVOCATI', '#22c55e');
  y += sectionH;

  convocati.forEach((ath, i) => {
    const col = i % athPerRow;
    const row = Math.floor(i / athPerRow);
    const ax  = p + col * ((canvasW - p*2) / athPerRow);
    const ay  = y + row * athRowH;
    drawAthleteCard(ctx, ax, ay, (canvasW - p*2) / athPerRow - 8, athRowH - 8, ath, cvMap[ath.id], 'convocato');
  });
  y += athRows * athRowH + padding;

  // ── Riserve section ───────────────────────────────────────
  if (riserve.length > 0) {
    drawSectionHeader(ctx, p, y, canvasW - p*2, '🔄  RISERVE', '#f59e0b');
    y += sectionH;
    riserve.forEach((ath, i) => {
      const col = i % athPerRow;
      const row = Math.floor(i / athPerRow);
      const ax  = p + col * ((canvasW - p*2) / athPerRow);
      const ay  = y + row * athRowH;
      drawAthleteCard(ctx, ax, ay, (canvasW - p*2) / athPerRow - 8, athRowH - 8, ath, cvMap[ath.id], 'riserva');
    });
    y += riserveRows * athRowH + padding;
  }

  // ── Footer ────────────────────────────────────────────────
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.moveTo(p, canvasH - footerH - 10);
  ctx.lineTo(canvasW - p, canvasH - footerH - 10);
  ctx.stroke();

  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '12px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('SportTrack Pro · ' + new Date().toLocaleDateString('it-IT'), canvasW/2, canvasH - footerH + 20);
  ctx.textAlign = 'left';

  // ── Download ──────────────────────────────────────────────
  const link = document.createElement('a');
  link.download = 'Convocati_vs_' + m.opponent.replace(/[^a-zA-Z0-9]/g,'_') + '_' + m.date + '.png';
  link.href = canvas.toDataURL('image/png', 0.95);
  link.click();
  toast('Immagine esportata ✅','success');
}

// Canvas helpers
function darkenColor(hex, amount) {
  const num = parseInt(hex.replace('#',''), 16);
  const r = Math.max(0, (num>>16) - Math.round(255*amount));
  const g = Math.max(0, ((num>>8)&0xFF) - Math.round(255*amount));
  const b = Math.max(0, (num&0xFF) - Math.round(255*amount));
  return '#' + ((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

function roundRect(ctx, x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
  if (fill) ctx.fill();
  if (stroke) ctx.stroke();
}

function drawSectionHeader(ctx, x, y, w, label, color) {
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  roundRect(ctx, x, y, w, 32, 6, true, false);
  // Left accent bar
  ctx.fillStyle = color;
  roundRect(ctx, x, y, 4, 32, 2, true, false);
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 15px Arial';
  ctx.fillText(label, x+14, y+21);
}

function drawAthleteCard(ctx, x, y, w, h, ath, cv, status) {
  // Card background
  const cardBg = status === 'convocato' ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.07)';
  ctx.fillStyle = cardBg;
  roundRect(ctx, x, y, w, h, 6, true, false);

  // Number circle
  const numColor = status === 'convocato' ? '#22c55e' : '#f59e0b';
  ctx.fillStyle = numColor;
  ctx.beginPath();
  ctx.arc(x+20, y+h/2, 14, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 12px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(ath.number||'?', x+20, y+h/2+4);
  ctx.textAlign = 'left';

  // Name
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 14px Arial';
  const fullName = ath.lastName + ' ' + ath.firstName;
  ctx.fillText(fullName.length > 20 ? fullName.slice(0,19)+'…' : fullName, x+40, y+h/2-3);

  // Nickname + role
  const sub = [ath.nickname ? '"'+ath.nickname+'"' : '', ath.role||''].filter(Boolean).join(' · ');
  if (sub) {
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = '11px Arial';
    ctx.fillText(sub.length > 25 ? sub.slice(0,24)+'…' : sub, x+40, y+h/2+14);
  }

  // Note from cv
  if (cv?.notes) {
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = 'italic 10px Arial';
    ctx.textAlign = 'right';
    ctx.fillText(cv.notes.slice(0,18), x+w-6, y+h/2+14);
    ctx.textAlign = 'left';
  }
}

    </div>`;
  }).join('');
}

function addScorer(matchId) {
  const athId = document.getElementById('scorer-athlete')?.value;
  const goals = parseInt(document.getElementById('scorer-goals')?.value)||1;
  if (!athId) { toast('Seleziona un atleta','error'); return; }

  // Controlla se esiste già
  const existing = (S.scorers||[]).find(s => s.matchId===matchId && s.athleteId===athId);
  if (existing) {
    existing.goals += goals;
    sbSync('scorers', existing);
  } else {
    const newScorer = { id: uid(), matchId, athleteId: athId, goals, notes: '' };
    if (!S.scorers) S.scorers = [];
    S.scorers.push(newScorer);
    sbSync('scorers', newScorer);
  }
  saveState();
  const el = document.getElementById('scorers-list');
  if (el) el.innerHTML = buildScorersList(matchId);
  document.getElementById('scorer-athlete').value = '';
  document.getElementById('scorer-goals').value = '1';
  toast('⚽ Marcatore aggiunto','success');
}

function removeScorer(scorerId, matchId) {
  S.scorers = (S.scorers||[]).filter(s => s.id !== scorerId);
  sbSync('scorers', scorerId, true); // delete
  saveState();
  const el = document.getElementById('scorers-list');
  if (el) el.innerHTML = buildScorersList(matchId);
}

// ── STATISTICHE GOL E PUNTI ───────────────────────────────────
function getMatchPoints(result) {
  if (result === 'W') return 3;
  if (result === 'D') return 1;
  return 0;
}

function getCategoryMatchStats(catId) {
  const ms = S.matches.filter(m => m.categoryId === catId && m.result !== 'TBD');
  const pts  = ms.reduce((s,m) => s + getMatchPoints(m.result), 0);
  const gf   = ms.reduce((s,m) => s + (m.scoredGoals||0), 0);
  const gs   = ms.reduce((s,m) => s + (m.concededGoals||0), 0);
  const w    = ms.filter(m=>m.result==='W').length;
  const d    = ms.filter(m=>m.result==='D').length;
  const l    = ms.filter(m=>m.result==='L').length;
  return { played: ms.length, w, d, l, pts, gf, gs, gd: gf-gs };
}

// Shared: in-memory import data
let _importRows = [];

function previewImport(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
    _importRows = rows;

    const defaultSeasId = document.getElementById('imp-season')?.value || S.activeSeason;
    const defaultCatId  = document.getElementById('imp-cat')?.value || '';
    const defaultTeamId = document.getElementById('imp-team')?.value || '';

    let html = `<div style="font-weight:700;margin-bottom:8px">Anteprima: ${rows.length} righe trovate</div>`;
    html += `<div class="table-wrap" style="max-height:260px;overflow-y:auto"><table><thead><tr>
      <th>Cognome</th><th>Nome</th><th>Nascita</th><th>Categoria</th><th>Squadra</th><th>Stagione</th><th>Ruolo</th><th>#</th><th>Stato</th>
    </tr></thead><tbody>`;

    let ok=0, dup=0, missCat=0;
    rows.forEach(r => {
      if (!r.Nome||!r.Cognome) return;
      const catVal  = r.Categoria || defaultCatId;
      const teamVal = r.Squadra   || defaultTeamId;
      const seasVal = r.Stagione  || defaultSeasId;
      // Debug
      if (!window._importLogged) {
        console.log('[Import] S.categories:', S.categories.length, S.categories.map(c=>c.name));
        console.log('[Import] catVal:', catVal, 'defaultCatId:', defaultCatId);
        window._importLogged = true;
      }
      // Cerca per ID oppure per nome (case-insensitive)
      const cat  = S.categories.find(c=>c.id===catVal) ||
                   S.categories.find(c=>c.name.toLowerCase()===String(catVal).toLowerCase().trim());
      const team = S.teams.find(t=>t.id===teamVal) ||
                   S.teams.find(t=>t.name.toLowerCase()===String(teamVal).toLowerCase().trim());
      const seas = S.seasons?.find(s=>s.id===seasVal) ||
                   S.seasons?.find(s=>s.name.toLowerCase()===String(seasVal).toLowerCase().trim());
      const catId  = cat?.id  || catVal;
      const teamId = team?.id || teamVal;
      const seasId = seas?.id || seasVal;
      const isDup   = !!athleteExists(r.Nome,r.Cognome,r.Nascita||'');
      if (isDup) dup++;
      else if (!cat) missCat++;
      else ok++;
      const statusBadge = isDup ? '<span class="badge badge-gold">Duplicato</span>'
        : !cat ? '<span class="badge badge-red">Cat. mancante</span>'
        : '<span class="badge badge-green">✅ OK</span>';
      html += `<tr>
        <td>${esc(r.Cognome||'')}</td><td>${esc(r.Nome||'')}</td>
        <td>${esc(r.Nascita||'')}</td>
        <td>${cat?esc(cat.name):`<span style="color:red">${esc(catId)}</span>`}</td>
        <td>${team?esc(team.name):(teamId?`<span style="color:orange">${esc(teamId)}</span>`:'—')}</td>
        <td>${seas?esc(seas.name):esc(seasId)}</td>
        <td>${esc(r.Ruolo||'')}</td><td>${esc(String(r.Numero||''))}</td>
        <td>${statusBadge}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
    html += `<div style="margin-top:10px;display:flex;gap:14px;font-size:.88rem">
      <span class="badge badge-green">✅ ${ok} importabili</span>
      ${dup>0?`<span class="badge badge-gold">⚠️ ${dup} duplicati (saltati)</span>`:''}
      ${missCat>0?`<span class="badge badge-red">❌ ${missCat} categoria mancante (saltati)</span>`:''}
    </div>`;

    document.getElementById('imp-preview').innerHTML = html;
    document.getElementById('imp-actions').style.display = ok > 0 ? 'flex' : 'none';
  };
  reader.readAsArrayBuffer(file);
}

function confirmImportAthletes() {
  if (!_importRows.length) return;
  const defaultSeasId = document.getElementById('imp-season')?.value || S.activeSeason;
  const defaultCatId  = document.getElementById('imp-cat')?.value || '';
  const defaultTeamId = document.getElementById('imp-team')?.value || '';

  let imported=0, skipped=0;
  _importRows.forEach(r => {
    if (!r.Nome||!r.Cognome) return;
    const catVal  = String(r.Categoria||defaultCatId||'');
    const teamVal = String(r.Squadra||defaultTeamId||'');
    const seasVal = String(r.Stagione||defaultSeasId||'');

    // Cerca per ID o per nome (case-insensitive)
    const cat  = S.categories.find(c=>c.id===catVal) ||
                 S.categories.find(c=>c.name.toLowerCase()===catVal.toLowerCase().trim());
    const team = S.teams.find(t=>t.id===teamVal) ||
                 S.teams.find(t=>t.name.toLowerCase()===teamVal.toLowerCase().trim());
    const seas = S.seasons?.find(s=>s.id===seasVal) ||
                 S.seasons?.find(s=>s.name.toLowerCase()===seasVal.toLowerCase().trim());

    const catId  = cat?.id  || catVal;
    const teamId = team?.id || teamVal;
    const seasId = seas?.id || seasVal;

    if (!cat || athleteExists(r.Nome,r.Cognome,r.Nascita||'')) { skipped++; return; }

    const athId = uid();
    const newAth = {
      id: athId,
      firstName: String(r.Nome||''),
      lastName:  String(r.Cognome||''),
      dob:       String(r.Nascita||''),
      nickname:  String(r.Nickname||''),
      teamId:    teamId,
      categoryId:catId,
      number:    parseInt(r.Numero)||null,
      role:      String(r.Ruolo||''),
      notes:     String(r.Note||''),
      parentIds: [],
    };
    S.athletes.push(newAth);
    sbSync('athletes', newAth);

    if (!S.athleteSeasons) S.athleteSeasons=[];
    const newAs = {
      id: uid(), athleteId: athId,
      categoryId: catId, teamId: teamId, seasonId: seasId,
      role: String(r.Ruolo||''), shirtNumber: parseInt(r.Numero)||null,
      joinDate: new Date().toISOString().slice(0,10), notes:'',
    };
    S.athleteSeasons.push(newAs);
    sbSync('athlete_seasons', newAs);
    imported++;
  });

  saveState();
  _importRows = [];
  window._importLogged = false;
  closeModal();
  toast('✅ Importati ' + imported + ' atleti' + (skipped?', '+skipped+' saltati':''), 'success');
  showView('admin-athletes');
}

function athleteExists(nome,cognome,dob){
  return S.athletes.find(a =>
    a.firstName?.toLowerCase()===nome.toLowerCase() &&
    a.lastName?.toLowerCase()===cognome.toLowerCase() &&
    a.dob===dob
  );
}


function importAthletesExcel(){

  const input = document.getElementById("excelFile");
  if(!input){ alert("Input file non trovato"); return; }
  input.click();

  input.onchange = function(e){

    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(evt){

      const data = new Uint8Array(evt.target.result);
      const workbook = XLSX.read(data,{type:"array"});
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet);

      let imported = 0;
      let duplicates = 0;
      let missingCategory = 0;

      rows.forEach(r=>{

        if(!r.Nome || !r.Cognome) return;

        if(athleteExists(r.Nome,r.Cognome,r.Nascita)){
          duplicates++;
          return;
        }

        const cat = S.categories?.find(c=>c.id===r.Categoria);

        if(!cat){
          missingCategory++;
          return;
        }

        const athleteId = 'id_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);

        S.athletes.push({
          id: athleteId,
          firstName: r.Nome,
          lastName: r.Cognome,
          dob: r.Nascita || "",
          nickname: r.Nickname || "",
          notes: ""
        });

        S.athleteSeasons.push({
          id:'id_'+Math.random().toString(36).slice(2,9),
          athleteId: athleteId,
          categoryId: r.Categoria,
          seasonId: S.activeSeason,
          role: r.Ruolo || "",
          shirtNumber: r.Numero || "",
          joinDate: new Date().toISOString().slice(0,10),
          notes:""
        });

        imported++;

      });

      localStorage.setItem("sporttrack_data", JSON.stringify(S));

      alert(
        "IMPORT COMPLETATO\n\n" +
        "Atleti importati: "+imported+"\n"+
        "Duplicati ignorati: "+duplicates+"\n"+
        "Categoria non trovata: "+missingCategory
      );

      location.reload();

    };

    reader.readAsArrayBuffer(file);

  };
}

let _bgSyncInterval = null;
async function backgroundSync() {
  if (DB_MODE !== 'supabase' || !currentUser) return;
  try {
    // Ricarica tutti i dati freschi dal DB
    const fresh = await DB.loadAll();
    const activeSeason = (fresh.seasons||[]).find(s=>s.active);
    fresh.activeSeason = activeSeason?.id || fresh.seasons?.[0]?.id || S.activeSeason;
    // Mantieni le configurazioni locali non ancora in DB
    fresh.activityTypes  = S.activityTypes;
    fresh.perfParams     = S.perfParams;
    fresh.sessionTypePerfParams = S.sessionTypePerfParams;
    Object.assign(S, fresh);
    saveState();
  } catch(e) { console.warn('Background sync error:', e); }
}

function startBackgroundSync() {
  if (_bgSyncInterval) clearInterval(_bgSyncInterval);
  _bgSyncInterval = setInterval(backgroundSync, 60000);
}

    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
    z-index: 9999; max-width: 340px; width: calc(100vw - 32px);
    font-family: 'DM Sans', sans-serif;
  `;
  banner.innerHTML = `
    <span style="font-size:1.5rem">📲</span>
    <div style="flex:1">
      <div style="font-size:.88rem;font-weight:600;color:#E2E8F0">Installa SportTrack</div>
      <div style="font-size:.78rem;color:#94A3B8">Aggiungila alla schermata Home</div>
    </div>
    <button onclick="installPWA()" style="
      background:#4F86F7;color:white;border:none;border-radius:8px;
      padding:8px 14px;font-size:.82rem;font-weight:600;cursor:pointer;
      font-family:inherit;white-space:nowrap;
    ">Installa</button>
    <button onclick="document.getElementById('pwa-banner').remove()" style="
      background:none;border:none;color:#94A3B8;cursor:pointer;
      font-size:1.1rem;padding:4px;line-height:1;
    ">✕</button>
  `;
  document.body.appendChild(banner);
}

function installPWA() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(choice => {
    console.log('[PWA] Scelta:', choice.outcome);
    deferredPrompt = null;
    const b = document.getElementById('pwa-banner');
    if (b) b.remove();
  });
}

// App installata — nascondi il banner
window.addEventListener('appinstalled', () => {
  const b = document.getElementById('pwa-banner');
  if (b) b.remove();
  console.log('[PWA] App installata!');
});
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(r => console.log('[SW] Registrato:', r.scope))
      .catch(e => console.warn('[SW] Errore:', e));
  });
}
// Banner installazione PWA
let _deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredPrompt = e;
  // Mostra banner dopo il login
  setTimeout(() => {
    if (_deferredPrompt && document.getElementById('app')?.classList.contains('visible')) {
      showInstallBanner();
    }
  }, 3000);
});
function showInstallBanner() {
  if (document.getElementById('pwa-banner')) return;
  const banner = document.createElement('div');
  banner.id = 'pwa-banner';
  banner.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#161B27;border:1px solid #4F86F7;border-radius:14px;padding:14px 20px;display:flex;align-items:center;gap:14px;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.5);max-width:340px;width:calc(100% - 32px)';
  banner.innerHTML = '<div style="font-size:1.8rem">⚽</div><div style="flex:1"><div style="font-weight:700;color:#E2E8F0;font-size:.9rem">Installa SportTrack Pro</div><div style="color:#94A3B8;font-size:.78rem;margin-top:2px">Aggiungi alla schermata Home</div></div><button onclick="installPWA()" style="background:#4F86F7;color:white;border:none;border-radius:8px;padding:8px 14px;font-weight:600;font-size:.85rem;cursor:pointer">Installa</button><button onclick="document.getElementById('pwa-banner').remove()" style="background:none;border:none;color:#94A3B8;font-size:1.2rem;cursor:pointer;padding:4px">✕</button>';
  document.body.appendChild(banner);
}
async function installPWA() {
  if (!_deferredPrompt) return;
  _deferredPrompt.prompt();
  const { outcome } = await _deferredPrompt.userChoice;
  _deferredPrompt = null;
  document.getElementById('pwa-banner')?.remove();
}
</script>
