// Helper: incrementa/decrementa stat con pulsanti +/-
window._adjustStat = function(btn, delta) {
    const field = btn.getAttribute('data-field');
    const id = btn.getAttribute('data-id');
    const span = document.querySelector(`.stat-val[data-field="${field}"][data-id="${id}"]`);
    if (!span) return;
    let val = parseInt(span.textContent) + delta;
    if (val < 0) val = 0;
    span.textContent = val;
};

window.saveFullTabellino = async function(sessionId, detailId) {
    const updateData = {
        opponent_name: document.getElementById('tab-opponent').value,
        match_status: document.getElementById('tab-status').value,
        meet_time: document.getElementById('tab-meet-time').value,
        match_start_time: document.getElementById('tab-match-start').value,
        address: document.getElementById('tab-address').value,
        goals_for: parseInt(document.getElementById('tab-gf').value) || 0,
        goals_against: parseInt(document.getElementById('tab-gs').value) || 0,
        is_home: document.getElementById('tab-is-home').value === 'true',
        is_friendly: document.getElementById('tab-is-friendly').value === 'true',
    };

    // Build stats from the player grid (new format)
    const statsToInsert = [];

    // Collect all unique athlete IDs from stat controls
    const athleteIds = new Set();
    document.querySelectorAll('.stat-val[data-id], .stat-mins[data-id], .stat-starter[data-id]').forEach(el => {
        athleteIds.add(el.getAttribute('data-id'));
    });

    athleteIds.forEach(aid => {
        const goals = parseInt(document.querySelector(`.stat-val[data-field="goals"][data-id="${aid}"]`)?.textContent || '0') || 0;
        const yc    = parseInt(document.querySelector(`.stat-val[data-field="yellow_cards"][data-id="${aid}"]`)?.textContent || '0') || 0;
        const rc    = parseInt(document.querySelector(`.stat-val[data-field="red_cards"][data-id="${aid}"]`)?.textContent || '0') || 0;
        const mins  = parseInt(document.querySelector(`.stat-mins[data-id="${aid}"]`)?.value || '0') || 0;
        const isStarter = document.querySelector(`.stat-starter[data-id="${aid}"]`)?.checked ?? true;

        statsToInsert.push({
            session_id: sessionId,
            athlete_id: aid,
            goals,
            yellow_cards: yc,
            red_cards: rc,
            minutes_played: mins,
            is_starter: isStarter
        });
    });

    // Also keep scorers JSON for backward compatibility (events-list may be absent now)
    const legacyEvents = statsToInsert.flatMap(s => {
        const arr = [];
        for (let i = 0; i < s.goals; i++) arr.push({ athlete_id: s.athlete_id, type: '⚽ Goal' });
        for (let i = 0; i < s.yellow_cards; i++) arr.push({ athlete_id: s.athlete_id, type: '🟨 Amm.' });
        for (let i = 0; i < s.red_cards; i++) arr.push({ athlete_id: s.athlete_id, type: '🟥 Esp.' });
        return arr;
    });
    updateData.scorers = JSON.stringify(legacyEvents);

    try {
        await client.from('match_details').update(updateData).eq('id', detailId);
        await client.from('match_stats').delete().eq('session_id', sessionId);
        if (statsToInsert.length > 0) {
            await client.from('match_stats').insert(statsToInsert);
        }
        alert("✅ Tabellino e Statistiche sincronizzati!");
        document.getElementById('sub-section-container').innerHTML = '';
        if (typeof initPartite === 'function') initPartite();
    } catch (err) {
        console.error(err);
        alert("Errore durante il salvataggio: " + (err.message || "Controlla la console."));
    }
};

window.openStatistiche = async function(sessionId) {
    const container = window.prepareSubSection(sessionId);
    if (!container) return;

    const currentSession = await window.safeGetSession(sessionId);
    const teamId = currentSession.team_id;

    const { data: types } = await client.from('session_types').select('id, name');
    const validTypeIds = (types || []).filter(t => t.name.toLowerCase().includes('partita') || t.name.toLowerCase().includes('gara')).map(t => t.id);

    const { data: allMatches } = await client.from('match_details').select(`*, sessions!inner(team_id, type_id)`).eq('sessions.team_id', teamId).in('sessions.type_id', validTypeIds);
    const { data: allAttendances } = await client.from('attendances').select(`athlete_id, status, is_called_up, athletes(name, surname), sessions!inner(type_id)`).eq('sessions.team_id', teamId).in('sessions.type_id', validTypeIds);
    const { data: performanceStats } = await client.from('match_stats').select(`*, sessions!inner(type_id)`).eq('sessions.team_id', teamId).in('sessions.type_id', validTypeIds);

    const athleteMap = {};
    allAttendances?.forEach(att => {
        if (!athleteMap[att.athlete_id]) athleteMap[att.athlete_id] = { name: `${att.athletes.surname} ${att.athletes.name}`, presenze: 0, totali: 0, gol: 0, amm: 0, esp: 0, squal: 0, min: 0 };
        athleteMap[att.athlete_id].totali++; 
        if (att.is_called_up && att.status !== 'squalificato') athleteMap[att.athlete_id].presenze++;
        if (att.status === 'squalificato') athleteMap[att.athlete_id].squal++;
    });

    performanceStats?.forEach(st => {
        const a = athleteMap[st.athlete_id];
        if (a) { a.gol += (st.goals || 0); a.amm += (st.yellow_cards || 0); a.esp += (st.red_cards || 0); a.min += (st.minutes_played || 0); }
    });

    // ── Calcola KPI della squadra (solo partite ufficiali) ──
    const officialMatches = (allMatches || []).filter(m => !m.is_friendly);
    const totalMatches   = officialMatches.length;
    const wins   = officialMatches.filter(m => m.match_status === 'vittoria').length;
    const draws  = officialMatches.filter(m => m.match_status === 'pareggio').length;
    const losses = officialMatches.filter(m => m.match_status === 'sconfitta').length;
    const homeMatches  = officialMatches.filter(m => m.is_home === true).length;
    const awayMatches  = officialMatches.filter(m => m.is_home === false).length;
    const totalGF = officialMatches.reduce((s,m) => s + (m.goals_for||0), 0);
    const totalGS = officialMatches.reduce((s,m) => s + (m.goals_against||0), 0);
    const totalAmm = (performanceStats||[]).reduce((s,st) => s + (st.yellow_cards||0), 0);
    const totalEsp = (performanceStats||[]).reduce((s,st) => s + (st.red_cards||0), 0);

    const athletes = Object.values(athleteMap).sort((a,b) => b.gol - a.gol || b.presenze - a.presenze);

    const kpiCard = (label, value, sub, color) => `
        <div style="background:white; border:1px solid #e2e8f0; border-radius:10px; padding:12px 14px; border-top:3px solid ${color};">

        <!-- HEADER -->
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; flex-wrap:wrap; gap:8px;">
            <div>
                <h3 style="font-family:'Space Grotesk',sans-serif; font-size:1rem; font-weight:700; margin:0;">📊 Performance Analysis</h3>
                <div style="font-size:0.7rem; color:#94a3b8; margin-top:2px;">Solo partite ufficiali &middot; Amichevoli escluse</div>

        <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:10px; margin-bottom:1.25rem;">
            ${kpiCard('Partite', totalMatches, 'ufficiali giocate', '#2563eb')}
            ${kpiCard('🏠 Casa', homeMatches, 'partite in casa', '#2563eb')}
            ${kpiCard('🚌 Trasferta', awayMatches, 'partite fuori', '#8b5cf6')}

        <!-- RISULTATI BAR -->
        ${totalMatches > 0 ? `

async function initImportAtleti() {
    const selSeason = document.getElementById('import-sel-season');
    const selSoc = document.getElementById('import-sel-society');
    const selTeam = document.getElementById('import-sel-team');

    try {
        // 1. Caricamento Iniziale Stagioni
        const { data: seasons } = await client.from('seasons').select('id, name').order('name', { ascending: false });
        if (selSeason) {
            selSeason.innerHTML = '<option value="">Scegli Stagione...</option>' + 
                (seasons || []).map(s => `<option value="${s.id}">${s.name}</option>`).join('');
        }

        // 2. Evento Cambio Stagione -> Carica Società
        selSeason.onchange = async () => {
            if (!selSeason.value) return;
            const { data: societies } = await client.from('societies').select('*').order('name');
            selSoc.innerHTML = '<option value="">Scegli Società...</option>' + 
                (societies || []).map(s => `<option value="${s.id}">${s.name}</option>`).join('');
            selSoc.disabled = false;
            selTeam.disabled = true;
        };

        // 3. Evento Cambio Società -> Carica Squadre
        selSoc.onchange = async () => {
            if (!selSoc.value) return;
            const { data: teams } = await client.from('teams')
                .select('id, name, category_id, categories(name)')
                .eq('society_id', selSoc.value);
            
            selTeam.innerHTML = '<option value="">Scegli Squadra...</option>' + 
                (teams || []).map(t => `
                    <option value="${t.id}" data-catid="${t.category_id}" data-catname="${t.categories?.name}">
                        ${t.name} (${t.categories?.name || 'No Cat'})
                    </option>
                `).join('');
            selTeam.disabled = false;
        };

        // 4. Evento Cambio Squadra -> Sblocca Zona Upload
        selTeam.onchange = () => {
            const opt = selTeam.selectedOptions[0];
            if (selTeam.value) {
                document.getElementById('cat-display-label').innerText = "Categoria: " + opt.getAttribute('data-catname');
                document.getElementById('import-msg-init').style.display = 'none';
                document.getElementById('import-action-zone').style.display = 'block';
            }
        };

        // 5. Gestione Caricamento File
        document.getElementById('btn-trigger-file').onclick = () => document.getElementById('import-excel-input').click();

        document.getElementById('import-excel-input').onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (evt) => {
                const workbook = XLSX.read(evt.target.result, { type: 'binary' });
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                
                const sID = selSeason.value;
                const socID = selSoc.value;
                const tID = selTeam.value;
                const cID = selTeam.selectedOptions[0].getAttribute('data-catid');

                let count = 0;

                for (let row of rows) {
                    try {
                        const getVal = (obj, aliases) => {
                            const key = Object.keys(obj).find(k => aliases.includes(k.toLowerCase().trim()));
                            return key ? obj[key] : null;
                        };

                        const nome = getVal(row, ['nome', 'name']);
                        const cognome = getVal(row, ['cognome', 'surname']);
                        const dataNascita = getVal(row, ['data_nascita', 'nascita', 'data', 'born_date', 'birth_date']);

                        if (!nome || !cognome) continue;

                        // A. Inserimento Anagrafica (Usando BORN_DATE)
                        const { data: ath, error: aErr } = await client.from('athletes').insert({
                            name: nome, 
                            surname: cognome, 
                            born_date: dataNascita // <--- CORRETTO DA birth_date A born_date
                        }).select().single();

                        if (aErr) {
                            console.error("Errore Atleti:", aErr.message);
                            continue;
                        }

                        // B. Inserimento Legame Stagionale
                        if (ath) {
                            const { error: sErr } = await client.from('athlete_team_seasons').insert({
                                athlete_id: ath.id,
                                season_id: sID,
                                society_id: socID,
                                team_id: tID,
                                category_id: cID
                            });

                            if (!sErr) count++;
                            else console.error("Errore Legame:", sErr.message);
                        }
                    } catch (err) {
                        console.error("Errore riga:", err);
                    }
                }

                alert(`✅ Importazione completata!\nAtleti registrati correttamente: ${count}`);
                
                // Reset UI
                document.getElementById('import-excel-input').value = "";
                selTeam.value = "";
                document.getElementById('import-msg-init').style.display = 'block';
                document.getElementById('import-action-zone').style.display = 'none';
            };
            reader.readAsBinaryString(file);
        };

    } catch (err) {
        console.error("Errore initImport:", err);
    }
}

window._dashData = {};

window.initDashboard = async function() {
    try {
        const effectiveRole = (window._effectiveRole || window._userRole || '').toLowerCase();
        const isGlobalUser = ['admin','manager'].includes(effectiveRole);
        const isSocietyScoped = ['presidente','segretario','responsabile','dirigente','allenatore'].includes(effectiveRole);
        const userSocietyId = window._currentSocietyId;

        // Carica stagioni
        const { data: seasons } = await client.from('seasons').select('id, name, is_active').order('name', { ascending: false });
        const selSeason = document.getElementById('dash-season-filter');
        if (selSeason) {
            (seasons || []).forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.id;
                opt.textContent = s.name + (s.is_active ? ' ✓' : '');
                if (s.is_active) opt.selected = true;
                selSeason.appendChild(opt);
            });
        }

        window._dashData._seasons = seasons || [];

        // Gestione filtro società in base al ruolo
        // IMPORTANTE: nascondere solo il SELECT società, non il wrapper (che contiene anche il filtro stagione)
        const selSoc = document.getElementById('dash-soc-filter');

        if (isGlobalUser) {
            // Admin/Manager: mostra tutte le società selezionabili
            const { data: societies } = await client.from('societies').select('id, name').order('name');
            window._dashData._societies = societies || [];
            if (selSoc) {
                (societies || []).forEach(s => {
                    selSoc.innerHTML += `<option value="${s.id}">${s.name}</option>`;
                });
            }
        } else if (isSocietyScoped && userSocietyId) {
            // Ruoli societari: nasconde SOLO il select società (non il wrapper), forza la propria
            if (selSoc) selSoc.style.display = 'none';
            window._dashData._forcedSocietyId = userSocietyId;
            // Recupera nome società per mostrarlo
            const { data: mySoc } = await client.from('societies').select('id, name').eq('id', userSocietyId).maybeSingle();
            window._dashData._societies = mySoc ? [mySoc] : [];
        } else {
            // Genitore o ruolo sconosciuto: nasconde solo il select società
            if (selSoc) selSoc.style.display = 'none';
            window._dashData._forcedSocietyId = userSocietyId;
        }

        // Label stagione attiva
        const activeSeason = (seasons || []).find(s => s.is_active);
        const labelEl = document.getElementById('dash-season-label');
        if (labelEl) labelEl.textContent = '🌐 Stagione: ' + (activeSeason?.name || 'Tutte');

        await window.refreshDashboard();

    } catch(err) { console.error('initDashboard error:', err); }
};

window.refreshDashboard = async function() {
    const seasonId = document.getElementById('dash-season-filter')?.value;
    const socId = window._dashData._forcedSocietyId ||
                  document.getElementById('dash-soc-filter')?.value || 'all';

    const labelEl = document.getElementById('dash-season-label');
    if (labelEl) {
        if (!seasonId || seasonId === 'all') {
            labelEl.textContent = '🌐 Tutte le stagioni';
        } else {
            const s = (window._dashData._seasons || []).find(x => x.id === seasonId);
            labelEl.textContent = '🌐 Stagione: ' + (s?.name || '');
        }
    }

    // Calcola team IDs per ruoli scoped (dirigente/allenatore/responsabile)
    const effRole = (window._effectiveRole || window._userRole || '').toLowerCase();
    const isTeamScoped = ['dirigente','allenatore','responsabile'].includes(effRole);
    const scopedTeamIds = isTeamScoped ? await window.loadUserAssignedTeams() : null;

    await Promise.all([
        window.loadDashKPIs(seasonId, socId, scopedTeamIds),
        window.loadDashMatches(seasonId, socId, scopedTeamIds),
        window.loadDashPresenze(seasonId, socId, scopedTeamIds),
        window.loadDashStats(seasonId, socId, scopedTeamIds),
        window.loadDashAthletes(seasonId, socId, scopedTeamIds),
    ]);
};

/* ── KPI ── */
window.loadDashKPIs = async function(seasonId, socId, scopedTeamIds) {
    const grid = document.getElementById('dash-kpi-grid');
    if (!grid) return;

    try {
        const hasTeamScope = scopedTeamIds && scopedTeamIds.length > 0;

        // Base queries
        let athQ = client.from('athlete_team_seasons').select('id, society_id, season_id, team_id, teams(category_id)', { count: 'exact', head: false });
        let sessQ = client.from('sessions').select('id, society_id, season_id, team_id', { count: 'exact', head: false });
        let socQ = client.from('societies').select('id', { count: 'exact', head: false });
        let catQ = client.from('categories').select('id, society_id', { count: 'exact', head: false });
        let staffQ = client.from('users').select('id, society_id, management_role', { count: 'exact', head: false }).neq('username', 'admin');
        let attQ = client.from('attendances').select('status, sessions!inner(team_id, society_id, season_id)');

        // Filters
        if (seasonId && seasonId !== 'all') {
            athQ = athQ.eq('season_id', seasonId);
            sessQ = sessQ.eq('season_id', seasonId);
            attQ = attQ.eq('sessions.season_id', seasonId);
        }
        if (socId && socId !== 'all') {
            athQ = athQ.eq('society_id', socId);
            sessQ = sessQ.eq('society_id', socId);
            catQ = catQ.eq('society_id', socId);
            staffQ = staffQ.eq('society_id', socId);
            attQ = attQ.eq('sessions.society_id', socId);
        }
        // Filtro team per ruoli scoped (dirigente/allenatore vedono solo i propri team)
        if (hasTeamScope) {
            athQ = athQ.in('team_id', scopedTeamIds);
            sessQ = sessQ.in('team_id', scopedTeamIds);
            attQ = attQ.in('sessions.team_id', scopedTeamIds);
        }

        const [athRes, sessRes, socRes, catRes, staffRes, attRes] = await Promise.all([
            athQ, sessQ, socQ, catQ, staffQ, attQ
        ]);

        const athletes = athRes.data || [];
        const sessions = sessRes.data || [];
        const staff = staffRes.data || [];
        const attendances = attRes.data || [];

        // KPI calculations
        const totalAtleti = athletes.length;
        const totalSessioni = sessions.length;
        const totalSocieta = (socId && socId !== 'all') ? 1 : (socRes.data || []).length;

        // Per ruoli scoped (dirigente/allenatore): conta solo le categorie dei propri team
        // Per gli altri: usa il conteggio diretto da catQ
        let totalCategorie;
        if (hasTeamScope) {
            // Recupera i team assegnati con la loro category_id per contare le categorie uniche
            const { data: scopedTeams } = await client
                .from('teams')
                .select('category_id')
                .in('id', scopedTeamIds);
            const uniqueCatIds = new Set((scopedTeams || []).map(t => t.category_id).filter(Boolean));
            totalCategorie = uniqueCatIds.size;
        } else {
            totalCategorie = (catRes.data || []).length;
        }
        // Staff: per ruoli scoped mostra solo lo staff dei propri team
        let staffFiltered = staff;
        if (hasTeamScope) {
            const { data: scopedStaff } = await client
                .from('user_category_seasons')
                .select('user_id')
                .in('team_id', scopedTeamIds);
            const scopedUserIds = new Set((scopedStaff || []).map(r => r.user_id).filter(Boolean));
            staffFiltered = staff.filter(u => scopedUserIds.has(u.id));
        }
        const totalStaff = staffFiltered.length;

        const staffByRole = staffFiltered.reduce((acc, u) => {
            const r = (u.management_role || 'Altro').toLowerCase();
            if (r.includes('president')) acc.presidenti++;
            else if (r.includes('allenator') || r.includes('coach')) acc.allenatori++;
            else if (r.includes('dirigent')) acc.dirigenti++;
            else if (r.includes('responsabil')) acc.responsabili++;
            return acc;
        }, { presidenti:0, allenatori:0, dirigenti:0, responsabili:0 });

        // Calcolo % presenze globale
        const tot = attendances.length;
        const pres = attendances.filter(a => (a.status||'').toLowerCase() === 'presente').length;
        const percPres = tot > 0 ? Math.round((pres/tot)*100) : 0;

        const kpis = [
            { label:'Atleti Totali',      value: totalAtleti,   sub: `in ${totalCategorie} categor${totalCategorie === 1 ? 'ia' : 'ie'}`, color:'#2563eb' },
            { label:'Sessioni Registrate', value: totalSessioni,  sub: 'tutte le categorie',              color:'#10b981' },
            { label:'% Presenze Globali',  value: percPres+'%',   sub: `${pres}/${tot} totali`,            color:'#f59e0b' },
            { label:'Società',             value: totalSocieta,   sub: '1 sport',                          color:'#06b6d4' },
            { label:'Categorie',           value: totalCategorie, sub: 'attive',                           color:'#8b5cf6' },
            { label:'Staff Totale',        value: totalStaff,     sub: 'utenti registrati',                color:'#64748b' },
            { label:'Allenatori',          value: staffByRole.allenatori, sub:'registrati',               color:'#f59e0b' },
            { label:'Dirigenti',           value: staffByRole.dirigenti,  sub:'registrati',               color:'#ef4444' },
            ...(!hasTeamScope ? [{ label:'Presidenti', value: staffByRole.presidenti, sub:'registrati', color:'#2563eb' }] : []),
        ];

        grid.innerHTML = kpis.map(k => `
            <div class="kpi-card" style="--kpi-color:${k.color}">
                <div class="kpi-label">${k.label}</div>
                <div class="kpi-value">${k.value}</div>
                <div class="kpi-sub">${k.sub}</div>
            </div>
        `).join('');

    } catch(err) { console.error('KPI error:', err); }
};

/* ── PARTITE ULTIMO MESE ── */
window._dashMatches = [];
window._dashMatchTeams = [];

window.loadDashMatches = async function(seasonId, socId, scopedTeamIds) {
    try {
        const oneMonthAgo = new Date();
        oneMonthAgo.setMonth(oneMonthAgo.getMonth() - 1);
        const fromDate = oneMonthAgo.toISOString().split('T')[0];

        const { data: types } = await client.from('session_types').select('id, name');
        const validIds = (types||[]).filter(t => t.name.toLowerCase().includes('partita') || t.name.toLowerCase().includes('gara')).map(t => t.id);

        let q = client.from('sessions')
            .select('id, title, session_date, society_id, team_id, teams(name), societies(name)')
            .gte('session_date', fromDate)
            .order('session_date', { ascending: false });

        if (validIds.length > 0) q = q.in('type_id', validIds);
        if (seasonId && seasonId !== 'all') q = q.eq('season_id', seasonId);
        if (socId && socId !== 'all') q = q.eq('society_id', socId);
        if (scopedTeamIds && scopedTeamIds.length > 0) q = q.in('team_id', scopedTeamIds);

        const { data: sessions } = await q;

        // Recupera i match_details
        const sessionIds = (sessions || []).map(s => s.id);
        let details = [];
        if (sessionIds.length > 0) {
            const { data: d } = await client.from('match_details').select('*').in('session_id', sessionIds);
            details = d || [];
        }
        const detailMap = {};
        details.forEach(d => detailMap[d.session_id] = d);

        window._dashMatches = (sessions || []).map(s => ({ ...s, detail: detailMap[s.id] }));
        window._dashMatchTeams = [...new Map((sessions||[]).filter(s=>s.teams).map(s => [s.team_id, { id:s.team_id, name:s.teams.name }])).values()];

        // Popola filtro squadra
        const selTeam = document.getElementById('dash-match-team');
        const selSoc = document.getElementById('dash-match-soc');
        if (selTeam) {
            selTeam.innerHTML = '<option value="">Tutte le squadre</option>' +
                window._dashMatchTeams.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
        }
        if (selSoc) {
            const matchSocs = [...new Map((sessions||[]).filter(s=>s.societies).map(s=>[s.society_id,{id:s.society_id,name:s.societies.name}])).values()];
            selSoc.innerHTML = '<option value="">Tutte le società</option>' +
                matchSocs.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
        }

        window.renderDashMatches();
    } catch(err) { console.error('loadDashMatches error:', err); }
};

window.renderDashMatches = function() {
    const tbody = document.getElementById('dash-matches-body');
    if (!tbody) return;
    const filterTeam = document.getElementById('dash-match-team')?.value;
    const filterSoc = document.getElementById('dash-match-soc')?.value;

    const filtered = window._dashMatches.filter(m =>
        (!filterTeam || m.team_id === filterTeam) &&
        (!filterSoc || m.society_id === filterSoc)
    );

    if (filtered.length === 0) {
        tbody.innerHTML = "<tr><td colspan=\"5\" style=\"text-align:center; padding:20px; color:#94a3b8;\">Nessuna partita nell'ultimo mese.</td></tr>";
        return;
    }

    const esitoBadge = (status) => {
        if (!status || status === 'da disputare') return '<span style="background:#f1f5f9; color:#64748b; padding:2px 8px; border-radius:99px; font-size:0.7rem; font-weight:700;">DA GIOCARE</span>';
        if (status === 'vittoria') return '<span style="background:#dcfce7; color:#166534; padding:2px 8px; border-radius:99px; font-size:0.7rem; font-weight:700;">VITTORIA</span>';
        if (status === 'sconfitta') return '<span style="background:#fee2e2; color:#991b1b; padding:2px 8px; border-radius:99px; font-size:0.7rem; font-weight:700;">SCONFITTA</span>';
        if (status === 'pareggio') return '<span style="background:#fef3c7; color:#92400e; padding:2px 8px; border-radius:99px; font-size:0.7rem; font-weight:700;">PAREGGIO</span>';
        return '<span style="background:#f1f5f9; color:#64748b; padding:2px 8px; border-radius:99px; font-size:0.7rem; font-weight:700;">' + status.toUpperCase() + '</span>';
    };

    tbody.innerHTML = filtered.map(m => {
        const d = m.detail;
        const risultato = d ? `${d.goals_for ?? '-'} - ${d.goals_against ?? '-'}` : '- -';
        const vs = d?.opponent_name ? `vs ${d.opponent_name}` : (m.title || 'Gara');
        return `
        <tr style="border-bottom:1px solid #f1f5f9;">
            <td style="padding:9px 12px; color:#64748b; white-space:nowrap;">${new Date(m.session_date).toLocaleDateString('it-IT')}</td>
            <td style="padding:9px 12px; font-weight:600;">${vs}</td>
            <td style="padding:9px 12px; color:#2563eb;">${m.teams?.name || '-'}</td>
            <td style="padding:9px 12px; text-align:center; font-weight:700; font-family:'Space Grotesk',sans-serif;">${risultato}</td>
            <td style="padding:9px 12px; text-align:center;">${esitoBadge(d?.match_status)}</td>
        </tr>`;
    }).join('');
};

/* ── PRESENZE SESSIONI ── */
window._dashSessions = [];

window.loadDashPresenze = async function(seasonId, socId, scopedTeamIds) {
    try {
        let q = client.from('sessions')
            .select('id, title, session_date, team_id, type_id, teams(name), attendances(status)')
            .order('session_date', { ascending: false })
            .limit(50);

        if (seasonId && seasonId !== 'all') q = q.eq('season_id', seasonId);
        if (socId && socId !== 'all') q = q.eq('society_id', socId);
        if (scopedTeamIds && scopedTeamIds.length > 0) q = q.in('team_id', scopedTeamIds);

        const { data } = await q;

        // Escludi sessioni di tipo gara/partita
        const { data: types } = await client.from('session_types').select('id, name');
        const garaIds = new Set((types||[]).filter(t => t.name.toLowerCase().includes('partita') || t.name.toLowerCase().includes('gara')).map(t=>t.id));

        window._dashSessions = (data||[]).filter(s => !garaIds.has(s.type_id));

        // Popola filtro squadra
        const selTeam = document.getElementById('dash-pres-team');
        if (selTeam) {
            const teams = [...new Map(window._dashSessions.filter(s=>s.teams).map(s=>[s.team_id,{id:s.team_id,name:s.teams.name}])).values()];
            selTeam.innerHTML = '<option value="">Tutte le squadre</option>' + teams.map(t=>`<option value="${t.id}">${t.name}</option>`).join('');
        }

        window.renderDashPresenze();
    } catch(err) { console.error('loadDashPresenze error:', err); }
};

window.renderDashPresenze = function() {
    const tbody = document.getElementById('dash-pres-body');
    if (!tbody) return;
    const filterTeam = document.getElementById('dash-pres-team')?.value;

    const filtered = window._dashSessions
        .filter(s => !filterTeam || s.team_id === filterTeam)
        .slice(0, 15);

    if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:20px; color:#94a3b8;">Nessuna sessione trovata.</td></tr>';
        return;
    }

    tbody.innerHTML = filtered.map(s => {
        const att = s.attendances || [];
        const p = att.filter(a => (a.status||'').toLowerCase()==='presente').length;
        const a = att.filter(x => (x.status||'').toLowerCase()==='assente').length;
        const g = att.filter(x => (x.status||'').toLowerCase()==='giustificato').length;
        const tot = att.length;
        const perc = tot > 0 ? Math.round((p/tot)*100) : 0;
        const percColor = perc >= 75 ? '#10b981' : perc >= 50 ? '#f59e0b' : '#ef4444';
        return `
        <tr style="border-bottom:1px solid #f1f5f9;">
            <td style="padding:8px 10px;">
                <div style="font-weight:600; font-size:0.8rem;">${s.title || 'Sessione'}</div>
                <div style="font-size:0.7rem; color:#94a3b8;">${new Date(s.session_date).toLocaleDateString('it-IT')} · ${s.teams?.name||''}</div>
            </td>
            <td style="padding:8px 10px; text-align:center; color:#10b981; font-weight:700;">${p}</td>
            <td style="padding:8px 10px; text-align:center; color:#ef4444; font-weight:700;">${a}</td>
            <td style="padding:8px 10px; text-align:center; color:#f59e0b; font-weight:700;">${g}</td>
            <td style="padding:8px 10px; text-align:center; font-weight:700; color:${percColor};">${perc}%</td>
        </tr>`;
    }).join('');
};

/* ── STATISTICHE GARE PER SQUADRA ── */
window._dashMatchStats = [];

window.loadDashStats = async function(seasonId, socId, scopedTeamIds) {
    try {
        let q = client.from('sessions')
            .select('id, team_id, society_id, season_id, teams(name), societies(name)');

        const { data: types } = await client.from('session_types').select('id, name');
        const validIds = (types||[]).filter(t => t.name.toLowerCase().includes('partita') || t.name.toLowerCase().includes('gara')).map(t=>t.id);
        if (validIds.length > 0) q = q.in('type_id', validIds);
        if (seasonId && seasonId !== 'all') q = q.eq('season_id', seasonId);
        if (socId && socId !== 'all') q = q.eq('society_id', socId);
        if (scopedTeamIds && scopedTeamIds.length > 0) q = q.in('team_id', scopedTeamIds);

        const { data: sessions } = await q;
        const sessionIds = (sessions||[]).map(s=>s.id);

        if (sessionIds.length === 0) {
            window._dashMatchStats = [];
            // Popola filtro soc
            const selSoc = document.getElementById('dash-stats-soc');
            if (selSoc) selSoc.innerHTML = '<option value="">Tutte le società</option>';
            window.renderDashStats();
            return;
        }

        const [detailsRes, statsRes] = await Promise.all([
            client.from('match_details').select('session_id, goals_for, goals_against, match_status, is_friendly, is_home').in('session_id', sessionIds),
            client.from('match_stats').select('session_id, yellow_cards, red_cards').in('session_id', sessionIds)
        ]);

        const detailMap = {};
        (detailsRes.data||[]).forEach(d => detailMap[d.session_id] = d);

        // Aggrega per squadra — ESCLUDI AMICHEVOLI (is_friendly = true)
        const teamMap = {};
        (sessions||[]).forEach(s => {
            if (!s.team_id) return;
            const det = detailMap[s.id];
            if (det && det.is_friendly === true) return; // salta amichevoli
            if (!teamMap[s.team_id]) teamMap[s.team_id] = {
                name: s.teams?.name || '-',
                soc: s.societies?.name || '-',
                society_id: s.society_id,
                partite:0, casa:0, trasferta:0, gf:0, gs:0, amm:0, esp:0, w:0, d:0, l:0
            };
            const t = teamMap[s.team_id];
            t.partite++;
            if (det) {
                if (det.is_home === true) t.casa++;
                else if (det.is_home === false) t.trasferta++;
                t.gf += det.goals_for || 0;
                t.gs += det.goals_against || 0;
                if (det.match_status === 'vittoria') t.w++;
                else if (det.match_status === 'pareggio') t.d++;
                else if (det.match_status === 'sconfitta') t.l++;
            }
        });

        (statsRes.data||[]).forEach(st => {
            const sess = (sessions||[]).find(s=>s.id===st.session_id);
            if (sess && teamMap[sess.team_id]) {
                teamMap[sess.team_id].amm += st.yellow_cards || 0;
                teamMap[sess.team_id].esp += st.red_cards || 0;
            }
        });

        window._dashMatchStats = Object.values(teamMap);

        // Filtro soc
        const selSoc = document.getElementById('dash-stats-soc');
        if (selSoc) {
            const socs = [...new Map(window._dashMatchStats.map(t=>[t.society_id, t.soc])).entries()];
            selSoc.innerHTML = '<option value="">Tutte le società</option>' + socs.map(([id,name])=>`<option value="${id}">${name}</option>`).join('');
        }

        window.renderDashStats();
    } catch(err) { console.error('loadDashStats error:', err); }
};

window.renderDashStats = function() {
    const tbody = document.getElementById('dash-stats-body');
    if (!tbody) return;
    const filterSoc = document.getElementById('dash-stats-soc')?.value;

    const filtered = window._dashMatchStats

        tbody.innerHTML = '<tr><td colspan="9" style="text-align:center; padding:20px; color:#94a3b8;">Nessun dato partite ufficiali disponibile.</td></tr>';
        return;

    tbody.innerHTML = filtered.map(t => `
        <tr style="border-bottom:1px solid #f1f5f9;">
            <td style="padding:8px 10px; font-weight:600; font-size:0.82rem;">${t.name}<br><span style="font-size:0.7rem; color:#94a3b8;">${t.soc}</span></td>
            <td style="padding:8px 10px; text-align:center; color:#64748b; font-weight:700;">${t.partite}</td>
            <td style="padding:8px 10px; text-align:center; color:#2563eb; font-weight:700;" title="In casa">${t.casa}</td>
            <td style="padding:8px 10px; text-align:center; color:#8b5cf6; font-weight:700;" title="In trasferta">${t.trasferta}</td>
            <td style="padding:8px 10px; text-align:center; color:#10b981; font-weight:700;">${t.gf}</td>
            <td style="padding:8px 10px; text-align:center; color:#ef4444; font-weight:700;">${t.gs}</td>
            <td style="padding:8px 10px; text-align:center; color:#f59e0b; font-weight:700;">${t.amm}</td>

                <span style="color:#10b981;">${t.w}V</span> · <span style="color:#64748b;">${t.d}P</span> · <span style="color:#ef4444;">${t.l}S</span>
            </td>
        </tr>`).join('');
};

/* ── STATISTICHE PER ATLETA ── */
window._dashAthletes = [];
window._dashAthSortField = 'presenze'; // presenze | gol | conv
window._dashAthSortDir = -1; // -1 = desc, 1 = asc

window.toggleDashAthSort = function() {
    const btn = document.getElementById('dash-ath-sort-btn');
    const fields = ['presenze','conv','gol'];
    const labels = { presenze:'Presenze', conv:'Convocazioni', gol:'Gol' };
    const idx = fields.indexOf(window._dashAthSortField);
    if (window._dashAthSortDir === -1) {
        window._dashAthSortDir = 1;
    } else {
        window._dashAthSortField = fields[(idx + 1) % fields.length];
        window._dashAthSortDir = -1;
    }
    if (btn) btn.textContent = `Ordina: ${labels[window._dashAthSortField]} ${window._dashAthSortDir === -1 ? '↓' : '↑'}`;
    window.renderDashAthletes();
};

window.loadDashAthletes = async function(seasonId, socId, scopedTeamIds) {
    try {
        // 1. Recupera tutti gli atleti assegnati a squadre
        let athQ = client.from('athlete_team_seasons')
            .select('athlete_id, team_id, society_id, season_id, athletes(name, surname), teams(name), societies(name)');

        if (seasonId && seasonId !== 'all') athQ = athQ.eq('season_id', seasonId);
        if (socId && socId !== 'all') athQ = athQ.eq('society_id', socId);
        if (scopedTeamIds && scopedTeamIds.length > 0) athQ = athQ.in('team_id', scopedTeamIds);

        const { data: assignments } = await athQ;
        if (!assignments || assignments.length === 0) {
            window._dashAthletes = [];
            _populateAthFilters([]);
            window.renderDashAthletes();
            return;
        }

        // Mappa athlete_id -> info base (nome, squadra, società)
        const athleteMap = {};
        assignments.forEach(a => {
            if (!athleteMap[a.athlete_id]) {
                athleteMap[a.athlete_id] = {
                    id: a.athlete_id,
                    name: `${a.athletes?.surname || ''} ${a.athletes?.name || ''}`.trim(),
                    team: a.teams?.name || '-',
                    team_id: a.team_id,
                    society: a.societies?.name || '-',
                    society_id: a.society_id,
                    // Sessioni (allenamenti)
                    sess_tot: 0, sess_pres: 0, sess_ass: 0, sess_giust: 0, sess_inf: 0,
                    // Gare (partite)
                    gara_tot: 0, gara_pres: 0, conv: 0, gol: 0, amm: 0, esp: 0, min: 0,
                    // Performance (somma valori, poi media)
                    perf_vel: 0, perf_tec: 0, perf_fis: 0, perf_res: 0, perf_com: 0, perf_count: 0,
                };
            }
        });

        const athleteIds = Object.keys(athleteMap);

        // 2. Recupera tipi sessione per distinguere allenamenti da gare
        const { data: types } = await client.from('session_types').select('id, name');
        const garaTypeIds = new Set((types||[])
            .filter(t => t.name.toLowerCase().includes('partita') || t.name.toLowerCase().includes('gara'))
            .map(t => t.id));

        // 3. Recupera presenze (tutte le sessioni) filtrate per stagione/società
        let attQ = client.from('attendances')
            .select('athlete_id, status, is_called_up, performance_data, sessions!inner(type_id, society_id, season_id)');

        if (seasonId && seasonId !== 'all') attQ = attQ.eq('sessions.season_id', seasonId);
        if (socId && socId !== 'all') attQ = attQ.eq('sessions.society_id', socId);

        const { data: attendances } = await attQ;

        (attendances || []).forEach(att => {
            const a = athleteMap[att.athlete_id];
            if (!a) return;
            const isGara = garaTypeIds.has(att.sessions?.type_id);
            const status = (att.status || '').toLowerCase();

            if (isGara) {
                // Gara: conta convocazioni e presenze effettive
                a.gara_tot++;
                if (status === 'presente') a.gara_pres++;
                if (att.is_called_up && status !== 'squalificato') a.conv++;
            } else {
                // Allenamento: conta presenze e performance
                a.sess_tot++;
                if (status === 'presente') a.sess_pres++;
                else if (status === 'assente') a.sess_ass++;
                else if (status === 'giustificato') a.sess_giust++;
                else if (status === 'infortunato') a.sess_inf++;
                // Performance (solo se presenti nel JSON e atleta era presente)
                const p = att.performance_data;
                if (p && typeof p === 'object' && status === 'presente') {
                    const vel = Number(p.VEL||p.vel||0), tec = Number(p.TEC||p.tec||0),
                          fis = Number(p.FIS||p.fis||0), res = Number(p.RES||p.res||0),
                          com = Number(p.COM||p.com||0);
                    if (vel||tec||fis||res||com) {
                        a.perf_vel += vel; a.perf_tec += tec;
                        a.perf_fis += fis; a.perf_res += res;
                        a.perf_com += com; a.perf_count++;
                    }
                }
            }
        });

        // 4. Recupera statistiche gare (gol, ammonizioni, espulsioni)
        let statsQ = client.from('match_stats')
            .select('athlete_id, goals, yellow_cards, red_cards, minutes_played, sessions!inner(society_id, season_id, type_id)');

        if (seasonId && seasonId !== 'all') statsQ = statsQ.eq('sessions.season_id', seasonId);
        if (socId && socId !== 'all') statsQ = statsQ.eq('sessions.society_id', socId);

        const { data: matchStats } = await statsQ;

        (matchStats || []).forEach(st => {
            const a = athleteMap[st.athlete_id];
            if (!a) return;
            a.gol += st.goals || 0;
            a.amm += st.yellow_cards || 0;
            a.esp += st.red_cards || 0;
            a.min += st.minutes_played || 0;
        });

        window._dashAthletes = Object.values(athleteMap);

        // Popola filtri
        _populateAthFilters(window._dashAthletes);
        window.renderDashAthletes();

    } catch(err) { console.error('loadDashAthletes error:', err); }
};

function _populateAthFilters(athletes) {
    const selSoc = document.getElementById('dash-ath-soc');
    const selTeam = document.getElementById('dash-ath-team');
    if (!selSoc || !selTeam) return;

    const socs = [...new Map(athletes.filter(a=>a.society_id).map(a=>[a.society_id, a.society])).entries()];
    const teams = [...new Map(athletes.filter(a=>a.team_id).map(a=>[a.team_id, a.team])).entries()];

    selSoc.innerHTML = '<option value="">Tutte le società</option>' +
        socs.map(([id, name]) => `<option value="${id}">${name}</option>`).join('');

    selTeam.innerHTML = '<option value="">Tutte le squadre</option>' +
        teams.map(([id, name]) => `<option value="${id}">${name}</option>`).join('');
}

window.renderDashAthletes = function() {
    const tbody = document.getElementById('dash-athletes-body');
    if (!tbody) return;

    const filterSoc = document.getElementById('dash-ath-soc')?.value;
    const filterTeam = document.getElementById('dash-ath-team')?.value;
    const search = (document.getElementById('dash-ath-search')?.value || '').toLowerCase();
    const sortField = window._dashAthSortField || 'presenze';
    const sortDir = window._dashAthSortDir || -1;

    let filtered = window._dashAthletes.filter(a =>
        (!filterSoc || a.society_id === filterSoc) &&
        (!filterTeam || a.team_id === filterTeam) &&
        (!search || a.name.toLowerCase().includes(search))
    );

    // Ordinamento
    const sortKey = { presenze: 'sess_pres', conv: 'conv', gol: 'gol' }[sortField] || 'sess_pres';
    filtered.sort((a, b) => sortDir * (b[sortKey] - a[sortKey]));

    if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="20" style="text-align:center; padding:24px; color:#94a3b8;">Nessun atleta trovato.</td></tr>';
        return;
    }

    tbody.innerHTML = filtered.map(a => {
        // % presenze allenamenti
        const percSess = a.sess_tot > 0 ? Math.round((a.sess_pres / a.sess_tot) * 100) : null;
        const cSess = percSess === null ? '#94a3b8' : percSess >= 75 ? '#10b981' : percSess >= 50 ? '#f59e0b' : '#ef4444';
        const tSess = percSess !== null ? percSess + '%' : '-';
        // % presenze partite
        const percGara = a.gara_tot > 0 ? Math.round((a.gara_pres / a.gara_tot) * 100) : null;
        // % presenze totale (allenamenti + partite)
        const totPres = (a.sess_pres || 0) + (a.gara_pres || 0);
        const totTot  = (a.sess_tot  || 0) + (a.gara_tot  || 0);
        const percTot = totTot > 0 ? Math.round((totPres / totTot) * 100) : null;
        const cTot = percTot === null ? '#94a3b8' : percTot >= 75 ? '#10b981' : percTot >= 50 ? '#f59e0b' : '#ef4444';
        const tTot = percTot !== null ? percTot + '%' : '-';

        return `
        <tr style="border-bottom:1px solid #f1f5f9; transition:background 0.1s;" onmouseover="this.style.background='#fafbff'" onmouseout="this.style.background=''">
            <td style="padding:9px 12px;">
                <div style="font-weight:700; font-size:0.82rem; color:#1e293b;">${a.name}</div>
                <div style="font-size:0.7rem; color:#94a3b8;">${a.society}</div>
            </td>
            <td style="padding:9px 12px; font-size:0.8rem; color:#2563eb; font-weight:500;">${a.team}</td>
            <!-- Allenamenti -->
            <td style="padding:9px 12px; text-align:center; color:#10b981; font-weight:700; border-left:2px solid #f0fdf4;">${a.sess_pres || 0}</td>
            <td style="padding:9px 12px; text-align:center; color:#ef4444; font-weight:700;">${a.sess_ass || 0}</td>
            <td style="padding:9px 12px; text-align:center; color:#f59e0b; font-weight:700;">${a.sess_giust || 0}</td>
            <td style="padding:9px 12px; text-align:center; color:#8b5cf6; font-weight:700;">${a.sess_inf || 0}</td>
            <td style="padding:9px 12px; text-align:center; font-weight:700; color:${cSess};">${tSess}</td>
            <!-- Partite -->
            <td style="padding:9px 12px; text-align:center; color:#10b981; font-weight:700; border-left:2px solid #eff6ff;">${a.gara_pres || 0}</td>
            <td style="padding:9px 12px; text-align:center; color:#2563eb; font-weight:700;">${a.conv || 0}</td>
            <td style="padding:9px 12px; text-align:center; color:#10b981; font-weight:700;">${a.gol || 0}</td>
            <td style="padding:9px 12px; text-align:center; color:#f59e0b; font-weight:700;">${a.amm || 0}</td>
            <td style="padding:9px 12px; text-align:center; color:#ef4444; font-weight:700;">${a.esp || 0}</td>
            <td style="padding:9px 12px; text-align:center; color:#2563eb; font-weight:600; font-size:0.8rem;">${a.min > 0 ? a.min + '\'' : '<span style="color:#e2e8f0;">—</span>'}</td>
            <!-- Totale -->
            <td style="padding:9px 12px; text-align:center; font-weight:700; color:#475569; border-left:2px solid #fffbeb;">${totPres}/${totTot}</td>
            <td style="padding:9px 12px; text-align:center; font-weight:700; color:${cTot};">${tTot}</td>
            <!-- Performance medie -->
            ${(()=>{ const n = a.perf_count||0;
                const stars = (v) => { const avg = n>0?Math.round(v/n):0;
                    return avg>0 ? '<span style="color:#6366f1;font-weight:700;">'+avg+'★</span>' : '<span style="color:#e2e8f0;">-</span>'; };
                return `<td style="padding:9px 12px; text-align:center; border-left:2px solid #eef2ff;">${stars(a.perf_vel)}</td>
                        <td style="padding:9px 12px; text-align:center;">${stars(a.perf_tec)}</td>
                        <td style="padding:9px 12px; text-align:center;">${stars(a.perf_fis)}</td>
                        <td style="padding:9px 12px; text-align:center;">${stars(a.perf_res)}</td>
                        <td style="padding:9px 12px; text-align:center;">${stars(a.perf_com)}</td>`;
            })()}
        </tr>`;
    }).join('');
};

window._userAssignedTeamIds = null; // cache

window.loadUserAssignedTeams = async function() {
    // Restituisce array di team_id assegnati all'utente corrente via user_category_seasons
    // Solo per ruoli scoped (dirigente, allenatore); per altri restituisce null (= nessun filtro)
    const effRole = (window._effectiveRole || window._userRole || '').toLowerCase();
    const isScopedStaff = ['dirigente','allenatore','responsabile'].includes(effRole);
    if (!isScopedStaff) { window._userAssignedTeamIds = null; return null; }
    if (window._userAssignedTeamIds !== null) return window._userAssignedTeamIds; // usa cache

    const userId = window._currentUserId;
    if (!userId) { window._userAssignedTeamIds = []; return []; }

    const { data } = await client.from('user_category_seasons')
        .select('team_id')
        .eq('user_id', userId);

    const ids = [...new Set((data||[]).map(r => r.team_id).filter(Boolean))];
    window._userAssignedTeamIds = ids;
    return ids;
};

window._genitoriList = [];
window._genitoreAthletes = {};   // map genitore_user_id → [athlete]
window._allAthletes = [];        // tutti gli atleti per il select

window.initGenitori = async function() {
    try {
        // Carica tutti gli utenti con management_role = 'Genitore'
        const { data: genitori } = await client.from('users')
            .select('id, name, email, username, society_id')
            .eq('management_role', 'Genitore')
            .order('name');

        // Carica tutte le associazioni genitore→atleta
        const { data: links } = await client.from('parent_athletes')
            .select('parent_id, athlete_id, athletes(id, name, surname)');

        // Carica tutti gli atleti per il modal
        const { data: allAth } = await client.from('athletes')
            .select('id, name, surname')
            .order('surname');

        // Split "name" column (cognome + nome) into surname/name for rendering
        window._genitoriList = (genitori || []).map(g => {
            const parts = (g.name || '').trim().split(' ');
            return {
                ...g,
                surname: parts[0] || '',
                name: parts.slice(1).join(' ') || ''
            };
        });
        window._allAthletes = allAth || [];

        // Costruisci mappa parent_id → array di atleti
        window._genitoreAthletes = {};
        (links || []).forEach(l => {
            if (!window._genitoreAthletes[l.parent_id]) window._genitoreAthletes[l.parent_id] = [];
            if (l.athletes) window._genitoreAthletes[l.parent_id].push(l.athletes);
        });

        window.renderGenitori();
    } catch(err) { console.error('initGenitori error:', err); }
};

window.renderGenitori = function() {
    const tbody = document.getElementById('genitori-tbody');
    if (!tbody) return;
    const search = (document.getElementById('gen-search')?.value || '').toLowerCase();

    let list = window._genitoriList.filter(g => {
        const full = `${g.name} ${g.surname} ${g.username} ${g.email}`.toLowerCase();
        return !search || full.includes(search);
    });

    if (list.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:24px; color:#94a3b8;">Nessun genitore trovato.</td></tr>';
        return;
    }

    tbody.innerHTML = list.map(g => {
        const athletes = window._genitoreAthletes[g.id] || [];
        const athBadges = athletes.length > 0
            ? athletes.map(a => `<span style="background:#dbeafe; color:#1d4ed8; padding:2px 8px; border-radius:99px; font-size:0.72rem; font-weight:700; white-space:nowrap;">${a.surname} ${a.name}</span>`).join(' ')
            : '<span style="color:#94a3b8; font-size:0.78rem;">— nessun atleta —</span>';

        return `<tr>
            <td style="font-weight:600;">${g.surname || ''} ${g.name || ''}</td>
            <td style="color:#64748b; font-size:0.82rem;">${g.username || '—'}</td>
            <td style="color:#64748b; font-size:0.82rem;">${g.email || '—'}</td>
            <td style="text-align:center;"><div style="display:flex; gap:4px; flex-wrap:wrap; justify-content:center;">${athBadges}</div></td>
            <td style="text-align:right;">
                <button class="btn-sm btn-warning" onclick="window.openGenitoreModal('${g.id}')">✏️ Modifica</button>
                <button class="btn-sm btn-danger" onclick="window.deleteGenitore('${g.id}')">🗑️</button>
            </td>
        </tr>`;
    }).join('');
};

window.saveGenitore = async function(genitoreId) {
    const name     = document.getElementById('gen-name')?.value.trim();
    const surname  = document.getElementById('gen-surname')?.value.trim();
    const email    = document.getElementById('gen-email')?.value.trim();
    const username = document.getElementById('gen-username')?.value.trim();
    const password = document.getElementById('gen-password')?.value;
    const selEl    = document.getElementById('gen-athletes');
    const selectedAthletes = Array.from(selEl?.selectedOptions || []).map(o => o.value);

    if (!name || !surname) return alert('Nome e cognome sono obbligatori.');

    try {
        let userId = genitoreId;

        if (!genitoreId) {
            // Nuovo genitore: crea l'utente Auth + riga in users
            if (!email || !password) return alert('Email e password sono obbligatorie per il nuovo genitore.');
            if (password.length < 6) return alert('La password deve essere di almeno 6 caratteri.');

            const { data: authData, error: authErr } = await client.auth.admin
                ? client.auth.admin.createUser({ email, password, email_confirm: true })
                : { data: null, error: { message: 'Usa la funzione Supabase Admin per creare utenti.' } };

            // Fallback: usa signUp se admin API non disponibile lato client
            let authUid;
            if (authErr || !authData?.user) {
                const { data: su, error: suErr } = await client.auth.signUp({ email, password });
                if (suErr) throw new Error('Errore creazione account: ' + suErr.message);
                authUid = su?.user?.id;
            } else {
                authUid = authData.user.id;
            }

            const { data: newUser, error: userErr } = await client.from('users').insert({
                id: authUid,
                name: `${surname} ${name}`.trim(), email, username,
                role: 'user',
                management_role: 'Genitore',
                society_id: window._currentSocietyId || null,
            }).select().single();

            if (userErr) throw new Error('Errore salvataggio utente: ' + userErr.message);
            userId = authUid;
        } else {
            // Modifica: aggiorna solo nome/cognome
            await client.from('users').update({ name: `${surname} ${name}`.trim() }).eq('id', genitoreId);
        }

        // Sincronizza associazioni atleti
        await client.from('parent_athletes').delete().eq('parent_id', userId);
        if (selectedAthletes.length > 0) {
            await client.from('parent_athletes').insert(
                selectedAthletes.map(aid => ({ parent_id: userId, athlete_id: aid }))
            );
        }

        modal.close();
        alert('✅ Genitore salvato con successo!');
        window._userAssignedTeamIds = null; // reset cache
        await window.initGenitori();
    } catch(err) {
        console.error(err);
        alert('Errore: ' + err.message);
    }
};

window.deleteGenitore = async function(genitoreId) {
    if (!confirm('Eliminare questo genitore e tutte le sue associazioni?')) return;
    try {
        await client.from('parent_athletes').delete().eq('parent_id', genitoreId);
        await client.from('users').delete().eq('id', genitoreId);
        await window.initGenitori();
    } catch(err) { alert('Errore eliminazione: ' + err.message); }
};

window.initGenitoreView = async function() {
    const contentEl = document.getElementById('content');
    if (!contentEl) return;
    const userId = window._currentUserId;
    contentEl.innerHTML = '<div class="card"><p style="color:#94a3b8;text-align:center;padding:20px;">⏳ Caricamento...</p></div>';

    try {
        // 1. Atleti del genitore
        const { data: links } = await client.from('parent_athletes')
            .select('athlete_id, athletes(id,name,surname,born_date)')
            .eq('parent_id', userId);

        if (!links || links.length === 0) {
            contentEl.innerHTML = `<div class="card" style="text-align:center;padding:40px;">
                <div style="font-size:3rem;margin-bottom:12px;">👶</div>
                <h2 style="font-family:'Space Grotesk',sans-serif;">Nessun atleta associato</h2>
                <p style="color:#94a3b8;">Contatta l'amministratore per associare il tuo figlio all'account.</p>
            </div>`;
            return;
        }

        const athletes = links.map(l => l.athletes).filter(Boolean);

        // 2. Dati comuni
        const { data: sessionTypes } = await client.from('session_types').select('id,name');
        const garaTypeIds = new Set((sessionTypes||[])
            .filter(t => t.name.toLowerCase().includes('partita') || t.name.toLowerCase().includes('gara'))
            .map(t => t.id));
        const garaIdsArr = [...garaTypeIds];

        const activeSeason = (await client.from('seasons').select('id,name').eq('is_active',true).maybeSingle()).data;
        const sid = activeSeason?.id || null;

        // 3. Dati per ogni atleta
        const athIds = athletes.map(a => a.id);

        const [tsRes, msRes, attRes] = await Promise.all([
            client.from('athlete_team_seasons')
                .select('athlete_id,season_id,team_id,seasons(id,name,is_active),teams(id,name,categories(name))')
                .in('athlete_id', athIds),
            client.from('match_stats')
                .select('athlete_id,goals,yellow_cards,red_cards,minutes_played,sessions!inner(season_id,type_id,team_id)')
                .in('athlete_id', athIds),
            client.from('attendances')
                .select('athlete_id,status,is_called_up,sessions!inner(season_id,type_id,team_id)')
                .in('athlete_id', athIds),
        ]);

        const teamSeasons = tsRes.data || [];
        const matchStats  = msRes.data || [];
        const attendances = attRes.data || [];

        // Aggrega stats per atleta+stagione
        const statsBy = {};
        matchStats.forEach(st => {
            const s = st.sessions?.season_id;
            if (!garaTypeIds.has(st.sessions?.type_id)) return;
            if (!statsBy[st.athlete_id]) statsBy[st.athlete_id] = {};
            if (!statsBy[st.athlete_id][s]) statsBy[st.athlete_id][s] = {goals:0,yc:0,rc:0,min:0};
            statsBy[st.athlete_id][s].goals += st.goals||0;
            statsBy[st.athlete_id][s].yc    += st.yellow_cards||0;
            statsBy[st.athlete_id][s].rc    += st.red_cards||0;
            statsBy[st.athlete_id][s].min   += st.minutes_played||0;
        });
        const presBy = {};
        attendances.forEach(att => {
            const s = att.sessions?.season_id;
            if (!s || !garaTypeIds.has(att.sessions?.type_id)) return;
            const aid = att.athlete_id;
            if (!presBy[aid]) presBy[aid] = {};
            if (!presBy[aid][s]) presBy[aid][s] = {pres:0,tot:0,conv:0};
            presBy[aid][s].tot++;
            if (att.is_called_up) presBy[aid][s].conv++;
            if ((att.status||'').toLowerCase()==='presente') presBy[aid][s].pres++;
        });

        // Helper
        const pill = (val, label, color, bg='#f8fafc', border='#e2e8f0') =>
            `<div style="text-align:center;background:${bg};border:1px solid ${border};border-radius:10px;padding:10px 16px;min-width:72px;">
                <div style="font-family:'Space Grotesk',sans-serif;font-size:1.4rem;font-weight:800;color:${color};line-height:1;">${val}</div>
                <div style="font-size:0.62rem;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.06em;margin-top:3px;">${label}</div>
            </div>`;

        const esitoBadge = s => {
            const m = {vittoria:['#dcfce7','#166534','VITTORIA'],sconfitta:['#fee2e2','#991b1b','SCONFITTA'],pareggio:['#fef3c7','#92400e','PAREGGIO']};
            const [bg,col,lbl] = m[(s||'').toLowerCase()] || ['#f1f5f9','#64748b',(s||'DA DISPUTARE').toUpperCase()];
            return `<span style="background:${bg};color:${col};padding:2px 10px;border-radius:99px;font-size:0.7rem;font-weight:700;">${lbl}</span>`;
        };

        // Genera pagina per ogni atleta
        const renderAthletePage = async (ath) => {
            const athTeamSeasons = teamSeasons.filter(ts => ts.athlete_id === ath.id && ts.seasons?.is_active);
            const teamIds = [...new Set(athTeamSeasons.map(ts => ts.team_id).filter(Boolean))];
            const activeTsSeason = athTeamSeasons[0];
            const teamName = activeTsSeason?.teams?.name || '—';

                if (sid) mq = mq.eq('season_id', sid);
                const { data: ms } = await mq;

                    (mds||[]).forEach(d => matchDetailsMap[d.session_id] = d);

                        <th style="padding:7px 10px;text-align:center;font-size:0.7rem;font-weight:700;color:#8b5cf6;" title="Trasferta">🚌</th>
                        <th style="padding:7px 10px;text-align:center;font-size:0.7rem;font-weight:700;color:#10b981;">GF</th>
                        <th style="padding:7px 10px;text-align:center;font-size:0.7rem;font-weight:700;color:#ef4444;">GS</th>
                        <th style="padding:7px 10px;text-align:center;font-size:0.7rem;font-weight:700;color:#64748b;">V/P/S</th>
                        <th style="padding:7px 10px;text-align:center;font-size:0.7rem;font-weight:700;color:#2563eb;">%V</th>
                    </tr></thead>
                    <tbody>${statsGaraList.map(t => `<tr style="border-bottom:1px solid #f1f5f9;">
                        <td style="padding:8px 10px;font-weight:600;font-size:0.82rem;">${t.name}</td>
                        <td style="padding:8px 10px;text-align:center;font-weight:700;color:#334155;">${t.p}</td>
                        <td style="padding:8px 10px;text-align:center;font-weight:700;color:#2563eb;">${t.casa}</td>
                        <td style="padding:8px 10px;text-align:center;font-weight:700;color:#8b5cf6;">${t.trasf}</td>
                        <td style="padding:8px 10px;text-align:center;font-weight:700;color:#10b981;">${t.gf}</td>
                        <td style="padding:8px 10px;text-align:center;font-weight:700;color:#ef4444;">${t.gs}</td>
                        <td style="padding:8px 10px;text-align:center;font-size:0.8rem;">
                            <span style="color:#10b981;font-weight:700;">${t.w}V</span> · <span style="color:#64748b;font-weight:700;">${t.dr}P</span> · <span style="color:#ef4444;font-weight:700;">${t.l}S</span>
                        </td>
                        <td style="padding:8px 10px;text-align:center;font-weight:800;font-family:'Space Grotesk',sans-serif;color:#2563eb;">${t.p>0?Math.round(t.w/t.p*100):0}%</td>
                    </tr>`).join('')}</tbody>
                </table>`;

            return `
            <!-- 1. CARD SQUADRA -->
            <div style="background:linear-gradient(135deg,#1e3a5f 0%,#2563eb 100%);border-radius:16px;padding:22px 26px;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
                <div>
                    <div style="font-size:0.62rem;font-weight:700;color:rgba(255,255,255,0.55);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:4px;">🏟️ Squadra</div>
                    <div style="font-family:'Space Grotesk',sans-serif;font-size:1.4rem;font-weight:800;color:white;letter-spacing:-0.3px;">${teamName}</div>
                    ${catName ? `<div style="font-size:0.75rem;color:rgba(255,255,255,0.55);margin-top:3px;">${catName} · ${seasonName}</div>` : `<div style="font-size:0.75rem;color:rgba(255,255,255,0.55);margin-top:3px;">${seasonName}</div>`}
                </div>
                <div style="display:flex;gap:10px;flex-wrap:wrap;">
                    <div style="background:rgba(255,255,255,0.13);border-radius:12px;padding:10px 18px;text-align:center;border:1px solid rgba(255,255,255,0.1);">
                        <div style="font-size:1.4rem;font-weight:800;color:#6ee7b7;line-height:1;">${totGoals}</div>
                        <div style="font-size:0.6rem;color:rgba(255,255,255,0.55);text-transform:uppercase;margin-top:3px;">⚽ Gol</div>
                    </div>
                    <div style="background:rgba(255,255,255,0.13);border-radius:12px;padding:10px 18px;text-align:center;border:1px solid rgba(255,255,255,0.1);">
                        <div style="font-size:1.4rem;font-weight:800;color:#93c5fd;line-height:1;">${totMin}'</div>
                        <div style="font-size:0.6rem;color:rgba(255,255,255,0.55);text-transform:uppercase;margin-top:3px;">⏱ Min</div>
                    </div>
                    <div style="background:rgba(255,255,255,0.13);border-radius:12px;padding:10px 18px;text-align:center;border:1px solid rgba(255,255,255,0.1);">
                        <div style="font-size:1.4rem;font-weight:800;color:#fde68a;line-height:1;">${totConv}</div>
                        <div style="font-size:0.6rem;color:rgba(255,255,255,0.55);text-transform:uppercase;margin-top:3px;">Convoc.</div>
                    </div>
                    ${totYC>0 ? `<div style="background:rgba(255,255,255,0.13);border-radius:12px;padding:10px 18px;text-align:center;border:1px solid rgba(255,255,255,0.1);">
                        <div style="font-size:1.4rem;font-weight:800;color:#fcd34d;line-height:1;">${totYC}</div>
                        <div style="font-size:0.6rem;color:rgba(255,255,255,0.55);text-transform:uppercase;margin-top:3px;">🟨 Amm</div>
                    </div>` : ''}
                </div>
            </div>

            <!-- 2. STATISTICHE ATLETA -->
            <div class="card" style="margin-bottom:1rem;">
                <div style="font-size:0.72rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:14px;">📊 Statistiche del tuo atleta — ${seasonName}</div>
                <div style="display:flex;gap:10px;flex-wrap:wrap;">
                    ${pill(stAct.goals||0,'⚽ Gol','#10b981','#f0fdf4','#bbf7d0')}
                    ${pill(stAct.min||0,'⏱ Min','#2563eb','#eff6ff','#bfdbfe')}
                    ${pill(stAct.yc||0,'🟨 Amm','#f59e0b','#fffbeb','#fde68a')}
                    ${pill(stAct.rc||0,'🟥 Esp','#ef4444','#fef2f2','#fecaca')}
                    <div style="width:1px;background:#e2e8f0;margin:0 4px;"></div>
                    ${pill(prAct.pres||0,'Presenze','#10b981','#f0fdf4','#bbf7d0')}
                    ${pill(prAct.conv||0,'Convoc.','#2563eb','#eff6ff','#bfdbfe')}
                    ${pill(prAct.tot||0,'Partite','#64748b')}
                    ${convPerc !== null ? pill(convPerc+'%','Conv%',percColor) : ''}
                </div>
            </div>

            <!-- 3. PARTITE RECENTI -->
            <div class="card" style="margin-bottom:1rem;">
                <div style="font-size:0.72rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:14px;">🏆 Partite recenti</div>
                ${matchesHTML}
            </div>

            <!-- 4. PRESENZE SESSIONI + STATS GARA -->
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                <div class="card">
                    <div style="font-size:0.72rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:14px;">📅 Presenze Sessioni</div>
                    ${presHTML}
                </div>
                <div class="card">
                    <div style="font-size:0.72rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;">⚽ Statistiche Gare per Squadra</div>
                    <div style="font-size:0.68rem;color:#94a3b8;margin-bottom:14px;">Solo partite ufficiali · Amichevoli escluse</div>
                    ${statsGaraHTML}
                </div>
            </div>`;
        };

        // Genera tutte le pagine
        const pages = await Promise.all(athletes.map(ath => renderAthletePage(ath)));

        // Costruisci HTML finale
        const multiChild = athletes.length > 1;
        const tabsHTML = multiChild ? `
            <div style="display:flex;gap:4px;margin-bottom:1.5rem;background:white;border:1px solid #e2e8f0;border-radius:12px;padding:5px;width:fit-content;">
                ${athletes.map((ath,i) => `
                    <button id="child-tab-btn-${i}" onclick="window._switchChild(${i})"
                        style="padding:8px 20px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:0.85rem;font-weight:600;
                        ${i===0 ? 'background:#2563eb;color:white;' : 'background:transparent;color:#64748b;'}">
                        👤 ${ath.surname} ${ath.name}
                    </button>`).join('')}
            </div>` : '';

        const pagesHTML = pages.map((html,i) =>
            `<div id="child-page-${i}" style="${i===0?'':'display:none;'}">${html}</div>`
        ).join('');

        contentEl.innerHTML = `
        <div style="font-family:'DM Sans',sans-serif;padding:0;">
            <div style="margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:8px;">
                <div>
                    <h2 style="font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:800;color:#1e293b;margin:0;">👨‍👩‍👧 Benvenuto, ${window.CURRENT_USER?.name || 'Genitore'}</h2>
                    <div style="font-size:0.82rem;color:#94a3b8;margin-top:4px;">🌐 Stagione: ${activeSeason?.name || '—'} · ${new Date().toLocaleDateString('it-IT',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div>
                </div>
                <div style="font-size:0.78rem;color:#64748b;background:white;border:1px solid #e2e8f0;border-radius:8px;padding:6px 14px;">
                    ${athletes.length} figlio${athletes.length!==1?'i':''}  associato${athletes.length!==1?'i':''}
                </div>
            </div>
            ${tabsHTML}
            ${pagesHTML}
        </div>`;

        // Switcher tra figli
        window._switchChild = function(idx) {
            athletes.forEach((_,i) => {
                const page = document.getElementById('child-page-'+i);
                const btn  = document.getElementById('child-tab-btn-'+i);
                if (page) page.style.display = i===idx ? '' : 'none';
                if (btn) {
                    btn.style.background = i===idx ? '#2563eb' : 'transparent';
                    btn.style.color      = i===idx ? 'white'   : '#64748b';
                }
            });
        };

    } catch(err) {
        console.error('initGenitoreView error:', err);
        contentEl.innerHTML = `<div class="card"><p style="color:#ef4444;">Errore caricamento dati: ${err.message}</p></div>`;
    }
};
/* [QUI AGGIUNGEREMO LE FUNZIONI PER SPORT, SOCIETÀ, ECC. UNA ALLA VOLTA] */
</script>
</body>
</html>
