<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportTrackPro - Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #3730a3;
            --sidebar-bg: #0f172a;
            --bg-app: #f1f5f9;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --danger: #ef4444;
            --warning: #f59e0b;
            --white: #ffffff;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-app); color: var(--text-main); overflow-x: hidden; }

        /* --- LOGIN PAGE --- */
        #login-screen { 
            display: flex; align-items: center; justify-content: center; 
            height: 100vh; background: radial-gradient(circle at top left, #4f46e5, #1e293b);
        }
        .login-card { 
            background: var(--white); padding: 2.5rem; border-radius: 20px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); width: 100%; max-width: 420px; 
        }
        .login-card h2 { text-align: center; margin-bottom: 2rem; color: var(--sidebar-bg); font-weight: 800; }
        .login-card label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; }
        .login-card input { 
            width: 100%; padding: 12px; margin-bottom: 20px; 
            border: 1px solid #e2e8f0; border-radius: 10px; outline: none; transition: 0.2s;
        }
        .login-card input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }

        /* --- APP STRUCTURE --- */
        #app { display: none; min-height: 100vh; }
        
        #sidebar {
            width: 260px; background: var(--sidebar-bg); color: white;
            padding: 2rem 1rem; position: fixed; height: 100vh;
            display: flex; flex-direction: column; z-index: 100;
        }
        #sidebar h3 { font-size: 1.3rem; font-weight: 800; margin-bottom: 2.5rem; padding-left: 1rem; color: #fff; letter-spacing: -1px; }
        #sidebar a {
            color: #94a3b8; text-decoration: none; padding: 12px 16px;
            border-radius: 10px; font-weight: 500; cursor: pointer; transition: 0.2s; margin-bottom: 4px;
        }
        #sidebar a:hover { background: rgba(255,255,255,0.05); color: white; }
        #sidebar a.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }

        #main-content { margin-left: 260px; padding: 2.5rem; width: calc(100% - 260px); }

        /* --- UI COMPONENTS --- */
        .card { background: var(--white); padding: 2rem; border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid #e2e8f0; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .btn { 
            background: var(--primary); color: white; border: none; padding: 10px 24px; 
            border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .btn:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .btn-danger { background: var(--danger); }
        .btn-sm { padding: 6px 12px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: 600; font-size: 0.8rem; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; border-bottom: 2px solid #f1f5f9; }
        td { padding: 16px 12px; border-bottom: 1px solid #f1f5f9; font-size: 0.95rem; }
        tr:hover { background: #f8fafc; }

        /* --- MODAL SYSTEM --- */
        #modal-overlay { 
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); 
            z-index: 999; display: none; backdrop-filter: blur(4px); 
        }
        #modal { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 2.5rem; border-radius: 20px; width: 480px; 
            z-index: 1000; display: none; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        #modal h2 { margin-bottom: 1.5rem; font-weight: 800; }
        #modal label { display: block; margin-top: 15px; font-size: 0.85rem; font-weight: 700; color: var(--text-main); }
        #modal input, #modal select { width: 100%; padding: 12px; margin-top: 6px; border: 1px solid #e2e8f0; border-radius: 10px; outline: none; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2>SportTrackPro</h2>
            <form id="login-form">
                <label>Username</label>
                <input type="text" id="username" placeholder="Inserisci il tuo username" required>
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
                <button type="submit" class="btn" style="width:100%">Accedi al sistema</button>
                <div id="error-msg" style="color:var(--danger); margin-top:15px; display:none; text-align:center; font-size:0.9rem; font-weight:500;"></div>
            </form>
        </div>
    </div>

    <div id="app">
        <nav id="sidebar">
            <h3>SportTrackPro</h3>
            <a data-section="dashboard" class="active">🏠 Dashboard</a>
            <a data-section="stagioni">📅 Stagioni</a>
            <a data-section="sport">⚽ Sport</a>
            <a data-section="societa">🏢 Società</a>
            <a data-section="categoria">🏷️ Categorie</a>
            <a data-section="squadra">👥 Squadre</a>
            <a data-section="staff">👔 Staff</a>
            <a data-section="atleti">🏃 Atleti</a>
            <button class="btn btn-danger" id="btn-logout" style="margin-top:auto;">Esci</button>
        </nav>

        <main id="main-content">
            <div id="page-content">
                </div>
        </main>
    </div>

    <div id="modal-overlay"></div>
    <div id="modal">
        <h2 id="modal-title">Titolo</h2>
        <div id="modal-body"></div>
        <div style="margin-top:2.5rem; display:flex; gap:12px; justify-content:flex-end;">
            <button class="btn" style="background:#94a3b8" onclick="modal.close()">Annulla</button>
            <button class="btn" id="btn-modal-save">Salva Modifiche</button>
        </div>
    </div>

    <script src="db.js"></script>

    <script>
        let CURRENT_USER = null;

        // --- GESTIONE MODAL ---
        const modal = {
            overlay: document.getElementById('modal-overlay'),
            window: document.getElementById('modal'),
            open(title, html) {
                document.getElementById('modal-title').innerText = title;
                document.getElementById('modal-body').innerHTML = html;
                this.overlay.style.display = 'block';
                this.window.style.display = 'block';
            },
            close() {
                this.overlay.style.display = 'none';
                this.window.style.display = 'none';
            }
        };

        // --- NAVIGAZIONE ---
        function loadPage(section) {
            const container = document.getElementById('page-content');
            
            // UI Update Sidebar
            document.querySelectorAll('#sidebar a').forEach(a => a.classList.remove('active'));
            document.querySelector(`[data-section="${section}"]`)?.classList.add('active');

            switch(section) {
                case 'squadra':
                    container.innerHTML = templateSquadra();
                    initSquadra();
                    break;
                case 'staff':
                    container.innerHTML = templateStaff();
                    initStaff();
                    break;
                default:
                    container.innerHTML = `<div class="card"><h2>${section.toUpperCase()}</h2><p>Questa sezione è in fase di caricamento o sviluppo.</p></div>`;
            }
        }

        // --- LOGICA LOGIN ---
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errDiv = document.getElementById('error-msg');

            const { data: userRow, error: userErr } = await client.from('users').select('*').eq('username', username).maybeSingle();
            
            if (userErr || !userRow) { 
                errDiv.innerText = "Utente non trovato"; 
                errDiv.style.display = "block"; 
                return; 
            }

            const { error: authErr } = await client.auth.signInWithPassword({ email: userRow.email, password });
            
            if (authErr) { 
                errDiv.innerText = "Credenziali errate"; 
                errDiv.style.display = "block"; 
                return; 
            }

            CURRENT_USER = userRow;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            loadPage('dashboard');
        };

        document.getElementById('btn-logout').onclick = () => location.reload();

        // --- SEZIONE SQUADRA ---
        function templateSquadra() {
            return `
            <div class="card">
                <div class="header">
                    <h2>Gestione Squadre</h2>
                    <button class="btn" id="btn-add-team">+ Aggiungi Squadra</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Società</th>
                            <th>Categoria</th>
                            <th>Sport</th>
                            <th style="text-align:right">Azioni</th>
                        </tr>
                    </thead>
                    <tbody id="team-list"></tbody>
                </table>
            </div>`;
        }

        async function initSquadra() {
            const { data, error } = await client.from('teams').select(`
                *,
                societies!rel_team_society(name),
                categories!rel_team_category(name),
                sports!rel_team_sport(name, icon)
            `).order('name');

            const tbody = document.getElementById('team-list');
            if (error) return tbody.innerHTML = `<tr><td>Errore: ${error.message}</td></tr>`;

            tbody.innerHTML = data.map(t => `
                <tr>
                    <td><strong>${t.name}</strong></td>
                    <td>${t.societies?.name || '-'}</td>
                    <td><span style="background:#e0f2fe; color:#0369a1; padding:4px 10px; border-radius:8px; font-size:0.8rem; font-weight:600;">${t.categories?.name || '-'}</span></td>
                    <td>${t.sports?.icon || ''} ${t.sports?.name || '-'}</td>
                    <td style="text-align:right">
                        <button class="btn-sm" style="background:var(--warning)" onclick="editTeam('${t.id}')">✏️</button>
                        <button class="btn-sm" style="background:var(--danger); margin-left:5px" onclick="deleteTeam('${t.id}')">🗑️</button>
                    </td>
                </tr>
            `).join('');

            document.getElementById('btn-add-team').onclick = () => openTeamModal();
        }

        // Funzione per il modal squadra (Aggiungi/Modifica)
        async function openTeamModal(id = null) {
            const [resSoc, resCat, resSpr] = await Promise.all([
                client.from('societies').select('id, name'),
                client.from('categories').select('id, name'),
                client.from('sports').select('id, name, icon')
            ]);

            let existing = null;
            if(id) {
                const { data } = await client.from('teams').select('*').eq('id', id).single();
                existing = data;
            }

            modal.open(id ? 'Modifica Squadra' : 'Nuova Squadra', `
                <label>Nome Squadra</label>
                <input type="text" id="f-name" value="${existing ? existing.name : ''}">
                <label>Società</label>
                <select id="f-soc">${resSoc.data.map(s => `<option value="${s.id}" ${existing?.society_id == s.id ? 'selected' : ''}>${s.name}</option>`).join('')}</select>
                <label>Categoria</label>
                <select id="f-cat">${resCat.data.map(c => `<option value="${c.id}" ${existing?.category_id == c.id ? 'selected' : ''}>${c.name}</option>`).join('')}</select>
                <label>Sport</label>
                <select id="f-spr">${resSpr.data.map(sp => `<option value="${sp.id}" ${existing?.sport_id == sp.id ? 'selected' : ''}>${sp.icon} ${sp.name}</option>`).join('')}</select>
            `);

            document.getElementById('btn-modal-save').onclick = async () => {
                const row = {
                    name: document.getElementById('f-name').value,
                    society_id: document.getElementById('f-soc').value,
                    category_id: document.getElementById('f-cat').value,
                    sport_id: document.getElementById('f-spr').value
                };
                const { error } = id ? await client.from('teams').update(row).eq('id', id) : await client.from('teams').insert(row);
                if(!error) { modal.close(); initSquadra(); } else { alert(error.message); }
            };
        }

        window.editTeam = (id) => openTeamModal(id);
        window.deleteTeam = async (id) => { if(confirm("Eliminare?")) { await client.from('teams').delete().eq('id', id); initSquadra(); } };

        // --- SEZIONE STAFF (Solo Lettura) ---
        function templateStaff() {
            return `
            <div class="card">
                <div class="header"><h2>Anagrafica Staff</h2></div>
                <table>
                    <thead><tr><th>Username</th><th>Email</th><th>Ruolo</th></tr></thead>
                    <tbody id="staff-list"></tbody>
                </table>
            </div>`;
        }

        async function initStaff() {
            const { data } = await client.from('users').select('*').order('username');
            document.getElementById('staff-list').innerHTML = data.map(u => `
                <tr>
                    <td><strong>${u.username}</strong></td>
                    <td>${u.email}</td>
                    <td>${u.role || 'Staff'}</td>
                </tr>
            `).join('');
        }

        // Inizializzazione Click Sidebar
        document.querySelectorAll('#sidebar [data-section]').forEach(link => {
            link.onclick = () => loadPage(link.getAttribute('data-section'));
        });
    </script>
</body>
</html>
