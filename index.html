<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportTrackPro - Gestione</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --card: #ffffff; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        #login-wrap { background: var(--card); padding: 2rem; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; max-width: 380px; }
        #app { display: none; width: 95%; max-width: 1000px; background: var(--card); min-height: 80vh; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin: 20px; align-self: flex-start; }

        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.4rem; font-weight: 600; font-size: 0.9rem; color: #475569; }
        input { width: 100%; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        
        button { width: 100%; padding: 0.75rem; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #1d4ed8; }
        .btn-logout { background: #ef4444; width: auto; padding: 0.4rem 1rem; margin-top: 10px; }

        #error-msg { color: #b91c1c; background: #fee2e2; padding: 0.75rem; border-radius: 6px; margin-top: 1rem; display: none; font-size: 0.85rem; border: 1px solid #fecaca; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
        .card-data { border: 1px solid #e2e8f0; padding: 1.2rem; border-radius: 8px; background: #f8fafc; }
        ul { list-style: none; padding: 0; }
        li { padding: 0.6rem; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; }
        li:last-child { border: none; }
        .status-active { color: #16a34a; font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="login-wrap">
        <h2 style="text-align: center; margin-bottom: 1.5rem;">SportTrackPro</h2>
        <form id="login-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Inserisci username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit">Accedi</button>
            <div id="error-msg"></div>
        </form>
    </div>

    <div id="app">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f1f5f9; padding-bottom: 1rem;">
            <div>
                <h2 id="welcome-title" style="margin:0;">Dashboard</h2>
                <p id="user-info" style="margin:0; color: #64748b; font-size: 0.9rem;"></p>
            </div>
            <button class="btn-logout" id="btn-logout">Logout</button>
        </div>

        <div class="grid">
            <div class="card-data">
                <h3>Stagioni</h3>
                <ul id="list-seasons"><li>Caricamento...</li></ul>
            </div>
            <div class="card-data">
                <h3>Società</h3>
                <ul id="list-societa"><li>Caricamento...</li></ul>
            </div>
        </div>
    </div>

    <script type="module">
        const SUPABASE_URL  = 'https://saoghfehqrjgobcpiebz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhb2doZmVocXJqZ29iY3BpZWJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NzgwMTcsImV4cCI6MjA4OTE1NDAxN30.3i6bHXbdmKppLt8r2n4YCD5rgeFnm6veeFPmReDmOMY';

        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let CURRENT_USER = null;

      // --- LOGICA LOGIN AGGIORNATA ---
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errDiv = document.getElementById('error-msg');
    errDiv.style.display = 'none';

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    // UI: Caratteri grandi per i messaggi di errore
    errDiv.style.fontSize = "18px";
    errDiv.style.padding = "15px";

    try {
        // STEP 1: Recupero Email (Qui sparirà l'errore 403 grazie alla Policy SQL)
        const { data: userRow, error: userErr } = await client
            .from('users')
            .select('*')
            .eq('username', username)
            .maybeSingle();

        if (userErr) {
            console.error("Errore 403 Persistente:", userErr);
            throw new Error("Errore Permessi (403). Hai eseguito il codice SQL su Supabase?");
        }
        
        if (!userRow) throw new Error("Utente non trovato.");

        // STEP 2: Autenticazione con password
        const { data: authData, error: authError } = await client.auth.signInWithPassword({
            email: userRow.email,
            password: password
        });

        if (authError) throw new Error("Password errata.");

        // STEP 3: Setup Variabili e UI (INGRANDIMENTO CARATTERI)
        window.CURRENT_USER = { ...authData.user, ...userRow };
        window._userRole = userRow.role;
        window._currentSocietyId = userRow.society_id;

        // INGRANDIMENTO GLOBALE DELLA UI (Font 18px)
        document.documentElement.style.fontSize = "18px"; 
        
        document.getElementById('login-wrap').style.display = 'none';
        const appDiv = document.getElementById('app');
        appDiv.style.display = 'block';
        appDiv.style.fontSize = "1.1rem"; // Un po' più grande del normale

        const userInfo = document.getElementById('user-info');
        if(userInfo) {
            userInfo.innerText = `Loggato come: ${userRow.name} (${userRow.role})`;
            userInfo.style.fontWeight = "bold";
        }

        loadData();

    } catch (err) {
        errDiv.innerText = "⚠️ " + err.message;
        errDiv.style.display = 'block';
    }
});
    </script>
</body>
</html>
