<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SportTrack Pro</title>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── TOKENS ─────────────────────────────────────────── */
:root {
  --bg:#f1f5f9; --card:#fff; --border:#e2e8f0;
  --text:#0f172a; --muted:#64748b;
  --sidebar:#1e293b; --sidebar-t:#94a3b8;
  --accent:#2563eb; --accent-l:#eff6ff;
  --green:#059669; --green-l:#d1fae5;
  --gold:#d97706;  --gold-l:#fef3c7;
  --red:#dc2626;   --red-l:#fee2e2;
  --purple:#7c3aed;--purple-l:#ede9fe;
  --radius:10px; --shadow:0 1px 3px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
.hidden{display:none!important}

/* ── LOGIN ──────────────────────────────────────────── */
.login-wrap{height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1e293b,#0f172a)}
.login-card{background:var(--card);border-radius:20px;padding:36px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{font-size:28px;font-weight:800;color:var(--accent);margin-bottom:8px}
.login-sub{color:var(--muted);font-size:14px;margin-bottom:28px}
.login-card label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.login-card input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:15px;margin-bottom:14px;outline:none;transition:border .2s}
.login-card input:focus{border-color:var(--accent)}
.btn-login{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn-login:disabled{opacity:.6;cursor:not-allowed}
.login-err{color:var(--red);font-size:13px;margin-top:10px;min-height:18px}

/* ── APP SHELL ──────────────────────────────────────── */
.app{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ────────────────────────────────────────── */
.sidebar{width:240px;background:var(--sidebar);display:flex;flex-direction:column;padding:0;flex-shrink:0;overflow-y:auto}
.sidebar-logo{padding:22px 20px 14px;font-size:18px;font-weight:800;color:#fff;letter-spacing:-.02em;border-bottom:1px solid rgba(255,255,255,.07)}
.sidebar-logo span{color:var(--accent)}
.sidebar-user{padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.07)}
.sidebar-user .uname{font-size:14px;font-weight:600;color:#fff}
.sidebar-user .urole{font-size:12px;color:var(--sidebar-t);margin-top:2px;text-transform:capitalize}
.nav-section{padding:10px 12px 4px;font-size:11px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.08em}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 16px;background:none;border:none;color:var(--sidebar-t);text-align:left;cursor:pointer;border-radius:8px;font-size:14px;font-weight:500;transition:all .15s;margin:1px 0}
.nav-btn:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-btn.active{background:var(--accent);color:#fff}
.nav-btn .icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.sidebar-footer{margin-top:auto;padding:12px}
.btn-logout{width:100%;padding:10px 16px;background:none;border:1px solid rgba(255,255,255,.1);color:#fca5a5;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;transition:all .15s}
.btn-logout:hover{background:rgba(220,38,38,.15);border-color:#fca5a5}

/* ── MAIN ───────────────────────────────────────────── */
.main{flex:1;overflow-y:auto;padding:28px;display:flex;flex-direction:column;gap:24px}
.page-title{font-size:24px;font-weight:800;letter-spacing:-.02em}
.page-sub{font-size:14px;color:var(--muted);margin-top:4px}

/* ── STATS GRID ─────────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
.stat-card .s-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.stat-card .s-val{font-size:34px;font-weight:800;margin-top:6px;line-height:1}
.stat-card .s-sub{font-size:12px;color:var(--muted);margin-top:4px}
.stat-blue .s-val{color:var(--accent)}
.stat-green .s-val{color:var(--green)}
.stat-gold .s-val{color:var(--gold)}
.stat-red .s-val{color:var(--red)}
.stat-purple .s-val{color:var(--purple)}

/* ── CARD ───────────────────────────────────────────── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.card-title{font-size:15px;font-weight:700}
.card-body{padding:20px}

/* ── TABLE ──────────────────────────────────────────── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:14px}
th{padding:10px 14px;text-align:left;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;background:#f8fafc;border-bottom:2px solid var(--border)}
td{padding:11px 14px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8fafc}

/* ── BADGES ─────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:12px;font-weight:600}
.badge-blue{background:var(--accent-l);color:var(--accent)}
.badge-green{background:var(--green-l);color:var(--green)}
.badge-gold{background:var(--gold-l);color:var(--gold)}
.badge-red{background:var(--red-l);color:var(--red)}
.badge-purple{background:var(--purple-l);color:var(--purple)}
.badge-gray{background:#f1f5f9;color:#475569}

/* ── BUTTONS ────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--border)}
.btn-ghost:hover{background:#f1f5f9;color:var(--text)}
.btn-danger{background:var(--red-l);color:var(--red);border:1.5px solid #fecaca}
.btn-danger:hover{background:#fecaca}
.btn-sm{padding:5px 10px;font-size:12px}

/* ── FORMS ──────────────────────────────────────────── */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.form-field label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.form-field input,.form-field select,.form-field textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;outline:none;transition:border .2s;background:#fff}
.form-field input:focus,.form-field select:focus{border-color:var(--accent)}
.form-actions{display:flex;gap:8px;flex-wrap:wrap}

/* ── MODAL ──────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(2px)}
.modal{background:#fff;border-radius:16px;padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h3{font-size:18px;font-weight:700;margin-bottom:20px}
.modal-actions{display:flex;gap:8px;margin-top:20px}

/* ── HIERARCHY TREE ─────────────────────────────────── */
.tree-node{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.tree-row{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:background .15s}
.tree-row:hover{background:#f8fafc}
.tree-icon{font-size:18px;width:28px;text-align:center;flex-shrink:0}
.tree-name{font-weight:600;font-size:15px;flex:1}
.tree-meta{font-size:12px;color:var(--muted)}
.tree-children{padding:0 0 8px 44px;border-top:1px solid var(--border);background:#fafafa}
.tree-child{display:flex;align-items:center;gap:10px;padding:9px 16px 9px 0;border-bottom:1px dashed var(--border)}
.tree-child:last-child{border-bottom:none}

/* ── EMPTY STATE ────────────────────────────────────── */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty .e-icon{font-size:40px;margin-bottom:12px}
.empty .e-text{font-size:15px;font-weight:600;margin-bottom:6px;color:var(--text)}
.empty .e-sub{font-size:13px}

/* ── TOAST ──────────────────────────────────────────── */
#toast-wrap{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:200}
.toast{padding:12px 18px;border-radius:10px;font-size:14px;font-weight:600;color:#fff;box-shadow:0 4px 14px rgba(0,0,0,.2);animation:slideIn .25s ease}
.toast-ok{background:var(--green)}
.toast-err{background:var(--red)}
.toast-warn{background:var(--gold)}
@keyframes slideIn{from{transform:translateX(80px);opacity:0}to{transform:none;opacity:1}}

/* ── RESPONSIVE ─────────────────────────────────────── */
@media(max-width:768px){
  .sidebar{width:200px}
  .main{padding:16px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<!-- ═══════════════ LOGIN ═══════════════ -->
<div id="login" class="login-wrap">
  <form class="login-card" onsubmit="doLogin(event)">
    <div class="login-logo">⚽ SportTrack</div>
    <div class="login-sub">Gestione Società Sportiva</div>
    <label>Username</label>
    <input id="inp-user" placeholder="es. mario.rossi" autocomplete="username" required>
    <label>Password</label>
    <input id="inp-pass" type="password" placeholder="••••••••" autocomplete="current-password" required>
    <button type="submit" class="btn-login" id="btn-login">Entra</button>
    <div class="login-err" id="login-err"></div>
  </form>
</div>

<!-- ═══════════════ APP ═══════════════ -->
<div id="app" class="app hidden">

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">Sport<span>Track</span></div>
    <div class="sidebar-user">
      <div class="uname" id="sb-name">—</div>
      <div class="urole" id="sb-role">—</div>
    </div>
    <div id="nav-items"></div>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="doLogout()">↩ Esci</button>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="main" id="main-content">
    <!-- rendered dynamically -->
  </main>
</div>

<!-- MODAL CONTAINER -->
<div id="modal-wrap"></div>
<!-- TOAST CONTAINER -->
<div id="toast-wrap"></div>

<script>
'use strict'

/* ═══════════════════════════════════════════════════════
   SUPABASE CLIENT
═══════════════════════════════════════════════════════ */
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
  auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false }
})

/* ═══════════════════════════════════════════════════════
   RUOLI — permessi per ogni sezione
   admin     → tutto
   manager   → vede tutto, modifica la propria società
   coach     → vede le proprie categorie/squadre/sessioni
   user      → sola lettura sulle proprie strutture
═══════════════════════════════════════════════════════ */
const ROLES = {
  admin:   { label:'Amministratore', color:'badge-purple', canAdmin:true,  canEdit:true,  canView:true  },
  manager: { label:'Manager',        color:'badge-blue',   canAdmin:false, canEdit:true,  canView:true  },
  coach:   { label:'Allenatore',     color:'badge-green',  canAdmin:false, canEdit:false, canView:true  },
  user:    { label:'Utente',         color:'badge-gray',   canAdmin:false, canEdit:false, canView:true  },
}
const roleInfo = (r) => ROLES[r] || ROLES.user

/* ═══════════════════════════════════════════════════════
   STATO GLOBALE
═══════════════════════════════════════════════════════ */
let USER     = null   // profilo utente corrente
let UCS      = []     // user_category_seasons dell'utente
let currentSection = ''

/* ═══════════════════════════════════════════════════════
   INIT — auto-restore sessione al caricamento pagina
═══════════════════════════════════════════════════════ */
;(async () => {
  try {
    const { data: { session }, error } = await db.auth.getSession()
    if (error || !session) {
      if (error) {
        try { await db.auth.signOut({ scope:'local' }) } catch(_) {}
      }
      return
    }
    await _loadProfile(session.user.id)
  } catch(e) {
    console.warn('[AutoRestore]', e.message)
    try { await db.auth.signOut({ scope:'local' }) } catch(_) {}
  }
})()

async function _loadProfile(uid) {
  const { data, error } = await db
    .from('users')
    .select('id, email, username, name, role')
    .eq('id', uid)
    .maybeSingle()
  if (error || !data) return
  USER = data
  // Carica assegnazioni categoria/stagione dell'utente
  const { data: ucs } = await db
    .from('user_category_seasons')
    .select('*')
    .eq('user_id', uid)
  UCS = ucs || []
  showApp()
}

/* ═══════════════════════════════════════════════════════
   LOGIN
═══════════════════════════════════════════════════════ */
async function doLogin(e) {
  e.preventDefault()
  const errEl = document.getElementById('login-err')
  const btn   = document.getElementById('btn-login')
  errEl.textContent = ''
  btn.disabled = true
  btn.textContent = 'Accesso in corso...'

  const username = document.getElementById('inp-user').value.trim()
  const password = document.getElementById('inp-pass').value

  try {
    // 1 — trova email da username
    const { data: row, error: rowErr } = await db
      .from('users')
      .select('id, email, username, name, role')
      .ilike('username', username)
      .maybeSingle()

    if (rowErr)  { errEl.textContent = 'Errore database: ' + rowErr.message; return }
    if (!row)    { errEl.textContent = 'Username non trovato'; return }
    if (!row.email) { errEl.textContent = 'Email non configurata per questo account'; return }

    // 2 — autentica
    const { data: auth, error: authErr } = await db.auth.signInWithPassword({
      email: row.email, password
    })
    if (authErr) {
      let msg = authErr.message
      if (msg.includes('Invalid login'))       msg = 'Password errata'
      if (msg.includes('Email not confirmed')) msg = 'Email non confermata'
      if (msg.includes('Too many requests'))   msg = 'Troppi tentativi — riprova tra qualche minuto'
      errEl.textContent = msg
      return
    }

    USER = row
    // Carica UCS
    const { data: ucs } = await db.from('user_category_seasons').select('*').eq('user_id', row.id)
    UCS = ucs || []
    showApp()

  } catch(err) {
    errEl.textContent = 'Errore imprevisto: ' + err.message
  } finally {
    btn.disabled = false
    btn.textContent = 'Entra'
  }
}

/* ═══════════════════════════════════════════════════════
   LOGOUT
═══════════════════════════════════════════════════════ */
async function doLogout() {
  try { await db.auth.signOut() } catch(_) {}
  USER = null; UCS = []
  document.getElementById('app').classList.add('hidden')
  document.getElementById('login').classList.remove('hidden')
  document.getElementById('inp-user').value = ''
  document.getElementById('inp-pass').value = ''
  document.getElementById('login-err').textContent = ''
}

/* ═══════════════════════════════════════════════════════
   SHOW APP — costruisce nav e va alla home
═══════════════════════════════════════════════════════ */
function showApp() {
  document.getElementById('login').classList.add('hidden')
  document.getElementById('app').classList.remove('hidden')
  document.getElementById('sb-name').textContent = USER.name || USER.username || '—'
  const ri = roleInfo(USER.role)
  document.getElementById('sb-role').textContent = ri.label

  buildNav()
  navigate('dashboard')
}

/* ═══════════════════════════════════════════════════════
   NAV — costruisce la sidebar in base al ruolo
═══════════════════════════════════════════════════════ */
function buildNav() {
  const ri = roleInfo(USER.role)
  const sections = [
    { id:'dashboard', icon:'📊', label:'Dashboard',    always:true },
    { id:'struttura', icon:'🏗️', label:'Struttura',    always:true },
    { id:'sessioni',  icon:'📅', label:'Sessioni',      always:true },
    { id:'atleti',    icon:'👥', label:'Atleti',        always:true },
    { id:'presenze',  icon:'✅', label:'Presenze',      always:true },
    { id:'utenti',    icon:'👤', label:'Utenti',        admin:true  },
  ]
  const items = sections.filter(s => s.always || (s.admin && ri.canAdmin))
  document.getElementById('nav-items').innerHTML = items.map(s => `
    <button class="nav-btn" data-sec="${s.id}" onclick="navigate('${s.id}')">
      <span class="icon">${s.icon}</span> ${s.label}
    </button>`).join('')
}

function navigate(sec) {
  currentSection = sec
  document.querySelectorAll('.nav-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.sec === sec))
  const renders = {
    dashboard: renderDashboard,
    struttura: renderStruttura,
    sessioni:  renderSessioni,
    atleti:    renderAtleti,
    presenze:  renderPresenze,
    utenti:    renderUtenti,
  }
  if (renders[sec]) renders[sec]()
}

/* ═══════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════ */
function esc(s) {
  const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML
}
function fmt(d) {
  if (!d) return '—'
  return new Date(d).toLocaleDateString('it-IT')
}
function toast(msg, type='ok') {
  const w = document.getElementById('toast-wrap')
  const t = document.createElement('div')
  t.className = `toast toast-${type}`
  t.textContent = msg
  w.appendChild(t)
  setTimeout(() => t.remove(), 3200)
}
function setMain(html) {
  document.getElementById('main-content').innerHTML = html
}
function openModal(html) {
  document.getElementById('modal-wrap').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">${html}</div>
    </div>`
}
function closeModal() {
  document.getElementById('modal-wrap').innerHTML = ''
}

// Controlla se l'utente può modificare una categoria specifica
function canEditCat(categoryId, seasonId) {
  const ri = roleInfo(USER.role)
  if (ri.canAdmin) return true
  if (!ri.canEdit) return false
  // manager può modificare solo le categorie a cui è assegnato
  return UCS.some(u => u.category_id === categoryId && u.season_id === seasonId)
}
function canEdit() { return roleInfo(USER.role).canAdmin || roleInfo(USER.role).canEdit }
function isAdmin()  { return roleInfo(USER.role).canAdmin }

// Filtro categorie visibili all'utente
function visibleCategoryIds() {
  if (isAdmin()) return null // null = tutte
  return [...new Set(UCS.map(u => u.category_id))]
}

/* ═══════════════════════════════════════════════════════
   1. DASHBOARD
═══════════════════════════════════════════════════════ */
async function renderDashboard() {
  setMain(`<div class="page-title">Dashboard</div>
    <div class="page-sub">Benvenuto, ${esc(USER.name || USER.username)}</div>
    <div class="stats-grid" id="dash-stats">
      ${[1,2,3,4,5].map(()=>`<div class="stat-card"><div class="s-label">—</div><div class="s-val" style="color:#e2e8f0">···</div></div>`).join('')}
    </div>
    <div id="dash-extra"></div>`)

  try {
    const catFilter = visibleCategoryIds()

    const [sports, societies, categories, teams, athletes, sessions] = await Promise.all([
      db.from('sports').select('id', { count:'exact', head:true }),
      db.from('societies').select('id', { count:'exact', head:true }),
      catFilter
        ? db.from('categories').select('id', { count:'exact', head:true }).in('id', catFilter.length ? catFilter : ['__none__'])
        : db.from('categories').select('id', { count:'exact', head:true }),
      db.from('teams').select('id', { count:'exact', head:true }),
      db.from('athletes').select('id', { count:'exact', head:true }),
      db.from('sessions').select('id', { count:'exact', head:true }),
    ])

    document.getElementById('dash-stats').innerHTML = `
      <div class="stat-card stat-blue">
        <div class="s-label">Sport</div>
        <div class="s-val">${sports.count ?? 0}</div>
      </div>
      <div class="stat-card stat-blue">
        <div class="s-label">Società</div>
        <div class="s-val">${societies.count ?? 0}</div>
      </div>
      <div class="stat-card stat-green">
        <div class="s-label">Categorie</div>
        <div class="s-val">${categories.count ?? 0}</div>
      </div>
      <div class="stat-card stat-gold">
        <div class="s-label">Squadre</div>
        <div class="s-val">${teams.count ?? 0}</div>
      </div>
      <div class="stat-card stat-purple">
        <div class="s-label">Atleti</div>
        <div class="s-val">${athletes.count ?? 0}</div>
      </div>
      <div class="stat-card stat-green">
        <div class="s-label">Sessioni</div>
        <div class="s-val">${sessions.count ?? 0}</div>
      </div>`

    // Stagione attiva
    const { data: activeSeas } = await db.from('seasons').select('*').eq('is_active', true).maybeSingle()
    if (activeSeas) {
      document.getElementById('dash-extra').innerHTML = `
        <div class="card">
          <div class="card-header">
            <div class="card-title">🗓️ Stagione Attiva</div>
          </div>
          <div class="card-body" style="display:flex;gap:24px;flex-wrap:wrap">

/* ═══════════════════════════════════════════════════════
   2. STRUTTURA — Sport → Società → Categoria → Squadra
═══════════════════════════════════════════════════════ */
async function renderStruttura() {
  setMain(`
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
      <div>
        <div class="page-title">Struttura</div>
        <div class="page-sub">Sport → Società → Categorie → Squadre</div>
      </div>
      ${isAdmin() ? `
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-ghost" onclick="openSportModal()">+ Sport</button>
        <button class="btn btn-ghost" onclick="openSocietaModal()">+ Società</button>
        <button class="btn btn-ghost" onclick="openCategoriaModal()">+ Categoria</button>
        <button class="btn btn-primary" onclick="openSquadraModal()">+ Squadra</button>
      </div>` : ''}
    </div>
    <div id="struttura-tree">
      <div class="empty"><div class="e-icon">⏳</div><div class="e-text">Caricamento...</div></div>
    </div>`)

  try {
    const [sportsR, socR, catR, teamR, tcsR] = await Promise.all([
      db.from('sports').select('*').order('name'),
      db.from('societies').select('*').order('name'),
      db.from('categories').select('*').order('name'),
      db.from('teams').select('*').order('name'),
      db.from('team_category_season').select('*'),
    ])
    const sports  = sportsR.data  || []
    const socs    = socR.data     || []
    const cats    = catR.data     || []
    const teams   = teamR.data    || []
    const tcs     = tcsR.data     || []

    const catFilter = visibleCategoryIds()

    if (!sports.length) {
      document.getElementById('struttura-tree').innerHTML =
        `<div class="empty"><div class="e-icon">🏅</div>
        <div class="e-text">Nessuno sport ancora</div>
        <div class="e-sub">Comincia aggiungendo uno sport</div>
        ${isAdmin() ? `<br><button class="btn btn-primary" onclick="openSportModal()">+ Aggiungi Sport</button>` : ''}
        </div>`
      return
    }

    let html = ''
    for (const sport of sports) {
      const sportSocs = socs.filter(s => s.sport_id === sport.id)
      html += `<div class="tree-node">
        <div class="tree-row" onclick="this.nextElementSibling.classList.toggle('hidden')">
          <span class="tree-icon">${sport.icon || '🏅'}</span>
          <div>
            <div class="tree-name">${esc(sport.name)}</div>
            <div class="tree-meta">${sportSocs.length} società</div>
          </div>
          ${isAdmin() ? `
          <div style="margin-left:auto;display:flex;gap:6px" onclick="event.stopPropagation()">
            <button class="btn btn-ghost btn-sm" onclick="openSportModal('${sport.id}')">✏️</button>
            <button class="btn btn-danger btn-sm" onclick="deleteSport('${sport.id}')">🗑️</button>
          </div>` : ''}
        </div>
        <div class="tree-children">`

      for (const soc of sportSocs) {
        const socCats = cats.filter(c => c.society_id === soc.id)
          .filter(c => !catFilter || catFilter.includes(c.id))
        html += `<div style="margin-bottom:8px">
          <div style="display:flex;align-items:center;gap:10px;padding:10px 0 6px">
            <span style="font-size:20px">🏛️</span>
            <div style="flex:1">
              <div style="font-weight:700;font-size:14px">${esc(soc.name)}</div>
              <div style="font-size:12px;color:var(--muted)">${esc(soc.city||'')}${soc.email ? ' · '+esc(soc.email) : ''}</div>
            </div>
            ${canEdit() ? `
            <div style="display:flex;gap:6px" onclick="event.stopPropagation()">
              <button class="btn btn-ghost btn-sm" onclick="openSocietaModal('${soc.id}')">✏️</button>
              ${isAdmin() ? `<button class="btn btn-danger btn-sm" onclick="deleteSocieta('${soc.id}')">🗑️</button>` : ''}
            </div>` : ''}
          </div>`

        for (const cat of socCats) {
          const catTeamIds = tcs.filter(t => t.category_id === cat.id).map(t => t.team_id)
          const catTeams = teams.filter(t => catTeamIds.includes(t.id))
          html += `<div style="margin-left:20px;border-left:2px solid var(--border);padding-left:14px;margin-bottom:6px">
            <div style="display:flex;align-items:center;gap:8px;padding:7px 0 4px">
              <span style="font-size:16px">🏷️</span>
              <div style="flex:1">
                <div style="font-weight:600;font-size:13px">${esc(cat.name)}</div>
              </div>
              ${canEdit() ? `
              <div style="display:flex;gap:6px">
                <button class="btn btn-ghost btn-sm" onclick="openCategoriaModal('${cat.id}')">✏️</button>
                ${isAdmin() ? `<button class="btn btn-danger btn-sm" onclick="deleteCategoria('${cat.id}')">🗑️</button>` : ''}
              </div>` : ''}
            </div>
            ${catTeams.map(t => `
            <div style="display:flex;align-items:center;gap:8px;padding:5px 0 5px 20px;border-bottom:1px dashed var(--border)">
              <span>👕</span>
              <div style="flex:1;font-size:13px">${esc(t.name)}</div>
              ${canEdit() ? `
              <div style="display:flex;gap:6px">
                <button class="btn btn-ghost btn-sm" onclick="openSquadraModal('${t.id}')">✏️</button>
                ${isAdmin() ? `<button class="btn btn-danger btn-sm" onclick="deleteSquadra('${t.id}')">🗑️</button>` : ''}
              </div>` : ''}
            </div>`).join('')}
            ${canEdit() ? `<div style="padding:4px 0 4px 20px">
              <button class="btn btn-ghost btn-sm" style="font-size:11px" onclick="openSquadraModal(null,'${cat.id}')">+ Squadra</button>
            </div>` : ''}
          </div>`
        }
        html += `</div>`
      }

      // Società senza sport assegnato
      if (!sportSocs.length) {
        html += `<div style="padding:10px 0;color:var(--muted);font-size:13px">Nessuna società per questo sport</div>`
      }
      html += `</div></div>`
    }
    document.getElementById('struttura-tree').innerHTML = html

  } catch(e) {
    console.error(e)
    toast('Errore caricamento struttura', 'err')
  }
}

/* ── CRUD SPORT ─────────────────────────────────────── */
async function openSportModal(id) {
  let sport = null
  if (id) {
    const { data } = await db.from('sports').select('*').eq('id', id).single()
    sport = data
  }
  openModal(`
    <h3>${sport ? 'Modifica Sport' : 'Nuovo Sport'}</h3>
    <div class="form-grid" style="grid-template-columns:1fr 80px">
      <div class="form-field">
        <label>Nome Sport *</label>
        <input id="m-sport-name" value="${esc(sport?.name||'')}" placeholder="es. Calcio">
      </div>
      <div class="form-field">
        <label>Icona</label>
        <input id="m-sport-icon" value="${esc(sport?.icon||'🏅')}" placeholder="🏅" style="text-align:center;font-size:20px">
      </div>
    </div>
    ${!sport ? `<div class="form-field">
      <label>ID (opzionale, auto se vuoto)</label>
      <input id="m-sport-id" placeholder="es. calcio">
    </div>` : ''}
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="saveSport('${id||''}')">💾 Salva</button>
      <button class="btn btn-ghost" onclick="closeModal()">Annulla</button>
    </div>`)
}
async function saveSport(id) {
  const name = document.getElementById('m-sport-name').value.trim()
  const icon = document.getElementById('m-sport-icon').value.trim() || '🏅'
  if (!name) { toast('Nome obbligatorio', 'err'); return }
  const payload = { name, icon }
  let err
  if (id) {
    ;({ error: err } = await db.from('sports').update(payload).eq('id', id))
  } else {
    const sid = document.getElementById('m-sport-id')?.value.trim() || crypto.randomUUID().slice(0,8)
    ;({ error: err } = await db.from('sports').insert({ id: sid, ...payload }))
  }
  if (err) { toast('Errore: ' + err.message, 'err'); return }
  toast(id ? 'Sport aggiornato' : 'Sport creato ✓', 'ok')
  closeModal(); renderStruttura()
}
async function deleteSport(id) {
  if (!confirm('Eliminare questo sport?')) return
  const { error } = await db.from('sports').delete().eq('id', id)
  if (error) { toast('Errore: ' + error.message, 'err'); return }
  toast('Sport eliminato', 'ok'); renderStruttura()
}

/* ── CRUD SQUADRA ───────────────────────────────────── */
async function openSquadraModal(id, preCatId) {
  const [socR, catR, seaR] = await Promise.all([
    db.from('societies').select('id,name').order('name'),
    db.from('categories').select('id,name,society_id').order('name'),
    db.from('seasons').select('id,name,is_active').order('start_date', { ascending:false }),
  ])
  const socs  = socR.data  || []
  const cats  = catR.data  || []
  const seas  = seaR.data  || []

  let team = null
  let linkedCatId = preCatId || ''
  let linkedSeasId = seas.find(s => s.is_active)?.id || ''
  if (id) {
    const { data } = await db.from('teams').select('*').eq('id', id).single()
    team = data
    const { data: tcs } = await db.from('team_category_season').select('*').eq('team_id', id)
    if (tcs?.length) { linkedCatId = tcs[0].category_id; linkedSeasId = tcs[0].season_id }
  }

  const socOpts = socs.map(s =>
    `<option value="${s.id}" ${team?.society_id===s.id?'selected':''}>${esc(s.name)}</option>`).join('')
  const catOpts = cats.map(c =>
    `<option value="${c.id}" ${c.id===linkedCatId?'selected':''}>${esc(c.name)}</option>`).join('')
  const seaOpts = seas.map(s =>
    `<option value="${s.id}" ${s.id===linkedSeasId?'selected':''}>${esc(s.name)}${s.is_active?' ★':''}</option>`).join('')

  openModal(`
    <h3>${team ? 'Modifica Squadra' : 'Nuova Squadra'}</h3>
    <div class="form-grid">
      <div class="form-field" style="grid-column:1/-1">
        <label>Nome Squadra *</label>
        <input id="m-team-name" value="${esc(team?.name||'')}" placeholder="es. Prima Squadra">
      </div>
      <div class="form-field">
        <label>Società *</label>
        <select id="m-team-soc">
          <option value="">— Seleziona —</option>${socOpts}
        </select>
      </div>
      <div class="form-field">
        <label>Sport</label>
        <select id="m-team-sport">
          <option value="">— Seleziona —</option>
          ${(await db.from('sports').select('id,name,icon').order('name')).data?.map(s =>
            `<option value="${s.id}" ${team?.sport_id===s.id?'selected':''}>${s.icon||''} ${esc(s.name)}</option>`
          ).join('')||''}
        </select>
      </div>
      <div class="form-field">
        <label>Categoria</label>
        <select id="m-team-cat">
          <option value="">— Nessuna —</option>${catOpts}
        </select>
      </div>
      <div class="form-field">
        <label>Stagione</label>
        <select id="m-team-sea">
          <option value="">— Nessuna —</option>${seaOpts}
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="saveSquadra('${id||''}')">💾 Salva</button>
      <button class="btn btn-ghost" onclick="closeModal()">Annulla</button>
    </div>`)
}
async function saveSquadra(id) {
  const name       = document.getElementById('m-team-name').value.trim()
  const society_id = document.getElementById('m-team-soc').value || null
  const sport_id   = document.getElementById('m-team-sport').value || null
  const cat_id     = document.getElementById('m-team-cat').value || null
  const sea_id     = document.getElementById('m-team-sea').value || null
  if (!name) { toast('Nome obbligatorio', 'err'); return }

  let teamId = id
  let err
  if (id) {
    ;({ error: err } = await db.from('teams').update({ name, society_id, sport_id }).eq('id', id))
  } else {
    const { data: ins, error: e } = await db.from('teams').insert({ name, society_id, sport_id }).select('id').single()
    err = e; if (ins) teamId = ins.id
  }
  if (err) { toast('Errore: ' + err.message, 'err'); return }

  // Aggiorna team_category_season
  if (teamId && cat_id && sea_id) {
    await db.from('team_category_season').delete().eq('team_id', teamId)
    await db.from('team_category_season').insert({ team_id: teamId, category_id: cat_id, season_id: sea_id })
  }
  toast(id ? 'Squadra aggiornata' : 'Squadra creata ✓', 'ok')
  closeModal(); renderStruttura()
}
async function deleteSquadra(id) {
  if (!confirm('Eliminare questa squadra?')) return
  await db.from('team_category_season').delete().eq('team_id', id)
  const { error } = await db.from('teams').delete().eq('id', id)
  if (error) { toast('Errore: ' + error.message, 'err'); return }
  toast('Squadra eliminata', 'ok'); renderStruttura()
}

    `).order('date', { ascending: false }).limit(100)

            <td>${esc(s.categories?.name||'—')}</td>
            <td>${esc(s.teams?.name||'—')}</td>

            <td style="color:var(--muted);font-size:13px">${esc(s.notes||'')}</td>

            </td>` : ''}
          </tr>`).join('')}
        </tbody>
      </table>`
  } catch(e) {
    toast('Errore caricamento sessioni', 'err')
  }
}

        <label>Note</label>
        <textarea id="m-sess-notes" rows="2" style="resize:vertical">${esc(sess?.notes||'')}</textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="saveSessione('${id||''}')">💾 Salva</button>
      <button class="btn btn-ghost" onclick="closeModal()">Annulla</button>
    </div>`)
}
async function saveSessione(id) {
  const date        = document.getElementById('m-sess-date').value
  const season_id   = document.getElementById('m-sess-sea').value
  const category_id = document.getElementById('m-sess-cat').value
  const team_id     = document.getElementById('m-sess-team').value || null
  const notes       = document.getElementById('m-sess-notes').value.trim()
  if (!date || !season_id || !category_id) { toast('Data, stagione e categoria obbligatori', 'err'); return }
  const payload = { date, season_id, category_id, team_id, notes }
  let err
  if (id) {
    ;({ error: err } = await db.from('sessions').update(payload).eq('id', id))
  } else {
    ;({ error: err } = await db.from('sessions').insert(payload))
  }
  if (err) { toast('Errore: ' + err.message, 'err'); return }
  toast(id ? 'Sessione aggiornata' : 'Sessione creata ✓', 'ok')
  closeModal(); renderSessioni()
}
async function deleteSessione(id) {
  if (!confirm('Eliminare questa sessione?')) return
  await db.from('attendances').delete().eq('session_id', id)
  const { error } = await db.from('sessions').delete().eq('id', id)
  if (error) { toast('Errore: ' + error.message, 'err'); return }
  toast('Sessione eliminata', 'ok'); renderSessioni()
}

/* ═══════════════════════════════════════════════════════
   4. ATLETI
═══════════════════════════════════════════════════════ */
async function renderAtleti() {
  setMain(`
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
      <div>
        <div class="page-title">Atleti</div>
        <div class="page-sub">Anagrafica e stagioni</div>
      </div>
      ${canEdit() ? `<button class="btn btn-primary" onclick="openAtletaModal()">+ Nuovo Atleta</button>` : ''}
    </div>
    <div class="card">
      <div class="tbl-wrap" id="atleti-table">
        <div class="empty"><div class="e-icon">⏳</div></div>
      </div>
    </div>`)

  try {
    const catFilter = visibleCategoryIds()
    let athletes, error
    if (catFilter) {
      // Atleti iscritti nelle categorie visibili tramite athlete_seasons
      const { data: asList } = await db.from('athlete_seasons')
        .select('athlete_id').in('category_id', catFilter.length ? catFilter : ['__none__'])
      const ids = [...new Set((asList||[]).map(a => a.athlete_id))]
      if (!ids.length) {
        document.getElementById('atleti-table').innerHTML =
          `<div class="empty"><div class="e-icon">👥</div><div class="e-text">Nessun atleta nelle tue categorie</div></div>`
        return
      }
      ;({ data: athletes, error } = await db.from('athletes').select('*').in('id', ids).order('name'))
    } else {
      ;({ data: athletes, error } = await db.from('athletes').select('*').order('name'))
    }
    if (error) throw error

    if (!athletes?.length) {
      document.getElementById('atleti-table').innerHTML =
        `<div class="empty"><div class="e-icon">👥</div><div class="e-text">Nessun atleta ancora</div></div>`
      return
    }
    document.getElementById('atleti-table').innerHTML = `
      <table>
        <thead><tr><th>Nome</th><th>Data Nascita</th><th>Società</th>${canEdit()?'<th></th>':''}</tr></thead>
        <tbody>${athletes.map(a => `
          <tr>
            <td><strong>${esc(a.name)}</strong></td>
            <td>${fmt(a.birthdate)}</td>
            <td><span class="badge badge-gray">${esc(a.society_id||'—')}</span></td>
            ${canEdit() ? `<td style="display:flex;gap:6px">
              <button class="btn btn-ghost btn-sm" onclick="openAtletaModal('${a.id}')">✏️</button>
              <button class="btn btn-danger btn-sm" onclick="deleteAtleta('${a.id}')">🗑️</button>
            </td>` : ''}
          </tr>`).join('')}
        </tbody>
      </table>`
  } catch(e) {
    toast('Errore caricamento atleti', 'err')
  }
}

async function openAtletaModal(id) {
  const { data: socs } = await db.from('societies').select('id,name').order('name')
  let a = null
  if (id) {
    const { data } = await db.from('athletes').select('*').eq('id', id).single()
    a = data
  }
  const socOpts = (socs||[]).map(s =>
    `<option value="${s.id}" ${a?.society_id===s.id?'selected':''}>${esc(s.name)}</option>`).join('')
  openModal(`
    <h3>${a ? 'Modifica Atleta' : 'Nuovo Atleta'}</h3>
    <div class="form-grid">
      <div class="form-field" style="grid-column:1/-1">
        <label>Nome Completo *</label>
        <input id="m-atl-name" value="${esc(a?.name||'')}" placeholder="es. Mario Rossi">
      </div>
      <div class="form-field">
        <label>Data di Nascita</label>
        <input id="m-atl-birth" type="date" value="${a?.birthdate||''}">
      </div>
      <div class="form-field">
        <label>Società</label>
        <select id="m-atl-soc"><option value="">— Nessuna —</option>${socOpts}</select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="saveAtleta('${id||''}')">💾 Salva</button>
      <button class="btn btn-ghost" onclick="closeModal()">Annulla</button>
    </div>`)
}
async function saveAtleta(id) {
  const name       = document.getElementById('m-atl-name').value.trim()
  const birthdate  = document.getElementById('m-atl-birth').value || null
  const society_id = document.getElementById('m-atl-soc').value || null
  if (!name) { toast('Nome obbligatorio', 'err'); return }
  const payload = { name, birthdate, society_id }
  let err
  if (id) {
    ;({ error: err } = await db.from('athletes').update(payload).eq('id', id))
  } else {
    ;({ error: err } = await db.from('athletes').insert(payload))
  }
  if (err) { toast('Errore: ' + err.message, 'err'); return }
  toast(id ? 'Atleta aggiornato' : 'Atleta creato ✓', 'ok')
  closeModal(); renderAtleti()
}
async function deleteAtleta(id) {
  if (!confirm('Eliminare questo atleta?')) return
  await db.from('athlete_seasons').delete().eq('athlete_id', id)
  await db.from('attendances').delete().eq('athlete_id', id)
  const { error } = await db.from('athletes').delete().eq('id', id)
  if (error) { toast('Errore: ' + error.message, 'err'); return }
  toast('Atleta eliminato', 'ok'); renderAtleti()
}

/* ═══════════════════════════════════════════════════════
   5. PRESENZE
═══════════════════════════════════════════════════════ */
async function renderPresenze() {
  setMain(`
    <div class="page-title">Presenze</div>
    <div class="page-sub">Seleziona una sessione per gestire le presenze</div>
    <div class="card">
      <div class="card-header">
        <div class="card-title">Sessioni recenti</div>
      </div>
      <div class="tbl-wrap" id="pres-sess-list">
        <div class="empty"><div class="e-icon">⏳</div></div>
      </div>
    </div>
    <div id="pres-detail"></div>`)

  try {
    const catFilter = visibleCategoryIds()
    let q = db.from('sessions').select(`
      id, date, notes, category_id,
      categories(name), teams(name), seasons(name)
    `).order('date', { ascending: false }).limit(30)
    if (catFilter) q = q.in('category_id', catFilter.length ? catFilter : ['__none__'])
    const { data: sess, error } = await q
    if (error) throw error

    if (!sess?.length) {
      document.getElementById('pres-sess-list').innerHTML =
        `<div class="empty"><div class="e-icon">📅</div><div class="e-text">Nessuna sessione</div></div>`
      return
    }
    document.getElementById('pres-sess-list').innerHTML = `
      <table>
        <thead><tr><th>Data</th><th>Categoria</th><th>Squadra</th><th>Stagione</th><th></th></tr></thead>
        <tbody>${sess.map(s => `
          <tr>
            <td><strong>${fmt(s.date)}</strong></td>
            <td>${esc(s.categories?.name||'—')}</td>
            <td>${esc(s.teams?.name||'—')}</td>
            <td>${esc(s.seasons?.name||'—')}</td>
            <td><button class="btn btn-primary btn-sm" onclick="loadPresenzeDetail('${s.id}','${esc(s.categories?.name||'')}','${fmt(s.date)}')">Gestisci →</button></td>
          </tr>`).join('')}
        </tbody>
      </table>`
  } catch(e) {
    toast('Errore caricamento sessioni', 'err')
  }
}

async function loadPresenzeDetail(sessId, catName, dateStr) {
  const detEl = document.getElementById('pres-detail')
  detEl.innerHTML = `<div class="card"><div class="card-body"><div class="empty"><div class="e-icon">⏳</div></div></div></div>`

  try {
    // Trova atleti iscritti alla categoria della sessione
    const { data: sessRow } = await db.from('sessions').select('category_id, season_id').eq('id', sessId).single()
    const { data: asRows }  = await db.from('athlete_seasons')
      .select('athlete_id, athletes(id, name)')
      .eq('category_id', sessRow.category_id)
      .eq('season_id', sessRow.season_id)
    const { data: attRows } = await db.from('attendances').select('*').eq('session_id', sessId)

    const athletes = (asRows||[]).map(r => r.athletes).filter(Boolean)
    const attMap   = Object.fromEntries((attRows||[]).map(a => [a.athlete_id, a]))

    if (!athletes.length) {
      detEl.innerHTML = `<div class="card">
        <div class="card-header"><div class="card-title">📋 ${esc(catName)} — ${dateStr}</div></div>
        <div class="card-body">
          <div class="empty"><div class="e-icon">👥</div><div class="e-text">Nessun atleta iscritto in questa categoria/stagione</div></div>
        </div></div>`
      return
    }

    detEl.innerHTML = `
      <div class="card">
        <div class="card-header">
          <div class="card-title">📋 ${esc(catName)} — ${dateStr}</div>
          ${canEdit() ? `<button class="btn btn-primary btn-sm" onclick="savePresenze('${sessId}')">💾 Salva presenze</button>` : ''}
        </div>
        <div class="card-body">
          <table>
            <thead><tr><th>Atleta</th><th style="text-align:center">Presente</th><th style="text-align:center">Assente</th><th style="text-align:center">Giustificato</th></tr></thead>
            <tbody id="pres-rows">
              ${athletes.map(a => {
                const cur = attMap[a.id]?.status || ''
                return `<tr>
                  <td><strong>${esc(a.name)}</strong></td>
                  ${['P','A','G'].map(s => `
                  <td style="text-align:center">
                    <input type="radio" name="att-${a.id}" value="${s}" ${cur===s?'checked':''} ${canEdit()?'':'disabled'}>
                  </td>`).join('')}
                </tr>`
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>`
  } catch(e) {
    toast('Errore caricamento presenze', 'err')
  }
}

async function savePresenze(sessId) {
  const rows = document.querySelectorAll('#pres-rows tr')
  const updates = []
  rows.forEach(tr => {
    const checked = tr.querySelector('input[type=radio]:checked')
    if (!checked) return
    const athleteId = checked.name.replace('att-', '')
    updates.push({ session_id: sessId, athlete_id: athleteId, status: checked.value })
  })
  // Upsert — cancella esistenti e reinserisci
  await db.from('attendances').delete().eq('session_id', sessId)
  if (updates.length) {
    const { error } = await db.from('attendances').insert(updates)
    if (error) { toast('Errore salvataggio: ' + error.message, 'err'); return }
  }
  toast('Presenze salvate ✓', 'ok')
}

/* ═══════════════════════════════════════════════════════
   6. UTENTI (solo admin)
═══════════════════════════════════════════════════════ */
async function renderUtenti() {
  if (!isAdmin()) { setMain(`<div class="empty"><div class="e-icon">🔒</div><div class="e-text">Accesso non autorizzato</div></div>`); return }
  setMain(`
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
      <div>
        <div class="page-title">Utenti</div>
        <div class="page-sub">Gestione account e ruoli</div>
      </div>
    </div>
    <div class="card">
      <div class="tbl-wrap" id="utenti-table">
        <div class="empty"><div class="e-icon">⏳</div></div>
      </div>
    </div>`)

  try {
    const { data: users, error } = await db.from('users').select('*').order('name')
    if (error) throw error

    document.getElementById('utenti-table').innerHTML = `
      <table>
        <thead><tr><th>Nome</th><th>Username</th><th>Email</th><th>Ruolo</th><th>Registrato</th><th></th></tr></thead>
        <tbody>${(users||[]).map(u => {
          const ri = roleInfo(u.role)
          return `<tr>
            <td><strong>${esc(u.name||'—')}</strong></td>
            <td><code style="font-size:12px;background:#f1f5f9;padding:2px 6px;border-radius:4px">${esc(u.username||'—')}</code></td>
            <td style="color:var(--muted);font-size:13px">${esc(u.email||'—')}</td>
            <td><span class="badge ${ri.color}">${ri.label}</span></td>
            <td style="color:var(--muted);font-size:12px">${fmt(u.created_at)}</td>
            <td>
              <button class="btn btn-ghost btn-sm" onclick="openRuoloModal('${u.id}','${u.role||'user'}','${esc(u.name||u.username||'')}')">
                Cambia ruolo
              </button>
            </td>
          </tr>`
        }).join('')}
        </tbody>
      </table>`
  } catch(e) {
    toast('Errore caricamento utenti', 'err')
  }
}

async function openRuoloModal(uid, currentRole, userName) {
  const { data: cats } = await db.from('categories').select('id,name').order('name')
  const { data: seas } = await db.from('seasons').select('id,name,is_active').order('start_date', { ascending:false })
  const { data: ucsRows } = await db.from('user_category_seasons').select(`
    id, role, category_id, season_id,
    categories(name), seasons(name)
  `).eq('user_id', uid)

  const roleOpts = Object.entries(ROLES).map(([k,v]) =>
    `<option value="${k}" ${k===currentRole?'selected':''}>${v.label}</option>`).join('')
  const catOpts = (cats||[]).map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join('')
  const seaOpts = (seas||[]).map(s =>
    `<option value="${s.id}" ${s.is_active?'selected':''}>${esc(s.name)}${s.is_active?' ★':''}</option>`).join('')
  const ucsHtml = (ucsRows||[]).map(u => `
    <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
      <span class="badge badge-blue">${esc(u.categories?.name||'—')}</span>
      <span class="badge badge-gray">${esc(u.seasons?.name||'—')}</span>
      <span class="badge badge-green">${u.role}</span>
      <button class="btn btn-danger btn-sm" style="margin-left:auto" onclick="deleteUCS('${u.id}','${uid}','${currentRole}','${esc(userName)}')">✕</button>
    </div>`).join('') || '<div style="color:var(--muted);font-size:13px">Nessuna assegnazione</div>'

  openModal(`
    <h3>👤 ${esc(userName)}</h3>
    <div class="form-field" style="margin-bottom:16px">
      <label>Ruolo Sistema</label>
      <select id="m-usr-role">${roleOpts}</select>
    </div>
    <button class="btn btn-ghost" style="margin-bottom:20px" onclick="saveRuolo('${uid}')">Aggiorna ruolo</button>
    <hr style="border:none;border-top:1px solid var(--border);margin-bottom:16px">
    <div style="font-size:13px;font-weight:700;margin-bottom:8px;color:var(--muted)">ASSEGNAZIONI CATEGORIA / STAGIONE</div>
    <div style="margin-bottom:14px">${ucsHtml}</div>
    <div style="background:var(--accent-l);border-radius:8px;padding:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="form-field" style="margin:0">
        <label>Categoria</label>
        <select id="m-ucs-cat"><option value="">—</option>${catOpts}</select>
      </div>
      <div class="form-field" style="margin:0">
        <label>Stagione</label>
        <select id="m-ucs-sea"><option value="">—</option>${seaOpts}</select>
      </div>
      <div class="form-field" style="margin:0">
        <label>Ruolo</label>
        <select id="m-ucs-role">
          <option value="coach">Allenatore</option>
          <option value="manager">Manager</option>
        </select>
      </div>
      <div style="display:flex;align-items:flex-end">
        <button class="btn btn-primary btn-sm" onclick="addUCS('${uid}')">+ Aggiungi</button>
      </div>
    </div>
    <div class="modal-actions" style="margin-top:16px">
      <button class="btn btn-ghost" onclick="closeModal()">Chiudi</button>
    </div>`)
}

async function saveRuolo(uid) {
  const role = document.getElementById('m-usr-role').value
  const { error } = await db.from('users').update({ role }).eq('id', uid)
  if (error) { toast('Errore: ' + error.message, 'err'); return }
  toast('Ruolo aggiornato ✓', 'ok')
  // Aggiorna locale se è l'utente corrente
  if (uid === USER.id) USER.role = role
  closeModal(); renderUtenti()
}

async function addUCS(uid) {
  const category_id = document.getElementById('m-ucs-cat').value
  const season_id   = document.getElementById('m-ucs-sea').value
  const role        = document.getElementById('m-ucs-role').value
  if (!category_id || !season_id) { toast('Seleziona categoria e stagione', 'err'); return }
  const { error } = await db.from('user_category_seasons').insert({
    user_id: uid, category_id, season_id, role, team_id: ''
  })
  if (error) { toast('Errore: ' + error.message, 'err'); return }
  toast('Assegnazione aggiunta ✓', 'ok')
  // Ricarica il modal
  const { data: u } = await db.from('users').select('role,name,username').eq('id', uid).single()
  openRuoloModal(uid, u.role, u.name || u.username)
}

async function deleteUCS(ucsId, uid, role, userName) {
  const { error } = await db.from('user_category_seasons').delete().eq('id', ucsId)
  if (error) { toast('Errore: ' + error.message, 'err'); return }
  toast('Assegnazione rimossa', 'ok')
  openRuoloModal(uid, role, userName)
}
</script>
