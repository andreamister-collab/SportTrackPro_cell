<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SportTrack Pro</title>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{--bg:#f3f4f6;--card:#fff;--border:#e5e7eb;--text:#111827;--muted:#6b7280;--sidebar:#1f2937;--sidebar-active:#2563eb}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,Arial;background:var(--bg);color:var(--text);height:100vh}
.hidden{display:none}
.login-wrap{height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;width:340px;box-shadow:0 10px 30px rgba(0,0,0,.06)}
.login-card h1{margin:0 0 16px;font-size:22px}
.login-card input{width:100%;margin-bottom:10px;padding:10px;border:1px solid #cbd5e1;border-radius:8px;font-size:14px}
.login-card button{width:100%;padding:10px;background:var(--sidebar-active);color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer}
.login-card .err{color:#b91c1c;font-size:13px;margin-top:8px}
.app{display:flex;height:100vh}
.sidebar{width:220px;background:var(--sidebar);color:#fff;padding:20px}
.sidebar h2{margin:0 0 20px;font-size:18px}
.sidebar button{background:none;border:none;color:#d1d5db;text-align:left;padding:10px 12px;width:100%;cursor:pointer;border-radius:8px;font-size:15px}
.sidebar button.active,.sidebar button:hover{background:var(--sidebar-active);color:#fff}
.main{flex:1;padding:24px;overflow:auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;max-width:900px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px}
.stat h3{margin:0;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.stat .val{margin:6px 0 0;font-size:32px;font-weight:800}
input,button{padding:8px 10px;border:1px solid #cbd5e1;border-radius:8px;font-size:14px}
button.primary{background:var(--sidebar-active);color:#fff;border-color:var(--sidebar-active);cursor:pointer}
table{width:100%;border-collapse:collapse;margin-top:16px}
th,td{padding:10px;border-bottom:1px solid var(--border);text-align:left}
th{background:#f9fafb;font-size:13px;color:var(--muted)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="login-wrap">
  <form class="login-card" onsubmit="login(event)">
    <h1>Accedi</h1>
    <input id="username" placeholder="Username" autocomplete="username" required>
    <input id="password" type="password" placeholder="Password" autocomplete="current-password" required>
    <button type="submit">Entra</button>
    <div id="login-err" class="err"></div>
  </form>
</div>

<!-- APP -->
<div id="app" class="app hidden">
  <div class="sidebar">
    <h2>SportTrack</h2>
    <button data-sec="dashboard" class="active">Dashboard</button>
    <button data-sec="sport">Sport</button>
    <button onclick="logout()" style="margin-top:20px;color:#fca5a5">Esci</button>
  </div>

  <div class="main">
    <section id="sec-dashboard" class="card">
      <h1>Dashboard</h1>
      <div class="cards">
        <div class="stat"><h3>SPORT</h3><div class="val" id="k-sport">0</div></div>
        <div class="stat"><h3>SOCIETÀ</h3><div class="val" id="k-societa">0</div></div>
        <div class="stat"><h3>ATLETI</h3><div class="val" id="k-atleti">0</div></div>
      </div>
    </section>

    <section id="sec-sport" class="card hidden">
      <h1>Sport</h1>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <input id="sport-id" placeholder="id (es. calcio)">
        <input id="sport-nome" placeholder="Nome (es. Calcio)">
        <button class="primary" onclick="createSport()">Aggiungi</button>
      </div>
      <table id="tbl-sport">
        <thead><tr><th>ID</th><th>Nome</th><th>Azioni</th></tr></thead>
        <tbody><tr><td colspan="3">Caricamento...</td></tr></tbody>
      </table>
    </section>
  </div>
</div>

<script>
const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
  auth: {
    persistSession: true,
    autoRefreshToken: true,
    detectSessionInUrl: false
  }
})
let USER = null

/* ---------- NAV ---------- */
document.querySelectorAll('.sidebar button[data-sec]').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.sidebar button[data-sec]').forEach(x=>x.classList.remove('active'))
    b.classList.add('active')
    document.querySelectorAll('.main section').forEach(s=>s.classList.add('hidden'))
    document.getElementById('sec-'+b.dataset.sec).classList.remove('hidden')
    if(b.dataset.sec==='dashboard') loadDashboard()
    if(b.dataset.sec==='sport') loadSports()
  }
})

/* ---------- HELPERS UI ---------- */
function showApp() {
  document.getElementById('login').classList.add('hidden')
  document.getElementById('app').classList.remove('hidden')
  loadDashboard()
}
function showLogin(msg) {
  document.getElementById('app').classList.add('hidden')
  document.getElementById('login').classList.remove('hidden')
  document.getElementById('username').value = ''
  document.getElementById('password').value = ''
  if (msg) document.getElementById('login-err').textContent = msg
}

/* ---------- LOGIN ---------- */
async function login(e){
  e.preventDefault()
  const errEl  = document.getElementById('login-err')
  const btn    = document.querySelector('.login-card button[type="submit"]')
  errEl.textContent = ''
  btn.disabled = true
  btn.textContent = 'Accesso in corso...'

  const username = document.getElementById('username').value.trim()
  const password = document.getElementById('password').value

  try {
    // STEP 1 — recupera email da public.users tramite username
    const { data: userRow, error: userErr } = await client
      .from('users')
      .select('id, email, username, name')  // solo colonne esistenti
      .ilike('username', username)
      .maybeSingle()

    if (userErr) { errEl.textContent = 'Errore database: ' + userErr.message; return }
    if (!userRow) { errEl.textContent = 'Username non trovato'; return }
    if (!userRow.email) { errEl.textContent = 'Email non configurata per questo account'; return }

    // STEP 2 — autentica con Supabase Auth
    const { data: authData, error: authErr } = await client.auth.signInWithPassword({
      email:    userRow.email,
      password: password
    })

    if (authErr) {
      let msg = authErr.message
      if (msg.toLowerCase().includes('invalid login'))       msg = 'Password errata'
      if (msg.toLowerCase().includes('email not confirmed')) msg = 'Email non confermata'
      if (msg.toLowerCase().includes('too many requests'))   msg = 'Troppi tentativi — riprova tra qualche minuto'
      errEl.textContent = msg
      return
    }

    // STEP 3 — login riuscito
    USER = { ...authData.user, ...userRow }
    showApp()

  } catch(err) {
    errEl.textContent = 'Errore imprevisto: ' + err.message
    console.error('[login]', err)
  } finally {
    btn.disabled = false
    btn.textContent = 'Entra'
  }
}

/* ---------- LOGOUT ---------- */
async function logout(){
  try { await client.auth.signOut() } catch(_) {}
  USER = null
  showLogin()
}

/* ---------- AUTO-RESTORE SESSIONE ---------- */
;(async () => {
  try {
    const { data: { session }, error } = await client.auth.getSession()
    if (error) {
      // Token scaduto/invalido — pulisci localStorage senza chiamate di rete
      try { await client.auth.signOut({ scope: 'local' }) } catch(_) {}
      return
    }
    if (!session) return  // nessuna sessione salvata

    const { data: userRow, error: profileErr } = await client
      .from('users')
      .select('id, email, username, name')
      .eq('id', session.user.id)
      .maybeSingle()

    if (profileErr || !userRow) {
      try { await client.auth.signOut({ scope: 'local' }) } catch(_) {}
      return
    }

    USER = { ...session.user, ...userRow }
    showApp()

  } catch(err) {
    console.warn('[AutoRestore]', err.message)
    try { await client.auth.signOut({ scope: 'local' }) } catch(_) {}
  }
})()

/* ---------- DASHBOARD ---------- */
async function loadDashboard(){
  try{
    const [{count:sport},{count:societa},{count:atleti}]=await Promise.all([
      client.from('sports').select('id',{count:'exact',head:true}),
      client.from('societies').select('id',{count:'exact',head:true}),
      client.from('athletes').select('id',{count:'exact',head:true})
    ])
    document.getElementById('k-sport').textContent=sport||0
    document.getElementById('k-societa').textContent=societa||0
    document.getElementById('k-atleti').textContent=atleti||0
  }catch(e){
    console.error('DASHBOARD ERROR:', e)
    document.getElementById('k-sport').textContent='?'
    document.getElementById('k-societa').textContent='?'
    document.getElementById('k-atleti').textContent='?'
  }
}
/* ---------- SPORT ---------- */
async function loadSports(){
  const {data,error}=await client.from('sports').select('*').order('name')
  const tb=document.querySelector('#tbl-sport tbody')
  if(error){ tb.innerHTML=`<tr><td colspan="3" style="color:red">ERRORE: ${error.message}</td></tr>`; return }
  tb.innerHTML=data.length? data.map(s=>`
    <tr>
      <td>${s.id}</td>
      <td>${s.name}</td>
      <td><button onclick="deleteSport('${s.id}')">Elimina</button></td>
    </tr>`).join('')
  : `<tr><td colspan="3">Nessuno sport presente</td></tr>`
}

async function createSport(){
  const id=document.getElementById('sport-id').value.trim()
  const name=document.getElementById('sport-nome').value.trim()
  if(!id || !name) return alert('Compila ID e Nome')

  const {error}=await client.from('sports').insert({id,name})
  if(error) return alert(error.message)

  document.getElementById('sport-id').value=''
  document.getElementById('sport-nome').value=''
  loadSports()
  loadDashboard()
}

async function deleteSport(id){
  if(!confirm('Eliminare lo sport '+id+' ?')) return
  const {error}=await client.from('sports').delete().eq('id',id)
  if(error) return alert(error.message)
  loadSports()
  loadDashboard()
}
</script>
</body>
</html>
