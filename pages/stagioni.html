<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportTrackPro - Gestione Stagioni</title>
    <style>
        :root { --primary: #2563eb; --success: #16a34a; --warning: #f59e0b; --danger: #ef4444; --bg: #f8fafc; }
        body { font-family: system-ui, sans-serif; background: var(--bg); padding: 20px; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 1.5rem; max-width: 1000px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; border-bottom: 2px solid #f1f5f9; padding-bottom: 1rem; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; background: #f8fafc; color: #64748b; font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; }
        .btn { padding: 0.5rem 1rem; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; color: white; background: var(--primary); }
        .btn-action { font-size: 0.8rem; margin-right: 4px; }
        .badge { padding: 0.25rem 0.6rem; border-radius: 999px; font-size: 0.75rem; font-weight: 700; }
        .badge-active { background: #dcfce7; color: #166534; }
        .badge-inactive { background: #f1f5f9; color: #475569; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2 style="margin:0">STAGIONI</h2>
        <button class="btn" id="btn-add-stagione">+ Nuova Stagione</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Periodo</th>
                <th>Stato</th>
                <th>Azioni</th>
            </tr>
        </thead>
        <tbody id="list-stagioni">
            <tr><td colspan="4">Caricamento in corso...</td></tr>
        </tbody>
    </table>
</div>

<script type="module">
    import { client } from '../db.js';

    /* --- UTILS --- */
    const convertITDate = (itDate) => {
        const [d, m, y] = itDate.split('/');
        return `${y}-${m.padStart(2, '0')}-${d.padStart(2, '0')}`;
    };

    const formatDate = (sqlDate) => {
        if (!sqlDate) return 'N.D.';
        const [y, m, d] = sqlDate.split('-');
        return `${d}/${m}/${y}`;
    };

    /* --- LOGICA DB --- */
    async function initStagioni() {
        const { data, error } = await client
            .from('seasons')
            .select('*')
            .order('start_date', { ascending: false });

        const tbody = document.getElementById('list-stagioni');
        if (error) {
            tbody.innerHTML = `<tr><td colspan="4" style="color:red">${error.message}</td></tr>`;
            return;
        }

        tbody.innerHTML = data.map(s => `
            <tr>
                <td><strong>${s.name}</strong></td>
                <td>${formatDate(s.start_date)} → ${formatDate(s.end_date)}</td>
                <td><span class="badge ${s.is_active ? 'badge-active' : 'badge-inactive'}">${s.is_active ? 'ATTIVA' : 'INATTIVA'}</span></td>
                <td>
                    <button class="btn btn-action btn-toggle" data-id="${s.id}" data-active="${s.is_active}" style="background:#64748b">
                        ${s.is_active ? 'Disattiva' : 'Attiva'}
                    </button>
                    <button class="btn btn-action btn-edit" data-id="${s.id}" data-name="${s.name}" style="background:var(--warning)">Modifica</button>
                    <button class="btn btn-action btn-delete" data-id="${s.id}" style="background:var(--danger)">Elimina</button>
                </td>
            </tr>
        `).join('');

        attachListeners();
    }

    // Colleghiamo gli eventi ai bottoni creati dinamicamente
    function attachListeners() {
        document.querySelectorAll('.btn-toggle').forEach(btn => btn.onclick = () => toggleStagione(btn.dataset.id, btn.dataset.active === 'true'));
        document.querySelectorAll('.btn-edit').forEach(btn => btn.onclick = () => editStagione(btn.dataset.id, btn.dataset.name));
        document.querySelectorAll('.btn-delete').forEach(btn => btn.onclick = () => deleteStagione(btn.dataset.id));
    }

    async function addStagione() {
        const annoInizio = prompt('Anno inizio (es. 2025)');
        const annoFine = prompt('Anno fine (es. 2026)');
        if (!annoInizio || !annoFine) return;

        const { error } = await client.from('seasons').insert([{
            name: `${annoInizio}/${annoFine}`,
            start_date: convertITDate(`01/08/${annoInizio}`),
            end_date: convertITDate(`31/07/${annoFine}`),
            is_active: false
        }]);

        if (error) alert(error.message); else initStagioni();
    }

    async function toggleStagione(id, isActive) {
        if (!isActive) {
            // Spegniamo le altre se attiviamo questa
            await client.from('seasons').update({ is_active: false }).eq('is_active', true);
            await client.from('seasons').update({ is_active: true }).eq('id', id);
        } else {
            await client.from('seasons').update({ is_active: false }).eq('id', id);
        }
        initStagioni();
    }

    async function editStagione(id, oldName) {
        const newName = prompt('Nuovo nome stagione:', oldName);
        if (!newName || newName === oldName) return;
        const { error } = await client.from('seasons').update({ name: newName }).eq('id', id);
        if (error) alert(error.message); else initStagioni();
    }

    async function deleteStagione(id) {
        if (!confirm('Eliminare la stagione?')) return;
        const { error } = await client.from('seasons').delete().eq('id', id);
        if (error) alert(error.message); else initStagioni();
    }

    /* --- AVVIO --- */
    document.getElementById('btn-add-stagione').addEventListener('click', addStagione);
    initStagioni();
</script>

</body>
</html>
