<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportTrackPro - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2563eb; --secondary: #64748b; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* Login Box */
        #login-wrap { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; border: 1px solid #e2e8f0; }
        
        /* App Container */
        #app { display: none; width: 100%; max-width: 800px; background: white; min-height: 80vh; padding: 2rem; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin: 20px; }

        h2, h3 { color: #0f172a; margin-top: 0; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.9rem; }
        input { width: 100%; padding: 0.8rem; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 1rem; transition: border 0.2s; }
        input:focus { outline: none; border-color: var(--primary); ring: 2px var(--primary); }
        
        button { width: 100%; padding: 0.8rem; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        .btn-logout { background: #ef4444; width: auto; padding: 0.5rem 1rem; font-size: 0.8rem; margin-top: 10px; }

        #error-msg { color: #dc2626; font-size: 0.85rem; margin-top: 1rem; text-align: center; display: none; padding: 0.5rem; background: #fef2f2; border-radius: 6px; }
        
        /* Dashboard Styles */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .card { border: 1px solid #e2e8f0; padding: 1.5rem; border-radius: 12px; }
        ul { list-style: none; padding: 0; }
        li { padding: 0.5rem 0; border-bottom: 1px solid #f1f5f9; font-size: 0.95rem; }
        li:last-child { border: none; }
        .badge { font-size: 0.7rem; background: #dcfce7; color: #166534; padding: 2px 8px; border-radius: 10px; margin-left: 10px; }
    </style>
</head>
<body>

    <div id="login-wrap">
        <h2>SportTrackPro</h2>
        <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 1.5rem;">Inserisci le tue credenziali per accedere.</p>
        <form id="login-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Es: admin" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit">Accedi</button>
            <div id="error-msg"></div>
        </form>
    </div>

    <div id="app">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 id="welcome-msg">Caricamento...</h2>
            <button class="btn-logout" onclick="logout()">Esci</button>
        </div>
        <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 20px 0;">
        
        <div id="content">
            <div class="grid">
                <div class="card">
                    <h3>Stagioni</h3>
                    <ul id="list-seasons"><li>Caricamento...</li></ul>
                </div>
                <div class="card">
                    <h3>Società</h3>
                    <ul id="list-societa"><li>Caricamento...</li></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURAZIONE ---
        const SUPABASE_URL = 'https://saoghfehqrjgobcpiebz.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhb2doZmVocXJqZ29iY3BpZWJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NzgwMTcsImV4cCI6MjA4OTE1NDAxN30.3i6bHXbdmKppLt8r2n4YCD5rgeFnm6veeFPmReDmOMY'; // <--- IMPORTANTE
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let CURRENT_USER = null;

        // --- GESTIONE LOGIN ---
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorDiv = document.getElementById('error-msg');
            errorDiv.style.display = 'none';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                // 1. Cerco l'email associata allo username nella tabella pubblica
                const { data: userRow, error: userErr } = await client
                    .from('users')
                    .select('id, username, email, name, role')
                    .eq('username', username)
                    .maybeSingle();

                if (userErr) throw new Error("Errore database: " + userErr.message);
                if (!userRow) throw new Error("Username non trovato.");

                // 2. Eseguo il login vero e proprio
                const { data, error: authError } = await client.auth.signInWithPassword({
                    email: userRow.email,
                    password: password
                });

                if (authError) throw new Error("Password errata.");

                // 3. Salvo l'utente e mostro l'app
                CURRENT_USER = { ...data.user, ...userRow };
                showApp();

            } catch (err) {
                errorDiv.innerText = err.message;
                errorDiv.style.display = 'block';
            }
        });

        // --- NAVIGAZIONE E UI ---
        function showApp() {
            document.getElementById('login-wrap').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('welcome-msg').innerText = `Benvenuto, ${CURRENT_USER.name}`;
            loadDashboardData();
        }

        async function loadDashboardData() {
            // Recupero stagioni e società in parallelo
            const [resSeasons, resSocieta] = await Promise.all([
                client.from('seasons').select('*').order('name', { ascending: false }),
                client.from('societa').select('*').order('name')
            ]);

            // Render Stagioni
            const listSeasons = document.getElementById('list-seasons');
            if (resSeasons.data) {
                listSeasons.innerHTML = resSeasons.data.length 
                    ? resSeasons.data.map(s => `<li>${s.name} ${s.is_active ? '<span class="badge">Attiva</span>' : ''}</li>`).join('')
                    : '<li>Nessuna stagione trovata.</li>';
            }

            // Render Società
            const listSocieta = document.getElementById('list-societa');
            if (resSocieta.data) {
                listSocieta.innerHTML = resSocieta.data.length
                    ? resSocieta.data.map(soc => `<li>${soc.name} <small>(${soc.city || 'N.D.'})</small></li>`).join('')
                    : '<li>Nessuna società trovata.</li>';
            }
        }

        async function logout() {
            await client.auth.signOut();
            location.reload();
        }

        // Controllo se l'utente è già loggato all'avvio
        window.onload = async () => {
            const { data: { session } } = await client.auth.getSession();
            if (session) {
                // In un caso reale qui recupereresti di nuovo i dati da public.users
                // Per ora permettiamo il refresh semplice
                console.log("Sessione attiva trovata");
            }
        };
    </script>
</body>
</html>
