    <style>
        :root { --primary: #3b82f6; --bg: #f3f4f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* Contenitori principali */
        #login-wrap { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        #app { display: none; width: 100%; height: 100vh; background: white; padding: 20px; }

        h2 { text-align: center; color: #1f2937; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #4b5563; }
        input { width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        
        button { 
            width: 100%; padding: 0.75rem; background: var(--primary); color: white; 
            border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; 
            cursor: pointer; transition: background 0.2s; 
        }
        button:hover { background: #2563eb; }
        #error-msg { color: #ef4444; font-size: 0.85rem; margin-top: 1rem; text-align: center; display: none; }

</head>

            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>

    </div>

        </header>

            <p>Caricamento dashboard in corso...</p>

    </div>

        // Funzione di Login
async function loadSection(section) {
    const content = document.getElementById('content');
    content.innerHTML = '<p>Caricamento in corso...</p>';

    if (section === 'dashboard') {
        try {
            // 1. Recupero le ultime 5 stagioni
            const { data: seasons, error: seasonsErr } = await client
                .from('seasons')
                .select('id, name, is_active')
                .order('name', { ascending: false })
                .limit(5);

            if (seasonsErr) throw seasonsErr;

            // 2. Recupero le ultime sessioni
            const { data: sessions, error: sessionsErr } = await client
                .from('sessions')
                .select('id, created_at') // Aggiungi altre colonne se necessario
                .limit(5);

            if (sessionsErr) throw sessionsErr;

            // 3. Rendering della Dashboard
            renderDashboard(seasons, sessions);

        } catch (err) {
            content.innerHTML = `<p style="color:red">Errore nel caricamento dati: ${err.message}</p>`;
            console.error(err);
        }
    }
}

function renderDashboard(seasons, sessions) {
    const content = document.getElementById('content');
    
    let html = `<h3>Stagioni Recenti</h3><ul>`;
    seasons.forEach(s => {
        html += `<li>${s.name} ${s.is_active ? '✅' : ''}</li>`;
    });
    html += `</ul>`;

    html += `<h3>Ultime Sessioni</h3><ul>`;
    sessions.forEach(sess => {
        html += `<li>Sessione del: ${new Date(sess.created_at).toLocaleDateString()}</li>`;
    });
    html += `</ul>`;

    content.innerHTML = html;
}

// Aggiorna la tua initApp per far partire la dashboard
function initApp() {
    console.log("App Inizializzata per:", USER.username);
    loadSection('dashboard');
}

        async function logout() {
            await client.auth.signOut();
            location.reload();
        }

        // Event Listener
        loginForm.addEventListener('submit', login);
    </script>
