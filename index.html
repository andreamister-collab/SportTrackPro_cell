<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportTrackPro - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
	<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
	<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary:#2563eb; --bg:#f1f5f9; --card:#ffffff; --sidebar:#0f172a; --sidebar-active:#1e293b; --danger:#ef4444; }
        * { box-sizing:border-box; }
        body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); margin:0; min-height:100vh; color:#0f172a; }
        
        /* LOGIN */
        #login-wrap { background:var(--card); padding:2rem; border-radius:12px; box-shadow:0 10px 15px -3px rgba(0,0,0,0.1); width:100%; max-width:380px; margin:10vh auto; }
        
        /* APP LAYOUT */
        #app { display:none; flex-direction:row; min-height:100vh; }
        #sidebar { width:260px; background:var(--sidebar); color:#cbd5e1; padding:1rem; display:flex; flex-direction:column; position:fixed; height:100vh; }
        #sidebar h3 { margin:0 0 1.5rem; font-size:1.1rem; color:#fff; }
        #sidebar a { display:block; padding:0.75rem 0.9rem; color:#cbd5e1; text-decoration:none; border-radius:6px; cursor:pointer; margin-bottom:0.25rem; font-weight:500; }
        #sidebar a.active, #sidebar a:hover { background:var(--sidebar-active); color:#fff; }
        #content { flex:1; margin-left:260px; padding:2rem; overflow-x:auto; }

        /* COMPONENTS */
        .card { background:var(--card); padding:1.4rem; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.05); }
        .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; border-bottom:1px solid #eee; padding-bottom:10px; }
        .btn { padding:0.6rem 1rem; background:var(--primary); color:white; border:none; border-radius:6px; cursor:pointer; font-weight:600; }
        .btn-logout { background:var(--danger); margin-top:auto; padding:0.7rem; border-radius:6px; border:none; color:white; cursor:pointer; }
        
        /* TABLE & MODAL */
        table { width:100%; border-collapse:collapse; }
        th, td { padding:0.8rem; border-bottom:1px solid #e2e8f0; text-align:left; }
        th { background:#f8fafc; font-size:0.85rem; color:#64748b; }
        .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; align-items:center; justify-content:center; z-index:1000; }
        .modal-content { background:white; padding:2rem; border-radius:12px; width:90%; max-width:450px; }
        .modal-active { display:flex; }
        input, select { width:100%; padding:0.65rem; border:1px solid #cbd5e1; border-radius:6px; margin-bottom:1rem; margin-top:0.3rem; }
        .badge { padding:0.25rem 0.6rem; border-radius:999px; font-size:0.75rem; font-weight:700; }
        .badge-active { background:#dcfce7; color:#166534; }
        .badge-inactive { background:#f1f5f9; color:#475569; }
		.btn-sm { padding: 0.4rem 0.6rem; border: none; border-radius: 4px; color: white; cursor: pointer; font-size: 0.8rem; margin-left: 4px; }
        .btn-warning { background: #f59e0b; }
        .btn-danger { background: #ef4444; }
    </style>
</head>
<body>

<div id="login-wrap">
    <h2 style="text-align:center; margin-bottom:1.5rem;">SportTrackPro</h2>
    <form id="login-form">
        <label>Username</label>
        <input type="text" id="username" placeholder="Inserisci username" required>
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
        <button type="submit" class="btn" style="width:100%">Accedi</button>
        <div id="error-msg" style="color:red; margin-top:10px; display:none; font-size:0.9rem;"></div>
    </form>
</div>

<div id="app">
    <nav id="sidebar">
        <h3>SportTrackPro</h3>
        <a data-section="dashboard">DASHBOARD</a>
        <a data-section="stagioni">STAGIONI</a>
        <a data-section="sport">SPORT</a>
        <a data-section="societa">SOCIETÀ</a>
        <a data-section="categoria">CATEGORIA</a>
        <a data-section="squadra">SQUADRA</a>
        <a data-section="staff">👥 ANAGRAFICA STAFF</a>
        <a data-section="assegnazioni">📋 ASSEGNAZIONI TECNICHE</a>
        <a data-section="atleti">🏃 ANAGRAFICA ATLETI</a>
        <a data-section="sessioni">📅 SESSIONI E PARTITE</a> <button id="btn-logout" class="btn-logout">Esci</button>
        <button id="btn-logout" class="btn-logout">Esci</button>
    </nav>

    <main id="content">
        </main>
</div>

<div id="modal-overlay" class="modal-overlay">
    <div class="modal-content">
        <h3 id="modal-title" style="margin-top:0">Titolo Modal</h3>
        <div id="modal-body"></div>
        <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:10px;">
            <button class="btn" id="btn-modal-save">Salva</button>
            <button class="btn" id="btn-modal-close" style="background:#64748b">Annulla</button>
        </div>
    </div>
</div>

<script type="module">
    import { client } from './db.js';

    let CURRENT_USER = null;

    /* --- LOGICA MODAL --- */
    const modal = {
        el: document.getElementById('modal-overlay'),
        title: document.getElementById('modal-title'),
        body: document.getElementById('modal-body'),
        open(title, html) {
            this.title.innerText = title;
            this.body.innerHTML = html;
            this.el.classList.add('modal-active');
        },
        close() { this.el.classList.remove('modal-active'); }
    };
    document.getElementById('btn-modal-close').onclick = () => modal.close();

    /* --- GESTIONE LOGIN / LOGOUT --- */
    document.getElementById('login-form').onsubmit = async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const errDiv = document.getElementById('error-msg');

        const { data: userRow, error: userErr } = await client.from('users').select('*').eq('username', username).maybeSingle();
        if (userErr || !userRow) { errDiv.innerText = "Utente non trovato"; errDiv.style.display="block"; return; }

        const { data: auth, error: authErr } = await client.auth.signInWithPassword({ email: userRow.email, password });
        if (authErr) { errDiv.innerText = "Password errata"; errDiv.style.display="block"; return; }

        CURRENT_USER = userRow;
        document.getElementById('login-wrap').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        loadPage('dashboard');
    };

    document.getElementById('btn-logout').onclick = () => location.reload();

    /* --- NAVIGAZIONE (LOADER PAGINE) --- */
    const loadPage = (section) => {
        document.querySelectorAll('#sidebar a').forEach(a => a.classList.remove('active'));
        const link = document.querySelector(`#sidebar a[data-section="${section}"]`);
        if (link) link.classList.add('active');

        const content = document.getElementById('content');

        switch(section) {
            case 'dashboard': 
                content.innerHTML = `<div class="card"><h2>Benvenuto, ${CURRENT_USER.name}</h2><p>Seleziona una voce dal menu per iniziare.</p></div>`; 
                break;
            
            case 'stagioni': 
                content.innerHTML = templateStagioni(); 
                initStagioni(); 
                break;
				case 'sport':
                content.innerHTML = templateSport();
                initSport();
                break;

            case 'societa':
                content.innerHTML = templateSocieta();
                initSocieta();
                break;

            case 'categoria':
                content.innerHTML = templateCategoria();
                initCategoria();
                break;

            case 'squadra':
                content.innerHTML = templateSquadra();
                initSquadra();
                break;
		case 'staff': // Anagrafica Utenti (tabella users)
            content.innerHTML = templateStaff();
            initStaff();
            break;

        case 'assegnazioni': // Relazione Staff <-> Categoria <-> Stagione
            content.innerHTML = templateAssignments();
            initAssignments();
            break;

        case 'atleti':
            content.innerHTML = templateAtleti();
            initAtleti();
            break;
			
        case 'sessioni': // Futura gestione Allenamenti/Partite
            content.innerHTML = `<div class="card"><h2>Calendario Sessioni</h2><p>In fase di sviluppo...</p></div>`;
            break;
            /* [INSERIRE QUI I CASE PER SPORT, SOCIETÀ, ECC. IN SEGUITO] */

            default: 
                content.innerHTML = `<div class="card"><h2>Sezione ${section}</h2><p>In fase di sviluppo...</p></div>`;
        }
    };

    document.querySelectorAll('#sidebar a').forEach(a => {
        a.onclick = () => loadPage(a.dataset.section);
    });

/* ============================================================
   PAGINA: STAGIONI (Versione Aggiornata)
   ============================================================ */
function templateStagioni() {
    return `
    <div class="card">
        <div class="header">
            <h2>GESTIONE STAGIONI</h2>
            <button class="btn" id="btn-add-stagione">+ Nuova Stagione</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Periodo</th>
                    <th>Stato</th>
                    <th style="text-align:right">Azioni</th>
                </tr>
            </thead>
            <tbody id="list-stagioni"></tbody>
        </table>
    </div>`;
}

async function initStagioni() {
    const { data, error } = await client.from('seasons').select('*').order('start_date', {ascending:false});
    const tbody = document.getElementById('list-stagioni');
    
    if (error) { tbody.innerHTML = `<tr><td colspan="4">Errore: ${error.message}</td></tr>`; return; }

    // Generiamo l'HTML senza usare onclick
    tbody.innerHTML = data?.map(s => `
        <tr>
            <td><strong>${s.name}</strong></td>
            <td>${s.start_date} → ${s.end_date}</td>
            <td><span class="badge ${s.is_active?'badge-active':'badge-inactive'}">${s.is_active?'ATTIVA':'INATTIVA'}</span></td>
            <td style="text-align:right">
                <button class="btn-sm btn-action-activate" data-id="${s.id}" data-active="${s.is_active}" style="background:${s.is_active ? '#64748b' : '#16a34a'}">
                    ${s.is_active ? 'Spegni' : 'Attiva'}
                </button>
                <button class="btn-sm btn-action-edit" data-id="${s.id}" data-name="${s.name}" style="background:var(--warning)">✏️</button>
                <button class="btn-sm btn-action-delete" data-id="${s.id}" style="background:var(--danger)">🗑️</button>
            </td>
        </tr>
    `).join('') || '<tr><td colspan="4">Nessuna stagione trovata.</td></tr>';

    // === ATTACCHIAMO I LISTENER AI BOTTONI (Metodo sicuro) ===
    
    // Bottoni Attiva/Spegni
    tbody.querySelectorAll('.btn-action-activate').forEach(btn => {
        btn.onclick = () => handleStagioneToggle(btn.dataset.id, btn.dataset.active === 'true');
    });

    // Bottoni Modifica (Matita)
    tbody.querySelectorAll('.btn-action-edit').forEach(btn => {
        btn.onclick = () => handleStagioneEdit(btn.dataset.id, btn.dataset.name);
    });

    // Bottoni Elimina (Cestino)
    tbody.querySelectorAll('.btn-action-delete').forEach(btn => {
        btn.onclick = () => handleStagioneDelete(btn.dataset.id);
    });

    // Bottone "Nuova Stagione" (quello in alto nella card)
    const btnAdd = document.getElementById('btn-add-stagione');
    if(btnAdd) {
        btnAdd.onclick = () => {
            modal.open('Nuova Stagione', `
                <p style="font-size:0.85rem; color:#666">Inserisci gli anni solari (es. 2025 e 2026)</p>
                <label>Anno Inizio</label><input type="number" id="y-start" value="2025">
                <label>Anno Fine</label><input type="number" id="y-end" value="2026">
            `);
            document.getElementById('btn-modal-save').onclick = async () => {
                const y1 = document.getElementById('y-start').value;
                const y2 = document.getElementById('y-end').value;
                await client.from('seasons').insert({ 
                    name: `${y1}/${y2}`, 
                    start_date: `${y1}-08-01`, 
                    end_date: `${y2}-07-31`, 
                    is_active: false 
                });
                modal.close();
                initStagioni();
            };
        };
    }
}

    /* [QUI AGGIUNGEREMO LE FUNZIONI PER SPORT, SOCIETÀ, ECC. UNA ALLA VOLTA] */
/* ============================================================
   SEZIONE: AZIONI LOGICHE STAGIONI
   ============================================================ */

async function handleStagioneToggle(id, isActive) {
    if (!isActive) {
        await client.from('seasons').update({ is_active: false }).eq('is_active', true);
        await client.from('seasons').update({ is_active: true }).eq('id', id);
    } else {
        await client.from('seasons').update({ is_active: false }).eq('id', id);
    }
    initStagioni();
}

async function handleStagioneEdit(id, currentName) {
    const newName = prompt("Modifica nome stagione (es. 2025/2026):", currentName);
    if (newName && newName !== currentName) {
        await client.from('seasons').update({ name: newName }).eq('id', id);
        initStagioni();
    }
}

async function handleStagioneDelete(id) {
    if (confirm("Sei sicuro di voler eliminare questa stagione?")) {
        const { error } = await client.from('seasons').delete().eq('id', id);
        if (error) alert("Errore: " + error.message);
        initStagioni();
    }
}

/* ============================================================
   SEZIONE: SPORT (Template + Init + Azioni)
   ============================================================ */

function templateSport() {
    return `
    <div class="card">
        <div class="header">
            <h2>GESTIONE SPORT</h2>
            <button class="btn" id="btn-add-sport">+ Nuovo Sport</button>
        </div>
        <table>
            <thead><tr><th>Icona</th><th>Nome</th><th style="text-align:right">Azioni</th></tr></thead>
            <tbody id="list-sport"></tbody>
        </table>
    </div>`;
}

async function initSport() {
    const { data } = await client.from('sports').select('*').order('name');
    const tbody = document.getElementById('list-sport');
    
    tbody.innerHTML = data?.map(s => `
        <tr>
            <td style="font-size:1.5rem">${s.icon || '🏐'}</td>
            <td><strong>${s.name}</strong></td>
            <td style="text-align:right">
                <button class="btn-sm btn-sport-edit" data-id="${s.id}" data-name="${s.name}" data-icon="${s.icon}" style="background:var(--warning)">✏️</button>
                <button class="btn-sm btn-sport-delete" data-id="${s.id}" style="background:var(--danger)">🗑️</button>
            </td>
        </tr>
    `).join('') || '<tr><td colspan="3">Nessun dato.</td></tr>';

    // Listener bottoni tabella Sport
    tbody.querySelectorAll('.btn-sport-edit').forEach(btn => {
        btn.onclick = () => handleSportEdit(btn.dataset.id, btn.dataset.name, btn.dataset.icon);
    });
    tbody.querySelectorAll('.btn-sport-delete').forEach(btn => {
        btn.onclick = () => handleSportDelete(btn.dataset.id);
    });

    // Bottone Nuovo Sport
    document.getElementById('btn-add-sport').onclick = () => {
        modal.open('Nuovo Sport', `
            <label>Nome Sport</label><input type="text" id="sp-name" placeholder="es. Calcio">
            <label>Icona (Emoji)</label><input type="text" id="sp-icon" placeholder="es. ⚽">
        `);
        document.getElementById('btn-modal-save').onclick = async () => {
            const name = document.getElementById('sp-name').value;
            const icon = document.getElementById('sp-icon').value;
            await client.from('sports').insert({ name, icon });
            modal.close();
            initSport();
        };
    };
}

async function handleSportEdit(id, oldName, oldIcon) {
    modal.open('Modifica Sport', `
        <label>Nome Sport</label><input type="text" id="up-sp-name" value="${oldName}">
        <label>Icona (Emoji)</label><input type="text" id="up-sp-icon" value="${oldIcon}">
    `);
    document.getElementById('btn-modal-save').onclick = async () => {
        const name = document.getElementById('up-sp-name').value;
        const icon = document.getElementById('up-sp-icon').value;
        await client.from('sports').update({ name, icon }).eq('id', id);
        modal.close();
        initSport();
    };
}

async function handleSportDelete(id) {
    if (confirm("Eliminare questo sport?")) {
        await client.from('sports').delete().eq('id', id);
        initSport();
    }
}
/* ============================================================
   SEZIONE: SOCIETÀ (Versione Finale Anti-Errore)
   ============================================================ */

function templateSocieta() {
    return `
    <div class="card">
        <div class="header">
            <h2>GESTIONE SOCIETÀ</h2>
            <button class="btn" id="btn-add-societa">+ Nuova Società</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Nome Società</th>
                    <th>Sport Associato</th>
                    <th style="text-align:right">Azioni</th>
                </tr>
            </thead>
            <tbody id="list-societa">
                <tr><td colspan="3">Caricamento in corso...</td></tr>
            </tbody>
        </table>
    </div>`;
}

async function initSocieta() {
    const tbody = document.getElementById('list-societa');
    if (!tbody) return;

    const { data, error } = await client
        .from('societies')
        .select('*, sports!fk_soc_to_sport(name, icon)') 
        .order('name');
    
    if (error) { 
        tbody.innerHTML = `<tr><td colspan="3">Errore: ${error.message}</td></tr>`; 
        return; 
    }

    tbody.innerHTML = data?.map(s => {
        // Protezione per nomi con apostrofi
        const safeName = s.name.replace(/'/g, "\\'");
        return `
        <tr>
            <td><strong>${s.name}</strong></td>
            <td>${s.sports ? s.sports.icon + ' ' + s.sports.name : '-'}</td>
            <td style="text-align:right">
                <button class="btn-sm btn-warning" onclick="handleSocietaEdit('${s.id}', '${safeName}', '${s.sport_id}')">✏️</button>
                <button class="btn-sm btn-danger" onclick="handleSocietaDelete('${s.id}')">🗑️</button>
            </td>
        </tr>`;
    }).join('') || '<tr><td colspan="3">Nessuna società.</td></tr>';

    document.getElementById('btn-add-societa').onclick = async () => {
        const { data: sportsList } = await client.from('sports').select('*').order('name');
        const options = sportsList?.map(sp => `<option value="${sp.id}">${sp.icon} ${sp.name}</option>`).join('') || '';

        modal.open('Aggiungi Nuova Società', `
            <label>Nome della Società</label>
            <input type="text" id="new-soc-name" placeholder="es. A.C. Esempio">
            <label>Disciplina Sportiva</label>
            <select id="new-soc-sport">
                <option value="">-- Seleziona lo Sport --</option>
                ${options}
            </select>
        `);

        document.getElementById('btn-modal-save').onclick = async () => {
            const name = document.getElementById('new-soc-name').value.trim();
            const sport_id = document.getElementById('new-soc-sport').value;
            if(!name || !sport_id) return alert("Inserisci nome e seleziona uno sport!");

            const { error: insErr } = await client.from('societies').insert({ name, sport_id });
            if(!insErr) { modal.close(); initSocieta(); } else { alert(insErr.message); }
        };
    };
}

// ESPOSIZIONE GLOBALE FUNZIONI SOCIETÀ
window.handleSocietaEdit = async function(id, currentName, currentSportId) {
    const { data: sportsList } = await client.from('sports').select('*').order('name');
    const options = sportsList?.map(sp => 
        `<option value="${sp.id}" ${sp.id == currentSportId ? 'selected' : ''}>${sp.icon} ${sp.name}</option>`
    ).join('');

    modal.open('Modifica Società', `
        <label>Nome Società</label>
        <input type="text" id="edit-soc-name" value="${currentName}">
        <label>Disciplina Sportiva</label>
        <select id="edit-soc-sport">${options}</select>
    `);

    document.getElementById('btn-modal-save').onclick = async () => {
        const name = document.getElementById('edit-soc-name').value.trim();
        const sport_id = document.getElementById('edit-soc-sport').value;
        const { error } = await client.from('societies').update({ name, sport_id }).eq('id', id);
        if(!error) { modal.close(); initSocieta(); } else { alert(error.message); }
    };
};

window.handleSocietaDelete = async function(id) {
    if (confirm("Attenzione: eliminando la società perderai tutti i collegamenti. Procedere?")) {
        const { error } = await client.from('societies').delete().eq('id', id);
        if(!error) initSocieta(); else alert("Errore: " + error.message);
    }
};
/* ============================================================
   SEZIONE: CATEGORIA (Versione Finale Anti-Errore)
   ============================================================ */

function templateCategoria() {
    return `
    <div class="card">
        <div class="header">
            <h2>GESTIONE CATEGORIE</h2>
            <button class="btn" id="btn-add-categoria">+ Nuova Categoria</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Nome Categoria</th>
                    <th>Società di Riferimento</th>
                    <th style="text-align:right">Azioni</th>
                </tr>
            </thead>
            <tbody id="list-categoria">
                <tr><td colspan="3">Caricamento in corso...</td></tr>
            </tbody>
        </table>
    </div>`;
}

async function initCategoria() {
    const tbody = document.getElementById('list-categoria');
    if (!tbody) return;

    const { data, error } = await client
        .from('categories')
        .select('*, societies!fk_cat_to_soc(name)') 
        .order('name');

    if (error) { 
        tbody.innerHTML = `<tr><td colspan="3">Errore: ${error.message}</td></tr>`; 
        return; 
    }

    tbody.innerHTML = data?.map(c => {
        const safeName = c.name.replace(/'/g, "\\'");
        return `
        <tr>
            <td><strong>${c.name}</strong></td>
            <td>${c.societies ? c.societies.name : 'N/A'}</td>
            <td style="text-align:right">
                <button class="btn-sm btn-warning" onclick="handleCategoriaEdit('${c.id}', '${safeName}', '${c.society_id}')">✏️</button>
                <button class="btn-sm btn-danger" onclick="handleCategoriaDelete('${c.id}')">🗑️</button>
            </td>
        </tr>`;
    }).join('') || '<tr><td colspan="3">Nessuna categoria.</td></tr>';

    document.getElementById('btn-add-categoria').onclick = async () => {
        const { data: socList } = await client.from('societies').select('id, name').order('name');
        const options = socList?.map(s => `<option value="${s.id}">${s.name}</option>`).join('') || '';

        modal.open('Nuova Categoria', `
            <label>Nome Categoria</label>
            <input type="text" id="cat-name" placeholder="es. Under 19">
            <label>Associa a Società</label>
            <select id="cat-soc-id">
                <option value="">-- Seleziona Società --</option>
                ${options}
            </select>
        `);

        document.getElementById('btn-modal-save').onclick = async () => {
            const name = document.getElementById('cat-name').value.trim();
            const society_id = document.getElementById('cat-soc-id').value;
            if(!name || !society_id) return alert("Compila tutti i campi!");

/**
 * Inizializza la tabella filtrando per la stagione impostata come 'is_active'
 */
async function initSquadra() {
    const tbody = document.getElementById('list-squadra');
    const infoBanner = document.getElementById('team-season-info');
    if (!tbody) return;

    // 1. Recupero la Stagione Attiva
    const { data: activeSeason, error: sErr } = await client
        .from('seasons')
        .select('*')
        .eq('is_active', true)
        .maybeSingle();
    
    if (!activeSeason) {
        if (infoBanner) infoBanner.innerHTML = "⚠️ Attenzione: nessuna stagione attiva impostata.";
        tbody.innerHTML = '<tr><td colspan="5">Seleziona una stagione attiva nelle impostazioni per vedere le squadre.</td></tr>';
        return;
    }
    
    if (infoBanner) infoBanner.innerText = `📅 Stagione Attiva: ${activeSeason.name}`;

    // 2. Query con join sulle tabelle collegate e filtro season_id
    const { data, error } = await client
        .from('teams')
        .select(`
            id,
            name,
            season_id,
            society_id,
            category_id,
            sport_id,
            societies (name),
            categories (name),
            sports (name, icon)
        `)
        .eq('season_id', activeSeason.id)
        .order('name');

    if (error) {
        console.error("Errore query teams:", error);
        tbody.innerHTML = `<tr><td colspan="5">Errore: ${error.message}</td></tr>`;
        return;
    }

    tbody.innerHTML = data?.map(t => {
        const safeName = t.name.replace(/'/g, "\\'");
        return `
        <tr>
            <td><strong>${t.name}</strong></td>
            <td>${t.societies?.name || '-'}</td>
            <td>${t.categories?.name || '-'}</td>
            <td>${t.sports ? t.sports.icon + ' ' + t.sports.name : '-'}</td>
            <td style="text-align:right">
                <button class="btn-sm btn-warning" onclick="handleEditSquadra('${t.id}')">✏️</button>
                <button class="btn-sm btn-danger" onclick="handleDeleteSquadra('${t.id}')">🗑️</button>
            </td>
        </tr>`;
    }).join('') || '<tr><td colspan="5">Nessuna squadra presente per questa stagione.</td></tr>';

    document.getElementById('btn-add-squadra').onclick = () => openSquadraModal(activeSeason.id);
}

/**
 * Modale per Nuova/Modifica Squadra
 */
async function openSquadraModal(activeSeasonId, editData = null) {
    const isEdit = !!editData;

    // Caricamento liste per i dropdown
    const [socRes, catRes, spoRes, seaRes] = await Promise.all([
        client.from('societies').select('id, name').order('name'),
        client.from('categories').select('id, name').order('name'),
        client.from('sports').select('id, name, icon').order('name'),
        client.from('seasons').select('name').eq('id', activeSeasonId).single()
    ]);

    modal.open(isEdit ? 'Modifica Squadra' : 'Nuova Squadra', `
        <div style="margin-bottom:15px; padding:10px; background:#f0fdf4; border-radius:6px; color:#166534; font-size:0.85em; border:1px solid #dcfce7;">
            Stai salvando nella stagione: <strong>${seaRes.data?.name || 'Attiva'}</strong>
        </div>
        
        <label>Nome Squadra</label>
        <input type="text" id="tm-name" value="${editData ? editData.name : ''}" placeholder="es. Giovanissimi 2010">
        
        <label>Società</label>
        <select id="tm-soc">
            <option value="">-- Seleziona Società --</option>
            ${socRes.data?.map(s => `<option value="${s.id}" ${editData?.society_id === s.id ? 'selected' : ''}>${s.name}</option>`).join('')}
        </select>

        <label>Categoria</label>
        <select id="tm-cat">
            <option value="">-- Seleziona Categoria --</option>
            ${catRes.data?.map(c => `<option value="${c.id}" ${editData?.category_id === c.id ? 'selected' : ''}>${c.name}</option>`).join('')}
        </select>

        <label>Sport</label>
        <select id="tm-spo">
            <option value="">-- Seleziona Sport --</option>
            ${spoRes.data?.map(p => `<option value="${p.id}" ${editData?.sport_id === p.id ? 'selected' : ''}>${p.icon} ${p.name}</option>`).join('')}
        </select>
    `);

    document.getElementById('btn-modal-save').onclick = async () => {
        const payload = {
            name: document.getElementById('tm-name').value.trim(),
            society_id: document.getElementById('tm-soc').value,
            category_id: document.getElementById('tm-cat').value,
            sport_id: document.getElementById('tm-spo').value,
            season_id: activeSeasonId // Collegamento automatico alla stagione
        };

        if(!payload.name || !payload.society_id || !payload.category_id || !payload.sport_id) {
            return alert("Compila tutti i campi obbligatori!");
        }

        const { error } = isEdit 
            ? await client.from('teams').update(payload).eq('id', editData.id)
            : await client.from('teams').insert(payload);

        if (!error) { 
            modal.close(); 
            initSquadra(); 
        } else { 
            alert("Errore nel salvataggio: " + error.message); 
        }
    };
}

/**

async function initStaff() {
    const tbody = document.getElementById('list-staff');
    if (!tbody) return;

    // Recupero tutti gli utenti tranne l'admin
    const { data, error } = await client
        .from('users')
        .select('*')
        .neq('username', 'admin')
        .order('name');

    if (error) {
        tbody.innerHTML = `<tr><td colspan="3">Errore: ${error.message}</td></tr>`;

            </td>

    document.getElementById('btn-add-staff').onclick = () => openStaffModal();

/**
 * Modale per inserimento e modifica Staff
 */
async function openStaffModal(editData = null) {
    const isEdit = !!editData;

    modal.open(isEdit ? 'Modifica Staff' : 'Nuovo Staff', `
        <label>Nome e Cognome</label>
        <input type="text" id="st-name" value="${editData ? editData.name : ''}" placeholder="es. Mario Rossi">
        
        <label>Username (Login)</label>
        <input type="text" id="st-user" value="${editData ? editData.username : ''}" placeholder="es. m.rossi">
        
        ${!isEdit ? `
        <label>Password Temporanea</label>
        <input type="password" id="st-pass" placeholder="min. 6 caratteri">
        ` : '<p style="font-size:0.8em; color:#6b7280; margin-top:10px;">La password può essere cambiata solo dall\'utente o dal database.</p>'}
    `);

    document.getElementById('btn-modal-save').onclick = async () => {
        const name = document.getElementById('st-name').value.trim();
        const username = document.getElementById('st-user').value.trim();
        
        if(!name || !username) return alert("Nome e Username sono obbligatori!");

        const payload = { name, username };
        if(!isEdit) {
            const pass = document.getElementById('st-pass').value;
            if(pass.length < 6) return alert("La password deve avere almeno 6 caratteri.");
            payload.password = pass;
        }

        const { error } = isEdit 
            ? await client.from('users').update(payload).eq('id', editData.id)
            : await client.from('users').insert(payload);

        if (!error) {
            modal.close();
            initStaff();
        } else {
            alert("Errore salvataggio: " + error.message);
        }
    };
}

window.handleEditStaff = async function(id) {

};

    window.initAssignments = async function() {
        try {
            const [socs, seas, teams] = await Promise.all([
                client.from('societies').select('*').order('name'),
                client.from('seasons').select('*').order('name'),
                client.from('teams').select('*').order('name')
            ]);

            _lookupSocs = Object.fromEntries(socs.data.map(s => [s.id, s.name]));
            _lookupSeas = Object.fromEntries(seas.data.map(s => [s.id, s.name]));
            _allTeams = teams.data || [];

            const fSoc = document.getElementById('f-staff-soc');
            const fSea = document.getElementById('f-staff-sea');

            if(fSoc) fSoc.innerHTML = '<option value="">Tutte</option>' + socs.data.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
            if(fSea) fSea.innerHTML = seas.data.map(s => `<option value="${s.id}" ${s.is_active ? 'selected' : ''}>${s.name}</option>`).join('');

            // Inizializza il filtro squadre in base alla stagione attiva
            updateTeamFilter();
            await _fetchData();
        } catch (err) { console.error("Init Error:", err); }
    };

    // --- LOGICA FILTRO PROGRESSIVO ---
    window.updateTeamFilter = function() {
        const selSoc = document.getElementById('f-staff-soc')?.value;
        const selSea = document.getElementById('f-staff-sea')?.value;
        const fTea = document.getElementById('f-staff-team');

        if (!fTea) return;

        // Filtriamo l'elenco delle squadre in base a Società e Stagione selezionate
        const filteredTeams = _allTeams.filter(t => {
            const matchSoc = !selSoc || t.society_id == selSoc;
            const matchSea = !selSea || t.season_id == selSea;
            return matchSoc && matchSea;
        });

        fTea.innerHTML = '<option value="">Tutte</option>' + 
            filteredTeams.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
    };

    async function _fetchData() {
        const { data: activeSeason } = await client.from('seasons').select('id').eq('is_active', true).maybeSingle();
        if (activeSeason && document.getElementById('btn-add-assignment')) {
            document.getElementById('btn-add-assignment').onclick = () => openAssignmentModal(activeSeason.id);
        }

        const { data, error } = await client
            .from('user_category_seasons')
            .select(`
                id, role, season_id, team_id, user_id, society_id,
                users!fk_staff_user (name),
                teams!fk_ucs_team (name)
            `);
        
        if (error) {
            console.error("Errore query:", error);
            return;
        }

        _allAssignments = data || [];
        window.applyStaffFilters();
    }

    window.applyStaffFilters = function() {

        const soc = document.getElementById('f-staff-soc')?.value;
        const sea = document.getElementById('f-staff-sea')?.value;
        const team = document.getElementById('f-staff-team')?.value;

        const filtered = _allAssignments.filter(a => {
            return (!name || a.users?.name?.toLowerCase().includes(name)) &&
                   (!soc || a.society_id == soc) &&
                   (!sea || a.season_id == sea) &&
                   (!team || a.team_id == team);
        });

        const tbody = document.getElementById('list-assignments');
        if (!tbody) return;

        tbody.innerHTML = filtered.map(a => `
            <tr>
                <td><strong>${a.users?.name || 'N/D'}</strong></td>

        ]);

            </select>
            <label>Squadra (Team)</label>
            <select id="as-team">
                <option value="">-- Seleziona Squadra --</option>

                <label style="font-size: 11px; font-weight:bold;">Stagione</label>

            </div>
            <div>
                <label style="font-size: 11px; font-weight:bold;">Categoria</label>
                <select id="filter-category" onchange="updateProgressiveFilters(); applyAtletiFilters();" style="width:100%"><option value="">Tutte</option></select>
            </div>
            <div>
                <label style="font-size: 11px; font-weight:bold;">Squadra</label>
                <select id="filter-team" onchange="applyAtletiFilters()" style="width:100%"><option value="">Tutte</option></select>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Atleta</th>
                    <th>Società</th>
                    <th>Stagione</th>
                    <th>Categoria</th>

                    <th>Ruolo</th>
                    <th style="text-align:center">N°</th>

            </thead>
            <tbody id="list-atleti">
                <tr><td colspan="8">Caricamento in corso...</td></tr>
            </tbody>
        </table>
    </div>`;
};

window.initAtleti = async function() {
    try {
        const [socs, seas, cats, teams] = await Promise.all([
            client.from('societies').select('*').order('name'),
            client.from('seasons').select('*').order('name'),
            client.from('categories').select('*').order('name'),
            client.from('teams').select('*').order('name')
        ]);

        _allTeamsCache = teams.data || [];
        _allCategoriesCache = cats.data || [];

        const fSoc = document.getElementById('filter-society');
        const fSea = document.getElementById('filter-season');

        if(fSoc) fSoc.innerHTML = '<option value="">Tutte</option>' + socs.data.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
        if(fSea) fSea.innerHTML = seas.data.map(s => `<option value="${s.id}" ${s.is_active ? 'selected' : ''}>${s.name}</option>`).join('');

        // Inizializza i menu a tendina progressivi
        updateProgressiveFilters();
        await window.loadAtletiData();
    } catch (err) {
        console.error("Errore inizializzazione:", err);
    }
};

// LOGICA FILTRI PROGRESSIVI
window.updateProgressiveFilters = function() {
    const selSoc = document.getElementById('filter-society')?.value;
    const selSea = document.getElementById('filter-season')?.value;
    const selCat = document.getElementById('filter-category')?.value;
    
    const fCat = document.getElementById('filter-category');
    const fTea = document.getElementById('filter-team');

    // 1. Aggiorna Categorie (basate su Società se necessario, o lasciate globali)
    // Se le tue categorie non dipendono dalla società, saltiamo questo filtro.
    
    // 2. Aggiorna Squadre in base a Società, Stagione e Categoria
    if (fTea) {
        const filteredTeams = _allTeamsCache.filter(t => {
            return (!selSoc || t.society_id == selSoc) && 
                   (!selSea || t.season_id == selSea) &&
                   (!selCat || t.category_id == selCat);
        });
        
        const currentTeamVal = fTea.value;
        fTea.innerHTML = '<option value="">Tutte</option>' + 
            filteredTeams.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
        
        // Mantiene la selezione se ancora valida
        if (filteredTeams.find(t => t.id == currentTeamVal)) fTea.value = currentTeamVal;
    }
};

window.loadAtletiData = async function() {
    const { data, error } = await client
        .from('athlete_team_seasons')
        .select(`
            id, nickname, jersey_number, role,
            athletes:athlete_id (id, name, surname),
            societies:society_id (name, id),
            seasons:season_id (name, id),
            teams:team_id (name, id),
            categories:category_id (name, id)
        `);

    if (error) return;
    window.allAtletiData = data || [];
    window.applyAtletiFilters();
};

window.applyAtletiFilters = function() {
    const nameVal = document.getElementById('filter-name')?.value.toLowerCase();
    const socVal = document.getElementById('filter-society')?.value;
    const seaVal = document.getElementById('filter-season')?.value;
    const catVal = document.getElementById('filter-category')?.value;
    const teamVal = document.getElementById('filter-team')?.value;

    const filtered = window.allAtletiData.filter(row => {
        return (!nameVal || `${row.athletes?.surname} ${row.athletes?.name}`.toLowerCase().includes(nameVal)) &&
               (!socVal || row.societies?.id == socVal) &&
               (!seaVal || row.seasons?.id == seaVal) &&
               (!catVal || row.categories?.id == catVal) &&
               (!teamVal || row.teams?.id == teamVal);
    });

    const tbody = document.getElementById('list-atleti');
    if (!tbody) return;

    tbody.innerHTML = filtered.map(row => `
        <tr>
            <td><strong>${row.athletes?.surname || ''} ${row.athletes?.name || ''}</strong></td>
            <td><span style="color: #2563eb;">${row.societies?.name || '-'}</span></td>
            <td>${row.seasons?.name || '-'}</td>
            <td>${row.categories?.name || '-'}</td>
            <td>${row.teams?.name || 'Intera Cat.'}</td>
            <td>${row.role || '-'}</td>
            <td style="text-align:center">${row.jersey_number || '-'}</td>
            <td style="text-align:right">
                <button class="btn-sm btn-warning" onclick="openAtletaModal('${row.id}')">✏️</button>
                <button class="btn-sm btn-danger" onclick="deleteAtleta('${row.id}')">🗑️</button>
            </td>
        </tr>
    `).join('') || '<tr><td colspan="8">Nessun atleta trovato.</td></tr>';
};
/* ============================================================
   FUNZIONE IMPORT ATLETI: MAPPATURA UUID E CREAZIONE ANAGRAFICA
   ============================================================ */
window.importAtleti = async function(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = async (e) => {
        console.group("🚀 Debug Importazione Atleti");
        try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);

            console.log("Righe rilevate nell'Excel:", jsonData.length);

            // 1. Scarichiamo i riferimenti dal DB per trasformare i NOMI in ID
            const [socs, seas, cats, teams, existingAths] = await Promise.all([
                client.from('societies').select('id, name'),
                client.from('seasons').select('id, name'),
                client.from('categories').select('id, name'),
                client.from('teams').select('id, name'),
                client.from('athletes').select('id, name, surname')
            ]);

            const findId = (list, name, context) => {
                if (!name) return null;
                const match = list.find(i => i.name?.toString().trim().toLowerCase() === name.toString().trim().toLowerCase());
                if (!match) console.warn(`⚠️ Riga Excel: "${name}" non trovato nel DB (${context})`);
                return match?.id;
            };

            const finalAssignments = [];
            let newAthletesCreated = 0;

            // 2. Elaborazione righe
            for (let i = 0; i < jsonData.length; i++) {
                const row = jsonData[i];
                const nRiga = i + 2; 

                // Gestione Nome/Cognome (es: 'Amorelli ')
                let fullStr = row.Atleta?.toString().trim() || "";
                if (!fullStr) continue;

                let parts = fullStr.split(" ");
                let surname = parts[0];
                let name = parts.slice(1).join(" ") || " ";

                // A. Cerchiamo o creiamo l'atleta nell'anagrafica
                let athleteId = existingAths.data.find(a => 
                    a.surname.toLowerCase() === surname.toLowerCase() && 
                    a.name.toLowerCase() === name.toLowerCase()
                )?.id;

                if (!athleteId) {
                    console.log(`👤 Riga ${nRiga}: Atleta nuovo (${fullStr}). Creazione in corso...`);
                    const { data: newA, error: errA } = await client.from('athletes')
                        .insert([{ name, surname }]).select('id').single();
                    
                    if (errA) {
                        console.error(`❌ Errore creazione atleta riga ${nRiga}:`, errA.message);
                        continue;
                    }
                    athleteId = newA.id;
                    newAthletesCreated++;
                    existingAths.data.push({ id: athleteId, name, surname });
                }

                // B. Trasformazione Nomi -> ID (UUID)
                const sId = findId(socs.data, row.Società, "Società");
                const seaId = findId(seas.data, row.Stagione, "Stagioni");
                const cId = findId(cats.data, row.Categoria, "Categorie");
                const tId = findId(teams.data, row.Squadra, "Squadre");

                if (athleteId && sId && seaId) {
                    finalAssignments.push({
                        athlete_id: athleteId,
                        society_id: sId,
                        season_id: seaId,
                        category_id: cId || null,
                        team_id: tId || null,
                        role: row.Ruolo || 'Atleta',
                        jersey_number: row['N°'] || row.Numero || null,
                        nickname: row.Nickname || null
                    });
                } else {
                    console.error(`❌ Riga ${nRiga}: Impossibile procedere. Società o Stagione mancanti o errate.`);
                }
            }

            // 3. Inserimento massivo finale
            if (finalAssignments.length > 0) {
                console.log(`📤 Invio di ${finalAssignments.length} record a Supabase...`);
                const { error: errIns } = await client.from('athlete_team_seasons').insert(finalAssignments);

                if (errIns) {
                    console.error("❌ ERRORE DATABASE:", errIns.message);
                    alert("Errore Database: " + errIns.message);
                } else {
                    console.log("✅ Importazione completata con successo!");
                    alert(`Import riuscito!\n- Nuovi atleti creati: ${newAthletesCreated}\n- Totale righe inserite: ${finalAssignments.length}`);
                }
            } else {
                alert("Nessun dato valido da importare. Controlla la console (F12) per i dettagli.");
            }

        } catch (err) {
            console.error("🔥 Errore critico script:", err);
        }
        console.groupEnd();
        if (window.loadAtletiData) await window.loadAtletiData();
        event.target.value = ""; 
    };
    reader.readAsArrayBuffer(file);
};
// 4. EXPORT EXCEL REALE (Richiede libreria SheetJS)
window.exportAtleti = function() {
    const table = document.querySelector("table");
    if (!table || table.rows.length <= 1) return alert("Tabella vuota!");

    // Esportiamo tutte le colonne tranne l'ultima ("Azioni")
    const rows = Array.from(table.querySelectorAll("tr"));
    const dataForExcel = rows.map(tr => {
        const cells = Array.from(tr.querySelectorAll("th, td"));
        return cells.slice(0, -1).map(c => c.innerText.trim());
    });

    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(dataForExcel);
    
    // Impostazione larghezza colonne per leggibilità
    ws['!cols'] = [{wch:25}, {wch:20}, {wch:15}, {wch:20}, {wch:20}, {wch:15}, {wch:8}];

    XLSX.utils.book_append_sheet(wb, ws, "Atleti_SportTrackPro");
    XLSX.writeFile(wb, "Export_Atleti_Completo.xlsx");
};
