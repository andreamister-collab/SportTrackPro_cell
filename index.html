<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportTrackPro - Gestione</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --card: #ffffff; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        #login-wrap { background: var(--card); padding: 2rem; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; max-width: 380px; }
        #app { display: none; width: 95%; max-width: 1000px; background: var(--card); min-height: 80vh; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin: 20px; align-self: flex-start; }

        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.4rem; font-weight: 600; font-size: 0.9rem; color: #475569; }
        input { width: 100%; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        
        button { width: 100%; padding: 0.75rem; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #1d4ed8; }
        .btn-logout { background: #ef4444; width: auto; padding: 0.4rem 1rem; margin-top: 10px; }

        #error-msg { color: #b91c1c; background: #fee2e2; padding: 0.75rem; border-radius: 6px; margin-top: 1rem; display: none; font-size: 0.85rem; border: 1px solid #fecaca; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
        .card-data { border: 1px solid #e2e8f0; padding: 1.2rem; border-radius: 8px; background: #f8fafc; }
        ul { list-style: none; padding: 0; }
        li { padding: 0.6rem; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; }
        li:last-child { border: none; }
        .status-active { color: #16a34a; font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="login-wrap">
        <h2 style="text-align: center; margin-bottom: 1.5rem;">SportTrackPro</h2>
        <form id="login-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Inserisci username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit">Accedi</button>
            <div id="error-msg"></div>
        </form>
    </div>

    <div id="app">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f1f5f9; padding-bottom: 1rem;">
            <div>
                <h2 id="welcome-title" style="margin:0;">Dashboard</h2>
                <p id="user-info" style="margin:0; color: #64748b; font-size: 0.9rem;"></p>
            </div>
            <button class="btn-logout" id="btn-logout">Logout</button>
        </div>

        <div class="grid">
            <div class="card-data">
                <h3>Stagioni</h3>
                <ul id="list-seasons"><li>Caricamento...</li></ul>
            </div>
            <div class="card-data">
                <h3>Società</h3>
                <ul id="list-societa"><li>Caricamento...</li></ul>
            </div>
        </div>
    </div>

    <script type="module">
    import { client } from './db.js';
    /*let _currentUserId = null;
    let _currentSocietyId = null;
    let _userRole = 'user'; // Imposta un default
    let CURRENT_USER = null;*/
	window._currentUserId = null;
    window._currentSocietyId = null;
    window._userRole = 'user'; 
    //window.CURRENT_USER = null;
	window._userName = null;
    let CURRENT_USER = null;

    /* --- LOGICA MODAL --- */
    const modal = {
        el: document.getElementById('modal-overlay'),
        title: document.getElementById('modal-title'),
        body: document.getElementById('modal-body'),
        open(title, html) {
            this.title.innerText = title;
            this.body.innerHTML = html;
            this.el.classList.add('modal-active');
        },
        close() { this.el.classList.remove('modal-active'); }
    };
    document.getElementById('btn-modal-close').onclick = () => modal.close();

/* ============================================================
   LOGICA DI AUTENTICAZIONE E LOGIN
   ============================================================ */
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errDiv = document.getElementById('error-msg');
    
    // Pulizia UI e setup font per l'errore
    errDiv.style.display = 'none';
    errDiv.style.fontSize = "18px"; 

    // Prendiamo le credenziali (username sempre minuscolo)
    const usernameInput = document.getElementById('username').value.trim().toLowerCase();
    const password = document.getElementById('password').value;

    try {
        // STEP 1: Recupero dati utente dalla tabella public.users
        const { data: userRow, error: userErr } = await client
            .from('users')
            .select('*')
            .eq('username', usernameInput)
            .maybeSingle();

        if (userErr) throw new Error("Errore database: " + userErr.message);
        if (!userRow) throw new Error(`Username '${usernameInput}' non trovato.`);

        // STEP 2: Tentativo di login su Supabase Auth
        const { error: authError } = await client.auth.signInWithPassword({
            email: userRow.email,
            password: password
        });

        if (authError) throw new Error("Password errata o account non attivo.");

        // STEP 3: Setup variabili globali di sessione
        window._userRole = userRow.role;
        window._currentSocietyId = userRow.society_id; // Sarà NULL per l'Admin
        window.CURRENT_USER = userRow;

        // --- INGRANDIMENTO GLOBALE UI (18px) ---
        document.documentElement.style.fontSize = "18px";
        
        // Cambio visualizzazione: da Login ad App
        document.getElementById('login-wrap').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        
        // Update Info Utente in alto
        const userInfo = document.getElementById('user-info');
        if(userInfo) {
            userInfo.innerText = `👤 ${userRow.name} (${userRow.role.toUpperCase()})`;
            userInfo.style.fontWeight = "bold";
            if(userRow.role === 'admin') userInfo.style.color = "#dc2626";
        }

        // Caricamento Dashboard iniziale
        loadPage('dashboard');

    } catch (err) {
        errDiv.innerText = "⚠️ " + err.message;
        errDiv.style.display = 'block';
    }
});
/* ============================================================
   SEZIONE: STAFF (Anagrafica Utenti / Personale)
   ============================================================ */

/**
 * Template HTML per la gestione dell'anagrafica Staff
 */
function templateStaff() {
    return `
    <div class="card">
        <div class="header" style="display:flex; justify-content:space-between; align-items:center;">
            <h2>ANAGRAFICA STAFF</h2>
            <button class="btn" id="btn-add-staff">+ Nuovo Utente</button>
        </div>
        <p style="font-size: 0.9rem; color: #666; margin: 15px 0; background: #f8fafc; padding: 12px; border-radius: 6px; border-left: 4px solid #2563eb;">
            Pannello di gestione personale. Gli <strong>Admin</strong> e i <strong>Manager</strong> hanno visibilità totale. 
            I tecnici sono vincolati alla società di appartenenza.
        </p>
        <div class="table-container">
            <table style="width:100%; border-collapse:collapse;">
                <thead>
                    <tr style="text-align:left; background:#f1f5f9; border-bottom:2px solid #e2e8f0;">
                        <th style="padding:12px;">Nome</th>
                        <th style="padding:12px;">Username / Email</th>
                        <th style="padding:12px;">Ruolo / Società</th>
                        <th style="padding:12px; text-align:right">Azioni</th>
                    </tr>
                </thead>
                <tbody id="list-staff">
                    <tr><td colspan="4" style="text-align:center; padding:20px;">Caricamento in corso...</td></tr>
                </tbody>
            </table>
        </div>
    </div>`;
}

/**
 * Inizializza la lista Staff con logica Admin (vede tutti)
 */
async function initStaff() {
    const tbody = document.getElementById('list-staff');
    if (!tbody) return;

    // L'Admin carica tutto tranne l'account 'admin' primario
    let { data, error } = await client
        .from('users')
        .select('*, societies(name)')
        .neq('username', 'admin')
        .order('name');

    if (error) {
        tbody.innerHTML = `<tr><td colspan="4" style="color:red;">Errore: ${error.message}</td></tr>`;
        return;
    }

    tbody.innerHTML = data?.map(u => `
        <tr style="border-bottom: 1px solid #edf2f7;">
            <td style="padding:12px;"><strong>${u.name}</strong></td>
            <td style="padding:12px;">${u.username}<br><small style="color:#64748b">${u.email}</small></td>
            <td style="padding:12px;">
                <span class="badge" style="background:#e2e8f0; color:#1e293b; font-size:0.75rem;">${u.role.toUpperCase()}</span><br>
                <small>${u.societies?.name || '<em>Accesso Globale</em>'}</small>
            </td>
            <td style="padding:12px; text-align:right">
                <button class="btn-sm btn-warning" onclick="handleEditStaff('${u.id}')">✏️</button>
                <button class="btn-sm btn-danger" onclick="handleDeleteStaff('${u.id}')">🗑️</button>
            </td>
        </tr>
    `).join('') || '<tr><td colspan="4" style="text-align:center; padding:20px;">Nessun utente trovato.</td></tr>';

    document.getElementById('btn-add-staff').onclick = () => openStaffModal();
}

/**
 * Modale per Inserimento/Modifica Staff
 */
async function openStaffModal(editData = null) {
    const isEdit = !!editData;
    
    // Carichiamo le società per permettere all'admin di assegnare l'utente
    const { data: societies } = await client.from('societies').select('id, name').order('name');

    modal.open(isEdit ? 'Modifica Staff' : 'Nuovo Utente Staff', `
        <div style="display:grid; gap:15px; margin-top:10px;">
            <div>
                <label>Nome Completo</label>
                <input type="text" id="st-name" value="${editData?.name || ''}" placeholder="es. Mario Rossi">
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <div>
                    <label>Username</label>
                    <input type="text" id="st-user" value="${editData?.username || ''}" placeholder="m.rossi">
                </div>
                <div>
                    <label>Email</label>
                    <input type="email" id="st-email" value="${editData?.email || ''}" placeholder="mario@esempio.it">
                </div>
            </div>
            <div>
                <label>Ruolo Sistema</label>
                <select id="st-role">
                    <option value="tecnico" ${editData?.role === 'tecnico' ? 'selected' : ''}>Tecnico / Allenatore</option>
                    <option value="manager" ${editData?.role === 'manager' ? 'selected' : ''}>Manager (Sistema)</option>
                    <option value="admin" ${editData?.role === 'admin' ? 'selected' : ''}>Admin</option>
                </select>
            </div>
            <div>
                <label>Società di Appartenenza</label>
                <select id="st-soc">
                    <option value="">-- Nessuna (Accesso Globale) --</option>
                    ${societies?.map(s => `<option value="${s.id}" ${editData?.society_id === s.id ? 'selected' : ''}>${s.name}</option>`).join('')}
                </select>
            </div>
        </div>
    `);

    document.getElementById('btn-modal-save').onclick = async () => {
        const payload = {
            name: document.getElementById('st-name').value.trim(),
            username: document.getElementById('st-user').value.trim().toLowerCase(),
            email: document.getElementById('st-email').value.trim(),
            role: document.getElementById('st-role').value,
            society_id: document.getElementById('st-soc').value || null
        };

        if(!payload.name || !payload.username || !payload.email) return alert("Compila i campi obbligatori!");

        const { error } = isEdit 
            ? await client.from('users').update(payload).eq('id', editData.id)
            : await client.from('users').insert(payload);

        if (!error) {
            modal.close();
            initStaff();
        } else {
            alert("Errore nel salvataggio: " + error.message);
        }
    };
}

/* --- FUNZIONI WINDOW --- */
window.handleEditStaff = async function(id) {
    const { data } = await client.from('users').select('*').eq('id', id).single();
    if (data) openStaffModal(data);
};

window.handleDeleteStaff = async function(id) {
    if (confirm("Eliminare definitivamente questo utente?")) {
        const { error } = await client.from('users').delete().eq('id', id);
        if (!error) initStaff();
    }
};
/* [QUI AGGIUNGEREMO LE FUNZIONI PER SPORT, SOCIETÀ, ECC. UNA ALLA VOLTA] */

</script>
</body>
</html>
