// ── Activity Types CRUD ────────────────────────────────────
function saveActivityTypes() {
  const current = getActivityTypesMap();
  const updated = {};
  Object.keys(current).forEach(k => {
    const emoji  = document.getElementById('act-emoji-'+k)?.value.trim() || current[k].emoji;
    const label  = document.getElementById('act-label-'+k)?.value.trim() || current[k].label;
    const color  = document.getElementById('act-color-'+k)?.value || current[k].color;
    updated[k] = { label, emoji, color, cls: 'act-'+k };
  });
  S.activityTypes = updated;
  saveState();
  buildAdminConfigTab('activities');
  toast('Tipi di attività salvati ✅', 'success');
}

function addActivityType() {
  const key   = document.getElementById('new-act-key').value.trim().toUpperCase().replace(/\s/g,'');
  const emoji = document.getElementById('new-act-emoji').value.trim() || '📋';
  const label = document.getElementById('new-act-label').value.trim();
  const color = document.getElementById('new-act-color').value;
  if (!key || !label) { toast('Chiave e nome obbligatori','error'); return; }
  const current = getActivityTypesMap();
  if (current[key]) { toast('Chiave già esistente','error'); return; }
  if (!S.activityTypes) S.activityTypes = { ...ACTIVITY_TYPES_DEFAULT };
  else if (Object.keys(S.activityTypes).length === 0) S.activityTypes = { ...ACTIVITY_TYPES_DEFAULT };
  S.activityTypes[key] = { label, emoji, color, cls: 'act-'+key };
  saveState();
  buildAdminConfigTab('activities');
  toast('Tipo attività "'+label+'" aggiunto ✅', 'success');
}

function deleteActivityType(key) {
  if (!confirm('Eliminare il tipo "'+key+'"? Le sessioni già create non verranno modificate.')) return;
  if (!S.activityTypes) S.activityTypes = { ...ACTIVITY_TYPES_DEFAULT };
  delete S.activityTypes[key];
  saveState();
  buildAdminConfigTab('activities');
  toast('Tipo eliminato', 'success');
}

function resetActivityTypes() {
  if (!confirm('Ripristinare i tipi di attività predefiniti?')) return;
  S.activityTypes = null;
  saveState();
  buildAdminConfigTab('activities');
  toast('Tipi ripristinati ai default');
}

// ── Performance Params CRUD ───────────────────────────────
function savePerfParams() {
  const current = getPerfParams().map(normPerfParam);
  const updated = current.map(({key}) => {
    const label = document.getElementById('perf-label-'+key)?.value.trim() || key;
    return { key, label };
  });
  S.perfParams = updated;
  saveState();
  buildAdminConfigTab('activities');
  toast('Parametri performance salvati ✅', 'success');
}

function addPerfParam() {
  const key   = document.getElementById('new-perf-key').value.trim().toLowerCase().replace(/\s/g,'_');
  const label = document.getElementById('new-perf-label').value.trim();
  if (!key || !label) { toast('Chiave e etichetta obbligatorie','error'); return; }
  const current = getPerfParams().map(normPerfParam);
  if (current.some(p => p.key === key)) { toast('Parametro già esistente','error'); return; }
  if (!S.perfParams) S.perfParams = PERF_PARAMS_DEFAULT.map(k => ({ key:k, label:PERF_LABELS_DEFAULT[k]||k }));
  S.perfParams.push({ key, label });
  saveState();
  buildAdminConfigTab('activities');
  toast('Parametro "'+label+'" aggiunto ✅', 'success');
}

function deletePerfParam(key) {
  if (!confirm('Eliminare il parametro "'+key+'"? I dati già registrati non verranno modificati.')) return;
  const current = getPerfParams().map(normPerfParam);
  S.perfParams = current.filter(p => p.key !== key);
  saveState();
  buildAdminConfigTab('activities');
  toast('Parametro eliminato');
}

function resetPerfParams() {
  if (!confirm('Ripristinare i parametri performance predefiniti?')) return;
  S.perfParams = null;
  saveState();
  buildAdminConfigTab('activities');
  toast('Parametri ripristinati ai default');
}



// ── Gestione user_category_seasons ───────────────────────────
async function saveUserCategorySeason(entry) {
  if (!S.userCategorySeasons) S.userCategorySeasons = [];
  const existing = S.userCategorySeasons.find(x=>x.id===entry.id);
  if (existing) Object.assign(existing, entry);
  else S.userCategorySeasons.push(entry);
  saveState();
  await dbUpsert('user_category_seasons', {
    id:          entry.id,
    user_id:     entry.userId,
    society_id:  entry.societyId||null,
    category_id: entry.categoryId,
    team_id:     entry.teamId||null,
    season_id:   entry.seasonId,
    role:        entry.role,
  });
}

async function deleteUserCategorySeason(id) {
  S.userCategorySeasons = (S.userCategorySeasons||[]).filter(x=>x.id!==id);
  saveState();
  await dbDelete('user_category_seasons', id);
}

// ── Gestione team_category_season ────────────────────────────
async function saveTeamCategorySeason(teamId, categoryId, seasonId) {
  if (!S.teamCategorySeasons) S.teamCategorySeasons = [];
  const existing = S.teamCategorySeasons.find(x=>
    x.teamId===teamId && x.categoryId===categoryId && x.seasonId===seasonId
  );
  if (existing) return existing;
  const entry = { id: uid(), teamId, categoryId, seasonId };
  S.teamCategorySeasons.push(entry);
  saveState();
  await dbUpsert('team_category_season', {
    id: entry.id, team_id: teamId, category_id: categoryId, season_id: seasonId,
  });
  return entry;
}

function openSeasonDetail(seasonId) {
  const seas = S.seasons.find(s=>s.id===seasonId);
  if (!seas) return;

  const athletes = [
    ...(S.athleteTeamSeasons||[]).filter(r=>r.seasonId===seasonId),
    ...(S.athleteSeasons||[]).filter(r=>r.seasonId===seasonId),
  ].reduce((map, r) => { map.set(r.athleteId, r); return map; }, new Map());

  const staff = (S.userCategorySeasons||[]).filter(r=>r.seasonId===seasonId);
  const teams = (S.teamCategorySeasons||[]).filter(r=>r.seasonId===seasonId);

  const athRows = [...athletes.values()].map(r => {
    const ath  = S.athletes.find(a=>a.id===r.athleteId);
    const cat  = S.categories.find(c=>c.id===r.categoryId);
    const team = S.teams.find(t=>t.id===r.teamId);
    const name = ath ? ((ath.firstName||ath.name||'') + ' ' + (ath.lastName||ath.surname||'')).trim() : '—';
    return `<tr>
      <td class="fw-700">${esc(name)}</td>
      <td>${esc(cat?.name||'—')}</td>
      <td>${esc(team?.name||'—')}</td>
      <td>${esc(r.role||r.jerseyNumber&&('#'+r.jerseyNumber)||'—')}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="4" class="text-muted">Nessun atleta</td></tr>';

  const staffRows = staff.map(r => {
    const u   = S.users.find(x=>x.id===r.userId);
    const cat = S.categories.find(c=>c.id===r.categoryId);
    return `<tr>
      <td class="fw-700">${esc(u?.name||'—')}</td>
      <td><span class="badge badge-blue">${esc(r.role||'—')}</span></td>
      <td>${esc(cat?.name||'—')}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="3" class="text-muted">Nessuno staff</td></tr>';

  openModal(`
    <div class="modal-header">
      <h3>⚽ ${esc(seas.name)}</h3>
      <div style="font-size:.85rem;color:var(--muted)">${seas.startDate||''} → ${seas.endDate||''}</div>
    </div>

    <div class="grid-2" style="gap:16px">
      <div>
        <div style="font-weight:700;margin-bottom:8px">👥 Atleti iscritti (${athletes.size})</div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Atleta</th><th>Categoria</th><th>Squadra</th><th>Ruolo/#</th></tr></thead>
            <tbody>${athRows}</tbody>
          </table>
        </div>
      </div>
      <div>
        <div style="font-weight:700;margin-bottom:8px">🎽 Staff (${staff.length})</div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Nome</th><th>Ruolo</th><th>Categoria</th></tr></thead>
            <tbody>${staffRows}</tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="form-actions" style="margin-top:16px">
      <button class="btn btn-accent" onclick="setSeasonActive('${seasonId}');closeModal()">⚡ Imposta come Attiva</button>
      <button class="btn btn-ghost" onclick="closeModal()">Chiudi</button>
    </div>
  `, { wide: true });
}

function buildSeasonsConfig() {
  const seasons = (S.seasons||[]).slice().sort((a,b)=>
    (b.startDate||b.startYear||'') > (a.startDate||a.startYear||'') ? 1 : -1
  );

  const rowsHtml = seasons.map(s => {
    // Conta atleti iscritti dalla stagione (athlete_team_seasons + athlete_seasons)
    const enrolled = [
      ...(S.athleteTeamSeasons||[]).filter(r=>r.seasonId===s.id),
      ...(S.athleteSeasons||[]).filter(r=>r.seasonId===s.id),
    ].reduce((acc, r) => { acc.add(r.athleteId); return acc; }, new Set()).size;

    // Conta sessioni con season_id diretto o per data
    const sessCnt = S.sessions.filter(sess => {
      if (sess.seasonId) return sess.seasonId === s.id;
      const { start, end } = getSeasonDates(s);
      return (sess.date||sess.session_date||'') >= start && (sess.date||sess.session_date||'') <= end;
    }).length;

    // Conta staff (user_category_seasons)
    const staffCnt = (S.userCategorySeasons||[]).filter(r=>r.seasonId===s.id).length;

    const isActive = s.isActive || s.active || s.id===S.activeSeason;
    const statusBadge = isActive
      ? '<span class="badge" style="background:var(--c2);color:#fff">★ Attiva</span>'
      : '<span class="badge badge-gray">Archivio</span>';

    return `<tr>
      <td class="fw-700" style="font-size:1rem">${esc(s.name)}</td>
      <td>${s.startDate||s.startYear||'—'}</td>
      <td>${s.endDate||s.endYear||'—'}</td>
      <td>${statusBadge}</td>
      <td>${enrolled}</td>
      <td>${sessCnt}</td>
      <td>${staffCnt}</td>
      <td style="display:flex;gap:4px;flex-wrap:wrap">
        ${!isActive?`<button class="btn btn-ghost btn-sm" onclick="setSeasonActive('${s.id}')">⚡ Attiva</button>`:''}
        <button class="btn btn-ghost btn-sm" onclick="openSeasonDetail('${s.id}')">📋 Dettaglio</button>
        ${!isActive?`<button class="btn btn-danger btn-sm" onclick="deleteSeason('${s.id}')">🗑️</button>`:''}
      </td>
    </tr>`;
  }).join('');

  return `
    <div class="card">
      <div class="card-title" style="justify-content:space-between">
        <div style="display:flex;align-items:center;gap:8px">
          <div class="icon" style="background:var(--accent-l);color:var(--accent)">⚽</div>
          Stagioni Calcistiche
        </div>
        <button class="btn btn-accent btn-sm" onclick="openNewSeasonModal()">+ Nuova Stagione</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Stagione</th><th>Inizio</th><th>Fine</th><th>Stato</th>
            <th>Atleti</th><th>Sessioni</th><th>Staff</th><th>Azioni</th>
          </tr></thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      </div>
    </div>`;
}

    <div class="form-row">

        <input id="ns-end" type="date" value="${thisYear+1}-06-30">
      </div>

async function addSeasonFromConfig() {
  const name  = document.getElementById('ns-name')?.value.trim()
              || document.getElementById('cfg-seas-start')?.value + '/' + document.getElementById('cfg-seas-end')?.value;
  const start = document.getElementById('ns-start')?.value
              || (document.getElementById('cfg-seas-start')?.value + '-07-01');
  const end   = document.getElementById('ns-end')?.value
              || (document.getElementById('cfg-seas-end')?.value + '-06-30');

  if (!name || !start || !end) { toast('Compila tutti i campi','error'); return; }
  if (end <= start) { toast('La data fine deve essere dopo quella di inizio','error'); return; }
  if ((S.seasons||[]).some(s => s.name===name)) { toast('Stagione già esistente','error'); return; }

  const newId = uid();
  const newSeason = {
    id: newId, name,
    startDate: start, endDate: end,
    isActive: false, active: false,
    // Compatibilità locale
    startYear: parseInt((start||'2000-01-01').slice(0,4)),
    endYear:   parseInt((end||'2001-01-01').slice(0,4)),
  };
  if (!S.seasons) S.seasons = [];
  S.seasons.push(newSeason);
  saveState();
  // Salva nel DB
  await dbUpsert('seasons', { id: newId, name, start_date: start, end_date: end, is_active: false });
  rebuildSeasonSelector();
  buildAdminConfigTab('seasons');
  closeModal();
  toast('Stagione ' + name + ' creata ✅','success');
}

function renderAthleteTable(athletes) {
  const tbody = document.getElementById('ath-tbody');
  if (!tbody) return;
  const sessions = getCategorySessions(selectedCategoryId);
  tbody.innerHTML = athletes.map(ath => {
    const atts = getAthleteAttendances(ath.id);
    const sessAtts = atts.filter(a => sessions.some(s=>s.id===a.sessionId));
    const pres = sessAtts.filter(a=>a.status==='P').length;
    const pr = pct(pres, sessions.length);
    const perf = getAthleteAvgPerf(ath.id);
    const pBadge = (v) => v > 0 ? `<div class="stars" style="justify-content:center">${[1,2,3,4,5].map(i=>`<span style="color:${i<=Math.round(v)?'var(--gold)':'var(--mist-3)'}">★</span>`).join('')}</div>` : '<span class="text-muted">—</span>';
    return `<tr>
      <td class="fw-700" style="font-family:var(--font-mono)">${ath.number||'—'}</td>
      <td>
        <div style="display:flex;align-items:center;gap:8px;cursor:pointer" onclick="openAthleteProfile('${ath.id}')">
          ${athleteAvatar(ath, 32)}
          <div><div class="fw-600">${esc(ath.lastName)} ${esc(ath.firstName)}</div></div>
        </div>
      </td>
      <td>${ath.teamId ? `<span class="badge badge-gray" style="font-size:.73rem">${esc(S.teams.find(t=>t.id===ath.teamId)?.name||'—')}</span>` : '<span class="text-muted text-sm">—</span>'}</td>
      <td>${fmtDate(ath.dob)}</td>
      <td>${esc(ath.role||'—')}</td>
      <td class="fw-700">${pres}/${sessions.length}</td>
      <td>${ratingBadge(pr)} <span class="fw-700 text-sm">${pr}%</span></td>
      <td>${pBadge(perf.tecnica)}</td>
      <td>${pBadge(perf.fisico)}</td>
      <td>${pBadge(perf.tattica)}</td>
      <td>${pBadge(perf.mentale)}</td>
      <td>${pBadge(perf.comunicazione)}</td>
      <td style="max-width:120px" class="text-sm text-muted truncate">${esc(ath.notes||'—')}</td>
      <td style="display:flex;gap:4px;flex-wrap:wrap">
        <button class="btn btn-ghost btn-sm" onclick="openAthleteProfile('${ath.id}')">👤</button>
        ${canEdit(selectedCategoryId)?`<button class="btn btn-ghost btn-sm" onclick="openAthleteModal('${ath.id}')">✏️</button>`:''}
        ${canEdit(selectedCategoryId)?`<button class="btn btn-danger btn-sm" onclick="deleteAthlete('${ath.id}')">🗑️</button>`:''}
      </td>
    </tr>`;
  }).join('');
  if (!athletes.length) tbody.innerHTML = `<tr><td colspan="13"><div class="empty-state"><div class="icon">👥</div><h3>Nessun atleta</h3><p>Aggiungi il primo atleta al roster.</p>${canEdit(selectedCategoryId)?`<button class="btn btn-accent" onclick="openAthleteModal()">+ Aggiungi Atleta</button>`:''}</div></td></tr>`;
}
function filterAthletes() {
  const q          = (document.getElementById('ath-search')?.value||'').toLowerCase();
  const sort       = document.getElementById('ath-sort')?.value||'name';
  const teamFilter = document.getElementById('ath-team-filter')?.value||'';
  const seas       = getActiveSeason();
  let athletes = getCategoryAthletesForSeason(selectedCategoryId, seas?.id)
    .filter(a => (a.firstName+' '+a.lastName+' '+(a.role||'')+' '+(a.nickname||'')).toLowerCase().includes(q));
  if (teamFilter) athletes = athletes.filter(a => (a.teamId||'')===teamFilter);
  if (sort==='number') athletes.sort((a,b)=>(a.number||0)-(b.number||0));
  else if (sort==='team') athletes.sort((a,b)=>(S.teams.find(t=>t.id===a.teamId)?.name||'').localeCompare(S.teams.find(t=>t.id===b.teamId)?.name||''));
  else if (sort==='pres') athletes.sort((a,b)=>getAthletePresenceRate(b.id,selectedCategoryId)-getAthletePresenceRate(a.id,selectedCategoryId));
  else athletes.sort((a,b)=>(a.lastName||'').localeCompare(b.lastName||''));
  renderAthleteTable(athletes);
}
function openAthleteModal(id) {
  const a = id ? S.athletes.find(x=>x.id===id) : null;
  const catId = a?.categoryId || selectedCategoryId || '';

  openModal(buildAthleteModalHtml(id, catId, a), 'modal-lg');
}

async function saveAthlete(id) {
  const firstName  = document.getElementById('ath-fname').value.trim();
  const lastName   = document.getElementById('ath-lname').value.trim();
  const categoryId = document.getElementById('ath-cat')?.value || selectedCategoryId || '';
  const teamId     = document.getElementById('ns-team')?.value || document.getElementById('ath-team')?.value || '';

  if (!firstName||!lastName) { toast('Nome e cognome obbligatori','error'); return; }
  if (!categoryId) { toast('Seleziona una categoria','error'); return; }

  const cat    = S.categories.find(c=>c.id===categoryId);
  const socId  = cat?.societyId || null;
  const dob    = document.getElementById('ath-dob')?.value || '';
  const num    = parseInt(document.getElementById('ath-num')?.value)||null;
  const role   = document.getElementById('ath-role')?.value?.trim() || '';
  const nick   = document.getElementById('ath-nick')?.value?.trim() || '';
  const notes  = document.getElementById('ath-notes')?.value?.trim() || '';
  const parentIds = Array.from(document.querySelectorAll('#parent-checkboxes input:checked')).map(cb=>cb.value);

  // Dati anagrafici puri (athletes)
  const athData = {
    firstName, lastName,
    name: firstName, surname: lastName,   // colonne DB reale
    dob, nickname: nick, notes, parentIds,
    societyId: socId,
    // Legacy (per compatibilità con codice esistente)
    categoryId, teamId: teamId||null, number: num, role,
  };

  let savedId = id;
  if (id) {
    const existing = S.athletes.find(x=>x.id===id);
    if (!existing) { toast('Atleta non trovato','error'); return; }
    Object.assign(existing, athData);
    toast('Atleta aggiornato ✅','success');
  } else {
    savedId = uid();
    S.athletes.push({ id: savedId, ...athData });
    toast('Atleta aggiunto ✅','success');
  }

  saveState();

  // Salva anagrafica nel DB (solo campi della tabella athletes)
  await dbUpsert('athletes', {
    id:         savedId,
    name:       firstName,
    surname:    lastName,
    born_date:  dob || null,
    society_id: socId,
  });

  // Crea/aggiorna iscrizione stagionale automaticamente
  const seasId = S.activeSeason;
  if (seasId && categoryId) {
    const existATS = (S.athleteTeamSeasons||[]).find(r =>
      r.athleteId===savedId && r.seasonId===seasId && r.categoryId===categoryId
    );
    const atsEntry = existATS
      ? Object.assign(existATS, { teamId: teamId||null, role, jerseyNumber: num })
      : { id: uid(), athleteId: savedId, seasonId: seasId, categoryId,
          teamId: teamId||null, societyId: socId, role, jerseyNumber: num, nickname: nick };
    if (!existATS) { if(!S.athleteTeamSeasons) S.athleteTeamSeasons=[]; S.athleteTeamSeasons.push(atsEntry); }
    // Sync athleteSeasons
    S.athleteSeasons = S.athleteTeamSeasons.map(r=>({
      id: r.id, athleteId: r.athleteId, categoryId: r.categoryId,
      teamId: r.teamId, seasonId: r.seasonId,
      shirtNumber: r.jerseyNumber, role: r.role, notes: '',
    }));
    saveState();
    await dbUpsert('athlete_team_seasons', {
      id: atsEntry.id, athlete_id: savedId, season_id: seasId,
      category_id: categoryId, team_id: teamId||null,
      society_id: socId, role, jersey_number: num, nickname: nick||'',
    });
  }

  closeModal();
  if (currentView==='admin-athletes') showView('admin-athletes');
  else if (categoryId !== selectedCategoryId) { selectedCategoryId=categoryId; showView('athletes'); }
  else showView('athletes');
}
function deleteAthlete(id) {

  S.athletes = S.athletes.filter(x=>x.id!==id);

async function createSession() {
  const date    = document.getElementById('sess-date').value;
  const type    = document.getElementById('sess-type').value;
  const notes   = document.getElementById('sess-notes').value.trim();
  const catId   = document.getElementById('ns-cat')?.value || selectedCategoryId || '';
  const teamId  = document.getElementById('ns-team')?.value || '';
  const seasId  = S.activeSeason;
  if (!date) { toast('Data obbligatoria','error'); return; }
  if (!catId) { toast('Seleziona una categoria','error'); return; }
  if (!canEditSessions(catId)) { toast('Non hai i permessi','error'); return; }

  // Ricava societyId dalla categoria
  const cat = S.categories.find(c=>c.id===catId);
  const socId = cat?.societyId || null;

  const newId = uid();
  const sess = {
    id: newId, categoryId: catId, teamId: teamId||null,
    seasonId: seasId, societyId: socId,
    date, type, notes, title: type||'Allenamento',
    createdBy: currentUser.id
  };
  S.sessions.push(sess);

  // Sync filter state
  if (!window._sessState) window._sessState = {};
  window._sessState.catId = catId;
  window._sessState.type  = type;
  if (catId !== selectedCategoryId) { selectedCategoryId = catId; buildSidebarNav(); }
  saveState();

  // Salva nel DB reale
  await dbUpsert('sessions', {
    id:          newId,
    title:       type||'Allenamento',
    session_date: date,
    category_id: catId,
    team_id:     teamId||null,
    season_id:   seasId||null,
    society_id:  socId||null,
    notes,
  });

  closeModal();
  toast('Sessione creata ✅','success');
  openSessionEdit(sess.id);
}
async function deleteSession(id) {
  if (!confirm('Eliminare questa sessione e tutte le presenze?')) return;
  S.sessions = S.sessions.filter(x=>x.id!==id);
  S.attendances = S.attendances.filter(x=>x.sessionId!==id);
  await dbDelete('sessions', id);
  saveState(); renderSessionsList(); toast('Sessione eliminata');
}

// Clean click handler using data attributes — avoids nested template literal issues
function attClick(btn) {
  if (btn.disabled) return;
  const sessId = btn.dataset.sessid;
  const athId  = btn.dataset.athid;
  const st     = btn.dataset.st;
  setAttStatus(sessId, athId, st);
}

async function setAttStatus(sessId, athleteId, status) {
  let att = S.attendances.find(a => a.sessionId===sessId && a.athleteId===athleteId);
  const isNew = !att;
  if (!att) {
    att = { id: uid(), sessionId: sessId, athleteId, status,
            perf: { tecnica:0, fisico:0, tattica:0, mentale:0, comunicazione:0 }, notes: '' };
    S.attendances.push(att);
  } else {
    att.status = status;
  }
  saveState();
  // Salva nel DB reale: attendances(id, session_id, athlete_id, status)
  dbUpsert('attendances', {
    id:         att.id,
    session_id: sessId,
    athlete_id: athleteId,
    status:     status,
  });
  // update UI
  ['P','A','G'].forEach(s => {
    const btn = document.getElementById(`btn-${s}-${athleteId}`);
    if (btn) { btn.className = `att-cell ${s===status?`att-${s}`:'att-empty'}`; }
  });
  const perfSec = document.getElementById(`perf-section-${athleteId}`);
  if (perfSec) perfSec.style.display = status==='P' ? 'block' : 'none';
}
function setStarPerf(star) {
  const v = parseInt(star.dataset.v);
  const p = star.dataset.param;
  const aid = star.dataset.aid;
  const sessId = star.dataset.sessid;
  let att = S.attendances.find(a => a.sessionId===sessId && a.athleteId===aid);
  if (!att) return;
  if (!att.perf) att.perf = {};
  att.perf[p] = v;
  saveState();
  const stars = document.querySelectorAll(`#stars-${aid}-${p} .star`);
  stars.forEach((s,i) => s.classList.toggle('on', i<v));
}
function setAttNote(sessId, athleteId, val) {
  const att = S.attendances.find(a => a.sessionId===sessId && a.athleteId===athleteId);
  if (att) { att.notes = val; saveState(); }
}
function markAll(sessId, status) {
  const athletes = getCategoryAthletes(selectedCategoryId);
  athletes.forEach(ath => setAttStatus(sessId, ath.id, status));
  toast(`Tutti segnati: ${STATUS_LABELS[status]}`, 'success');
}

  return `<table>

      const teamName = a.teamId ? S.teams.find(t=>t.id===a.teamId)?.name||'—' : '—';
      return `<tr>
        <td style="cursor:pointer" onclick="openAthleteProfile('${a.id}')">

        ${_multiT && _noTeamFilter ? `<td><span class="badge badge-gray" style="font-size:.72rem">${esc(teamName)}</span></td>` : ''}
        <td>${ratingBadge(pr)} <span class="fw-700">${pr}%</span></td>
        ${getPerfParams().map(normPerfParam).map(({key})=>`<td>${stars(perf[key]||0)}</td>`).join('')}
        <td>${stars(perf.overall)}</td>
        <td><button class="btn btn-ghost btn-sm" onclick="openAthleteProfile('${a.id}')">Profilo</button></td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;

// ══════════════════════════════════════════════════════════════════
//  BACKUP & RESTORE
// ══════════════════════════════════════════════════════════════════
function exportBackupJSON() {
  const data = JSON.stringify(S, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `backup_sporttrack_${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('✅ Backup esportato con successo', 'success');
}

function importBackupJSON(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const parsed = JSON.parse(e.target.result);
      // Basic validation
      if (!parsed.users || !parsed.athletes === undefined) {
        toast('❌ File non valido: struttura non riconosciuta', 'error');
        return;
      }
      if (!confirm('⚠️ Vuoi sovrascrivere tutti i dati attuali con il backup? L\'operazione non è reversibile.')) {
        input.value = '';
        return;
      }
      S = parsed;
      saveState();
      toast('✅ Backup ripristinato con successo! Ricaricamento...', 'success');
      setTimeout(() => location.reload(), 1500);
    } catch(err) {
      toast('❌ Errore nella lettura del file JSON', 'error');
    }
    input.value = '';
  };
  reader.readAsText(file);
}

// ══════════════════════════════════════════════════════════════════
//  EXCEL EXPORT ENGINE (pure JS, no dependency)
//  Generates real .xlsx files using Open XML format
// ══════════════════════════════════════════════════════════════════

// Minimal XLSX writer — produces valid .xlsx without external libraries
const XLSXWriter = {
  // Escape XML special chars
  xmlEsc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  },

  // Convert column index (0-based) to letter(s)
  colLetter(n) {
    let s = '';
    n++;
    while (n > 0) { s = String.fromCharCode(65 + (n-1)%26) + s; n = Math.floor((n-1)/26); }
    return s;
  },

  // Cell reference
  ref(row, col) { return this.colLetter(col) + row; },

  // Build shared strings table
  buildSST(sheets) {
    const strs = new Map();
    let idx = 0;
    sheets.forEach(sh => sh.rows.forEach(row => row.forEach(cell => {
      if (cell.t === 's' && !strs.has(cell.v)) strs.set(cell.v, idx++);
    })));
    return strs;
  },

  // Cell XML
  cellXML(ref, cell, sst) {
    if (cell.v === null || cell.v === undefined || cell.v === '') return '';
    const s = cell.s || 0;
    if (cell.t === 's') {
      const si = sst.get(cell.v);
      return `<c r="${ref}" t="s" s="${s}"><v>${si}</v></c>`;
    }
    if (cell.t === 'p') { // percent
      const num = typeof cell.v === 'number' ? cell.v : parseFloat(cell.v)||0;
      return `<c r="${ref}" s="${s}"><v>${num/100}</v></c>`;
    }
    // number
    const num = typeof cell.v === 'number' ? cell.v : parseFloat(cell.v)||0;
    return `<c r="${ref}" s="${s}"><v>${num}</v></c>`;
  },

  // Build worksheet XML
  buildWorksheet(sheet, sst) {
    const rows = sheet.rows;
    let xml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">`;

    // Column widths
    if (sheet.colWidths) {
      xml += '<cols>';
      sheet.colWidths.forEach((w,i) => {
        if (w) xml += `<col min="${i+1}" max="${i+1}" width="${w}" customWidth="1"/>`;
      });
      xml += '</cols>';
    }

    xml += '<sheetData>';
    rows.forEach((row, ri) => {
      const rn = ri + 1;
      const ht = sheet.rowHeights?.[ri] || '';
      xml += `<row r="${rn}"${ht ? ` ht="${ht}" customHeight="1"` : ''}>`;
      row.forEach((cell, ci) => {
        const ref = this.ref(rn, ci);
        xml += this.cellXML(ref, cell, sst);
      });
      xml += '</row>';
    });
    xml += '</sheetData></worksheet>';
    return xml;
  },

  // Styles XML — define fills, fonts, borders, xfs
  buildStyles() {
    return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">
  <fonts>
    <font><sz val="10"/><name val="Calibri"/></font>
    <font><b/><sz val="10"/><name val="Calibri"/></font>
    <font><b/><sz val="11"/><name val="Calibri"/><color rgb="FFFFFFFF"/></font>
    <font><sz val="10"/><name val="Calibri"/><color rgb="FF1A56DB"/></font>
    <font><sz val="10"/><name val="Calibri"/><color rgb="FF059669"/></font>
    <font><sz val="10"/><name val="Calibri"/><color rgb="FFDC2626"/></font>
    <font><b/><sz val="10"/><name val="Calibri"/><color rgb="FF1A56DB"/></font>
    <font><b/><sz val="12"/><name val="Calibri"/><color rgb="FFFFFFFF"/></font>
  </fonts>
  <fills>
    <fill><patternFill patternType="none"/></fill>
    <fill><patternFill patternType="gray125"/></fill>
    <fill><patternFill patternType="solid"><fgColor rgb="FF1A3A5C"/></patternFill></fill>
    <fill><patternFill patternType="solid"><fgColor rgb="FFD6E4F0"/></patternFill></fill>
    <fill><patternFill patternType="solid"><fgColor rgb="FFEAF2FF"/></patternFill></fill>
    <fill><patternFill patternType="solid"><fgColor rgb="FFD1FAE5"/></patternFill></fill>
    <fill><patternFill patternType="solid"><fgColor rgb="FFFEE2E2"/></patternFill></fill>
    <fill><patternFill patternType="solid"><fgColor rgb="FFFFF3CD"/></patternFill></fill>
    <fill><patternFill patternType="solid"><fgColor rgb="FFE2E8F0"/></patternFill></fill>
    <fill><patternFill patternType="solid"><fgColor rgb="FF2C3E50"/></patternFill></fill>
  </fills>
  <borders><border><left/><right/><top/><bottom/><diagonal/></border>
    <border><left style="thin"><color auto="1"/></left><right style="thin"><color auto="1"/></right><top style="thin"><color auto="1"/></top><bottom style="thin"><color auto="1"/></bottom><diagonal/></border>
  </borders>
  <cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs>
  <cellXfs>
    <xf numFmtId="0" fontId="0" fillId="0" borderId="1" xfId="0"><alignment wrapText="0"/></xf>
    <xf numFmtId="0" fontId="1" fillId="2" borderId="1" xfId="0"><alignment horizontal="center"/></xf>
    <xf numFmtId="0" fontId="2" fillId="2" borderId="1" xfId="0"><alignment horizontal="center"/></xf>
    <xf numFmtId="0" fontId="1" fillId="8" borderId="1" xfId="0"><alignment horizontal="center"/></xf>
    <xf numFmtId="0" fontId="0" fillId="4" borderId="1" xfId="0"><alignment horizontal="center"/></xf>
    <xf numFmtId="0" fontId="4" fillId="5" borderId="1" xfId="0"><alignment horizontal="center"/></xf>
    <xf numFmtId="0" fontId="5" fillId="6" borderId="1" xfId="0"><alignment horizontal="center"/></xf>
    <xf numFmtId="0" fontId="0" fillId="7" borderId="1" xfId="0"><alignment horizontal="center"/></xf>
    <xf numFmtId="9" fontId="6" fillId="3" borderId="1" xfId="0"><alignment horizontal="center"/></xf>
    <xf numFmtId="9" fontId="0" fillId="4" borderId="1" xfId="0"><alignment horizontal="center"/></xf>
    <xf numFmtId="0" fontId="1" fillId="9" borderId="1" xfId="0"><alignment horizontal="center"/></xf>
    <xf numFmtId="0" fontId="7" fillId="9" borderId="1" xfId="0"><alignment horizontal="center"/></xf>
  </cellXfs>
</styleSheet>`;
  },

  // Generate ZIP-like .xlsx bytes using a simple approach
  // We'll base64 encode a pre-built minimal xlsx and inject our data
  // Actually we'll write real XML parts and zip them using JSZip-compatible manual approach

  // Simpler: write CSV-like format that Excel can open, but as proper xlsx using
  // the data URI approach with actual XML. We build the full zip manually.

  // Base64 encode string
  b64(str) {
    return btoa(unescape(encodeURIComponent(str)));
  },

  // Create xlsx as a Blob using manual ZIP construction
  // We implement a minimal ZIP writer
  createXLSX(sheets) {
    const sst = this.buildSST(sheets);

    // Build all XML parts
    const parts = {};

    // [Content_Types].xml
    let sheetRels = sheets.map((s,i)=>
      `<Override PartName="/xl/worksheets/sheet${i+1}.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>`
    ).join('');
    parts['[Content_Types].xml'] = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
<Default Extension="xml" ContentType="application/xml"/>
<Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>
<Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/>
<Override PartName="/xl/sharedStrings.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sharedStrings+xml"/>
${sheetRels}
</Types>`;

    // _rels/.rels
    parts['_rels/.rels'] = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/>
</Relationships>`;

    // xl/_rels/workbook.xml.rels
    let wbRels = sheets.map((s,i)=>
      `<Relationship Id="rId${i+1}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet${i+1}.xml"/>`
    ).join('');
    wbRels += `<Relationship Id="rId${sheets.length+1}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/sharedStrings" Target="sharedStrings.xml"/>`;
    wbRels += `<Relationship Id="rId${sheets.length+2}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>`;
    parts['xl/_rels/workbook.xml.rels'] = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">${wbRels}</Relationships>`;

    // xl/workbook.xml
    const sheetElems = sheets.map((s,i)=>
      `<sheet name="${this.xmlEsc(s.name)}" sheetId="${i+1}" r:id="rId${i+1}"/>`
    ).join('');
    parts['xl/workbook.xml'] = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
<sheets>${sheetElems}</sheets></workbook>`;

    // xl/styles.xml
    parts['xl/styles.xml'] = this.buildStyles();

    // xl/sharedStrings.xml
    const sstArr = Array.from(sst.keys());
    parts['xl/sharedStrings.xml'] = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<sst xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" count="${sstArr.length}" uniqueCount="${sstArr.length}">
${sstArr.map(s=>`<si><t xml:space="preserve">${this.xmlEsc(s)}</t></si>`).join('')}
</sst>`;

    // xl/worksheets/sheet*.xml
    sheets.forEach((sh, i) => {
      parts[`xl/worksheets/sheet${i+1}.xml`] = this.buildWorksheet(sh, sst);
    });

    // Build ZIP
    return this.buildZip(parts);
  },

  // Minimal ZIP builder (store, no compression — valid xlsx)
  buildZip(parts) {
    const encoder = new TextEncoder();
    const entries = [];
    const centralDir = [];
    let offset = 0;

    for (const [name, content] of Object.entries(parts)) {
      const nameBytes  = encoder.encode(name);
      const dataBytes  = encoder.encode(content);
      const crc        = this.crc32(dataBytes);
      const localHeader = this.localFileHeader(nameBytes, dataBytes.length, crc);
      entries.push(localHeader, dataBytes);
      centralDir.push(this.centralDirEntry(nameBytes, dataBytes.length, crc, offset));
      offset += localHeader.length + dataBytes.length;
    }

    const cdBytes  = this.concat(centralDir);
    const eocd     = this.endOfCentralDir(centralDir.length, cdBytes.length, offset);
    return new Blob([this.concat(entries), cdBytes, eocd], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  },

  concat(arrays) {
    const total = arrays.reduce((s,a)=>s+a.length,0);
    const out = new Uint8Array(total);
    let off = 0;
    arrays.forEach(a => { out.set(a, off); off += a.length; });
    return out;
  },

  le16(n) { return new Uint8Array([n&0xff,(n>>8)&0xff]); },
  le32(n) { return new Uint8Array([n&0xff,(n>>8)&0xff,(n>>16)&0xff,(n>>24)&0xff]); },

  localFileHeader(name, size, crc) {
    return this.concat([
      new Uint8Array([0x50,0x4b,0x03,0x04]), // sig
      this.le16(20),   // version needed
      this.le16(0),    // flags
      this.le16(0),    // compression (store)
      this.le16(0),    // mod time
      this.le16(0),    // mod date
      this.le32(crc),
      this.le32(size), // compressed
      this.le32(size), // uncompressed
      this.le16(name.length),
      this.le16(0),    // extra
      name
    ]);
  },

  centralDirEntry(name, size, crc, offset) {
    return this.concat([
      new Uint8Array([0x50,0x4b,0x01,0x02]),
      this.le16(20), this.le16(20), this.le16(0), this.le16(0),
      this.le16(0), this.le16(0),
      this.le32(crc), this.le32(size), this.le32(size),
      this.le16(name.length), this.le16(0), this.le16(0),
      this.le16(0), this.le16(0), this.le32(0),
      this.le32(offset), name
    ]);
  },

  endOfCentralDir(count, cdSize, cdOffset) {
    return this.concat([
      new Uint8Array([0x50,0x4b,0x05,0x06]),
      this.le16(0), this.le16(0),
      this.le16(count), this.le16(count),
      this.le32(cdSize), this.le32(cdOffset),
      this.le16(0)
    ]);
  },

  crc32(bytes) {
    let c = 0xFFFFFFFF;
    for (let i = 0; i < bytes.length; i++) {
      c ^= bytes[i];
      for (let j = 0; j < 8; j++) c = (c&1) ? (0xEDB88320 ^ (c>>>1)) : (c>>>1);
    }
    return (c ^ 0xFFFFFFFF) >>> 0;
  },

  // Download blob
  download(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    setTimeout(()=>URL.revokeObjectURL(url), 1000);
  }
};

// Style constants for cells
const XS = {
  TITLE:    { t:'s', s:11 },  // white bold on dark, large
  HDR:      { t:'s', s:1  },  // bold white on navy
  HDR_DARK: { t:'s', s:10 },  // bold on dark section
  SUB_HDR:  { t:'s', s:3  },  // bold on gray
  NORMAL:   { t:'s', s:0  },
  ALT:      { t:'s', s:4  },  // light blue bg
  GREEN:    { t:'s', s:5  },
  RED:      { t:'s', s:6  },
  GOLD:     { t:'s', s:7  },
  PCT:      { t:'p', s:8  },  // percent, blue
  PCT_N:    { t:'p', s:9  },
};

function makeCell(v, style) { return { v: String(v ?? ''), ...style }; }
function numCell(v, s=0)    { return { v: Number(v)||0, t:'n', s }; }
function pctCell(v, s=8)    { return { v: Number(v)||0, t:'p', s }; }
function emptyRow(n)        { return Array(n).fill({ v:'', t:'s', s:0 }); }

// ── Export: Presenze ────────────────────────────────────────
function exportPresenze() {
  const catSel = document.getElementById('exp-cat-1').value;
  const catList = catSel === 'all'
    ? S.categories.filter(c => currentUser.role==='admin' || getAccessibleCategoryIds().includes(c.id))
    : S.categories.filter(c=>c.id===catSel);

  const sheets = catList.map(cat => {
    const athletes = getCategoryAthletes(cat.id).sort((a,b)=>(a.lastName||'').localeCompare(b.lastName||''));
    const sessions = getCategorySessions(cat.id);
    const team = S.teams.find(t=>t.id===cat.teamId);
    const sport = S.sports.find(s=>s.id===cat.sportId);

    const colWidths = [5, 22, 12, 12, ...sessions.map(()=>5), 8, 8, 8, 9, 9, 9];
    const rows = [];

    // Title row
    rows.push([makeCell(`REGISTRO PRESENZE — ${cat.name} (${sport?.name||''} · ${team?.name||''})`, XS.HDR_DARK),
      ...Array(sessions.length+9).fill({v:'',t:'s',s:10})]);

    // Date row
    rows.push([makeCell('#',XS.HDR), makeCell('Atleta',XS.HDR), makeCell('Ruolo',XS.HDR), makeCell('N.',XS.HDR),
      ...sessions.map(s=>makeCell(fmtDate(s.date), XS.HDR)),
      makeCell('P',XS.HDR), makeCell('A',XS.HDR), makeCell('G',XS.HDR),
      makeCell('% Tot.',XS.HDR), makeCell('% All.',XS.HDR), makeCell('% Part.',XS.HDR)
    ]);

    // Type row
    rows.push([makeCell('',XS.SUB_HDR), makeCell('Tipo →',XS.SUB_HDR), makeCell('',XS.SUB_HDR), makeCell('',XS.SUB_HDR),
      ...sessions.map(s=>makeCell((getActivityTypesMap()[s.type]?.label||s.type), XS.SUB_HDR)),
      ...Array(6).fill({v:'',t:'s',s:3})
    ]);

    athletes.forEach((ath, i) => {
      const atts = getAthleteAttendances(ath.id);
      const pres = atts.filter(a=>sessions.some(s=>s.id===a.sessionId)&&a.status==='P').length;
      const ass  = atts.filter(a=>sessions.some(s=>s.id===a.sessionId)&&a.status==='A').length;
      const giust= atts.filter(a=>sessions.some(s=>s.id===a.sessionId)&&a.status==='G').length;
      const tot  = sessions.length;
      const prRate = tot ? pres/tot : 0;
      const aRate  = sessions.filter(s=>s.type==='A').length ? atts.filter(a=>sessions.find(s=>s.id===a.sessionId&&s.type==='A')&&a.status==='P').length / sessions.filter(s=>s.type==='A').length : 0;
      const pRate  = sessions.filter(s=>s.type==='P').length ? atts.filter(a=>sessions.find(s=>s.id===a.sessionId&&s.type==='P')&&a.status==='P').length / sessions.filter(s=>s.type==='P').length : 0;

      const altS = i%2===0 ? XS.ALT : XS.NORMAL;
      rows.push([
        makeCell(ath.number||'', altS),
        makeCell(`${ath.lastName} ${ath.firstName}`, altS),
        makeCell(ath.role||'', altS),
        makeCell(ath.number||'', altS),
        ...sessions.map(s => {
          const att = atts.find(a=>a.sessionId===s.id);
          const st = att?.status||'';
          const cellS = st==='P' ? XS.GREEN : st==='A' ? XS.RED : st==='G' ? XS.GOLD : altS;
          return makeCell(st||'—', cellS);
        }),
        numCell(pres), numCell(ass), numCell(giust),
        pctCell(prRate*100), pctCell(aRate*100), pctCell(pRate*100)
      ]);
    });

    return { name: cat.name.slice(0,31), rows, colWidths };
  });

  const blob = XLSXWriter.createXLSX(sheets);
  XLSXWriter.download(blob, `Presenze_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('File scaricato!', 'success');
}

// ── Export: Performance ────────────────────────────────────
function exportPerformance() {
  const catSel = document.getElementById('exp-cat-2').value;
  const catList = catSel === 'all'
    ? S.categories.filter(c => currentUser.role==='admin' || getAccessibleCategoryIds().includes(c.id))
    : S.categories.filter(c=>c.id===catSel);

  const sheets = catList.map(cat => {
    const athletes = getCategoryAthletes(cat.id).sort((a,b)=>(a.lastName||'').localeCompare(b.lastName||''));
    const sessions = getCategorySessions(cat.id);
    const colWidths = [5, 22, 10, ...sessions.map(()=>6), 8, 8, 8, 8, 8, 9];
    const rows = [];

    rows.push([makeCell(`PERFORMANCE — ${cat.name}`, XS.HDR_DARK), ...Array(sessions.length+9).fill({v:'',t:'s',s:10})]);

    PERF_PARAMS.forEach(param => {
      rows.push([
        makeCell(`▶ ${PERF_LABELS[param].toUpperCase()}`, XS.HDR),
        makeCell('Atleta', XS.HDR),
        makeCell('Ruolo', XS.HDR),
        ...sessions.map(s=>makeCell(fmtDate(s.date), XS.HDR)),
        makeCell('Media', XS.HDR),
        ...Array(5).fill({v:'',t:'s',s:1})
      ]);

      athletes.forEach((ath, i) => {
        const atts = getAthleteAttendances(ath.id);
        const altS = i%2===0 ? XS.ALT : XS.NORMAL;
        const vals = sessions.map(s => {
          const att = atts.find(a=>a.sessionId===s.id);
          return att?.status==='P' ? (att.perf?.[param]||0) : null;
        });
        const nonNull = vals.filter(v=>v!==null&&v>0);
        const avgVal = nonNull.length ? avg(nonNull) : 0;
        rows.push([
          makeCell(ath.number||'', altS),
          makeCell(`${ath.lastName} ${ath.firstName}`, altS),
          makeCell(ath.role||'', altS),
          ...vals.map(v => v !== null ? numCell(v||0) : makeCell('—', altS)),
          numCell(Math.round(avgVal*10)/10),
          ...Array(5).fill({v:'',t:'s',s:0})
        ]);
      });
      rows.push(emptyRow(sessions.length+9));
    });

    return { name: cat.name.slice(0,31), rows, colWidths };
  });

  const blob = XLSXWriter.createXLSX(sheets);
  XLSXWriter.download(blob, `Performance_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('File scaricato!', 'success');
}

function buildMatchCard(m, canMgr) {
  const bg = m.bgColor || '#1A3A5C';
  const convs = getMatchConvocati(m.id);
  const convCount = convs.filter(c=>c.status==='convocato').length;
  const riserveCount = convs.filter(c=>c.status==='riserva').length;
  const resultCls = 'match-result-' + (m.result||'TBD');
  const scoreText = m.result && m.result !== 'TBD'
    ? `${m.scoredGoals||0} — ${m.concededGoals||0}`
    : 'Da giocare';
  const resultLabel = RESULT_LABELS[m.result||'TBD']||'';

  return `
  <div class="match-card ${resultCls}" id="match-${m.id}">
    <div class="match-header" style="background:${esc(bg)}">
      <div>
        <div style="font-size:.75rem;opacity:.7;text-transform:uppercase;letter-spacing:.08em">${HOMEAWAY_LABELS[m.homeAway]||''}</div>
        <div style="font-size:1.3rem;font-weight:800;margin:4px 0">vs ${esc(m.opponent)}</div>
        <div style="font-size:.82rem;opacity:.75">📅 ${fmtDate(m.date)} ${m.time?'· 🕐 '+m.time:''}</div>
        ${m.meetTime ? `<div style="font-size:.78rem;opacity:.7;margin-top:4px">🤝 Ritrovo: ${esc(m.meetTime)} · 📍 ${esc(m.meetPlace||'')}</div>` : ''}
      </div>
      <div style="text-align:right">
        <div class="match-score">${scoreText}</div>
        <div style="font-size:.82rem;opacity:.75;margin-top:4px">${resultLabel}</div>
      </div>
    </div>
    <div class="match-body">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <span class="badge badge-blue">👥 ${convCount} convocati</span>
        ${riserveCount > 0 ? `<span class="badge badge-gold">🔄 ${riserveCount} riserve</span>` : ''}
        ${m.notes ? `<span class="text-muted text-sm truncate" style="flex:1">📝 ${esc(m.notes)}</span>` : ''}
        <div style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap">
          <button class="btn btn-accent btn-sm" onclick="openConvocatiView('${m.id}')">👥 Convocati</button>
          ${m.sessionId ? `<button class="btn btn-ghost btn-sm" onclick="openSessionEdit('${m.sessionId}')">📋 Presenze</button>` : ''}
          ${canMgr ? `<button class="btn btn-ghost btn-sm" onclick="openMatchModal('${m.id}')">✏️ Modifica</button>` : ''}
          ${canMgr ? `<button class="btn btn-ghost btn-sm" onclick="exportMatchImage('${m.id}')">🖼️ Esporta</button>` : ''}
          ${canMgr ? `<button class="btn btn-danger btn-sm" onclick="deleteMatch('${m.id}')">🗑️</button>` : ''}
        </div>
      </div>
    </div>
  </div>`;
}

// ── MATCH MODAL (crea/modifica) ──────────────────────────────

  const m = id ? S.matches.find(x=>x.id===id) : null;
  const curColor = m?.bgColor || '#1A3A5C';

  // Pre-fill from filter state or existing match

  const preCatId  = m?.categoryId || ms.catId || selectedCategoryId || '';
  const preTeamId = m?.teamId     || ms.teamId || '';
  const preCat    = S.categories.find(c=>c.id===preCatId);
  const catTeams  = preCat ? getCategoryTeams(preCatId) : [];

  const isAdmin = currentUser.role === 'admin';
  const accessibleCatIds = getAccessibleCategoryIds();
  const availCats = isAdmin ? S.categories : S.categories.filter(c=>accessibleCatIds.includes(c.id));

  const colorSwatches = MATCH_COLORS.map(c =>
    `<div class="color-swatch ${c===curColor?'selected':''}" style="background:${c}"

      <div style="font-size:.73rem;font-weight:700;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">📋 Contesto Partita</div>
      <div class="form-row" style="margin:0">

          <select id="m-cat" onchange="refreshMatchModalTeams(this.value)">

            ${availCats.map(c=>`<option value="${c.id}" ${c.id===preCatId?'selected':''}>${esc(c.name)}</option>`).join('')}

          <select id="m-team">
            <option value="">— Tutta la categoria —</option>
            ${catTeams.map(t=>`<option value="${t.id}" ${t.id===preTeamId?'selected':''}>${esc(t.name)}</option>`).join('')}

function selectMatchColor(el, color) {
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
  const inp = document.getElementById('m-color');
  if (inp) inp.value = color;
  const custom = document.getElementById('m-color-custom');
  if (custom) custom.value = color;
}

function refreshMatchModalTeams(catId) {
  const wrapper = document.getElementById('m-team-wrapper');
  if (!wrapper) return;
  const catTeams = getCategoryTeams(catId);
  wrapper.innerHTML = '<label style="font-size:.78rem">Squadra</label>' +
    '<select id="m-team"><option value="">— Tutta la categoria —</option>' +
    catTeams.map(t=>`<option value="${t.id}">${esc(t.name)}</option>`).join('') +
    '</select>';
}

function saveMatch(id) {
  const opponent  = document.getElementById('m-opp').value.trim();
  const homeAway  = document.getElementById('m-ha').value;
  const date      = document.getElementById('m-date').value;
  const time      = document.getElementById('m-time').value;
  const meetTime  = document.getElementById('m-meet').value;
  const meetPlace = document.getElementById('m-place').value.trim();
  const result    = document.getElementById('m-res').value;
  const gf        = parseInt(document.getElementById('m-gf').value)||0;
  const gs        = parseInt(document.getElementById('m-gs').value)||0;
  const notes     = document.getElementById('m-notes').value.trim();
  const bgColor   = document.getElementById('m-color').value || '#1A3A5C';
  // Read category and team from modal (new fields)
  const modalCatId  = document.getElementById('m-cat')?.value  || '';
  const modalTeamId = document.getElementById('m-team')?.value || '';

  if (!opponent || !date) { toast('Avversario e data obbligatori','error'); return; }
  if (!S.matches) S.matches = [];

  if (id) {
    const existing = S.matches.find(x=>x.id===id);
    if (!existing) { toast('Partita non trovata','error'); return; }
    Object.assign(existing, { opponent, homeAway, date, time, meetTime, meetPlace,
      result, scoredGoals:gf, concededGoals:gs, notes, bgColor });
    // Update category/team if changed via modal
    if (modalCatId) existing.categoryId = modalCatId;
    if (modalTeamId !== undefined) existing.teamId = modalTeamId || undefined;
    // Sync linked session
    if (existing.sessionId) {
      const linkedSess = S.sessions.find(s => s.id === existing.sessionId);
      if (linkedSess) {
        linkedSess.date = date;
        linkedSess.notes = 'Partita vs ' + opponent + (notes ? ' — ' + notes : '');
        if (modalCatId) linkedSess.categoryId = modalCatId;
      }
    }
    saveState(); closeModal();
    toast('Partita aggiornata ✅','success');
    if (currentView === 'convocati') {
      viewBuilders['convocati'](document.getElementById('view-convocati'));
    } else {
      showView('matches');
    }
  } else {
    const catId  = modalCatId  || selectedCategoryId;
    const teamId = modalTeamId || '';
    if (!catId) { toast('Seleziona una categoria','error'); return; }
    const mid    = uid();
    const sessId = uid();
    const sessNotes = 'Partita vs ' + opponent + (notes ? ' — ' + notes : '');
    S.sessions.push({ id: sessId, categoryId: catId, date, type: 'P',
      notes: sessNotes, createdBy: currentUser.id, matchId: mid });
    S.matches.push({ id: mid, opponent, homeAway, date, time, meetTime, meetPlace,
      result, scoredGoals:gf, concededGoals:gs, notes, bgColor,
      categoryId: catId, teamId: teamId||undefined, createdBy: currentUser.id, sessionId: sessId });
    // Sync filter state
    if (!window._matchState) window._matchState = {};
    window._matchState.catId  = catId;
    window._matchState.teamId = teamId;
    if (catId !== selectedCategoryId) { selectedCategoryId = catId; buildSidebarNav(); }
    saveState(); closeModal();
    toast('Partita aggiunta ✅ — Sessione creata automaticamente','success');
    showView('matches');
  }
}

function deleteMatch(id) {
  if (!confirm('Eliminare questa partita, i convocati e la sessione collegata?')) return;
  const m = S.matches.find(x=>x.id===id);
  // Remove linked session and its attendances
  if (m?.sessionId) {
    S.attendances = (S.attendances||[]).filter(x => x.sessionId !== m.sessionId);
    S.sessions = (S.sessions||[]).filter(x => x.id !== m.sessionId);
  }
  S.matches = (S.matches||[]).filter(x=>x.id!==id);
  S.convocati = (S.convocati||[]).filter(x=>x.matchId!==id);
  saveState(); showView('matches'); toast('Partita eliminata');
}

/** Stagione attiva come oggetto */
function getActiveSeason() {
  if (!S.seasons||!S.seasons.length) return null;
  return S.seasons.find(s=>s.id===S.activeSeason) || S.seasons[0];
}

/**
 * Calcola start/end date dalla stagione.
 * Il DB usa start_date/end_date (ISO date), non startYear/endYear.
 */
function getSeasonDates(season) {
  if (!season) return { start:'1900-01-01', end:'2100-12-31' };
  // DB reale: start_date / end_date
  const start = season.startDate || (season.startYear ? (getSeasonDates(season).start) : '1900-01-01');
  const end   = season.endDate   || (season.endYear   ? (getSeasonDates(season).end)   : '2100-12-31');
  return { start, end };
}

/** Filtra sessioni per stagione (usa session.seasonId se presente, altrimenti date) */
function filterSessionsBySeason(sessions, seasonId) {
  if (!seasonId) return sessions;
  return sessions.filter(s => {
    // DB reale: sessions ha season_id diretto
    if (s.seasonId) return s.seasonId === seasonId;
    // Fallback: filtra per data
    const seas = S.seasons.find(x=>x.id===seasonId);
    if (!seas) return true;
    const { start, end } = getSeasonDates(seas);
    return s.date >= start && s.date <= end;
  });
}

/** Filtra partite per stagione */
function filterMatchesBySeason(matches, seasonId) {
  if (!seasonId) return matches;
  return matches.filter(m => {
    const seas = S.seasons.find(x=>x.id===seasonId);
    if (!seas) return true;
    const { start, end } = getSeasonDates(seas);
    return m.date >= start && m.date <= end;
  });
}

/**
 * Ritorna i dati stagionali di un atleta per la stagione indicata.
 * Usa athlete_team_seasons come fonte primaria (DB reale).
 */
function getAthleteSeasonData(athleteId, seasonId) {
  const sid = seasonId || S.activeSeason;
  // Fonte primaria: athlete_team_seasons
  const ats = (S.athleteTeamSeasons||[]).find(x=>x.athleteId===athleteId && (!sid||x.seasonId===sid));
  if (ats) return {
    categoryId: ats.categoryId, teamId: ats.teamId,
    role: ats.role||'', shirtNumber: ats.jerseyNumber||null,
    societyId: ats.societyId||null, seasonId: ats.seasonId,
  };
  // Fallback: athlete_seasons legacy
  const as = (S.athleteSeasons||[]).find(x=>x.athleteId===athleteId && (!sid||x.seasonId===sid));
  if (as) return {
    categoryId: as.categoryId, teamId: as.teamId,
    role: as.role||'', shirtNumber: as.shirtNumber||null,
    societyId: null, seasonId: as.seasonId,
  };
  // Ultimo fallback: campi legacy sull'atleta
  const ath = S.athletes.find(a=>a.id===athleteId);
  return {
    categoryId: ath?.categoryId||null, teamId: ath?.teamId||null,
    role: ath?.role||'', shirtNumber: ath?.number||null,
    societyId: ath?.societyId||null, seasonId: sid,
  };
}

/** Ritorna tutti i record stagionali di un atleta (storia completa) */
function getAthleteSeasonsHistory(athleteId) {
  const fromATS = (S.athleteTeamSeasons||[]).filter(x=>x.athleteId===athleteId);
  const fromAS  = (S.athleteSeasons||[]).filter(x=>x.athleteId===athleteId);
  // Merge deduplicato per seasonId
  const all = [...fromATS, ...fromAS];
  const seen = new Set();
  return all.filter(x => {
    const key = x.seasonId+':'+x.categoryId;
    if (seen.has(key)) return false;
    seen.add(key); return true;
  }).sort((a,b) => {
    const sa = S.seasons.find(s=>s.id===a.seasonId);
    const sb = S.seasons.find(s=>s.id===b.seasonId);
    return (sb?.startDate||'') > (sa?.startDate||'') ? 1 : -1;
  });
}

/** Arricchisce un atleta con i dati della stagione corrente */
function enrichAthleteForSeason(ath, seasonId) {
  const sd = getAthleteSeasonData(ath.id, seasonId);
  return {
    ...ath,
    categoryId:  sd.categoryId  || ath.categoryId,
    teamId:      sd.teamId      || ath.teamId,
    role:        sd.role        || ath.role||'',
    number:      sd.shirtNumber || ath.number||null,
    shirtNumber: sd.shirtNumber || ath.number||null,
  };
}

/**
 * Ritorna gli atleti di una categoria per la stagione indicata.
 * Usa athlete_team_seasons come fonte primaria.
 */
function getCategoryAthletes(catId, teamId, seasonId) {
  const sid = seasonId || S.activeSeason;
  // Fonte primaria: athlete_team_seasons
  let records = (S.athleteTeamSeasons||[]).filter(r=>r.categoryId===catId && (!sid||r.seasonId===sid));
  if (!records.length) {
    // Fallback: athlete_seasons
    records = (S.athleteSeasons||[]).filter(r=>r.categoryId===catId && (!sid||r.seasonId===sid));
  }
  if (!records.length) {
    // Ultimo fallback: campo categoryId sull'atleta (dati pre-migrazione)
    return S.athletes.filter(a => a.categoryId===catId && (!teamId || a.teamId===teamId));
  }
  if (teamId) records = records.filter(r => (r.teamId||'')===teamId);
  return records.map(r => {
    const ath = S.athletes.find(a=>a.id===r.athleteId);
    if (!ath) return null;
    return {
      ...ath,
      categoryId:  r.categoryId,
      teamId:      r.teamId||null,
      role:        r.role||ath.role||'',
      number:      r.jerseyNumber||r.shirtNumber||ath.number||null,
      shirtNumber: r.jerseyNumber||r.shirtNumber||null,
      _atsId:      r.id,
    };
  }).filter(Boolean);
}

/**
 * Ritorna le categorie accessibili a un utente nella stagione indicata.
 * Usa user_category_seasons come fonte primaria.
 */
function getAccessibleCategoryIds(userId, seasonId) {
  const uid = userId || currentUser?.id;
  const sid = seasonId || S.activeSeason;
  if (!uid) return [];
  const u = S.users.find(x=>x.id===uid);
  if (!u) return [];
  if (u.role==='admin') return S.categories.map(c=>c.id);

  // Fonte primaria: user_category_seasons
  const ucs = (S.userCategorySeasons||[]).filter(r=>r.userId===uid && (!sid||r.seasonId===sid));
  if (ucs.length) return [...new Set(ucs.map(r=>r.categoryId))];

  // Fallback legacy: campi diretti sulla categoria
  return S.categories.filter(c =>
    (c.directorIds||[]).includes(uid) ||
    (c.managerIds||[]).includes(uid) ||
    (c.coachIds||[]).includes(uid) ||
    (c.professionalIds||[]).includes(uid)
  ).map(c=>c.id);
}

/**
 * Ritorna le squadre di una categoria nella stagione indicata.
 * Usa team_category_season come fonte primaria.
 */
function getCategoryTeams(catId, seasonId) {
  const sid = seasonId || S.activeSeason;
  // Fonte primaria: team_category_season
  const tcs = (S.teamCategorySeasons||[]).filter(r=>r.categoryId===catId && (!sid||r.seasonId===sid));
  if (tcs.length) return tcs.map(r=>S.teams.find(t=>t.id===r.teamId)).filter(Boolean);
  // Fallback legacy
  return S.teams.filter(t => t.categoryId===catId || (S.categories.find(c=>c.id===catId)?.teamIds||[]).includes(t.id));
}

/**
 * Ritorna le sessioni di una categoria per stagione.
 * Il DB ha season_id diretto sulla sessione.
 */
function getCategorySessionsForSeason(catId, seasonId) {
  return S.sessions.filter(s => {
    if (s.categoryId !== catId) return false;
    if (!seasonId) return true;
    // DB reale: usa seasonId diretto
    if (s.seasonId) return s.seasonId === seasonId;
    // Fallback: filtra per data
    const seas = S.seasons.find(x=>x.id===seasonId);
    if (!seas) return true;
    const { start, end } = getSeasonDates(seas);
    return s.date >= start && s.date <= end;
  });
}

/** Alias per retrocompatibilità */
function getCategorySessions(catId) {
  return getCategorySessionsForSeason(catId, S.activeSeason);
}

/** Ritorna il ruolo di un utente nella stagione indicata */
function getUserRoleForSeason(userId, seasonId) {
  const sid = seasonId || S.activeSeason;
  const ucs = (S.userCategorySeasons||[]).find(r=>r.userId===userId && (!sid||r.seasonId===sid));
  if (ucs) return ucs.role;
  return S.users.find(u=>u.id===userId)?.role || 'user';
}

/** Stats categoria per stagione */
function getCategoryStats(catId, seasonId) {
  const sid = seasonId || S.activeSeason;
  const athletes = getCategoryAthletes(catId, null, sid);
  const sessions = getCategorySessionsForSeason(catId, sid);
  const athIds   = athletes.map(a=>a.id);
  const allAtts  = S.attendances.filter(a=>sessions.some(s=>s.id===a.sessionId));
  const present  = allAtts.filter(a=>a.status==='P').length;
  const total    = athletes.length * sessions.length;
  const byType   = {};
  (S.activityTypes||[]).forEach(([k]) => {
    byType[k] = sessions.filter(s=>s.type===k).length;
  });
  return { athletes: athletes.length, sessions: sessions.length,
    presenceRate: total>0 ? pct(present,total) : 0, byType, present, total };
}

/** Presenza atleta per stagione */
function getAthletePresenceRate(athId, catId, seasonId) {

  const sessions = getCategorySessionsForSeason(catId, sid);
  const atts = S.attendances.filter(a=>a.athleteId===athId && sessions.some(s=>s.id===a.sessionId));
  return pct(atts.filter(a=>a.status==='P').length, sessions.length);
}

// Get athletes in a category for a given season
function getCategoryAthletesForSeason(catId, seasonId, teamId) {
  if (!seasonId) return getCategoryAthletes(catId, teamId);

  // Try to find athletes via athleteSeasons enrollment records first
  let enrollments = (S.athleteSeasons||[]).filter(as => as.categoryId===catId && as.seasonId===seasonId);
  if (teamId) enrollments = enrollments.filter(as => (as.teamId||'') === teamId);

  // FALLBACK: if no enrollment records for this season, use athletes directly via categoryId
  // This handles the case where athletes were added without going through season enrollment
  let athletes;
  if (enrollments.length === 0) {
    athletes = getCategoryAthletes(catId, teamId);
    return athletes;
  }

  const enrolledIds = enrollments.map(as => as.athleteId);
  // Also include athletes directly in category that aren't in athleteSeasons
  // (union of enrolled + direct members)
  const directAthletes = getCategoryAthletes(catId, teamId);
  const allIds = [...new Set([...enrolledIds, ...directAthletes.map(a=>a.id)])];
  athletes = S.athletes.filter(a => allIds.includes(a.id));
  if (teamId) athletes = athletes.filter(a => (a.teamId||'') === teamId);

  return athletes.map(a => {
    const as = enrollments.find(x => x.athleteId===a.id);
    return { ...a, role: as?.role||a.role, number: as?.shirtNumber||a.number,
             teamId: as?.teamId||a.teamId, _asId: as?.id };
  });
}

// Get sessions for a category in a given season
function getCategorySessionsForSeason(catId, seasonId) {
  if (!seasonId) return getCategorySessions(catId);
  const season = S.seasons.find(s => s.id === seasonId);
  if (!season) return getCategorySessions(catId);
  const startDate = getSeasonDates(season).start; // July 1st start
  const endDate   = getSeasonDates(season).end;   // June 30th end
  return getCategorySessions(catId).filter(s => s.date >= startDate && s.date <= endDate);
}

// Get matches for category in season
function getCategoryMatchesForSeason(catId, seasonId) {
  if (!seasonId) return getCategoryMatches(catId);
  const season = S.seasons.find(s => s.id === seasonId);
  if (!season) return getCategoryMatches(catId);
  const startDate = getSeasonDates(season).start;
  const endDate   = getSeasonDates(season).end;
  return getCategoryMatches(catId).filter(m => m.date >= startDate && m.date <= endDate);
}

// Get stats for a category in a given season
function getCategoryStatsForSeason(catId, seasonId, teamId) {
  const athletes = getCategoryAthletesForSeason(catId, seasonId, teamId);
  const sessions  = getCategorySessionsForSeason(catId, seasonId); // sessions are CATEGORY-level
  const athIds    = athletes.map(a=>a.id);
  // Filter attendances: sessions in this category/season AND athletes in this team (if filtered)
  const allAtts = S.attendances.filter(a =>
    sessions.some(s => s.id === a.sessionId) &&
    (teamId ? athIds.includes(a.athleteId) : true)
  );
  const present = allAtts.filter(a => a.status === 'P').length;
  // Total slots = athletes × sessions (same sessions for all teams in category)
  const total = athletes.length * sessions.length;
  const byType = {};
  getActivityTypes().forEach(([k]) => { byType[k] = sessions.filter(s => s.type === k).length; });
  return { athletes: athletes.length, sessions: sessions.length,
    presenceRate: total > 0 ? pct(present, total) : 0, byType, present, total };
}

function addNewSeason() {
  const start = parseInt(document.getElementById('new-season-start').value);
  const end   = parseInt(document.getElementById('new-season-end').value);
  if (!start || !end || end <= start) { toast('Anno inizio e fine non validi','error'); return; }
  const name = `${start}/${end}`;
  if ((S.seasons||[]).some(s => s.name === name)) { toast('Stagione già esistente','error'); return; }
  if (!S.seasons) S.seasons = [];
  S.seasons.push({ id: uid(), name, startYear: start, endYear: end, active: false });
  saveState(); rebuildSeasonSelector();
  document.getElementById('seasons-list-area').innerHTML = buildSeasonsListHtml(S.seasons.slice().reverse());
  document.getElementById('new-season-start').value = '';
  document.getElementById('new-season-end').value = '';
  toast('Stagione ' + name + ' aggiunta', 'success');
}

async function setSeasonActive(id) {
  // Aggiorna localmente
  S.seasons.forEach(s => { s.active = s.id===id; s.isActive = s.id===id; });
  S.activeSeason = id;
  saveState();
  // Aggiorna nel DB: disattiva tutte, attiva quella scelta
  if (DB_MODE === 'supabase') {
    await sb.from('seasons').update({ is_active: false }).neq('id', id);
    await sb.from('seasons').update({ is_active: true  }).eq('id', id);
  }
  rebuildSeasonSelector();
  // Refresh UI
  const listArea = document.getElementById('seasons-list-area');
  if (listArea) listArea.innerHTML = buildSeasonsConfig();
  else buildAdminConfigTab('seasons');
  toast('Stagione attiva: ' + (S.seasons.find(s=>s.id===id)?.name||id),'success');
}

async function deleteSeason(id) {
  if (!confirm('Eliminare questa stagione? Verranno rimossi anche tutti i dati stagionali collegati.')) return;
  S.seasons = S.seasons.filter(s => s.id !== id);
  S.athleteTeamSeasons = (S.athleteTeamSeasons||[]).filter(r=>r.seasonId!==id);
  S.athleteSeasons     = (S.athleteSeasons||[]).filter(r=>r.seasonId!==id);
  S.userCategorySeasons= (S.userCategorySeasons||[]).filter(r=>r.seasonId!==id);
  S.teamCategorySeasons= (S.teamCategorySeasons||[]).filter(r=>r.seasonId!==id);
  saveState();
  await dbDelete('seasons', id);
  rebuildSeasonSelector();
  buildAdminConfigTab('seasons');
  toast('Stagione eliminata','success');
}

// ── ATHLETE SEASON ENROLLMENT MODAL ─────────────────────────
function openAthleteSeasonModal(athleteId) {
  const ath = S.athletes.find(a => a.id === athleteId);
  if (!ath) return;

function exportConvocatiImage(matchId) {
  const m = S.matches.find(x=>x.id===matchId);
  if (!m) return;

  const cat      = S.categories.find(c=>c.id===m.categoryId);
  const cvMap    = {};
  (S.convocati||[]).filter(c=>c.matchId===matchId).forEach(c => cvMap[c.athleteId] = c);

  const convocati = getCategoryAthletes(m.categoryId)
    .filter(a => cvMap[a.id]?.status === 'convocato')
    .sort((a,b) => (a.number||99)-(b.number||99));
  const riserve = getCategoryAthletes(m.categoryId)
    .filter(a => cvMap[a.id]?.status === 'riserva')
    .sort((a,b) => (a.number||99)-(b.number||99));

  // Build HTML for the image using a hidden div + html2canvas approach
  // Since we can't load external libs, we'll use Canvas API directly
  const bg = m.bgColor || '#1A3A5C';

  // Calculate canvas height dynamically
  const athPerRow = 3;
  const athRowH   = 56;
  const athRows   = Math.ceil(convocati.length / athPerRow);
  const riserveRows = Math.ceil(riserve.length / athPerRow);
  const headerH   = 188;
  const sectionH  = 40;
  const footerH   = 50;
  const padding   = 24;
  const canvasW   = 800;
  let   canvasH   = headerH + sectionH + athRows * athRowH + padding;
  if (riserve.length > 0) canvasH += sectionH + riserveRows * athRowH + padding;
  canvasH += footerH + padding;

  const canvas = document.createElement('canvas');
  canvas.width  = canvasW;
  canvas.height = Math.max(canvasH, 400);
  const ctx = canvas.getContext('2d');

  // ── Background gradient ───────────────────────────────────
  const grad = ctx.createLinearGradient(0, 0, canvasW, canvasH);
  grad.addColorStop(0, bg);
  grad.addColorStop(1, darkenColor(bg, 0.4));
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvasW, canvasH);

  // ── Subtle pattern overlay ────────────────────────────────
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  for (let x=0; x<canvasW; x+=40) {
    for (let y=0; y<canvasH; y+=40) {
      ctx.beginPath();
      ctx.arc(x, y, 1.5, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // ── Header area ───────────────────────────────────────────
  const p = padding;

  // ── HEADER: SOCIETÀ (large) vs AVVERSARIO (smaller) ────────

  // Resolve society
  const socObj = S.societies.find(s => s.id === cat?.societyId);
  const socName = socObj?.name || cat?.name || '';
  const oppName = m.opponent || '';

  // Measure available width
  const availW = canvasW - p * 2;

  // ── RIGA PRINCIPALE: Società vs Avversario ───────────────
  // We place everything on ONE line, sizing dynamically:
  // Society name: large bold
  // " vs ": medium, muted
  // Opponent: medium

  // Start with big font for society, shrink until it fits ~55% of width
  let socFont = 42;
  ctx.font = `bold ${socFont}px Arial, sans-serif`;
  const maxSocW = availW * 0.54;
  let socFit = socName;
  while (ctx.measureText(socFit).width > maxSocW && socFit.length > 3) {
    socFit = socFit.slice(0, -1);
  }
  if (socFit !== socName) socFit += '…';

  // Draw society name
  ctx.fillStyle = '#FFFFFF';
  ctx.font = `bold ${socFont}px Arial, sans-serif`;
  const socW = ctx.measureText(socFit).width;
  ctx.fillText(socFit, p, p + 64);

  // Draw " vs " separator
  ctx.font = 'bold 18px Arial, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  const vsStr = '  vs  ';
  const vsW = ctx.measureText(vsStr).width;
  ctx.fillText(vsStr, p + socW, p + 56);

  // Draw opponent — fit remaining space
  const oppX   = p + socW + vsW;
  const oppMaxW = canvasW - p - oppX;
  ctx.font = 'bold 26px Arial, sans-serif';
  let oppFit = oppName;
  while (ctx.measureText(oppFit).width > oppMaxW && oppFit.length > 3) {
    oppFit = oppFit.slice(0, -1);
  }
  if (oppFit !== oppName) oppFit += '…';
  ctx.fillStyle = 'rgba(255,255,255,0.82)';
  ctx.fillText(oppFit, oppX, p + 58);

  // Match info line
  ctx.fillStyle = 'rgba(255,255,255,0.68)';
  ctx.font = '14px Arial, sans-serif';
  const infoLine = [
    '📅 ' + fmtDate(m.date),
    m.time ? '🕐 ' + m.time : '',
    HOMEAWAY_LABELS[m.homeAway] || '',
  ].filter(Boolean).join('   ·   ');
  ctx.fillText(infoLine, p, p + 90);

  // Ritrovo info
  if (m.meetTime || m.meetPlace) {
    ctx.fillStyle = 'rgba(255,255,255,0.58)';
    ctx.font = '13px Arial, sans-serif';
    const rLine = [
      m.meetTime ? '🤝 ' + m.meetTime : '',
      m.meetPlace ? '📍 ' + m.meetPlace : ''
    ].filter(Boolean).join('   ·   ');
    ctx.fillText(rLine, p, p + 110);
  }

  // Divider
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(p, p + 126);
  ctx.lineTo(canvasW - p, p + 126);
  ctx.stroke();

  // Count badges
  const badgeData = [
    { label: 'Convocati', value: convocati.length, color: 'rgba(5,150,105,0.8)' },
    { label: 'Riserve',   value: riserve.length,   color: 'rgba(217,119,6,0.8)' },
  ];
  let bx = p;
  badgeData.forEach(b => {
    ctx.fillStyle = b.color;
    roundRect(ctx, bx, p+136, 110, 32, 8, true, false);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 13px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(b.value + ' ' + b.label, bx+55, p+157);
    ctx.textAlign = 'left';
    bx += 122;
  });

  // ── Convocati section ─────────────────────────────────────
  let y = headerH + p;
  drawSectionHeader(ctx, p, y, canvasW - p*2, '✅  CONVOCATI', '#22c55e');
  y += sectionH;

  convocati.forEach((ath, i) => {
    const col = i % athPerRow;
    const row = Math.floor(i / athPerRow);
    const ax  = p + col * ((canvasW - p*2) / athPerRow);
    const ay  = y + row * athRowH;
    drawAthleteCard(ctx, ax, ay, (canvasW - p*2) / athPerRow - 8, athRowH - 8, ath, cvMap[ath.id], 'convocato');
  });
  y += athRows * athRowH + padding;

  // ── Riserve section ───────────────────────────────────────
  if (riserve.length > 0) {
    drawSectionHeader(ctx, p, y, canvasW - p*2, '🔄  RISERVE', '#f59e0b');
    y += sectionH;
    riserve.forEach((ath, i) => {
      const col = i % athPerRow;
      const row = Math.floor(i / athPerRow);
      const ax  = p + col * ((canvasW - p*2) / athPerRow);
      const ay  = y + row * athRowH;
      drawAthleteCard(ctx, ax, ay, (canvasW - p*2) / athPerRow - 8, athRowH - 8, ath, cvMap[ath.id], 'riserva');
    });
    y += riserveRows * athRowH + padding;
  }

  // ── Footer ────────────────────────────────────────────────
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.moveTo(p, canvasH - footerH - 10);
  ctx.lineTo(canvasW - p, canvasH - footerH - 10);
  ctx.stroke();

  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '12px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('SportTrack Pro · ' + new Date().toLocaleDateString('it-IT'), canvasW/2, canvasH - footerH + 20);
  ctx.textAlign = 'left';

  // ── Download ──────────────────────────────────────────────
  const link = document.createElement('a');
  link.download = 'Convocati_vs_' + m.opponent.replace(/[^a-zA-Z0-9]/g,'_') + '_' + m.date + '.png';
  link.href = canvas.toDataURL('image/png', 0.95);
  link.click();
  toast('Immagine esportata ✅','success');
}

// Canvas helpers
function darkenColor(hex, amount) {
  const num = parseInt(hex.replace('#',''), 16);
  const r = Math.max(0, (num>>16) - Math.round(255*amount));
  const g = Math.max(0, ((num>>8)&0xFF) - Math.round(255*amount));
  const b = Math.max(0, (num&0xFF) - Math.round(255*amount));
  return '#' + ((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

function roundRect(ctx, x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
  if (fill) ctx.fill();
  if (stroke) ctx.stroke();
}

function drawSectionHeader(ctx, x, y, w, label, color) {
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  roundRect(ctx, x, y, w, 32, 6, true, false);
  // Left accent bar
  ctx.fillStyle = color;
  roundRect(ctx, x, y, 4, 32, 2, true, false);
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 15px Arial';
  ctx.fillText(label, x+14, y+21);
}

function drawAthleteCard(ctx, x, y, w, h, ath, cv, status) {
  // Card background
  const cardBg = status === 'convocato' ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.07)';
  ctx.fillStyle = cardBg;
  roundRect(ctx, x, y, w, h, 6, true, false);

  // Number circle
  const numColor = status === 'convocato' ? '#22c55e' : '#f59e0b';
  ctx.fillStyle = numColor;
  ctx.beginPath();
  ctx.arc(x+20, y+h/2, 14, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 12px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(ath.number||'?', x+20, y+h/2+4);
  ctx.textAlign = 'left';

  // Name
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 14px Arial';
  const fullName = ath.lastName + ' ' + ath.firstName;
  ctx.fillText(fullName.length > 20 ? fullName.slice(0,19)+'…' : fullName, x+40, y+h/2-3);

  // Nickname + role
  const sub = [ath.nickname ? '"'+ath.nickname+'"' : '', ath.role||''].filter(Boolean).join(' · ');
  if (sub) {
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = '11px Arial';
    ctx.fillText(sub.length > 25 ? sub.slice(0,24)+'…' : sub, x+40, y+h/2+14);
  }

  // Note from cv
  if (cv?.notes) {
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = 'italic 10px Arial';
    ctx.textAlign = 'right';
    ctx.fillText(cv.notes.slice(0,18), x+w-6, y+h/2+14);
    ctx.textAlign = 'left';
  }
}
