<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SportTrack">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="SportTrack Pro">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<title>SportTrack Pro — Gestione Società Sportiva</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-title" content="SportTrack">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── ROOT TOKENS ──────────────────────────────────────────── */
:root {
  /* ── DARK PRO THEME ── */
  --ink:       #E2E8F0;
  --ink-2:     #CBD5E0;
  --ink-3:     #94A3B8;
  --mist:      #1E2433;
  --mist-2:    #252D3D;
  --mist-3:    #2D3748;
  --white:     #161B27;
  --accent:    #4F86F7;
  --accent-h:  #3B72E8;
  --accent-l:  #1E2D4A;
  --gold:      #F59E0B;
  --gold-l:    #2A1F00;
  --green:     #10B981;
  --green-l:   #022C1E;
  --red:       #EF4444;
  --red-l:     #2C0A0A;
  --teal:      #06B6D4;
  --teal-l:    #001E27;
  --purple:    #A78BFA;
  --purple-l:  #1E1240;

  --sport-a:   #4F86F7;
  --sport-p:   #F59E0B;
  --sport-i:   #10B981;
  --sport-ps:  #A78BFA;

  --radius:    10px;
  --radius-lg: 16px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.3), 0 1px 2px rgba(0,0,0,.2);
  --shadow:    0 4px 16px rgba(0,0,0,.4);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.5);

  --sidebar-w: 260px;
  --role-admin:   linear-gradient(135deg,#3B5BDB,#4F86F7);
  --role-resp:    linear-gradient(135deg,#7C3AED,#A78BFA);
  --role-dir:     linear-gradient(135deg,#059669,#34D399);
  --role-coach:   linear-gradient(135deg,#D97706,#FCD34D);
  --role-prof:    linear-gradient(135deg,#0891B2,#67E8F9);
  --header-h:  62px;
  --font-body: 'DM Sans', sans-serif;
  --font-head: 'Syne', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

/* ── RESET ──────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; -webkit-text-size-adjust: 100%; }
body { font-family: var(--font-body); background: #0D1117; color: #E2E8F0; min-height: 100vh; overscroll-behavior-y: none; }
button { cursor: pointer; font-family: inherit; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
input, select, textarea { -webkit-tap-highlight-color: transparent; }
a { text-decoration: none; color: inherit; }
input, select, textarea { font-family: inherit; }
ul { list-style: none; }
h1,h2,h3,h4,h5 { font-family: var(--font-head); }

/* ── SCROLLBAR ──────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2D3748; border-radius: 99px; }

/* ── LOGIN SCREEN ───────────────────────────────────────────── */
#login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0D1117;
  position: relative;
  overflow: hidden;
}
#login-screen::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 80% 60% at 60% 40%, rgba(26,86,219,.3) 0%, transparent 70%);
  pointer-events: none;
}
#login-screen .noise {
  position: absolute; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: .5; pointer-events: none;
}
.login-card {
  background: #161B27;
  border: 1px solid #2D3748;
  border-radius: 20px;
  padding: 48px 44px;
  width: 420px;
  box-shadow: 0 24px 60px rgba(0,0,0,.6);
  position: relative;
  z-index: 1;
  animation: loginIn .5s cubic-bezier(.22,1,.36,1) both;
}
@keyframes loginIn { from { opacity:0; transform:translateY(24px) scale(.97); } }
.login-logo {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 36px;
}
.login-logo .logo-icon {
  width: 46px; height: 46px; border-radius: 12px;
  background: linear-gradient(135deg, var(--accent), #3B82F6);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; color: white; box-shadow: 0 4px 12px rgba(26,86,219,.4);
}
.login-logo h1 { font-size: 1.5rem; color: #E2E8F0; letter-spacing: -.02em; }
.login-logo span { font-family: var(--font-body); font-weight: 400; color: #94A3B8; font-size: .85rem; }
.login-card h2 { font-size: 1.35rem; margin-bottom: 6px; color: #E2E8F0; }
.login-card p { color: #94A3B8; font-size: .9rem; margin-bottom: 28px; }
.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-size: .82rem; font-weight: 600; color: #94A3B8; margin-bottom: 6px; letter-spacing: .03em; text-transform: uppercase; }
.form-group input, .form-group select {
  width: 100%; padding: 11px 14px; border: 1.5px solid #2D3748;
  border-radius: var(--radius); font-size: .95rem; color: #E2E8F0;
  background: #1E2433; transition: border-color .2s, box-shadow .2s;
  outline: none;
}
.form-group input:focus, .form-group select:focus {
  border-color: var(--accent); background: #1A1F2E;
  box-shadow: 0 0 0 3px rgba(79,134,247,.18);
}
.btn-primary {
  width: 100%; padding: 12px; background: var(--accent); color: white;
  border: none; border-radius: var(--radius); font-size: .95rem; font-weight: 600;
  font-family: var(--font-head); letter-spacing: .02em;
  transition: background .2s, transform .1s, box-shadow .2s;
  box-shadow: 0 4px 12px rgba(26,86,219,.35);
}
.btn-primary:hover { background: var(--accent-h); box-shadow: 0 6px 20px rgba(26,86,219,.45); transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }
.login-hint { font-size: .8rem; color: #94A3B8; text-align: center; margin-top: 20px; line-height: 1.6; }
.login-hint strong { color: #E2E8F0; }

/* ── MAIN LAYOUT ────────────────────────────────────────────── */
#app { display: none; min-height: 100vh; flex-direction: column; }
#app.visible { display: flex; }

/* ── TOP NAVBAR ────────────────────────────────────────────── */
#topnav {
  background: #161B27;
  border-bottom: 1px solid #2D3748;
  color: white;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 16px rgba(0,0,0,.5);
  flex-shrink: 0;
}
.topnav-inner {
  display: flex; align-items: center;
  height: 56px; padding: 0 20px; gap: 0;
  overflow: visible;
}
.topnav-logo {
  display: flex; align-items: center; gap: 10px;
  margin-right: 24px; flex-shrink: 0; text-decoration: none;
}
.topnav-logo .logo-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), #3B82F6);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
}
.topnav-logo span { font-family: var(--font-head); font-size: 1rem; font-weight: 800; letter-spacing: -.01em; color: white; }
.topnav-logo span em { font-style: normal; color: #60A5FA; }

/* ── Dropdown menu items ── */
.topnav-menu { display: flex; align-items: stretch; flex: 1; gap: 2px; flex-wrap: nowrap; overflow: visible; }
.topnav-item { position: relative; }
.topnav-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 0 14px; height: 56px;
  background: none; border: none; color: rgba(255,255,255,.78);
  font-family: var(--font-body); font-size: .875rem; font-weight: 600;
  cursor: pointer; white-space: nowrap;
  transition: color .15s, background .15s;
  border-bottom: 3px solid transparent;
}
.topnav-btn:hover { color: white; background: rgba(255,255,255,.07); }
.topnav-btn.active { color: white; border-bottom-color: var(--accent); }
.topnav-btn .nav-arrow { font-size: .6rem; opacity: .55; transition: transform .2s; margin-left: 2px; }
.topnav-item:hover .nav-arrow { transform: rotate(180deg); }

/* ── Dropdown panel ── */
.topnav-dropdown {
  position: absolute; top: calc(100% + 4px); left: 0;
  background: #1E2433; border: 1px solid #2D3748; border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
  min-width: 220px; padding: 6px;
  opacity: 0; visibility: hidden; pointer-events: none;
  transform: translateY(-8px);
  transition: opacity .18s, transform .18s, visibility .18s;
  z-index: 200;
}
.topnav-item.open .topnav-dropdown {
  opacity: 1; visibility: visible; pointer-events: auto;
  transform: translateY(0);
}
.topnav-item.open .nav-arrow { transform: rotate(180deg); }
.dropdown-section-title {
  font-size: .68rem; font-weight: 700; color: #94A3B8;
  text-transform: uppercase; letter-spacing: .08em;
  padding: 8px 12px 4px; margin-top: 4px;
}
.dropdown-section-title:first-child { margin-top: 0; }
.dropdown-item {
  display: flex; align-items: center; gap: 9px;
  padding: 9px 12px; border-radius: 8px;
  background: none; border: none; width: 100%; text-align: left;
  font-family: var(--font-body); font-size: .875rem; font-weight: 500;
  color: #CBD5E0; cursor: pointer;
  transition: background .12s, color .12s;
}
.dropdown-item:hover { background: #252D3D; color: var(--accent); }
.dropdown-item.active { background: var(--accent-l); color: var(--accent); font-weight: 600; }
.dropdown-item .d-icon { width: 20px; text-align: center; font-size: .95rem; flex-shrink: 0; }
.dropdown-divider { height: 1px; background: #252D3D; margin: 4px 8px; }
.dropdown-danger { color: var(--red) !important; }
.dropdown-danger:hover { background: var(--red-l) !important; }

/* ── Right side (season + user) ── */
.topnav-right { margin-left: auto; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.season-pill {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 12px; border-radius: 99px;
  background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12);
}
.season-pill label { font-size: .75rem; color: rgba(255,255,255,.6); font-weight: 600; white-space: nowrap; cursor: default; }
.season-pill select {
  background: none; border: none; color: white;
  font-family: var(--font-body); font-size: .82rem; font-weight: 700;
  cursor: pointer; outline: none; padding: 0;
}
.season-pill select option { color: #E2E8F0; background: white; }

/* ── User chip ── */
.topnav-user { position: relative; }
.topnav-user-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 10px; border-radius: 99px;
  background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12);
  cursor: pointer; transition: background .15s;
}
.topnav-user-btn:hover { background: rgba(255,255,255,.14); }
.user-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #3B82F6);
  display: flex; align-items: center; justify-content: center;
  font-size: .72rem; font-weight: 700; color: white; flex-shrink: 0;
}
.topnav-user-btn .uname { font-size: .82rem; font-weight: 600; color: white; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.user-dropdown {
  position: absolute; top: calc(100% + 8px); right: 0;
  background: #1E2433; border: 1px solid #2D3748; border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
  min-width: 200px; padding: 6px;
  opacity: 0; visibility: hidden; pointer-events: none;
  transform: translateY(-8px);
  transition: opacity .18s, transform .18s, visibility .18s;
  z-index: 200;
}
.topnav-user.open .user-dropdown {
  opacity: 1; visibility: visible; pointer-events: auto;
  transform: translateY(0);
}
.user-dropdown-header {
  padding: 10px 12px 8px; border-bottom: 1px solid #2D3748; margin-bottom: 4px;
}
.user-dropdown-header .uname-full { font-weight: 700; font-size: .9rem; color: #E2E8F0; }
.user-dropdown-header .urole { font-size: .75rem; color: #94A3B8; margin-top: 2px; }

/* ── Bottom navigation bar (mobile only) ── */
#bottom-nav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 101;
  background: #161B27;
  border-top: 1px solid #2D3748;
  box-shadow: 0 -4px 20px rgba(0,0,0,.4);
  padding: 6px 4px max(6px, env(safe-area-inset-bottom));
  display: none;
  grid-template-columns: repeat(5, 1fr);
  align-items: stretch;
}
.bn-item {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; padding: 6px 4px; border: none; background: none;
  cursor: pointer; border-radius: 10px; transition: background .15s;
  min-height: 52px;
}
.bn-item:hover, .bn-item:active { background: #1E2433; }
.bn-item.active { background: #1E2D4A; }
.bn-item.active .bn-icon { filter: none; }
.bn-item.active .bn-label { color: var(--accent); font-weight: 700; }
.bn-icon { font-size: 1.3rem; line-height: 1; }
.bn-label { font-size: .64rem; font-weight: 600; color: #94A3B8; white-space: nowrap; font-family: var(--font-body); }

@media (max-width: 900px) {
  #bottom-nav { display: grid; }
  /* Push content above bottom nav */
  #content-area { padding-bottom: max(80px, calc(68px + env(safe-area-inset-bottom))); }
  /* Adjust mobile menu to not cover bottom nav */
  #mobile-menu { inset: 56px 0 calc(68px + env(safe-area-inset-bottom)) 0; }
}

/* ── Mobile hamburger ── */
#sidebar-toggle {
  display: none;
  background: none; border: none; color: white;
  font-size: 1.3rem; cursor: pointer; padding: 6px 8px;
  border-radius: 8px; transition: background .15s;
}
#sidebar-toggle:hover { background: rgba(255,255,255,.1); }

/* ── Mobile full-screen menu ── */
#mobile-menu {
  display: none;
  position: fixed; inset: 56px 0 0 0; z-index: 99;
  background: var(--ink); overflow-y: auto;
  padding: 12px 12px max(12px, env(safe-area-inset-bottom));
  -webkit-overflow-scrolling: touch;
}
#mobile-menu.open { display: block; }
.mobile-nav-section { margin-bottom: 16px; }
.mobile-nav-title {
  font-size: .68rem; font-weight: 700; color: rgba(255,255,255,.35);
  text-transform: uppercase; letter-spacing: .1em;
  padding: 6px 10px 4px;
}
.mobile-nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 8px;
  background: none; border: none; color: rgba(255,255,255,.75);
  font-family: var(--font-body); font-size: .9rem; font-weight: 500;
  cursor: pointer; width: 100%; text-align: left;
  transition: background .12s, color .12s;
}
.mobile-nav-item:hover { background: rgba(255,255,255,.06); color: white; }

@media (max-width: 900px) {
  .topnav-menu { display: none; }
  #sidebar-toggle { display: block; }
  .topnav-logo { margin-right: auto; }
  .season-pill label { display: none; }
  #top-bar { top: 56px; }
}
@media (max-width: 480px) {
  #top-bar { top: 52px; }
}

/* Main content — full width, no left margin */
#main-content, .main-content {
  flex: 1; overflow-x: hidden; display: flex; flex-direction: column;
  min-height: 0;
}

#top-bar {
  height: var(--header-h); background: #161B27;
  border-bottom: 1px solid #2D3748;
  display: flex; align-items: center; padding: 0 28px;
  position: sticky; top: 56px; z-index: 50;
  box-shadow: 0 2px 8px rgba(0,0,0,.3);
}
.topbar-title { font-size: 1.1rem; font-weight: 700; color: #E2E8F0; font-family: var(--font-head); }
.topbar-breadcrumb { font-size: .8rem; color: #94A3B8; margin-left: 10px; }
.topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 10px; }

#content-area { flex: 1; padding: 28px; overflow-y: auto; background: #0D1117; }

/* ── VIEW TRANSITIONS ───────────────────────────────────────── */
.view { display: none; animation: viewIn .3s cubic-bezier(.22,1,.36,1) both; }
.view.active { display: block; overflow-x: hidden; min-width: 0; overflow-y: auto; max-height: calc(100vh - 120px); }
@keyframes viewIn { from { opacity:0; transform:translateY(10px); } }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── PAGE HEADER ────────────────────────────────────────────── */
.page-header { margin-bottom: 28px; }
.page-header h2 { font-size: 1.65rem; color: #E2E8F0; letter-spacing: -.03em; }
.page-header p { color: #94A3B8; font-size: .9rem; margin-top: 4px; }
.page-header .header-row { display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 12px; }

/* ── CARDS ──────────────────────────────────────────────────── */
.card {
  background: #161B27; border-radius: var(--radius-lg);
  box-shadow: 0 2px 8px rgba(0,0,0,.3); border: 1px solid #2D3748;
  padding: 22px; overflow: hidden;
}
.card-title { font-size: .95rem; font-weight: 700; color: #E2E8F0; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.card-title .icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }

/* ── STAT CARDS ─────────────────────────────────────────────── */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
.stat-card {
  background: #161B27; border-radius: var(--radius-lg);
  padding: 20px; border: 1px solid #2D3748; box-shadow: 0 2px 6px rgba(0,0,0,.3);
  position: relative; overflow: hidden; transition: box-shadow .2s, transform .2s;
}
.stat-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.4); transform: translateY(-2px); }
.stat-card .label { font-size: .78rem; font-weight: 600; color: #94A3B8; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
.stat-card .value { font-size: 2rem; font-weight: 800; font-family: var(--font-head); line-height: 1; margin-bottom: 4px; }
.stat-card .sub { font-size: .78rem; color: #94A3B8; }
.stat-card .accent-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: 4px 0 0 4px; }
.stat-card.blue .accent-bar { background: var(--accent); }
.stat-card.blue .value { color: var(--accent); }
.stat-card.gold .accent-bar { background: var(--gold); }
.stat-card.gold .value { color: var(--gold); }
.stat-card.green .accent-bar { background: var(--green); }
.stat-card.green .value { color: var(--green); }
.stat-card.red .accent-bar { background: var(--red); }
.stat-card.red .value { color: var(--red); }
.stat-card.purple .accent-bar { background: var(--purple); }
.stat-card.purple .value { color: var(--purple); }
.stat-card.teal .accent-bar { background: var(--teal); }
.stat-card.teal .value { color: var(--teal); }

/* ── GRID LAYOUTS ───────────────────────────────────────────── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
.grid-auto { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
/* ── RESPONSIVE / MOBILE ─────────────────────────────────────── */

@media (max-width: 900px) {
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .convocati-grid { grid-template-columns: 1fr; }
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { min-width: 500px; }
  .header-row { flex-direction: column; align-items: flex-start; gap: 10px; }
  .header-row > div:last-child { width: 100%; }
  .header-row .btn { flex: 1; justify-content: center; }
  .card { margin-bottom: 12px; }
  .filter-bar {
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  padding: 14px 20px; background: #161B27;
  border-bottom: 1px solid #2D3748; margin-bottom: 20px;
  border-radius: var(--radius-lg);
}
  .filter-bar input, .filter-bar select { min-width: 0; flex: 1 1 140px; }
  #top-bar { flex-wrap: wrap; gap: 6px; min-height: 52px; padding: 0 14px; }
  .modal { max-width: 100vw !important; width: 100vw; margin: 0; border-radius: 0; min-height: 100vh; }
  .modal-overlay { padding: 0; align-items: flex-end; }
  .modal-xl { max-width: 100vw !important; }
  .modal-lg { max-width: 100vw !important; }

/* ── SCROLLBAR — top + bottom via CSS ───────────────────────── */
/* Mirror scrollbar trick: shows scrollbar at top AND bottom for wide tables */
.table-wrap-x {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  /* Custom scrollbar styling */
  scrollbar-width: thin;
  scrollbar-color: var(--mist-3) transparent;
}
.table-wrap-x::-webkit-scrollbar { height: 6px; }
.table-wrap-x::-webkit-scrollbar-track { background: #1E2433; border-radius: 4px; }
.table-wrap-x::-webkit-scrollbar-thumb { background: var(--mist-3); border-radius: 4px; }
.table-wrap-x::-webkit-scrollbar-thumb:hover { background: var(--ink-3); }

/* Double-scroll wrapper: places scrollbar at top via transform trick */
.table-scroll-top {
  overflow-x: auto;
  overflow-y: hidden;
  transform: rotateX(180deg);
  scrollbar-width: thin;
}
.table-scroll-top > * {
  transform: rotateX(180deg);
}

/* All table-wraps get smooth scrolling and visible scrollbar */
.table-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: var(--mist-3) transparent;
  padding-bottom: 4px; /* space for scrollbar */
}
.table-wrap::-webkit-scrollbar { height: 5px; }
.table-wrap::-webkit-scrollbar-track { background: #1E2433; }
.table-wrap::-webkit-scrollbar-thumb { background: var(--mist-3); border-radius: 4px; }

/* ── CONTENT SIZING ─────────────────────────────────────────── */
/* Ensure views never exceed viewport */


/* Cards: prevent overflow on narrow screens */
.card { min-width: 0; overflow: hidden; }
.stat-card { min-width: 0; }
.stat-card .value { font-size: clamp(1.4rem, 3vw, 2.2rem); }
.stat-card .label { font-size: clamp(.7rem, 1.5vw, .8rem); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.stat-card[onclick] { transition: box-shadow .18s, transform .18s, filter .15s; }
.stat-card[onclick]:hover { box-shadow: var(--shadow-lg); transform: translateY(-3px) scale(1.02); filter: brightness(1.03); }
.stat-card[onclick]:active { transform: translateY(0) scale(.99); }

/* ── PASSWORD STRENGTH ───────────────────────────────────────── */
#pw-strength-bar-wrap { animation: fadeIn .2s ease both; }


/* Page header: always wrap gracefully */
.page-header h2 { font-size: clamp(1.1rem, 3vw, 1.65rem); }

/* Tables: always scrollable horizontally */
.table-wrap table { min-width: min-content; }

/* ── TABLES ─────────────────────────────────────────────────── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: .88rem;  min-width: 0;}
thead th {
  padding: 10px 14px; text-align: left; font-size: .75rem; font-weight: 700;

}

tbody tr:hover { background: #1E2433; }
tbody td { padding: 11px 14px; vertical-align: middle; }
tbody tr:last-child { border-bottom: none; }

/* ── BUTTONS ────────────────────────────────────────────────── */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 8px; font-size: .85rem; font-weight: 600; border: none; cursor: pointer; transition: all .2s; white-space: nowrap; }
.btn-sm { padding: 6px 12px; font-size: .8rem; }
.btn-lg { padding: 12px 22px; font-size: .95rem; }
.btn-accent { background: var(--accent); color: white; box-shadow: 0 2px 8px rgba(26,86,219,.3); }
.btn-accent:hover { background: var(--accent-h); box-shadow: 0 4px 14px rgba(26,86,219,.4); transform: translateY(-1px); }
.btn-ghost { background: transparent; color: #94A3B8; border: 1.5px solid #2D3748; }
.btn-ghost:hover { background: #1E2433; color: #E2E8F0; border-color: var(--mist-3); }
.btn-danger { background: var(--red); color: white; }
.btn-danger:hover { background: #B91C1C; }
.btn-success { background: var(--green); color: white; }
.btn-success:hover { background: #047857; }
.btn-gold { background: var(--gold); color: white; }
.btn-gold:hover { background: #B45309; }

/* ── BADGES ─────────────────────────────────────────────────── */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 99px; font-size: .75rem; font-weight: 700; }
.badge-blue { background: var(--accent-l); color: var(--accent); }
.badge-gold { background: var(--gold-l); color: var(--gold); }
.badge-green { background: var(--green-l); color: var(--green); }
.badge-red { background: var(--red-l); color: var(--red); }
.badge-purple { background: var(--purple-l); color: var(--purple); }
.badge-teal { background: var(--teal-l); color: var(--teal); }

/* ── ACTIVITY TYPE CHIPS ────────────────────────────────────── */
.act-chip { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 99px; font-size: .78rem; font-weight: 700; }
.act-A { background: rgba(26,86,219,.1); color: var(--sport-a); }

.act-PS { background: rgba(124,58,237,.1); color: var(--sport-ps); }

/* ── FORMS ───────────────────────────────────────────────────── */
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-row.trio { grid-template-columns: 1fr 1fr 1fr; }
.form-field { display: flex; flex-direction: column; gap: 5px; }
.form-field label { font-size: .78rem; font-weight: 600; color: #94A3B8; text-transform: uppercase; letter-spacing: .04em; }
.form-field input, .form-field select, .form-field textarea {
  padding: 9px 12px; border: 1.5px solid #2D3748; border-radius: 8px;
  font-size: .9rem; color: #E2E8F0; background: #1E2433;
  transition: border-color .2s, box-shadow .2s; outline: none;
}
.form-field input:focus, .form-field select:focus, .form-field textarea:focus {
  border-color: var(--accent); background: white; box-shadow: 0 0 0 3px rgba(26,86,219,.1);
}
.form-field textarea { resize: vertical; min-height: 80px; }
.form-actions { display: flex; gap: 10px; padding-top: 8px; }
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.45);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; padding: 20px; backdrop-filter: blur(3px);
  animation: fadeIn .2s;
}
@keyframes fadeIn { from { opacity: 0; } }
.modal {
  background: white; border-radius: 18px; padding: 30px;
  width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto;

.modal-xl { max-width: 960px; }

.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
.modal-header h3 { font-size: 1.2rem; color: #E2E8F0; }
.modal-close { background: none; border: none; cursor: pointer; font-size: 1.3rem; color: #94A3B8; padding: 4px; border-radius: 6px; }
.modal-close:hover { background: #1E2433; color: var(--red); }

/* ── PROGRESS BAR ───────────────────────────────────────────── */
.progress-bar { height: 6px; background: #252D3D; border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 99px; transition: width .5s cubic-bezier(.22,1,.36,1); }
.progress-fill.green { background: var(--green); }
.progress-fill.gold { background: var(--gold); }
.progress-fill.red { background: var(--red); }
.progress-fill.blue { background: var(--accent); }

/* ── ATTENDANCE MATRIX ─────────────────────────────────────── */
.att-matrix { font-size: .8rem; }
.att-matrix table { border-collapse: separate; border-spacing: 2px; }
.att-matrix th { font-size: .68rem; padding: 4px 6px; background: #1E2433; border-radius: 4px; }
.att-cell {
  width: 32px; height: 32px; border-radius: 6px; display: inline-flex;
  align-items: center; justify-content: center; font-size: .75rem; font-weight: 700;
  cursor: pointer; transition: transform .1s; user-select: none; border: none;
}
.att-cell:hover { transform: scale(1.15); }
.att-P { background: var(--green-l); color: var(--green); }
.att-A { background: var(--red-l); color: var(--red); }
.att-G { background: var(--gold-l); color: var(--gold); }
.att-empty { background: #252D3D; color: #94A3B8; }
.att-C  { background: var(--accent-l); color: var(--accent); }
.att-NC { background: #252D3D;   color: #94A3B8; }

/* ── PERFORMANCE STARS ─────────────────────────────────────── */
.stars { display: flex; gap: 2px; }
.star { font-size: 1rem; cursor: pointer; color: var(--mist-3); transition: color .1s; }
.star.on { color: var(--gold); }

/* ── PERF RADAR (CSS-only mini chart) ─────────────────────── */
.perf-bars { display: flex; flex-direction: column; gap: 8px; }
.perf-bar-row { display: flex; align-items: center; gap: 10px; }
.perf-bar-label { font-size: .78rem; color: #94A3B8; width: 100px; flex-shrink: 0; }
.perf-bar-track { flex: 1; height: 8px; background: #252D3D; border-radius: 99px; overflow: hidden; }
.perf-bar-fill { height: 100%; border-radius: 99px; background: var(--accent); transition: width .6s cubic-bezier(.22,1,.36,1); }
.perf-bar-val { font-size: .78rem; font-weight: 700; color: #E2E8F0; width: 28px; text-align: right; font-family: var(--font-mono); }

/* ── TABS ────────────────────────────────────────────────────── */

.tab-btn {
  flex: 1; padding: 8px 14px; border: none; border-radius: 7px; cursor: pointer;

.entity-card {

.filter-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
.filter-bar input { flex: 1; min-width: 200px; padding: 9px 14px; border: 1.5px solid #2D3748; border-radius: 8px; font-size: .9rem; background: white; outline: none; }

.toast {
  background: var(--ink); color: white; padding: 12px 18px; border-radius: 10px;
  font-size: .88rem; font-weight: 500; box-shadow: var(--shadow-lg);

  animation: toastIn .3s cubic-bezier(.22,1,.36,1) both;
}

.toast.error { background: var(--red); }

/* ── CHART PLACEHOLDER ──────────────────────────────────────── */
.mini-chart { position: relative; }
.bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 100px; padding: 0 4px; }
.bar-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }

.bar-label { font-size: .65rem; color: #94A3B8; text-align: center; }

/* ── PARTITE & CONVOCATI ─────────────────────────────────────── */
.match-card {

  box-shadow: var(--shadow); margin-bottom: 16px;
  transition: transform .2s, box-shadow .2s;
}

  padding: 18px 22px; color: white; position: relative;
  display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
}

  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to right, rgba(0,0,0,.3) 0%, transparent 100%);
  pointer-events: none;
}

<script>
// ── CONFIGURAZIONE SUPABASE ────────────────────────────────────
// Sostituisci con i tuoi valori dal pannello Supabase → Settings → API
// ── CONFIGURAZIONE SUPABASE ─────────────────────────────────
// Sostituisci questi valori con le tue credenziali Supabase:
// Supabase Dashboard → Settings → API
// Le credenziali sono in config.js (caricato prima di questo script)

<script>
// ── INIT CLIENT ────────────────────────────────────────────────
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);







// ── MODALITÀ: 'supabase' o 'local' (fallback localStorage) ────
let DB_MODE = 'supabase';

// ── ADATTATORE DB ──────────────────────────────────────────────
// Mappa i nomi interni dell'app (camelCase) → colonne Supabase (snake_case)

const DB = {

  // ── AUTH ─────────────────────────────────────────────────────
  async login(username, password) {
    const email = username.includes('@') ? username : username + '@sporttrackpro.it';
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) throw new Error(error.message);

    // Carica profilo — prova prima con RPC (bypassa RLS), poi diretto, poi fallback
    let profile = null;

    // Tentativo 1: RPC get_my_profile (SECURITY DEFINER, bypassa RLS)
    try {
      const { data: rpcData, error: rpcErr } = await sb.rpc('get_my_profile');
      if (!rpcErr && rpcData) { profile = rpcData; }
    } catch(e) {}

    // Tentativo 2: lettura diretta (funziona se RLS è disabilitato o policy ok)
    if (!profile) {
      const { data: direct } = await sb
        .from('users').select('*').eq('id', data.user.id).maybeSingle();
      if (direct) profile = direct;
    }

    // Tentativo 3: fallback dai metadati auth
    if (!profile) {
      profile = {
        id: data.user.id,
        email: data.user.email,
        name: data.user.user_metadata?.name || data.user.email.split('@')[0],
        username: data.user.user_metadata?.username || data.user.email.split('@')[0],
        role: data.user.user_metadata?.role || 'admin',
        society_id: data.user.user_metadata?.society_id || null,
      };
    }

    return profile;
  },

  async logout() {
    await sb.auth.signOut();
  },

  async currentSession() {
    const { data } = await sb.auth.getSession();
    return data.session;
  },

  // ── LOAD ALL (rimpiazza loadState) ────────────────────────────
  async loadAll() {
    const [
      sports, societies, teams, categories, users,
      athletes, athleteSeasons, seasons,
      sessions, attendances, matches, convocati, performances, scorers
    ] = await Promise.all([
      sb.from('sports').select('*'),
      sb.from('societies').select('*'),
      sb.from('teams').select('*'),
      sb.from('categories').select('*'),
      sb.from('users').select('*'),
      sb.from('athletes').select('*'),
      sb.from('athlete_seasons').select('*'),
      sb.from('seasons').select('*').order('start_year', { ascending: false }),
      sb.from('sessions').select('*').order('date', { ascending: false }),
      sb.from('attendances').select('*'),
      sb.from('matches').select('*').order('date', { ascending: false }),
      sb.from('convocati').select('*'),
      sb.from('performances').select('*'),
      sb.from('scorers').select('*'),
    ]);

    // Converti snake_case → camelCase per compatibilità con il codice esistente
    return {
      sports:         (sports.data||[]).map(r => ({ id:r.id, name:r.name, icon:r.icon||'⚽' })),
      societies:      (societies.data||[]).map(r => ({ id:r.id, name:r.name, sportId:r.sport_id, city:r.city||'', email:r.email||'' })),
      teams:          (teams.data||[]).map(r => ({ ...r, societyId: r.society_id, sportId: r.sport_id })),
      categories:     (categories.data||[]).map(r => ({
        ...r, societyId: r.society_id, sportId: r.sport_id,
        teamId: r.team_id, teamIds: r.team_ids||[r.team_id].filter(Boolean),
        managerIds: r.manager_ids||[], directorIds: r.director_ids||[],
        coachIds: r.coach_ids||[], professionalIds: r.prof_ids||[]
      })),
      users:          (users.data||[]).map(r => ({
        ...r, societyId: r.society_id
      })),
      athletes:       (athletes.data||[]).map(r => ({
        ...r, firstName: r.first_name, lastName: r.last_name,
        categoryId: r.category_id, teamId: r.team_id, societyId: r.society_id,
        parentIds: r.parent_ids || []
      })),
      athleteSeasons: (athleteSeasons.data||[]).map(r => ({
        ...r, athleteId: r.athlete_id, categoryId: r.category_id,
        seasonId: r.season_id, teamId: r.team_id, shirtNumber: r.shirt_number,
        joinDate: r.join_date, societyId: r.society_id
      })),
      seasons:        (seasons.data||[]).map(r => ({
        ...r, societyId: r.society_id, startYear: r.start_year, endYear: r.end_year
      })),
      sessions:       (sessions.data||[]).map(r => ({
        ...r, categoryId: r.category_id, createdBy: r.created_by,
        matchId: r.match_id, societyId: r.society_id
      })),
      attendances:    (attendances.data||[]).map(r => ({
        ...r, sessionId: r.session_id, athleteId: r.athlete_id, societyId: r.society_id
      })),
      matches:        (matches.data||[]).map(r => ({
        ...r, categoryId: r.category_id, homeAway: r.home_away,
        scoredGoals: r.scored, concededGoals: r.conceded,
        bgColor: r.bg_color, createdBy: r.created_by, societyId: r.society_id,
        meetTime: r.meet_time, meetPlace: r.meet_place
      })),
      convocati:      (convocati.data||[]).map(r => ({
        ...r, matchId: r.match_id, athleteId: r.athlete_id, societyId: r.society_id
      })),
      scorers:        (scorers.data||[]).map(r => ({
        ...r, matchId: r.match_id, athleteId: r.athlete_id
      })),
      performances:   (performances.data||[]).map(r => ({
        ...r, sessionId: r.session_id, athleteId: r.athlete_id, societyId: r.society_id
      })),
      activeSeason:   null, // calcolato dopo
      staffHistory:   [],
      activityTypes:  null,
      perfParams:     null,
      sessionTypePerfParams: null,
    };
  },

  // ── SAVE HELPER (converte camelCase → snake_case) ─────────────
  _toSnake(obj, map) {
    const out = {};
    for (const [k,v] of Object.entries(obj)) {
      out[map[k]||k] = v;
    }
    return out;
  },

  // ── UPSERT GENERICO ──────────────────────────────────────────
  async upsert(table, data) {
    const { error } = await sb.from(table).upsert(data, { onConflict: 'id' });
    if (error) throw error;
  },

  async insert(table, data) {
    const { data: d, error } = await sb.from(table).insert(data).select().single();
    if (error) throw error;
    return d;
  },

  async update(table, id, data) {
    const { error } = await sb.from(table).update(data).eq('id', id);
    if (error) throw error;
  },

  async delete(table, id) {
    const { error } = await sb.from(table).delete().eq('id', id);
    if (error) throw error;
  },

  // ── SAVE ATHLETE ──────────────────────────────────────────────
  async saveAthlete(a) {
    return this.upsert('athletes', {
      id: a.id, first_name: a.firstName, last_name: a.lastName,
      dob: a.dob||null, nickname: a.nickname||'',
      category_id: a.categoryId||null, team_id: a.teamId||null,
      number: a.number||null, role: a.role||'', notes: a.notes||''
    });
  },

  async deleteAthlete(id) { return this.delete('athletes', id); },

  // ── SAVE SESSION ──────────────────────────────────────────────
  async saveSession(s) {
    return this.upsert('sessions', {
      id: s.id, category_id: s.categoryId, date: s.date,
      type: s.type, notes: s.notes||'', match_id: s.matchId||null,
      created_by: s.createdBy||null
    });
  },

  async deleteSession(id) { return this.delete('sessions', id); },

  // ── SAVE ATTENDANCE ───────────────────────────────────────────
  async saveAttendance(a) {
    return this.upsert('attendances', {
      id: a.id, session_id: a.sessionId, athlete_id: a.athleteId, status: a.status
    });
  },

  async deleteAttendancesBySession(sessionId) {
    const { error } = await sb.from('attendances').delete().eq('session_id', sessionId);
    if (error) throw error;
  },

  // ── SAVE MATCH ────────────────────────────────────────────────
  async saveMatch(m) {
    return this.upsert('matches', {
      id: m.id, category_id: m.categoryId, date: m.date, time: m.time||null,
      meet_time: m.meetTime||null, meet_place: m.meetPlace||null,
      opponent: m.opponent||'', home_away: m.homeAway||'home',
      result: m.result||'TBD', scored: m.scoredGoals||0, conceded: m.concededGoals||0,
      notes: m.notes||'', bg_color: m.bgColor||'#1A3A5C', created_by: m.createdBy||null
    });
  },

  async deleteMatch(id) { return this.delete('matches', id); },

  // ── SAVE CONVOCATO ────────────────────────────────────────────
  async saveConvocato(c) {
    return this.upsert('convocati', {
      id: c.id, match_id: c.matchId, athlete_id: c.athleteId,
      status: c.status, notes: c.notes||''
    });
  },

  // ── SAVE PERFORMANCE ─────────────────────────────────────────
  async savePerformance(p) {
    return this.upsert('performances', {
      id: p.id, session_id: p.sessionId, athlete_id: p.athleteId,
      params: p.params||{}, notes: p.notes||''
    });
  },

  // ── SAVE CATEGORY ─────────────────────────────────────────────
  async saveCategory(c) {
    return this.upsert('categories', {
      id: c.id, name: c.name, sport_id: c.sportId||null,
      society_id: c.societyId||null, team_id: c.teamId||null,
      team_ids: c.teamIds||[], manager_ids: c.managerIds||[],
      director_ids: c.directorIds||[], coach_ids: c.coachIds||[],
      prof_ids: c.professionalIds||[]
    });
  },

  // ── SAVE USER ─────────────────────────────────────────────────
  async saveUser(u) {
    return this.upsert('users', {
      id: u.id, name: u.name, username: u.username,
      email: u.email||'', role: u.role, profession: u.profession||'',
      phone: u.phone||'', society_id: u.societyId||null
    });
  },

  // ── SAVE SPORT ────────────────────────────────────────────────
  async saveSport(s) {
    return this.upsert('sports', { id: s.id, name: s.name, icon: s.icon||'⚽' });
  },

  // ── SAVE SEASON ───────────────────────────────────────────────
  async saveSeason(s) {
    return this.upsert('seasons', {
      id: s.id, name: s.name, start_year: s.startYear,
      end_year: s.endYear, active: s.active||false
    });
  },

  // ── SAVE ATHLETE SEASON ───────────────────────────────────────
  async saveAthleteSeason(as) {
    return this.upsert('athlete_seasons', {
      id: as.id, athlete_id: as.athleteId, category_id: as.categoryId,
      season_id: as.seasonId, team_id: as.teamId||null,
      role: as.role||'', shirt_number: as.shirtNumber||null,
      join_date: as.joinDate||null, notes: as.notes||''
    });
  },

  // ── REALTIME SUBSCRIPTION (opzionale, aggiorna live) ──────────
  subscribeToChanges(callback) {
    return sb.channel('sporttrack-changes')
      .on('postgres_changes', { event: '*', schema: 'public' }, callback)
      .subscribe();
  },

  // ── CHANGE PASSWORD ───────────────────────────────────────────
  async changePassword(newPassword) {
    const { error } = await sb.auth.updateUser({ password: newPassword });
    if (error) throw error;
  },

  // ── CREATE USER (admin) ───────────────────────────────────────
  async createUser(username, password, name, role, societyId) {
    const email = username + '@sporttrackpro.it';
    // Usa Admin API tramite edge function (necessita service role)
    // Per ora: inserisce direttamente in users, auth va fatto manualmente
    const id = crypto.randomUUID();
    await this.insert('users', {
      id, name, username, email, role, society_id: societyId
    });
    return { id, username, name, role };
  },
};

// ══════════════════════════════════════════════════════════════════
//  sbSync — helper centralizzato sync diretto su Supabase
//  Chiamato ESPLICITAMENTE da ogni funzione CRUD dopo aver modificato S
//  sbSync('athletes', obj)        → upsert
//  sbSync('athletes', id, true)   → delete
//  sbSync('athletes', [o1,o2])    → upsert multiplo
// ══════════════════════════════════════════════════════════════════
async function sbSync(table, objOrId, isDelete = false) {
  if (DB_MODE !== 'supabase' || !currentUser) return;
  // Verifica sessione attiva
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    console.warn('[sbSync] Nessuna sessione attiva — skip sync');
    toast('⚠️ Sessione scaduta, rieffettua il login', 'warning');
    return;
  }
  try {
    if (isDelete) {
      const id = typeof objOrId === 'string' ? objOrId : objOrId?.id;
      if (!id) return;
      const { error } = await sb.from(table).delete().eq('id', id);
      if (error) throw error;
      console.log(`[sbSync] DELETE ${table} id=${id} ✅`);
      return;
    }
    const rows = Array.isArray(objOrId) ? objOrId : [objOrId];
    // Assicura che society_id sia valorizzato per tabelle che lo richiedono
    const TABLES_WITH_SOCIETY = ['categories','athletes','sessions','matches',
      'attendances','performances','convocati','athlete_seasons','seasons','teams'];
    const fallbackSocId = currentUser.societyId || S.societies?.[0]?.id || null;
    const enriched = rows.map(obj => {
      if (TABLES_WITH_SOCIETY.includes(table) && !obj.societyId && !obj.society_id) {
        return { ...obj, societyId: fallbackSocId };
      }
      return obj;
    });
    const mapped = enriched.map(obj => toSnakeCase(table, obj));
    if (mapped.length === 0) return;
    console.log(`[sbSync] UPSERT ${table}`, mapped);
    // Upsert robusto: prova upsert, se 409/23505 fa update esplicito
    const { error } = await sb.from(table).upsert(mapped, {
      onConflict: 'id',
      ignoreDuplicates: false
    });
    if (error) {
      // 409 o 23505 = record già esistente → prova UPDATE esplicito
      if (error.code === '23505' || error.status === 409 || (error.message||'').includes('409')) {
        console.warn(`[sbSync] Upsert conflict su ${table}, provo UPDATE esplicito...`);
        let updateOk = true;
        for (const row of mapped) {
          const { id, ...fields } = row;
          if (!id) continue;
          const { error: updErr } = await sb.from(table).update(fields).eq('id', id);
          if (updErr) {
            console.error(`[sbSync] UPDATE fallito su ${table} id=${id}:`, updErr.message);
            updateOk = false;
          }
        }
        if (updateOk) {
          console.log(`[sbSync] UPDATE ${table} OK ✅`);
          const lbl = document.getElementById('db-status-label');
          if (lbl) { lbl.textContent = 'Salvato ✓'; setTimeout(() => { lbl.textContent = 'Supabase'; }, 2000); }
          return;
        }
      }
      console.error(`[sbSync] ERRORE ${table}:`, error);
      let msg = error.message;
      if (error.code === '42501') msg = `Permesso negato su "${table}" — controlla RLS policies`;
      if (error.code === 'PGRST301') msg = `JWT scaduto — rieffettua il login`;
      toast(`❌ DB ${table}: ${msg}`, 'error');
      return;
    }
    console.log(`[sbSync] UPSERT ${table} OK ✅`);
    // Aggiorna indicatore sync nella topbar
    const lbl = document.getElementById('db-status-label');
    if (lbl) { lbl.textContent = 'Salvato ✓'; setTimeout(() => { lbl.textContent = 'Supabase'; }, 2000); }
  } catch(e) {
    console.error(`[sbSync] exception su ${table}:`, e);
    toast(`❌ Errore sync ${table}: ${e.message}`, 'error');
  }
}

async function sbSyncDeleteWhere(table, col, val) {
  if (DB_MODE !== 'supabase' || !currentUser) return;
  try {
    const { error } = await sb.from(table).delete().eq(col, val);
    if (error) console.error(`[sbSyncDeleteWhere] ${table}.${col}=${val}:`, error.message);
  } catch(e) { console.error(e); }
}
// ══════════════════════════════════════════════════════════════════
//  RPC HELPERS — chiamate a funzioni PostgreSQL SECURITY DEFINER
// ══════════════════════════════════════════════════════════════════
// ── GESTIONE UTENTI — solo anon key, nessuna service role ────

async function rpcCreateUser(params) {
  // Usa RPC create_app_user (SECURITY DEFINER) — crea Auth + profilo in un solo step
  const { data, error } = await sb.rpc('create_app_user', {
    p_email:      params.email,
    p_password:   params.password,
    p_name:       params.name,
    p_username:   params.username,
    p_role:       params.role,
    p_profession: params.profession || '',
    p_phone:      params.phone || '',
    p_society_id: params.society_id || null,
  });
  if (error) throw new Error(error.message);
  return data; // { id, email, username, name, role }
}

async function rpcResetPassword(userId, newPassword) {
  // Solo l'utente stesso può cambiare la propria password via Supabase Auth
  // Per reset admin → usa Supabase Dashboard → Authentication → Users
  throw new Error('Per resettare la password di altri utenti usa Supabase Dashboard → Authentication → Users → azione "..." → Reset password');
}

async function rpcDeleteUser(userId) {
  // Elimina solo il profilo da public.users
  // L'utente Auth va eliminato da Supabase Dashboard → Authentication → Users
  const { error } = await sb.from('users').delete().eq('id', userId);
  if (error) throw new Error(error.message);
  return true;
}

// ── Config sync (activityTypes, perfParams, sessionTypePerfParams) ─
// Salva le configurazioni locali in Supabase come JSON in tabella 'config'
// La tabella va creata con: CREATE TABLE config (key text primary key, value jsonb);
async function sbSyncConfig(key, value) {
  if (DB_MODE !== 'supabase' || !currentUser) return;
  try {
    const { error } = await sb.from('config').upsert({ key, value: JSON.stringify(value) }, { onConflict: 'key' });
    if (error) console.warn('[sbSyncConfig]', key, error.message);
  } catch(e) { console.warn('[sbSyncConfig]', e); }
}
async function loadConfigFromDB() {
  if (DB_MODE !== 'supabase') return;
  try {
    const { data } = await sb.from('config').select('*');
    if (!data) return;
    data.forEach(row => {
      try {
        const val = JSON.parse(row.value);
        if (row.key === 'activityTypes')         S.activityTypes = val;
        if (row.key === 'perfParams')             S.perfParams = val;
        if (row.key === 'sessionTypePerfParams')  S.sessionTypePerfParams = val;
      } catch(e) {}
    });
  } catch(e) {}
}


// ── PATCH: saveState usa Supabase invece di localStorage ─────────
async function saveStateDB() {
  if (DB_MODE !== 'supabase') { saveState(); return; }
}

// Override saveState per modalità ibrida
// (le funzioni specifiche chiamano sbSync direttamente)

// ── PATCH: loadState usa Supabase ────────────────────────────────
async function loadStateFromDB() {
  try {
    const data = await DB.loadAll();
    console.log('[loadStateFromDB] societies:', data.societies?.length, data.societies?.map(s=>s.name));
    console.log('[loadStateFromDB] sports:', data.sports?.length);
    console.log('[loadStateFromDB] seasons:', data.seasons?.length);
    // Pulisci localStorage e sovrascrivi S completamente con dati freschi dal DB
    localStorage.removeItem(STORE_KEY);
    const activeSeason = (data.seasons||[]).find(s=>s.active);
    data.activeSeason = activeSeason?.id || data.seasons?.[0]?.id || null;
    // Sovrascrivi completamente S (non Object.assign che mantiene vecchi valori)
    S.sports         = data.sports         || [];
    S.societies      = data.societies      || [];
    S.teams          = data.teams          || [];
    S.seasons        = data.seasons        || [];
    S.users          = data.users          || [];
    S.categories     = data.categories     || [];
    S.athletes       = data.athletes       || [];
    S.athleteSeasons = data.athleteSeasons || [];
    S.sessions       = data.sessions       || [];
    S.attendances    = data.attendances    || [];
    S.performances   = data.performances   || [];
    S.matches        = data.matches        || [];
    S.convocati      = data.convocati      || [];
    S.scorers        = data.scorers        || [];
    S.activeSeason   = data.activeSeason;
    S.staffHistory   = data.staffHistory   || [];
    // Carica configurazioni locali da tabella config
    await loadConfigFromDB();
    // Snapshot per il dirty-tracking
    _prevState = JSON.parse(JSON.stringify(S));
    console.log('[loadStateFromDB] OK — societies:', S.societies.map(s=>s.name));
  } catch(e) {
    console.error('Errore caricamento DB:', e);
    toast('Errore caricamento dati: ' + e.message, 'error');
  }
}

let S = {}; // app state
let currentUser = null;
let currentView = '';
let selectedCategoryId = null; // context for dirigente

function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    // In modalità Supabase: se non c'è cache locale usa stato minimo (non defaultState)
    // I dati reali verranno caricati da loadStateFromDB dopo il login
    if (!raw) {
      S = {
        users:[], sports:[], societies:[], teams:[], categories:[],
        athletes:[], sessions:[], attendances:[], matches:[], convocati:[],
        seasons:[], athleteSeasons:[], staffHistory:[],
        activityTypes:null, perfParams:null, sessionTypePerfParams:null,
        activeSeason:null, athleteRoles:{}
      };
      return;
    }
    S = JSON.parse(raw);
    // Ensure new fields exist for users loading old data
    if (!S.matches)        S.matches = [];
    if (!S.convocati)      S.convocati = [];
    if (!S.athleteRoles)   S.athleteRoles = {};
    if (!S.seasons)        S.seasons = [{ id:'seas1', name:'2024/2025', startYear:2024, endYear:2025, active:false },{ id:'seas2', name:'2025/2026', startYear:2025, endYear:2026, active:true }];
    if (!S.activeSeason)   S.activeSeason = S.seasons.find(s=>s.active)?.id || S.seasons[S.seasons.length-1]?.id;
    if (!S.staffHistory)   S.staffHistory = [];
    if (!S.athleteSeasons) S.athleteSeasons = [];
    S.athletes.forEach(a => {
      if (a.nickname === undefined) a.nickname = '';
      if (a.teamId === undefined)   a.teamId = S.categories.find(c=>c.id===a.categoryId)?.teamId || '';
    });
    S.categories.forEach(c => {
      if (!c.managerIds)      c.managerIds = [];
      if (!c.coachIds)        c.coachIds = [];
      if (!c.professionalIds) c.professionalIds = [];
      if (!c.teamIds)         c.teamIds = c.teamId ? [c.teamId] : [];
    });
    (S.athleteSeasons||[]).forEach(as => {
      if (!as.teamId) as.teamId = S.athletes.find(a=>a.id===as.athleteId)?.teamId || '';
    });
    if (S.activityTypes === undefined) S.activityTypes = null;
    if (S.perfParams    === undefined) S.perfParams    = null;
    if (S.sessionTypePerfParams === undefined) S.sessionTypePerfParams = null;
  } catch { S = defaultState(); }
}

  localStorage.setItem(STORE_KEY, JSON.stringify(S));

  // Detect which arrays changed and mark dirty
  const tables = [
    ['athletes','athletes'], ['sessions','sessions'],
    ['attendances','attendances'], ['matches','matches'],
    ['convocati','convocati'], ['categories','categories'],
    ['teams','teams'], ['users','users'], ['seasons','seasons'],
    ['athleteSeasons','athlete_seasons'], ['performances','performances'],
  ];
  for (const [key, table] of tables) {
    const curr = S[key] || [];
    const prev = (_prevState?.[key]) || [];
    // Find new/changed records
    for (const obj of curr) {
      const prevObj = prev.find(p => p.id === obj.id);
      if (!prevObj || JSON.stringify(prevObj) !== JSON.stringify(obj)) {
        markDirty(table, obj);
      }
    }
    // Find deleted records
    for (const obj of prev) {
      if (!curr.find(c => c.id === obj.id)) {
        markDeleted(table, obj.id);
      }
    }
  }
  _prevState = JSON.parse(JSON.stringify(S));
}

function uid() {
  // Genera UUID v4 compatibile con Supabase (tipo uuid)
  if (typeof crypto !== 'undefined' && crypto.randomUUID) {
    return crypto.randomUUID();
  }
  // Fallback manuale UUID v4
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}
function esc(str) { const d = document.createElement('div'); d.textContent = str||''; return d.innerHTML; }
function initials(name) { return (name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
function fmtDate(d) { if(!d) return '—'; const dt = new Date(d); return dt.toLocaleDateString('it-IT'); }
function pct(n, total) { if(!total || total <= 0) return 0; return Math.min(100, Math.round((n/total)*100)); }
function avg(arr) { if(!arr.length) return 0; return arr.reduce((a,b)=>a+b,0)/arr.length; }

const ACTIVITY_TYPES_DEFAULT = {
  A:  { label: 'Allenamento',    emoji: '🏃', color: 'blue',   cls: 'act-A' },
  P:  { label: 'Partita',        emoji: '⚽', color: 'gold',   cls: 'act-P' },

};
// Keep backward-compatible reference
const ACTIVITY_TYPES = ACTIVITY_TYPES_DEFAULT;

const PERF_PARAMS_DEFAULT = ['tecnica','fisico','tattica','mentale','comunicazione'];
const PERF_LABELS_DEFAULT = { tecnica:'Tecnica', fisico:'Fisico', tattica:'Tattica', mentale:'Mentale', comunicazione:'Comunicaz.' };
const PERF_PARAMS = PERF_PARAMS_DEFAULT;
const PERF_LABELS = PERF_LABELS_DEFAULT;

// ── Dynamic accessors (read from state if configured, else use defaults) ──────
function getActivityTypes() {
  // Returns array of [key, typeObj] — like Object.entries(ACTIVITY_TYPES)
  if (S?.activityTypes && Object.keys(S.activityTypes).length > 0) {
    return Object.entries(S.activityTypes);
  }
  return Object.entries(ACTIVITY_TYPES_DEFAULT);
}

function getActivityTypesMap() {
  // Returns object map for quick lookup
  if (S?.activityTypes && Object.keys(S.activityTypes).length > 0) {
    return S.activityTypes;
  }
  return ACTIVITY_TYPES_DEFAULT;
}

function getPerfParams() {
  if (S?.perfParams && Array.isArray(S.perfParams) && S.perfParams.length > 0) {
    return S.perfParams;
  }
  return PERF_PARAMS_DEFAULT;
}

function getPerfLabel(key) {
  if (S?.perfParams && Array.isArray(S.perfParams)) {
    const found = S.perfParams.find(p => (typeof p === 'object' ? p.key : p) === key);
    if (found && typeof found === 'object') return found.label;
  }
  return PERF_LABELS_DEFAULT[key] || key;
}

// Normalize perfParam entry — can be string or {key, label}
function normPerfParam(p) {
  if (typeof p === 'object' && p.key) return p;
  return { key: p, label: PERF_LABELS_DEFAULT[p] || p };
}

// Get the perf params enabled for a specific session type
// Default: all params for type 'A' (Allenamento), none for others
function getPerfParamsForType(typeKey) {
  const allParams = getPerfParams();
  if (S.sessionTypePerfParams) {
    const configured = S.sessionTypePerfParams[typeKey];
    if (Array.isArray(configured)) {
      // Return only params that are in the configured list AND exist in allParams
      return allParams.filter(rawP => {
        const key = typeof rawP === 'object' ? rawP.key : rawP;
        return configured.includes(key);
      });
    }
    // Explicitly set to [] means no perf for this type
    if (configured !== undefined && configured !== null) return [];
  }
  // Default: all params for Allenamento (A), none for others
  if (typeKey === 'A') return allParams;
  return [];
}

// Save perf config for a session type
function setSessionTypePerfParams(typeKey, paramKeys) {
  if (!S.sessionTypePerfParams) S.sessionTypePerfParams = {};
  S.sessionTypePerfParams[typeKey] = paramKeys;
  saveState(); sbSyncConfig('sessionTypePerfParams', S.sessionTypePerfParams);
}

function getAthleteAttendances(athleteId) {
  return S.attendances.filter(a => a.athleteId === athleteId);
}
function getSessionAttendances(sessionId) {
  return S.attendances.filter(a => a.sessionId === sessionId);
}
// Returns athletes in a category, with optional teamId filter
function getCategoryAthletes(catId, teamId) {
  let list = S.athletes.filter(a => a.categoryId === catId);
  if (teamId) list = list.filter(a => a.teamId === teamId);
  return list;
}

// Returns all teams linked to a category (teamIds array, fallback to single teamId)
function getCategoryTeams(catId) {
  const cat = S.categories.find(c=>c.id===catId);
  if (!cat) return [];
  const ids = (cat.teamIds && cat.teamIds.length) ? cat.teamIds : (cat.teamId ? [cat.teamId] : []);
  return ids.map(id => S.teams.find(t=>t.id===id)).filter(Boolean);
}
function getCategorySessions(catId) {
  return S.sessions.filter(s => s.categoryId === catId).sort((a,b)=>a.date.localeCompare(b.date));
}
function getAthleteAvgPerf(athleteId) {
  const atts = getAthleteAttendances(athleteId).filter(a => a.status === 'P');
  const dynParams = getPerfParams().map(normPerfParam);
  const empty = Object.fromEntries(dynParams.map(p=>[p.key,0]));
  empty.overall = 0;
  if (!atts.length) return empty;
  const res = {};
  dynParams.forEach(({key}) => {
    const vals = atts.map(a => a.perf?.[key]||0).filter(v=>v>0);
    res[key] = vals.length ? avg(vals) : 0;
  });
  res.overall = dynParams.length > 0 ? avg(dynParams.map(({key}) => res[key]||0)) : 0;
  return res;
}
function getAthletePresenceRate(athleteId, categoryId) {
  const sessions = getCategorySessions(categoryId || S.athletes.find(a=>a.id===athleteId)?.categoryId);
  if (!sessions.length) return 0;
  const atts = S.attendances.filter(a => a.athleteId === athleteId && sessions.some(s => s.id === a.sessionId));
  const present = atts.filter(a => a.status === 'P').length;
  // Guard: never exceed 100%
  return Math.min(100, pct(present, sessions.length));
}
function getCategoryStats(catId) {
  const athletes = getCategoryAthletes(catId);
  const sessions = getCategorySessions(catId);
  const allAtts = S.attendances.filter(a => sessions.some(s => s.id === a.sessionId));
  const present = allAtts.filter(a => a.status === 'P').length;
  const total = athletes.length * sessions.length;
  const byType = {};
  Object.keys(ACTIVITY_TYPES).forEach(t => {
    const sessOfType = sessions.filter(s => s.type === t);
    byType[t] = sessOfType.length;
  });
  return { athletes: athletes.length, sessions: sessions.length, presenceRate: total > 0 ? pct(present, total) : 0, byType, present, total };
}

// Returns list of category IDs accessible to the current user
function getAccessibleCategoryIds() {
  if (!currentUser) return [];
  const r = currentUser.role;
  if (r === 'admin') return S.categories.map(c => c.id);
  // Presidente vede solo le categorie della sua società
  if (r === 'presidente') {
    const socId = currentUser.societyId;
    return socId
      ? S.categories.filter(c => c.societyId === socId).map(c => c.id)
      : S.categories.map(c => c.id);
  }
  return S.categories.filter(c => {
    if (r === 'responsabile')   return (c.managerIds||[]).includes(currentUser.id);
    if (r === 'dirigente')      return (c.directorIds||[]).includes(currentUser.id);
    if (r === 'allenatore')     return (c.coachIds||[]).includes(currentUser.id);
    if (r === 'professionista') return (c.professionalIds||[]).includes(currentUser.id);
    if (r === 'presidente') {
    const presAccIds = getAccessibleCategoryIds();
    desktopHTML =
      dGroup('📊 Panoramica',
        dItem('🏆','Panoramica',`showView('president-view')`)
      ) +
      dGroup('👕 Squadre',
        buildTeamDropdownItems(presAccIds) || '<div class="dropdown-section-title">Nessuna squadra</div>'
      ) +
      dGroup('⚙️ Gestione',
        dItem('👥','Staff & Utenti',`showAdminConfig('users')`) +
        dItem('🏛️','Società',`showAdminConfig('society')`) +
        dItem('🏷️','Categorie',`showAdminConfig('category')`)
      );
    mobileHTML =
      mSection('Panoramica', mItem('🏆','Panoramica',`showView('president-view')`)) +
      mSection('Squadre', buildMobileTeamItems(presAccIds)) +
      mSection('Gestione',
        mItem('👥','Staff & Utenti',`showAdminConfig('users')`) +
        mItem('🏛️','Società',`showAdminConfig('society')`) +
        mItem('🏷️','Categorie',`showAdminConfig('category')`)
      );
  }

  if (r === 'genitore') {
      // Il genitore accede alle categorie degli atleti a lui associati
      const myAthletes = S.athletes.filter(a => (a.parentIds||[]).includes(currentUser.id));
      return myAthletes.some(a => a.categoryId === c.id);
    }
    return false;
  }).map(c => c.id);
}

function canAccessCategory(catId) {
  if (!currentUser) return false;
  if (currentUser.role === 'admin') return true;
  if (currentUser.role === 'presidente') {
    const cat = S.categories.find(c=>c.id===catId);
    return !currentUser.societyId || cat?.societyId === currentUser.societyId;
  }
  return getAccessibleCategoryIds().includes(catId);
}

// What can a role DO in a category?
// Ritorna gli atleti associati al genitore loggato
function getMyChildren() {
  if (!currentUser || currentUser.role !== 'genitore') return [];
  return S.athletes.filter(a => (a.parentIds||[]).includes(currentUser.id));
}

function canEdit(catId) {
  if (!currentUser) return false;
  if (currentUser.role === 'admin') return true;
  const cat = S.categories.find(c=>c.id===catId);
  if (!cat) return false;
  const r = currentUser.role;
  // responsabile and dirigente can edit fully; allenatore can enter sessions+presenze; professionista read-only
  return ['responsabile','dirigente','allenatore'].includes(r) && canAccessCategory(catId);
}

function canEditSessions(catId) {
  if (!currentUser) return false;
  if (currentUser.role === 'admin') return true;
  return ['responsabile','dirigente','allenatore'].includes(currentUser.role) && canAccessCategory(catId);
}

function isReadOnly(catId) {
  if (!currentUser) return true;
  if (currentUser.role === 'admin') return false;
  // Presidente e professionista: sola lettura
  if (['professionista','presidente'].includes(currentUser.role)) return canAccessCategory(catId);
  return false;
}

// ── AUTH ──────────────────────────────────────────────────────
async function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value.trim();
  if (!u || !p) { toast('Inserisci username e password', 'error'); return; }

  const btn = document.querySelector('#login-screen .btn-primary');
  if (btn) { btn.disabled = true; btn.textContent = 'Connessione...'; }

  // Costruisci email dall'username
  // Prima cerca l'email reale in public.users tramite username
  let email = u.includes('@') ? u : u + '@sporttrackpro.it';

  try {
    // Step 0: cerca email reale da public.users tramite username
    if (!u.includes('@')) {
      const { data: userRow } = await sb
        .from('users').select('email').eq('username', u).maybeSingle();
      if (userRow?.email) {
        email = userRow.email;
        console.log('[Login] Email trovata da profilo:', email);
      }
    }

    // Step 1: autenticazione Supabase
    console.log('[Login] Tentativo auth:', email);
    const { data: authData, error: authErr } = await sb.auth.signInWithPassword({ email, password: p });

    if (authErr) {
      console.error('[Login] Auth error:', authErr);
      // Fallback localStorage
      const localUser = (S.users||[]).find(x => x.username === u && x.password === p);
      if (localUser) {
        DB_MODE = 'local';
        currentUser = localUser;
        _afterLogin();
        toast('Connesso in modalità locale', 'warning');
        return;
      }
      let msg = authErr.message || 'Errore autenticazione';
      if (msg.includes('Invalid login')) msg = 'Username o password errati';
      else if (msg.includes('Email not confirmed')) msg = 'Conferma la tua email prima di accedere';
      toast('❌ ' + msg, 'error');
      return;
    }

    console.log('[Login] Auth ok, uid:', authData.user.id);

    // Step 2: carica profilo da public.users
    let profile = null;
    const { data: profileData, error: profileErr } = await sb
      .from('users').select('*').eq('id', authData.user.id).maybeSingle();

    if (profileErr) {
      console.warn('[Login] Profile error:', profileErr.message);
    } else if (profileData) {
      profile = profileData;
      console.log('[Login] Profile loaded:', profile.username, profile.role);
    }

    // Fallback: costruisci profilo dai metadati auth
    if (!profile) {
      console.warn('[Login] Profilo non in public.users, uso metadati auth');
      profile = {
        id: authData.user.id,
        email: authData.user.email,
        name: authData.user.user_metadata?.name || u,
        username: u,
        role: 'admin',
        society_id: null,
      };
    }

    currentUser = { ...profile, societyId: profile.society_id };

    // Step 3: carica dati dal DB
    try {
      await loadStateFromDB();
    } catch(dbErr) {
      console.warn('[Login] DB load error (uso localStorage):', dbErr);
    }

    _afterLogin();

  } catch(e) {
    console.error('[Login] Unexpected error:', e);
    toast('❌ Errore imprevisto: ' + e.message, 'error');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Accedi →'; }
  }
}

// ── MUTATION TRACKER per Supabase sync ───────────────────────────
// Chiama dopo aver modificato un'entità: markDirty('athletes', obj)
const _dirtyQueue = new Map(); // table → Set of objects to upsert
const _deleteQueue = new Map(); // table → Set of ids to delete

function markDirty(table, obj) {
  if (DB_MODE !== 'supabase') return;
  if (!_dirtyQueue.has(table)) _dirtyQueue.set(table, new Map());
  _dirtyQueue.get(table).set(obj.id, obj);
  scheduleSyncFlush();
}
function markDeleted(table, id) {
  if (DB_MODE !== 'supabase') return;
  if (!_deleteQueue.has(table)) _deleteQueue.set(table, new Set());
  _deleteQueue.get(table).add(id);
  // Remove from dirty if was there
  _dirtyQueue.get(table)?.delete(id);
  scheduleSyncFlush();
}

let _flushTimer = null;
function scheduleSyncFlush() {
  if (_flushTimer) clearTimeout(_flushTimer);
  _flushTimer = setTimeout(flushToSupabase, 800); // debounce 800ms
}

// Converte oggetto camelCase → snake_case per la tabella specifica
// Tables with fixed column lists (no society_id)
const TABLE_COLUMNS = {
  sports:    ['id','name','icon'],
  societies: ['id','name','sport_id','city','email'],
};

// Colonne reali per ogni tabella (da schema Supabase verificato)
const TABLE_REAL_COLUMNS = {
  // Schema verificato sul DB reale — tutti gli ID sono text tranne users.id (uuid)
  sports:          ['id','name','icon'],
  societies:       ['id','name','sport_id','city','email'],
  teams:           ['id','name','society_id','sport_id'],
  seasons:         ['id','name','start_year','end_year','active','society_id'],
  users:           ['id','name','username','email','role','profession','phone','society_id'],
  categories:      ['id','name','sport_id','society_id','team_id','team_ids','director_ids','manager_ids','coach_ids','prof_ids'],
  athletes:        ['id','first_name','last_name','dob','nickname','category_id','team_id','number','role','notes','parent_ids'],
  athlete_seasons: ['id','athlete_id','category_id','season_id','team_id','role','shirt_number','join_date','notes'],
  sessions:        ['id','category_id','date','type','notes','match_id','created_by'],
  attendances:     ['id','session_id','athlete_id','status'],
  performances:    ['id','session_id','athlete_id','params','notes'],
  matches:         ['id','category_id','date','time','meet_time','meet_place','opponent','home_away','result','scored','conceded','notes','bg_color','created_by'],
  convocati:       ['id','match_id','athlete_id','status','notes'],
  scorers:         ['id','match_id','athlete_id','goals','notes'],
  config:          ['key','value'],
};

function toSnakeCase(table, obj) {
  // Conversione automatica camelCase → snake_case per tutti i campi
  function camelToSnake(str) {
    return str.replace(/[A-Z]/g, l => '_' + l.toLowerCase());
  }

  // Mappings espliciti per casi speciali
  const explicitMaps = {
    scoredGoals:      'scored',
    concededGoals:    'conceded',
    professionalIds:  'prof_ids',
  };

  // Campi da escludere sempre
  const exclude = new Set(['password','role_label','gradient','password_hash','teamId_old']);

  const out = {};
  for (const [k, v] of Object.entries(obj)) {
    if (exclude.has(k)) continue;
    const sk = explicitMaps[k] || camelToSnake(k);
    out[sk] = v;
  }

  // Converti stringhe vuote in null per colonne time/date
  const timeFields = new Set(['time','meet_time','join_date','dob']);
  for (const k of Object.keys(out)) {
    if (timeFields.has(k) && out[k] === '') out[k] = null;
  }

  // Filtra solo le colonne realmente presenti nel DB
  const realCols = TABLE_REAL_COLUMNS[table];
  if (realCols) {
    const filtered = {};
    for (const col of realCols) {
      if (col in out) filtered[col] = out[col];
    }
    return filtered;
  }
  return out;
}

const DB_REFRESH_VIEWS = new Set([
  'admin-overview','admin-society','admin-reports',
  'cat-dashboard','athletes','sessions','matches',
  'attendances','category-home'
]);

function showView(viewId, pushHistory=true) {
  // Genitore può vedere solo parent-view
  if (currentUser?.role === 'genitore' && viewId !== 'parent-view') {
    viewId = 'parent-view';
  }
  // Presidente può vedere solo alcune viste
  const presidentAllowed = [
    'president-view','admin-config','cat-dashboard',
    'admin-society','admin-reports',
    'athletes','matches','sessions','attendances',
    'convocati','cat-reports'
  ];
  if (currentUser?.role === 'presidente' && !presidentAllowed.includes(viewId)) {
    viewId = 'president-view';
  }
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const el = document.getElementById('view-' + viewId);
  if (!el) return;
  closeAllDropdowns();
  closeMobileMenu();
  const prevView = currentView;
  currentView = viewId;
  el.classList.add('active');
  highlightNavItem();
  updateBottomNav();

  // Mostra spinner
  el.innerHTML = `<div style="text-align:center;padding:60px;color:var(--ink-3)">
    <div style="font-size:2rem;margin-bottom:12px;animation:spin 1s linear infinite;display:inline-block">⟳</div>
    <div>Caricamento dati aggiornati...</div>
  </div>`;

  const fn = viewBuilders[viewId];
  if (!fn) { el.innerHTML = ''; return; }

  // Se siamo in modalità Supabase e la view usa dati condivisi → ricarica prima
  if (DB_MODE === 'supabase' && DB_REFRESH_VIEWS.has(viewId) && currentUser) {
    loadStateFromDB().then(() => {
      el.innerHTML = '';
      fn(el);
    }).catch(err => {
      console.warn('DB refresh failed, using cache:', err);
      el.innerHTML = '';
      fn(el);
    });
  } else {
    setTimeout(() => { el.innerHTML = ''; fn(el); }, 30);
  }

  // Push browser history
  if (pushHistory && prevView !== viewId) {
    const state = { viewId, selectedCategoryId, _sessEditId: window._sessEditId, _athProfileId: window._athProfileId, _convocatiMatchId: window._convocatiMatchId };
    history.pushState(state, '', '#' + viewId);
  }
}

// ── STAR RATING ────────────────────────────────────────────────
function starWidget(paramName, value, onChange) {
  let v = value || 0;
  const id = 'star_' + paramName + '_' + Date.now();
  const html = `<div class="stars" id="${id}">${[1,2,3,4,5].map(i=>`<span class="star ${i<=v?'on':''}" data-v="${i}">★</span>`).join('')}</div>`;
  setTimeout(() => {
    const el = document.getElementById(id);
    if (!el) return;
    el.querySelectorAll('.star').forEach(s => {
      s.addEventListener('click', () => {
        v = parseInt(s.dataset.v);
        el.querySelectorAll('.star').forEach((st,i) => st.classList.toggle('on', i<v));
        onChange(v);
      });
      s.addEventListener('mouseenter', () => {
        const hv = parseInt(s.dataset.v);
        el.querySelectorAll('.star').forEach((st,i) => st.classList.toggle('on', i<hv));
      });
      s.addEventListener('mouseleave', () => {
        el.querySelectorAll('.star').forEach((st,i) => st.classList.toggle('on', i<v));
      });
    });
  }, 50);
  return html;
}

// ── CHART HELPERS ──────────────────────────────────────────────
function barChart(data, colors) {
  // data: [{label, value, max}]
  const maxVal = Math.max(...data.map(d=>d.value||0), 1);
  return `<div class="bar-chart">${data.map((d,i)=>{
    const h = Math.round((d.value/maxVal)*80);
    const c = colors?.[i] || '#1A56DB';
    return `<div class="bar-item">
      <div class="bar-fill" style="height:${h}px;background:${c}"></div>
      <div class="bar-label">${d.label}</div>
    </div>`;
  }).join('')}</div>`;
}
function perfBar(label, value, max=5) {
  const pct = Math.round((value/max)*100);
  const col = pct >= 70 ? 'var(--green)' : pct >= 40 ? 'var(--gold)' : 'var(--red)';
  return `<div class="perf-bar-row">
    <div class="perf-bar-label">${label}</div>
    <div class="perf-bar-track"><div class="perf-bar-fill" style="width:${pct}%;background:${col}"></div></div>
    <div class="perf-bar-val">${value?value.toFixed(1):'—'}</div>
  </div>`;
}
function ratingBadge(pct) {
  if (pct >= 85) return '<span class="badge badge-green">🏆 Eccellente</span>';
  if (pct >= 70) return '<span class="badge badge-blue">✅ Buono</span>';
  if (pct >= 55) return '<span class="badge badge-gold">⚠️ Sufficiente</span>';
  return '<span class="badge badge-red">❌ Insufficiente</span>';
}
function actBadge(type) {
  const a = getActivityTypesMap()[type];
  if (!a) return `<span class="act-chip" style="background:var(--mist-2);color:var(--ink-3)">${type}</span>`;
  return `<span class="act-chip ${a.cls||''}">${a.emoji||''} ${a.label}</span>`;
}
function avatarColor(name) {
  const colors = ['#1A56DB','#059669','#D97706','#DC2626','#7C3AED','#0891B2','#DB2777'];
  let h = 0;
  for (const c of (name||'')) h = c.charCodeAt(0) + ((h<<5)-h);
  return colors[Math.abs(h) % colors.length];
}
function athleteAvatar(athlete, size=36) {
  const name = (athlete.firstName||'') + ' ' + (athlete.lastName||'');
  const color = avatarColor(name);
  return `<div class="athlete-avatar" style="width:${size}px;height:${size}px;font-size:${Math.round(size*.3)}px;background:${color}">${initials(name)}</div>`;
}

function buildAdminConfigTab(tab) {
  // activate tab — array completo di tutti i tab
  const allTabs = ['sport','society','team','category','users','activities','seasons','roles','settings'];
  document.querySelectorAll('#config-tabs .tab-btn').forEach((b,i) => {
    b.classList.toggle('active', allTabs[i] === tab);
  });
  const c = document.getElementById('config-content');
  if (!c) return;
  switch(tab) {
    case 'sport': c.innerHTML = buildSportConfig(); break;
    case 'society': c.innerHTML = buildSocietyConfig(); break;
    case 'team': c.innerHTML = buildTeamConfig(); break;
    case 'category': c.innerHTML = buildCategoryConfig(); break;
    case 'users': c.innerHTML = buildUsersConfig(); break;
    case 'settings': c.innerHTML = buildSettingsConfig(); break;
    case 'activities': c.innerHTML = buildActivitiesConfig(); break;
    case 'seasons': c.innerHTML = buildSeasonsConfig(); break;
    case 'roles': c.innerHTML = buildRolesConfig(); break;
  }
}
