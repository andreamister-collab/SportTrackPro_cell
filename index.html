<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0D1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SportTrack">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="SportTrack Pro">
<title>SportTrack Pro — Gestione Società Sportiva</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── ROOT TOKENS ───────────────────────────────────────────── */
:root {
  --ink:       #0D1117;
  --ink-2:     #1C2331;
  --ink-3:     #2D3748;
  --mist:      #F0F4F8;
  --mist-2:    #E2E8F0;
  --mist-3:    #CBD5E0;
  --white:     #FFFFFF;
  --accent:    #1A56DB;
  --accent-h:  #1648C1;
  --accent-l:  #EBF1FF;
  --gold:      #D97706;
  --gold-l:    #FEF3C7;
  --green:     #059669;
  --green-l:   #D1FAE5;
  --red:       #DC2626;
  --red-l:     #FEE2E2;
  --teal:      #0891B2;
  --teal-l:    #CFFAFE;
  --purple:    #7C3AED;
  --purple-l:  #EDE9FE;

  --sport-a:   #1A56DB; /* Allenamento */
  --sport-p:   #D97706; /* Partita */
  --sport-i:   #059669; /* Individual */
  --sport-ps:  #7C3AED; /* Psicomotricità */

  --radius:    10px;
  --radius-lg: 16px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow:    0 4px 16px rgba(0,0,0,.10);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.14);

  --sidebar-w: 260px;
  --role-admin:   linear-gradient(135deg,#1A56DB,#3B82F6);
  --role-resp:    linear-gradient(135deg,#7C3AED,#A78BFA);
  --role-dir:     linear-gradient(135deg,#059669,#34D399);
  --role-coach:   linear-gradient(135deg,#D97706,#FCD34D);
  --role-prof:    linear-gradient(135deg,#0891B2,#67E8F9);
  --header-h:  62px;
  --font-body: 'DM Sans', sans-serif;
  --font-head: 'Syne', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

/* ── RESET ──────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; -webkit-text-size-adjust: 100%; }
body { font-family: var(--font-body); background: var(--mist); color: var(--ink); min-height: 100vh; overscroll-behavior-y: none; }
button { cursor: pointer; font-family: inherit; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
input, select, textarea { -webkit-tap-highlight-color: transparent; }
a { text-decoration: none; color: inherit; }
input, select, textarea { font-family: inherit; }
ul { list-style: none; }
h1,h2,h3,h4,h5 { font-family: var(--font-head); }

/* ── SCROLLBAR ──────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--mist-3); border-radius: 99px; }

/* ── LOGIN SCREEN ───────────────────────────────────────────── */
#login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, var(--ink) 0%, var(--ink-3) 60%, #1A3A6E 100%);
  position: relative;
  overflow: hidden;
}
#login-screen::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 80% 60% at 60% 40%, rgba(26,86,219,.3) 0%, transparent 70%);
  pointer-events: none;
}
#login-screen .noise {
  position: absolute; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: .5; pointer-events: none;
}
.login-card {
  background: var(--white);
  border-radius: 20px;
  padding: 48px 44px;
  width: 420px;
  box-shadow: var(--shadow-lg), 0 0 0 1px rgba(255,255,255,.1);
  position: relative;
  z-index: 1;
  animation: loginIn .5s cubic-bezier(.22,1,.36,1) both;
}
@keyframes loginIn { from { opacity:0; transform:translateY(24px) scale(.97); } }
.login-logo {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 36px;
}
.login-logo .logo-icon {
  width: 46px; height: 46px; border-radius: 12px;
  background: linear-gradient(135deg, var(--accent), #3B82F6);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; color: white; box-shadow: 0 4px 12px rgba(26,86,219,.4);
}
.login-logo h1 { font-size: 1.5rem; color: var(--ink); letter-spacing: -.02em; }
.login-logo span { font-family: var(--font-body); font-weight: 400; color: var(--ink-3); font-size: .85rem; }
.login-card h2 { font-size: 1.35rem; margin-bottom: 6px; color: var(--ink); }
.login-card p { color: var(--ink-3); font-size: .9rem; margin-bottom: 28px; }
.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-size: .82rem; font-weight: 600; color: var(--ink-3); margin-bottom: 6px; letter-spacing: .03em; text-transform: uppercase; }
.form-group input, .form-group select {
  width: 100%; padding: 11px 14px; border: 1.5px solid var(--mist-3);
  border-radius: var(--radius); font-size: .95rem; color: var(--ink);
  background: var(--mist); transition: border-color .2s, box-shadow .2s;
  outline: none;
}
.form-group input:focus, .form-group select:focus {
  border-color: var(--accent); background: var(--white);
  box-shadow: 0 0 0 3px rgba(26,86,219,.12);
}
.btn-primary {
  width: 100%; padding: 12px; background: var(--accent); color: white;
  border: none; border-radius: var(--radius); font-size: .95rem; font-weight: 600;
  font-family: var(--font-head); letter-spacing: .02em;
  transition: background .2s, transform .1s, box-shadow .2s;
  box-shadow: 0 4px 12px rgba(26,86,219,.35);
}
.btn-primary:hover { background: var(--accent-h); box-shadow: 0 6px 20px rgba(26,86,219,.45); transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }
.login-hint { font-size: .8rem; color: var(--ink-3); text-align: center; margin-top: 20px; line-height: 1.6; }
.login-hint strong { color: var(--ink); }

/* ── MAIN LAYOUT ────────────────────────────────────────────── */
#app { display: none; min-height: 100vh; flex-direction: column; }
#app.visible { display: flex; }

/* ── TOP NAVBAR ────────────────────────────────────────────── */
#topnav {
  background: var(--ink);
  color: white;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 16px rgba(0,0,0,.25);
  flex-shrink: 0;
}
.topnav-inner {
  display: flex; align-items: center;
  height: 56px; padding: 0 20px; gap: 0;
  overflow: visible;
}
.topnav-logo {
  display: flex; align-items: center; gap: 10px;
  margin-right: 24px; flex-shrink: 0; text-decoration: none;
}
.topnav-logo .logo-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), #3B82F6);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
}
.topnav-logo span { font-family: var(--font-head); font-size: 1rem; font-weight: 800; letter-spacing: -.01em; color: white; }
.topnav-logo span em { font-style: normal; color: #60A5FA; }

/* ── Dropdown menu items ── */
.topnav-menu { display: flex; align-items: stretch; flex: 1; gap: 2px; flex-wrap: nowrap; overflow: visible; }
.topnav-item { position: relative; }
.topnav-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 0 14px; height: 56px;
  background: none; border: none; color: rgba(255,255,255,.78);
  font-family: var(--font-body); font-size: .875rem; font-weight: 600;
  cursor: pointer; white-space: nowrap;
  transition: color .15s, background .15s;
  border-bottom: 3px solid transparent;
}
.topnav-btn:hover { color: white; background: rgba(255,255,255,.07); }
.topnav-btn.active { color: white; border-bottom-color: var(--accent); }
.topnav-btn .nav-arrow { font-size: .6rem; opacity: .55; transition: transform .2s; margin-left: 2px; }
.topnav-item:hover .nav-arrow { transform: rotate(180deg); }

/* ── Dropdown panel ── */
.topnav-dropdown {
  position: absolute; top: calc(100% + 4px); left: 0;
  background: var(--white); border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,.18), 0 0 0 1px rgba(0,0,0,.06);
  min-width: 220px; padding: 6px;
  opacity: 0; visibility: hidden; pointer-events: none;
  transform: translateY(-8px);
  transition: opacity .18s, transform .18s, visibility .18s;
  z-index: 200;
}
.topnav-item.open .topnav-dropdown {
  opacity: 1; visibility: visible; pointer-events: auto;
  transform: translateY(0);
}
.topnav-item.open .nav-arrow { transform: rotate(180deg); }
.dropdown-section-title {
  font-size: .68rem; font-weight: 700; color: var(--ink-3);
  text-transform: uppercase; letter-spacing: .08em;
  padding: 8px 12px 4px; margin-top: 4px;
}
.dropdown-section-title:first-child { margin-top: 0; }
.dropdown-item {
  display: flex; align-items: center; gap: 9px;
  padding: 9px 12px; border-radius: 8px;
  background: none; border: none; width: 100%; text-align: left;
  font-family: var(--font-body); font-size: .875rem; font-weight: 500;
  color: var(--ink); cursor: pointer;
  transition: background .12s, color .12s;
}
.dropdown-item:hover { background: var(--mist); color: var(--accent); }
.dropdown-item.active { background: var(--accent-l); color: var(--accent); font-weight: 600; }
.dropdown-item .d-icon { width: 20px; text-align: center; font-size: .95rem; flex-shrink: 0; }
.dropdown-divider { height: 1px; background: var(--mist-2); margin: 4px 8px; }
.dropdown-danger { color: var(--red) !important; }
.dropdown-danger:hover { background: var(--red-l) !important; }

/* ── Right side (season + user) ── */
.topnav-right { margin-left: auto; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.season-pill {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 12px; border-radius: 99px;
  background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12);
}
.season-pill label { font-size: .75rem; color: rgba(255,255,255,.6); font-weight: 600; white-space: nowrap; cursor: default; }
.season-pill select {
  background: none; border: none; color: white;
  font-family: var(--font-body); font-size: .82rem; font-weight: 700;
  cursor: pointer; outline: none; padding: 0;
}
.season-pill select option { color: var(--ink); background: white; }

/* ── User chip ── */
.topnav-user { position: relative; }
.topnav-user-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 10px; border-radius: 99px;
  background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12);
  cursor: pointer; transition: background .15s;
}
.topnav-user-btn:hover { background: rgba(255,255,255,.14); }
.user-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #3B82F6);
  display: flex; align-items: center; justify-content: center;
  font-size: .72rem; font-weight: 700; color: white; flex-shrink: 0;
}
.topnav-user-btn .uname { font-size: .82rem; font-weight: 600; color: white; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.user-dropdown {
  position: absolute; top: calc(100% + 8px); right: 0;
  background: white; border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,.18), 0 0 0 1px rgba(0,0,0,.06);
  min-width: 200px; padding: 6px;
  opacity: 0; visibility: hidden; pointer-events: none;
  transform: translateY(-8px);
  transition: opacity .18s, transform .18s, visibility .18s;
  z-index: 200;
}
.topnav-user.open .user-dropdown {
  opacity: 1; visibility: visible; pointer-events: auto;
  transform: translateY(0);
}
.user-dropdown-header {
  padding: 10px 12px 8px; border-bottom: 1px solid var(--mist-2); margin-bottom: 4px;
}
.user-dropdown-header .uname-full { font-weight: 700; font-size: .9rem; color: var(--ink); }
.user-dropdown-header .urole { font-size: .75rem; color: var(--ink-3); margin-top: 2px; }

/* ── Bottom navigation bar (mobile only) ── */
#bottom-nav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 101;
  background: var(--white);
  border-top: 1px solid var(--mist-2);
  box-shadow: 0 -4px 20px rgba(0,0,0,.08);
  padding: 6px 4px max(6px, env(safe-area-inset-bottom));
  display: none;
  grid-template-columns: repeat(5, 1fr);
  align-items: stretch;
}
.bn-item {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; padding: 6px 4px; border: none; background: none;
  cursor: pointer; border-radius: 10px; transition: background .15s;
  min-height: 52px;
}
.bn-item:hover, .bn-item:active { background: var(--mist); }
.bn-item.active { background: var(--accent-l); }
.bn-item.active .bn-icon { filter: none; }
.bn-item.active .bn-label { color: var(--accent); font-weight: 700; }
.bn-icon { font-size: 1.3rem; line-height: 1; }
.bn-label { font-size: .64rem; font-weight: 600; color: var(--ink-3); white-space: nowrap; font-family: var(--font-body); }

@media (max-width: 900px) {
  #bottom-nav { display: grid; }
  /* Push content above bottom nav */
  #content-area { padding-bottom: max(80px, calc(68px + env(safe-area-inset-bottom))); }
  /* Adjust mobile menu to not cover bottom nav */
  #mobile-menu { inset: 56px 0 calc(68px + env(safe-area-inset-bottom)) 0; }
}

/* ── Mobile hamburger ── */
#sidebar-toggle {
  display: none;
  background: none; border: none; color: white;
  font-size: 1.3rem; cursor: pointer; padding: 6px 8px;
  border-radius: 8px; transition: background .15s;
}
#sidebar-toggle:hover { background: rgba(255,255,255,.1); }

/* ── Mobile full-screen menu ── */
#mobile-menu {
  display: none;
  position: fixed; inset: 56px 0 0 0; z-index: 99;
  background: var(--ink); overflow-y: auto;
  padding: 12px 12px max(12px, env(safe-area-inset-bottom));
  -webkit-overflow-scrolling: touch;
}
#mobile-menu.open { display: block; }
.mobile-nav-section { margin-bottom: 16px; }
.mobile-nav-title {
  font-size: .68rem; font-weight: 700; color: rgba(255,255,255,.35);
  text-transform: uppercase; letter-spacing: .1em;
  padding: 6px 10px 4px;
}
.mobile-nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 8px;
  background: none; border: none; color: rgba(255,255,255,.75);
  font-family: var(--font-body); font-size: .9rem; font-weight: 500;
  cursor: pointer; width: 100%; text-align: left;
  transition: background .12s, color .12s;
}
.mobile-nav-item:hover { background: rgba(255,255,255,.08); color: white; }

@media (max-width: 900px) {
  .topnav-menu { display: none; }
  #sidebar-toggle { display: block; }
  .topnav-logo { margin-right: auto; }
  .season-pill label { display: none; }
  #top-bar { top: 56px; }
}
@media (max-width: 480px) {
  #top-bar { top: 52px; }
}

/* Main content — full width, no left margin */
#main-content, .main-content {
  flex: 1; overflow-x: hidden; display: flex; flex-direction: column;
  min-height: 0;
}

#top-bar {
  height: var(--header-h); background: var(--white);
  border-bottom: 1px solid var(--mist-2);
  display: flex; align-items: center; padding: 0 28px;
  position: sticky; top: 56px; z-index: 50;
  box-shadow: var(--shadow-sm);
}
.topbar-title { font-size: 1.1rem; font-weight: 700; color: var(--ink); font-family: var(--font-head); }
.topbar-breadcrumb { font-size: .8rem; color: var(--ink-3); margin-left: 10px; }
.topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 10px; }

#content-area { flex: 1; padding: 28px; overflow-y: auto; }

/* ── VIEW TRANSITIONS ───────────────────────────────────────── */
.view { display: none; animation: viewIn .3s cubic-bezier(.22,1,.36,1) both; }
.view.active { display: block; overflow-x: hidden; min-width: 0; overflow-y: auto; max-height: calc(100vh - 120px); }
@keyframes viewIn { from { opacity:0; transform:translateY(10px); } }

/* ── PAGE HEADER ────────────────────────────────────────────── */
.page-header { margin-bottom: 28px; }
.page-header h2 { font-size: 1.65rem; color: var(--ink); letter-spacing: -.03em; }
.page-header p { color: var(--ink-3); font-size: .9rem; margin-top: 4px; }
.page-header .header-row { display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 12px; }

/* ── CARDS ──────────────────────────────────────────────────── */
.card {
  background: var(--white); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm); border: 1px solid var(--mist-2);
  padding: 22px; overflow: hidden;
}
.card-title { font-size: .95rem; font-weight: 700; color: var(--ink); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.card-title .icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }

/* ── STAT CARDS ─────────────────────────────────────────────── */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
.stat-card {
  background: var(--white); border-radius: var(--radius-lg);
  padding: 20px; border: 1px solid var(--mist-2); box-shadow: var(--shadow-sm);
  position: relative; overflow: hidden; transition: box-shadow .2s, transform .2s;
}
.stat-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
.stat-card .label { font-size: .78rem; font-weight: 600; color: var(--ink-3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
.stat-card .value { font-size: 2rem; font-weight: 800; font-family: var(--font-head); line-height: 1; margin-bottom: 4px; }
.stat-card .sub { font-size: .78rem; color: var(--ink-3); }
.stat-card .accent-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: 4px 0 0 4px; }
.stat-card.blue .accent-bar { background: var(--accent); }
.stat-card.blue .value { color: var(--accent); }
.stat-card.gold .accent-bar { background: var(--gold); }
.stat-card.gold .value { color: var(--gold); }
.stat-card.green .accent-bar { background: var(--green); }
.stat-card.green .value { color: var(--green); }
.stat-card.red .accent-bar { background: var(--red); }
.stat-card.red .value { color: var(--red); }
.stat-card.purple .accent-bar { background: var(--purple); }
.stat-card.purple .value { color: var(--purple); }
.stat-card.teal .accent-bar { background: var(--teal); }
.stat-card.teal .value { color: var(--teal); }

/* ── GRID LAYOUTS ───────────────────────────────────────────── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
.grid-auto { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
/* ── RESPONSIVE / MOBILE ─────────────────────────────────────── */

@media (max-width: 900px) {
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .convocati-grid { grid-template-columns: 1fr; }
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { min-width: 500px; }
  .header-row { flex-direction: column; align-items: flex-start; gap: 10px; }
  .header-row > div:last-child { width: 100%; }
  .header-row .btn { flex: 1; justify-content: center; }
  .card { margin-bottom: 12px; }
  .filter-bar { flex-wrap: wrap; gap: 8px; }
  .filter-bar input, .filter-bar select { min-width: 0; flex: 1 1 140px; }
  #top-bar { flex-wrap: wrap; gap: 6px; min-height: 52px; padding: 0 14px; }
  .modal { max-width: 100vw !important; width: 100vw; margin: 0; border-radius: 0; min-height: 100vh; }
  .modal-overlay { padding: 0; align-items: flex-end; }
  .modal-xl { max-width: 100vw !important; }
  .modal-lg { max-width: 100vw !important; }
  .att-cell { width: 36px; height: 36px; font-size: .9rem; }
  .match-header { padding: 14px 16px; }
  .match-score { font-size: 1.6rem; }
}

@media (max-width: 600px) {
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .form-row { flex-direction: column; }
  .form-row.trio { flex-direction: column; }
  h2 { font-size: 1.2rem; }
  .stat-card .value { font-size: 1.6rem !important; }
  .page-header { padding-bottom: 10px; margin-bottom: 16px; }
  .view.active { padding: 14px 14px; }
  #top-bar { padding: 8px 12px 8px 56px; }
  .filter-bar { padding: 10px 12px; }
  .card { padding: 14px 16px; }
  .card-title { font-size: .9rem; }
}

@media (max-width: 1000px) {
  .widget-row { grid-template-columns: 1fr; }
}

/* ── MOBILE OPTIMIZATIONS (max 480px) ──────────────────────── */

  .stat-card .label { font-size: .7rem; }

  /* Tabelle: scroll orizzontale + font più piccolo */

  table { font-size: .8rem; min-width: 480px; }
  thead th { padding: 8px 10px; font-size: .68rem; }
  tbody td { padding: 9px 10px; }

  /* Bottoni: touch target minimo 44px */
  .btn { min-height: 44px; padding: 10px 14px; font-size: .85rem; border-radius: 10px; }
  .btn-sm { min-height: 36px; padding: 7px 10px; font-size: .78rem; }
  .btn-lg { min-height: 48px; padding: 13px 20px; }

  /* Form fields: touch friendly */

  }

  .form-actions .btn { width: 100%; justify-content: center; }

  /* Modali bottom-sheet */
  .modal-overlay { align-items: flex-end; padding: 0; }
  .modal { border-radius: 20px 20px 0 0 !important; max-height: 92vh; padding: 20px 16px; }
  .modal::before {
    content: ''; display: block; width: 36px; height: 4px;

    margin: 0 auto 16px; 
  }
  .modal-header { margin-bottom: 16px; }
  .modal-header h3 { font-size: 1.05rem; }

  /* Presenze: celle più grandi per il touch */
  .att-cell { width: 40px !important; height: 40px !important; font-size: 1rem !important; border-radius: 8px; }
  .att-matrix { overflow-x: auto; }

  /* Header row azioni: stack verticale */
  .header-row { flex-direction: column; align-items: stretch; gap: 10px; }
  .header-row > div:last-child { display: flex; flex-wrap: wrap; gap: 8px; }
  .header-row .btn { flex: 1 1 calc(50% - 4px); justify-content: center; min-height: 44px; }

  /* Filter bar */
  .filter-bar { flex-direction: column; gap: 8px; padding: 10px; }

  #content-area { padding-bottom: max(80px, calc(16px + env(safe-area-inset-bottom))); }
}

/* Tablet landscape (601-900px) */
@media (min-width: 481px) and (max-width: 900px) {
  #content-area { padding: 20px 16px; }
  .card { padding: 18px; }
  .btn { min-height: 42px; }
  .form-field input, .form-field select, .form-field textarea { min-height: 42px; }
  .modal-overlay { align-items: flex-end; padding: 0; }
  .modal { border-radius: 20px 20px 0 0 !important; max-height: 88vh; }
}



/* ── SCROLLBAR — top + bottom via CSS ───────────────────────── */
/* Mirror scrollbar trick: shows scrollbar at top AND bottom for wide tables */
.table-wrap-x {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  /* Custom scrollbar styling */
  scrollbar-width: thin;
  scrollbar-color: var(--mist-3) transparent;
}
.table-wrap-x::-webkit-scrollbar { height: 6px; }
.table-wrap-x::-webkit-scrollbar-track { background: var(--mist); border-radius: 4px; }
.table-wrap-x::-webkit-scrollbar-thumb { background: var(--mist-3); border-radius: 4px; }
.table-wrap-x::-webkit-scrollbar-thumb:hover { background: var(--ink-3); }

/* Double-scroll wrapper: places scrollbar at top via transform trick */
.table-scroll-top {
  overflow-x: auto;
  overflow-y: hidden;
  transform: rotateX(180deg);
  scrollbar-width: thin;
}
.table-scroll-top > * {
  transform: rotateX(180deg);
}

/* All table-wraps get smooth scrolling and visible scrollbar */
.table-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: var(--mist-3) transparent;
  padding-bottom: 4px; /* space for scrollbar */
}
.table-wrap::-webkit-scrollbar { height: 5px; }
.table-wrap::-webkit-scrollbar-track { background: var(--mist); }
.table-wrap::-webkit-scrollbar-thumb { background: var(--mist-3); border-radius: 4px; }

/* ── CONTENT SIZING ─────────────────────────────────────────── */
/* Ensure views never exceed viewport */


/* Cards: prevent overflow on narrow screens */
.card { min-width: 0; overflow: hidden; }
.stat-card { min-width: 0; }
.stat-card .value { font-size: clamp(1.4rem, 3vw, 2.2rem); }
.stat-card .label { font-size: clamp(.7rem, 1.5vw, .8rem); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Page header: always wrap gracefully */
.page-header h2 { font-size: clamp(1.1rem, 3vw, 1.65rem); }

/* Tables: always scrollable horizontally */
.table-wrap table { min-width: min-content; }

/* ── TABLES ─────────────────────────────────────────────────── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: .88rem;  min-width: 0;}
thead th {
  padding: 10px 14px; text-align: left; font-size: .75rem; font-weight: 700;
  color: var(--ink-3); text-transform: uppercase; letter-spacing: .06em;
  background: var(--mist); border-bottom: 2px solid var(--mist-2); white-space: nowrap;
}
tbody tr { border-bottom: 1px solid var(--mist-2); transition: background .12s; }
tbody tr:hover { background: var(--mist); }
tbody td { padding: 11px 14px; vertical-align: middle; }
tbody tr:last-child { border-bottom: none; }

/* ── BUTTONS ────────────────────────────────────────────────── */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 8px; font-size: .85rem; font-weight: 600; border: none; cursor: pointer; transition: all .2s; white-space: nowrap; }
.btn-sm { padding: 6px 12px; font-size: .8rem; }
.btn-lg { padding: 12px 22px; font-size: .95rem; }
.btn-accent { background: var(--accent); color: white; box-shadow: 0 2px 8px rgba(26,86,219,.3); }
.btn-accent:hover { background: var(--accent-h); box-shadow: 0 4px 14px rgba(26,86,219,.4); transform: translateY(-1px); }
.btn-ghost { background: transparent; color: var(--ink-3); border: 1.5px solid var(--mist-3); }
.btn-ghost:hover { background: var(--mist); color: var(--ink); border-color: var(--mist-3); }
.btn-danger { background: var(--red); color: white; }
.btn-danger:hover { background: #B91C1C; }
.btn-success { background: var(--green); color: white; }
.btn-success:hover { background: #047857; }
.btn-gold { background: var(--gold); color: white; }
.btn-gold:hover { background: #B45309; }

/* ── BADGES ─────────────────────────────────────────────────── */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 99px; font-size: .75rem; font-weight: 700; }
.badge-blue { background: var(--accent-l); color: var(--accent); }
.badge-gold { background: var(--gold-l); color: var(--gold); }
.badge-green { background: var(--green-l); color: var(--green); }
.badge-red { background: var(--red-l); color: var(--red); }
.badge-purple { background: var(--purple-l); color: var(--purple); }
.badge-teal { background: var(--teal-l); color: var(--teal); }
.badge-gray { background: var(--mist-2); color: var(--ink-3); }

/* ── ACTIVITY TYPE CHIPS ────────────────────────────────────── */
.act-chip { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 99px; font-size: .78rem; font-weight: 700; }
.act-A { background: rgba(26,86,219,.1); color: var(--sport-a); }
.act-P { background: rgba(217,119,6,.1); color: var(--sport-p); }
.act-I { background: rgba(5,150,105,.1); color: var(--sport-i); }
.act-PS { background: rgba(124,58,237,.1); color: var(--sport-ps); }

/* ── FORMS ───────────────────────────────────────────────────── */
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-row.trio { grid-template-columns: 1fr 1fr 1fr; }
.form-field { display: flex; flex-direction: column; gap: 5px; }
.form-field label { font-size: .78rem; font-weight: 600; color: var(--ink-3); text-transform: uppercase; letter-spacing: .04em; }
.form-field input, .form-field select, .form-field textarea {
  padding: 9px 12px; border: 1.5px solid var(--mist-3); border-radius: 8px;
  font-size: .9rem; color: var(--ink); background: var(--mist);
  transition: border-color .2s, box-shadow .2s; outline: none;
}
.form-field input:focus, .form-field select:focus, .form-field textarea:focus {
  border-color: var(--accent); background: white; box-shadow: 0 0 0 3px rgba(26,86,219,.1);
}
.form-field textarea { resize: vertical; min-height: 80px; }
.form-actions { display: flex; gap: 10px; padding-top: 8px; }
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.45);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; padding: 20px; backdrop-filter: blur(3px);
  animation: fadeIn .2s;
}
@keyframes fadeIn { from { opacity: 0; } }
.modal {
  background: white; border-radius: 18px; padding: 30px;
  width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto;
  box-shadow: var(--shadow-lg); animation: modalIn .25s cubic-bezier(.22,1,.36,1) both;
  -webkit-overflow-scrolling: touch; overscroll-behavior: contain;
}
.modal-lg { max-width: 760px; }
.modal-xl { max-width: 960px; }
@keyframes modalIn { from { opacity:0; transform:scale(.94) translateY(12px); } }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
.modal-header h3 { font-size: 1.2rem; color: var(--ink); }
.modal-close { background: none; border: none; cursor: pointer; font-size: 1.3rem; color: var(--ink-3); padding: 4px; border-radius: 6px; }
.modal-close:hover { background: var(--mist); color: var(--red); }

/* ── PROGRESS BAR ───────────────────────────────────────────── */
.progress-bar { height: 6px; background: var(--mist-2); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 99px; transition: width .5s cubic-bezier(.22,1,.36,1); }
.progress-fill.green { background: var(--green); }
.progress-fill.gold { background: var(--gold); }
.progress-fill.red { background: var(--red); }
.progress-fill.blue { background: var(--accent); }

/* ── ATTENDANCE MATRIX ─────────────────────────────────────── */
.att-matrix { font-size: .8rem; }
.att-matrix table { border-collapse: separate; border-spacing: 2px; }
.att-matrix th { font-size: .68rem; padding: 4px 6px; background: var(--mist); border-radius: 4px; }
.att-cell {
  width: 32px; height: 32px; border-radius: 6px; display: inline-flex;
  align-items: center; justify-content: center; font-size: .75rem; font-weight: 700;
  cursor: pointer; transition: transform .1s; user-select: none; border: none;
}
.att-cell:hover { transform: scale(1.15); }
.att-P { background: var(--green-l); color: var(--green); }
.att-A { background: var(--red-l); color: var(--red); }
.att-G { background: var(--gold-l); color: var(--gold); }
.att-empty { background: var(--mist-2); color: var(--ink-3); }
.att-C  { background: var(--accent-l); color: var(--accent); }
.att-NC { background: var(--mist-2);   color: var(--ink-3); }

/* ── PERFORMANCE STARS ─────────────────────────────────────── */
.stars { display: flex; gap: 2px; }
.star { font-size: 1rem; cursor: pointer; color: var(--mist-3); transition: color .1s; }
.star.on { color: var(--gold); }
.star:hover { transform: scale(1.2); }

/* ── PERF RADAR (CSS-only mini chart) ─────────────────────── */
.perf-bars { display: flex; flex-direction: column; gap: 8px; }
.perf-bar-row { display: flex; align-items: center; gap: 10px; }
.perf-bar-label { font-size: .78rem; color: var(--ink-3); width: 100px; flex-shrink: 0; }
.perf-bar-track { flex: 1; height: 8px; background: var(--mist-2); border-radius: 99px; overflow: hidden; }
.perf-bar-fill { height: 100%; border-radius: 99px; background: var(--accent); transition: width .6s cubic-bezier(.22,1,.36,1); }
.perf-bar-val { font-size: .78rem; font-weight: 700; color: var(--ink); width: 28px; text-align: right; font-family: var(--font-mono); }

/* ── TABS ────────────────────────────────────────────────────── */
.tabs { display: flex; gap: 4px; background: var(--mist); border-radius: 10px; padding: 4px; margin-bottom: 20px; }
.tab-btn {
  flex: 1; padding: 8px 14px; border: none; border-radius: 7px; cursor: pointer;
  font-size: .85rem; font-weight: 600; color: var(--ink-3); background: transparent;
  transition: all .2s; font-family: inherit;
}
.tab-btn.active { background: white; color: var(--ink); box-shadow: var(--shadow-sm); }

/* ── ENTITY CARDS ────────────────────────────────────────────── */
.entity-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
.entity-card {
  background: white; border-radius: var(--radius-lg); border: 1px solid var(--mist-2);
  padding: 18px; transition: box-shadow .2s, transform .2s; cursor: pointer;
  box-shadow: var(--shadow-sm);
}
.entity-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
.entity-card .ec-icon {
  width: 48px; height: 48px; border-radius: 12px; margin-bottom: 12px;
  display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
}
.entity-card .ec-name { font-weight: 700; font-size: 1rem; color: var(--ink); margin-bottom: 4px; }
.entity-card .ec-meta { font-size: .8rem; color: var(--ink-3); }
.entity-card .ec-actions { margin-top: 14px; display: flex; gap: 6px; }

/* ── ATHLETE CARD ───────────────────────────────────────────── */
.athlete-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px; border-radius: 10px; border: 1px solid var(--mist-2);
  margin-bottom: 8px; background: white; transition: box-shadow .15s;
}
.athlete-row:hover { box-shadow: var(--shadow-sm); }
.athlete-avatar {
  width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: .85rem; color: white;
}
.athlete-info { flex: 1; min-width: 0; }
.athlete-info .name { font-weight: 600; font-size: .95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.athlete-info .meta { font-size: .78rem; color: var(--ink-3); }

/* ── SESSION ENTRY ───────────────────────────────────────────── */
.session-header {
  background: linear-gradient(135deg, var(--ink) 0%, var(--ink-3) 100%);
  border-radius: var(--radius-lg); padding: 22px 24px; color: white; margin-bottom: 20px;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
}
.session-header h3 { font-size: 1.2rem; margin-bottom: 4px; }
.session-header p { font-size: .85rem; opacity: .7; }
.session-legend { display: flex; gap: 10px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: .8rem; }

/* ── DASHBOARD WIDGETS ──────────────────────────────────────── */
.widget-row { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px; }
@media (max-width: 1000px) { .widget-row { grid-template-columns: 1fr; } }

/* ── SEARCH / FILTER BAR ────────────────────────────────────── */
.filter-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
.filter-bar input { flex: 1; min-width: 200px; padding: 9px 14px; border: 1.5px solid var(--mist-3); border-radius: 8px; font-size: .9rem; background: white; outline: none; }
.filter-bar input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(26,86,219,.1); }
.filter-bar select { padding: 9px 12px; border: 1.5px solid var(--mist-3); border-radius: 8px; font-size: .88rem; background: white; outline: none; cursor: pointer; }

/* ── EMPTY STATE ────────────────────────────────────────────── */
.empty-state { text-align: center; padding: 56px 20px; color: var(--ink-3); }
.empty-state .icon { font-size: 3rem; margin-bottom: 16px; opacity: .5; }
.empty-state h3 { font-size: 1.1rem; color: var(--ink-3); margin-bottom: 8px; }
.empty-state p { font-size: .88rem; max-width: 320px; margin: 0 auto 20px; }

/* ── TOAST ──────────────────────────────────────────────────── */
#toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast {
  background: var(--ink); color: white; padding: 12px 18px; border-radius: 10px;
  font-size: .88rem; font-weight: 500; box-shadow: var(--shadow-lg);
  display: flex; align-items: center; gap: 8px; min-width: 260px; max-width: 380px;
  animation: toastIn .3s cubic-bezier(.22,1,.36,1) both;
}
.toast.success { background: var(--green); }
.toast.error { background: var(--red); }
.toast.warning { background: var(--gold); }
@keyframes toastIn { from { opacity:0; transform:translateX(40px); } }

/* ── CHART PLACEHOLDER ──────────────────────────────────────── */
.mini-chart { position: relative; }
.bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 100px; padding: 0 4px; }
.bar-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.bar-fill { width: 100%; border-radius: 4px 4px 0 0; transition: height .5s cubic-bezier(.22,1,.36,1); min-height: 4px; }
.bar-label { font-size: .65rem; color: var(--ink-3); text-align: center; }

/* ── PARTITE & CONVOCATI ─────────────────────────────────────── */
.match-card {
  border-radius: var(--radius-lg); overflow: hidden;
  box-shadow: var(--shadow); margin-bottom: 16px;
  transition: transform .2s, box-shadow .2s;
}
.match-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.match-header {
  padding: 18px 22px; color: white; position: relative;
  display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
}
.match-header::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to right, rgba(0,0,0,.3) 0%, transparent 100%);
  pointer-events: none;
}
.match-header > * { position: relative; z-index: 1; }
.match-score { font-size: 2.2rem; font-weight: 900; font-family: var(--font-head); letter-spacing: -.03em; }
.match-result-W { border-left: 5px solid #22c55e; }
.match-result-D { border-left: 5px solid #eab308; }
.match-result-L { border-left: 5px solid #ef4444; }
.match-result-TBD { border-left: 5px solid #94a3b8; }
.match-body { background: white; padding: 16px 22px; }
.convocato-row {
  display: flex; align-items: center; gap: 10px; padding: 8px 12px;
  border-radius: 8px; margin-bottom: 6px; background: var(--mist);
  transition: background .15s; cursor: grab;
}
.convocato-row:hover { background: var(--mist-2); }
.cv-badge { padding: 3px 10px; border-radius: 99px; font-size: .72rem; font-weight: 700; }
.cv-convocato  { background: #D1FAE5; color: #065F46; }
.cv-riserva    { background: #FEF3C7; color: #92400E; }
.cv-non_conv   { background: #FEE2E2; color: #991B1B; }
.color-picker-strip { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.color-swatch {
  width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
  border: 3px solid transparent; transition: transform .15s, border-color .15s;
}
.color-swatch:hover { transform: scale(1.2); }
.color-swatch.selected { border-color: var(--accent); transform: scale(1.1); }
.convocati-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 700px) { .convocati-grid { grid-template-columns: 1fr; } }

/* ── SEASON BADGE ────────────────────────────────────────────── */

async function loadFromSupabase() {
  try {
    const [
      { data: sports },
      { data: societies },
      { data: teams },
      { data: categories },
      { data: seasons },
      { data: users },
      { data: athletes },
      { data: athleteTeamSeasons },
      { data: sessions },
      { data: attendances },
      { data: teamCategorySeasons },
      { data: userCategorySeasons },
    ] = await Promise.all([
      sb.from('sports').select('*'),
      sb.from('societies').select('*'),
      sb.from('teams').select('*'),
      sb.from('categories').select('*'),
      sb.from('seasons').select('*').order('start_date', { ascending: false }),

      sb.from('sessions').select('*').order('session_date', { ascending: false }),
      sb.from('attendances').select('*'),
      sb.from('team_category_season').select('*'),
      sb.from('user_category_seasons').select('*'),
    ]);

    // Mappa in formato compatibile con lo state locale
    S.sports      = (sports||[]).map(r => ({ id: r.id, name: r.name, icon: r.icon||'⚽' }));

    S.categories  = (categories||[]).map(r => ({ id: r.id, name: r.name, societyId: r.society_id }));
    S.seasons     = (seasons||[]).map(r => ({
      id: r.id, name: r.name,
      startDate: r.start_date, endDate: r.end_date,
      isActive: r.is_active||false,
      // Calcola startYear/endYear per compatibilità
      startYear: r.start_date ? parseInt(r.start_date.slice(0,4)) : null,
      endYear:   r.end_date   ? parseInt(r.end_date.slice(0,4))   : null,
    }));
    S.users       = (users||[]).map(r => ({ id: r.id, name: r.name||r.username, username: r.username||'', email: r.email||'', role: r.role||'user' }));
    S.athletes    = (athletes||[]).map(r => ({
      id: r.id,
      // Compatibilità con codice che usa firstName/lastName
      firstName: r.name||'', lastName: r.surname||'',
      name: r.name||'', surname: r.surname||'',
      dob: r.born_date||null, societyId: r.society_id||null,
    }));
    S.athleteTeamSeasons = (athleteTeamSeasons||[]).map(r => ({
      id: r.id, athleteId: r.athlete_id, societyId: r.society_id,
      categoryId: r.category_id, teamId: r.team_id, seasonId: r.season_id,
      jerseyNumber: r.jersey_number||null, nickname: r.nickname||'', role: r.role||'',
    }));
    // athleteSeasons: alias di athleteTeamSeasons per compatibilità
    S.athleteSeasons = S.athleteTeamSeasons.map(r => ({
      id: r.id, athleteId: r.athleteId, categoryId: r.categoryId,
      teamId: r.teamId, seasonId: r.seasonId,
      shirtNumber: r.jerseyNumber, role: r.role, notes: '',
    }));
    S.sessions    = (sessions||[]).map(r => ({
      id: r.id, categoryId: r.category_id, teamId: r.team_id,
      seasonId: r.season_id, societyId: r.society_id,
      date: r.session_date, title: r.title||'',
      // Compatibilità: type mappato dal titolo o 'A' default
      type: r.type || 'A', notes: r.notes||'', createdBy: r.created_by||'',
    }));
    S.attendances = (attendances||[]).map(r => ({
      id: r.id, sessionId: r.session_id, athleteId: r.athlete_id, status: r.status,
    }));
    S.teamCategorySeasons = (teamCategorySeasons||[]).map(r => ({
      id: r.id, teamId: r.team_id, categoryId: r.category_id, seasonId: r.season_id,
    }));
    S.userCategorySeasons = (userCategorySeasons||[]).map(r => ({
      id: r.id, userId: r.user_id, societyId: r.society_id,
      categoryId: r.category_id, teamId: r.team_id,
      seasonId: r.season_id, role: r.role,
    }));

    // Imposta stagione attiva
    const active = S.seasons.find(s => s.isActive || s.active);
    if (active) S.activeSeason = active.id;
    else if (S.seasons.length) S.activeSeason = S.seasons[0].id;

    console.log('[DB] Dati caricati da Supabase ✅');
    return true;
  } catch(e) {
    console.error('[DB] Errore caricamento:', e);
    return false;
  }
}

// ── Upsert generico nel DB ────────────────────────────────────
async function dbUpsert(table, obj) {
  if (DB_MODE !== 'supabase') return;
  const cols = DB_SCHEMA[table];
  if (!cols) return;
  // Filtra solo i campi presenti nel DB
  const filtered = {};
  const toSnake = str => str.replace(/[A-Z]/g, l => '_'+l.toLowerCase());
  for (const col of cols) {
    // Cerca camelCase e snake_case
    const camel = col.replace(/_([a-z])/g, (_,l) => l.toUpperCase());
    if (obj[col]     !== undefined) filtered[col]  = obj[col];
    else if (obj[camel] !== undefined) filtered[col] = obj[camel];
  }
  const { error } = await sb.from(table).upsert(filtered, { onConflict: 'id' });
  if (error) console.error(`[DB] UPSERT ${table}:`, error);
}

// ── Delete generico dal DB ────────────────────────────────────
async function dbDelete(table, id) {
  if (DB_MODE !== 'supabase') return;
  const { error } = await sb.from(table).delete().eq('id', id);
  if (error) console.error(`[DB] DELETE ${table}:`, error);
}

async function sbSignIn(email, password) {
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) throw error;
  return data.user;
}
async function sbSignOut() {
  await sb.auth.signOut();
}
async function sbGetSession() {
  const { data: { session } } = await sb.auth.getSession();
  return session;
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    S = raw ? JSON.parse(raw) : defaultState();
    // Ensure new fields exist for users loading old data
    if (!S.matches)        S.matches = [];
    if (!S.convocati)      S.convocati = [];
    if (!S.athleteRoles)   S.athleteRoles = {};
    if (!S.seasons)        S.seasons = [{ id:'seas1', name:'2024/2025', startYear:2024, endYear:2025, active:false },{ id:'seas2', name:'2025/2026', startYear:2025, endYear:2026, active:true }];
    if (!S.activeSeason)   S.activeSeason = S.seasons.find(s=>s.active)?.id || S.seasons[S.seasons.length-1]?.id;
    if (!S.staffHistory)   S.staffHistory = [];
    if (!S.athleteSeasons) S.athleteSeasons = [];
  if (!S.athleteTeamSeasons)  S.athleteTeamSeasons  = [];
  if (!S.teamCategorySeasons) S.teamCategorySeasons = [];
  if (!S.userCategorySeasons) S.userCategorySeasons = [];
    S.athletes.forEach(a => {
      if (a.nickname === undefined) a.nickname = '';
      if (a.teamId === undefined)   a.teamId = S.categories.find(c=>c.id===a.categoryId)?.teamId || '';
    });
    S.categories.forEach(c => {
      if (!c.managerIds)      c.managerIds = [];
      if (!c.coachIds)        c.coachIds = [];
      if (!c.professionalIds) c.professionalIds = [];
      if (!c.teamIds)         c.teamIds = c.teamId ? [c.teamId] : [];
    });
    (S.athleteSeasons||[]).forEach(as => {
      if (!as.teamId) as.teamId = S.athletes.find(a=>a.id===as.athleteId)?.teamId || '';
    });
    if (S.activityTypes === undefined) S.activityTypes = null;
    if (S.perfParams    === undefined) S.perfParams    = null;
    if (S.sessionTypePerfParams === undefined) S.sessionTypePerfParams = null;
  } catch { S = defaultState(); }
}
function saveState() {
  localStorage.setItem(STORE_KEY, JSON.stringify(S));
}
function resetState() {
  S = defaultState();
  saveState();
  location.reload();
}

function uid() { return 'id_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7); }
function esc(str) { const d = document.createElement('div'); d.textContent = str||''; return d.innerHTML; }
function initials(name) { return (name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
function fmtDate(d) { if(!d) return '—'; const dt = new Date(d); return dt.toLocaleDateString('it-IT'); }
// Normalizza data sessione (DB usa session_date, codice usa date)
function sessDate(s) { return s.date || s.session_date || ''; }
function pct(n, total) { if(!total || total <= 0) return 0; return Math.min(100, Math.round((n/total)*100)); }
function avg(arr) { if(!arr.length) return 0; return arr.reduce((a,b)=>a+b,0)/arr.length; }

const ACTIVITY_TYPES_DEFAULT = {
  A:  { label: 'Allenamento',    emoji: '🏃', color: 'blue',   cls: 'act-A' },
  P:  { label: 'Partita',        emoji: '⚽', color: 'gold',   cls: 'act-P' },
  I:  { label: 'Individual',     emoji: '🎯', color: 'green',  cls: 'act-I' },
  PS: { label: 'Psicomotricità', emoji: '🧠', color: 'purple', cls: 'act-PS' }
};
// Keep backward-compatible reference
const ACTIVITY_TYPES = ACTIVITY_TYPES_DEFAULT;

const PERF_PARAMS_DEFAULT = ['tecnica','fisico','tattica','mentale','comunicazione'];
const PERF_LABELS_DEFAULT = { tecnica:'Tecnica', fisico:'Fisico', tattica:'Tattica', mentale:'Mentale', comunicazione:'Comunicaz.' };
const PERF_PARAMS = PERF_PARAMS_DEFAULT;
const PERF_LABELS = PERF_LABELS_DEFAULT;

// ── Dynamic accessors (read from state if configured, else use defaults) ──────
function getActivityTypes() {
  // Returns array of [key, typeObj] — like Object.entries(ACTIVITY_TYPES)
  if (S?.activityTypes && Object.keys(S.activityTypes).length > 0) {
    return Object.entries(S.activityTypes);
  }
  return Object.entries(ACTIVITY_TYPES_DEFAULT);
}

function getActivityTypesMap() {
  // Returns object map for quick lookup
  if (S?.activityTypes && Object.keys(S.activityTypes).length > 0) {
    return S.activityTypes;
  }
  return ACTIVITY_TYPES_DEFAULT;
}

function getPerfParams() {
  if (S?.perfParams && Array.isArray(S.perfParams) && S.perfParams.length > 0) {
    return S.perfParams;
  }
  return PERF_PARAMS_DEFAULT;
}

function getPerfLabel(key) {
  if (S?.perfParams && Array.isArray(S.perfParams)) {
    const found = S.perfParams.find(p => (typeof p === 'object' ? p.key : p) === key);
    if (found && typeof found === 'object') return found.label;
  }
  return PERF_LABELS_DEFAULT[key] || key;
}

// Normalize perfParam entry — can be string or {key, label}
function normPerfParam(p) {
  if (typeof p === 'object' && p.key) return p;
  return { key: p, label: PERF_LABELS_DEFAULT[p] || p };
}

// Get the perf params enabled for a specific session type
// Default: all params for type 'A' (Allenamento), none for others
function getPerfParamsForType(typeKey) {
  const allParams = getPerfParams();
  if (S.sessionTypePerfParams) {
    const configured = S.sessionTypePerfParams[typeKey];
    if (Array.isArray(configured)) {
      // Return only params that are in the configured list AND exist in allParams
      return allParams.filter(rawP => {
        const key = typeof rawP === 'object' ? rawP.key : rawP;
        return configured.includes(key);
      });
    }
    // Explicitly set to [] means no perf for this type
    if (configured !== undefined && configured !== null) return [];
  }
  // Default: all params for Allenamento (A), none for others
  if (typeKey === 'A') return allParams;
  return [];
}

// Save perf config for a session type
function setSessionTypePerfParams(typeKey, paramKeys) {
  if (!S.sessionTypePerfParams) S.sessionTypePerfParams = {};
  S.sessionTypePerfParams[typeKey] = paramKeys;
  saveState();
}
const STATUS_LABELS = { P: 'Presente', A: 'Assente', G: 'Giustificato', C: 'Convocato', NC: 'Non Conv.' };
// Extended att statuses for matches
const MATCH_ATT_STATUSES = [

  { code:'A',  label:'Assente',     cls:'att-A',   bg:'var(--red-l)',     fg:'var(--red)'    },

  { code:'NC', label:'Non Conv.',   cls:'att-NC',  bg:'var(--mist-2)',    fg:'var(--ink-3)'  },
];

function getAthleteAttendances(athleteId) {
  return S.attendances.filter(a => a.athleteId === athleteId);
}
function getSessionAttendances(sessionId) {
  return S.attendances.filter(a => a.sessionId === sessionId);
}
// Returns athletes in a category, with optional teamId filter

function getCategoryTeams(catId) {
  const cat = S.categories.find(c=>c.id===catId);
  if (!cat) return [];
  const ids = (cat.teamIds && cat.teamIds.length) ? cat.teamIds : (cat.teamId ? [cat.teamId] : []);
  return ids.map(id => S.teams.find(t=>t.id===id)).filter(Boolean);
}

function getAthleteAvgPerf(athleteId) {
  const atts = getAthleteAttendances(athleteId).filter(a => a.status === 'P');
  const dynParams = getPerfParams().map(normPerfParam);
  const empty = Object.fromEntries(dynParams.map(p=>[p.key,0]));
  empty.overall = 0;
  if (!atts.length) return empty;
  const res = {};
  dynParams.forEach(({key}) => {
    const vals = atts.map(a => a.perf?.[key]||0).filter(v=>v>0);
    res[key] = vals.length ? avg(vals) : 0;
  });
  res.overall = dynParams.length > 0 ? avg(dynParams.map(({key}) => res[key]||0)) : 0;
  return res;
}
function getAthletePresenceRate(athleteId, categoryId) {
  const sessions = getCategorySessions(categoryId || S.athletes.find(a=>a.id===athleteId)?.categoryId);
  if (!sessions.length) return 0;
  const atts = S.attendances.filter(a => a.athleteId === athleteId && sessions.some(s => s.id === a.sessionId));
  const present = atts.filter(a => a.status === 'P').length;
  // Guard: never exceed 100%
  return Math.min(100, pct(present, sessions.length));
}
function getCategoryStats(catId) {
  const athletes = getCategoryAthletes(catId);
  const sessions = getCategorySessions(catId);
  const allAtts = S.attendances.filter(a => sessions.some(s => s.id === a.sessionId));
  const present = allAtts.filter(a => a.status === 'P').length;
  const total = athletes.length * sessions.length;
  const byType = {};
  Object.keys(ACTIVITY_TYPES).forEach(t => {
    const sessOfType = sessions.filter(s => s.type === t);
    byType[t] = sessOfType.length;
  });
  return { athletes: athletes.length, sessions: sessions.length, presenceRate: total > 0 ? pct(present, total) : 0, byType, present, total };
}

const ROLES = {
  admin:          { label: 'Amministratore',   icon: '🔑', color: '#1A56DB', gradient: 'linear-gradient(135deg,#1A56DB,#3B82F6)' },
  responsabile:   { label: 'Responsabile',     icon: '⭐', color: '#7C3AED', gradient: 'linear-gradient(135deg,#7C3AED,#A78BFA)' },
  dirigente:      { label: 'Dirigente',        icon: '🏛️', color: '#059669', gradient: 'linear-gradient(135deg,#059669,#34D399)' },
  allenatore:     { label: 'Allenatore',       icon: '⚽', color: '#D97706', gradient: 'linear-gradient(135deg,#D97706,#FCD34D)' },
  professionista: { label: 'Professionista',   icon: '🩺', color: '#0891B2', gradient: 'linear-gradient(135deg,#0891B2,#67E8F9)' },
};

// Returns list of category IDs accessible to the current user
function getAccessibleCategoryIds() {
  if (!currentUser) return [];
  const r = currentUser.role;
  if (r === 'admin') return S.categories.map(c => c.id);
  return S.categories.filter(c => {
    if (r === 'responsabile')   return (c.managerIds||[]).includes(currentUser.id);
    if (r === 'dirigente')      return (c.directorIds||[]).includes(currentUser.id);
    if (r === 'allenatore')     return (c.coachIds||[]).includes(currentUser.id);
    if (r === 'professionista') return (c.professionalIds||[]).includes(currentUser.id);
    return false;
  }).map(c => c.id);
}

function canAccessCategory(catId) {
  if (!currentUser) return false;
  if (currentUser.role === 'admin') return true;
  return getAccessibleCategoryIds(currentUser.id, S.activeSeason).includes(catId);
}

// What can a role DO in a category?
function canEdit(catId) {
  if (!currentUser) return false;
  if (currentUser.role === 'admin') return true;
  const cat = S.categories.find(c=>c.id===catId);
  if (!cat) return false;
  const r = currentUser.role;
  // responsabile and dirigente can edit fully; allenatore can enter sessions+presenze; professionista read-only
  return ['responsabile','dirigente','allenatore'].includes(r) && canAccessCategory(catId);
}

function canEditSessions(catId) {
  if (!currentUser) return false;
  if (currentUser.role === 'admin') return true;
  return ['responsabile','dirigente','allenatore'].includes(currentUser.role) && canAccessCategory(catId);
}

function isReadOnly(catId) {
  if (!currentUser) return true;
  if (currentUser.role === 'admin') return false;
  return currentUser.role === 'professionista' && canAccessCategory(catId);
}

function buildCategoryNavItems(ids) {
  const cats = ids ? S.categories.filter(c=>ids.includes(c.id)) : S.categories;
  return cats.map(cat => `
    <button class="nav-item sub" onclick="selectCategoryView('${cat.id}')">
      <span class="nav-icon">🏷️</span> ${esc(cat.name)}

// New: shows teams grouped by category; click → dashboard filtered to that team
function buildTeamNavItems(accIds) {
  const cats = accIds ? S.categories.filter(c=>accIds.includes(c.id)) : S.categories;
  return cats.map(cat => {
    const catTeams = getCategoryTeams(cat.id);
    if (catTeams.length === 0) {
      // Category has no teams defined — show as single item
      return `<button class="nav-item sub ${selectedCategoryId===cat.id && !window._dashTeam?'active':''}"
          onclick="selectTeamView('${cat.id}','')">
          <span class="nav-icon">🏷️</span> ${esc(cat.name)}
        </button>`;
    }
    if (catTeams.length === 1) {
      // Single team — show as flat item with team name
      const t = catTeams[0];
      return `<button class="nav-item sub ${selectedCategoryId===cat.id && (window._dashTeam===t.id||!window._dashTeam)?'active':''}"
          onclick="selectTeamView('${cat.id}','${t.id}')">
          <span class="nav-icon">👕</span> ${esc(t.name)}
          <span style="color:var(--ink-4);font-size:.7rem;margin-left:4px">${esc(cat.name)}</span>
        </button>`;
    }
    // Multi-team: show category header + each team indented
    const teamBtns = catTeams.map(t =>
      `<button class="nav-item sub ${selectedCategoryId===cat.id && window._dashTeam===t.id?'active':''}"
          onclick="selectTeamView('${cat.id}','${t.id}')"
          style="padding-left:28px">
          <span class="nav-icon" style="font-size:.8rem">👕</span> ${esc(t.name)}
        </button>`
    ).join('');
    // "All teams" pill for this category
    const allBtn = `<button class="nav-item sub ${selectedCategoryId===cat.id && !window._dashTeam?'active':''}"
        onclick="selectTeamView('${cat.id}','')"
        style="padding-left:28px;font-style:italic">
        <span class="nav-icon" style="font-size:.8rem">📊</span> Tutte
      </button>`;
    return `<div style="padding:4px 10px 2px;font-size:.72rem;font-weight:700;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em;margin-top:6px">
        🏷️ ${esc(cat.name)}
      </div>
      ${allBtn}${teamBtns}`;
  }).join('');
}

// ── TOAST ──────────────────────────────────────────────────────
function toast(msg, type='') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  const icons = { success:'✅', error:'❌', warning:'⚠️', '':'ℹ️' };
  t.innerHTML = `<span>${icons[type]||'ℹ️'}</span> ${esc(msg)}`;
  c.appendChild(t);
  setTimeout(() => { t.style.animation='fadeIn .3s reverse'; setTimeout(()=>t.remove(), 300); }, 3000);
}

function toggleMobileMenu() {
  const mm = document.getElementById('mobile-menu');
  if (!mm) return;
  mm.classList.toggle('open');
  document.getElementById('bn-menu')?.classList.toggle('active', mm.classList.contains('open'));
}
function closeMobileMenu() {
  document.getElementById('mobile-menu')?.classList.remove('open');

// ── BOTTOM NAV ────────────────────────────────────────────────
function bottomNavGo(target) {

function showView(viewId, pushHistory=true) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const el = document.getElementById('view-' + viewId);
  if (!el) return;
  closeAllDropdowns();
  closeMobileMenu();
  const prevView = currentView;
  currentView = viewId;
  el.classList.add('active');
  el.innerHTML = '<div style="text-align:center;padding:60px;color:var(--ink-3)">Caricamento...</div>';
  const fn = viewBuilders[viewId];
  if (fn) { setTimeout(() => { el.innerHTML = ''; fn(el); }, 30); }
  highlightNavItem();
  updateBottomNav();
  // Push to browser history for back button support
  if (pushHistory && prevView !== viewId) {
    const state = { viewId, selectedCategoryId, _sessEditId: window._sessEditId, _athProfileId: window._athProfileId, _convocatiMatchId: window._convocatiMatchId };
    history.pushState(state, '', '#' + viewId);
  }
}

// Handle browser back/forward buttons
window.addEventListener('popstate', (e) => {
  if (!currentUser) return;
  if (e.state && e.state.viewId) {
    if (e.state.selectedCategoryId) selectedCategoryId = e.state.selectedCategoryId;
    if (e.state._sessEditId)        window._sessEditId = e.state._sessEditId;
    if (e.state._athProfileId)      window._athProfileId = e.state._athProfileId;
    if (e.state._convocatiMatchId)  window._convocatiMatchId = e.state._convocatiMatchId;
    showView(e.state.viewId, false);
  }
});

function openModal(html, cls='') {

  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal ${cls}">${html}</div>`;
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
  return overlay;
}

// ── STAR RATING ────────────────────────────────────────────────
function starWidget(paramName, value, onChange) {
  let v = value || 0;
  const id = 'star_' + paramName + '_' + Date.now();
  const html = `<div class="stars" id="${id}">${[1,2,3,4,5].map(i=>`<span class="star ${i<=v?'on':''}" data-v="${i}">★</span>`).join('')}</div>`;
  setTimeout(() => {
    const el = document.getElementById(id);
    if (!el) return;
    el.querySelectorAll('.star').forEach(s => {
      s.addEventListener('click', () => {
        v = parseInt(s.dataset.v);
        el.querySelectorAll('.star').forEach((st,i) => st.classList.toggle('on', i<v));
        onChange(v);
      });
      s.addEventListener('mouseenter', () => {
        const hv = parseInt(s.dataset.v);
        el.querySelectorAll('.star').forEach((st,i) => st.classList.toggle('on', i<hv));
      });
      s.addEventListener('mouseleave', () => {
        el.querySelectorAll('.star').forEach((st,i) => st.classList.toggle('on', i<v));
      });
    });
  }, 50);
  return html;
}

// ── CHART HELPERS ──────────────────────────────────────────────
function barChart(data, colors) {
  // data: [{label, value, max}]
  const maxVal = Math.max(...data.map(d=>d.value||0), 1);
  return `<div class="bar-chart">${data.map((d,i)=>{
    const h = Math.round((d.value/maxVal)*80);
    const c = colors?.[i] || '#1A56DB';
    return `<div class="bar-item">
      <div class="bar-fill" style="height:${h}px;background:${c}"></div>
      <div class="bar-label">${d.label}</div>
    </div>`;
  }).join('')}</div>`;
}
function perfBar(label, value, max=5) {
  const pct = Math.round((value/max)*100);
  const col = pct >= 70 ? 'var(--green)' : pct >= 40 ? 'var(--gold)' : 'var(--red)';
  return `<div class="perf-bar-row">
    <div class="perf-bar-label">${label}</div>
    <div class="perf-bar-track"><div class="perf-bar-fill" style="width:${pct}%;background:${col}"></div></div>
    <div class="perf-bar-val">${value?value.toFixed(1):'—'}</div>
  </div>`;
}
function ratingBadge(pct) {
  if (pct >= 85) return '<span class="badge badge-green">🏆 Eccellente</span>';
  if (pct >= 70) return '<span class="badge badge-blue">✅ Buono</span>';
  if (pct >= 55) return '<span class="badge badge-gold">⚠️ Sufficiente</span>';
  return '<span class="badge badge-red">❌ Insufficiente</span>';
}
function actBadge(type) {
  const a = getActivityTypesMap()[type];
  if (!a) return `<span class="act-chip" style="background:var(--mist-2);color:var(--ink-3)">${type}</span>`;
  return `<span class="act-chip ${a.cls||''}">${a.emoji||''} ${a.label}</span>`;
}
function avatarColor(name) {
  const colors = ['#1A56DB','#059669','#D97706','#DC2626','#7C3AED','#0891B2','#DB2777'];
  let h = 0;
  for (const c of (name||'')) h = c.charCodeAt(0) + ((h<<5)-h);
  return colors[Math.abs(h) % colors.length];
}
function athleteAvatar(athlete, size=36) {
  const name = (athlete.firstName||'') + ' ' + (athlete.lastName||'');
  const color = avatarColor(name);
  return `<div class="athlete-avatar" style="width:${size}px;height:${size}px;font-size:${Math.round(size*.3)}px;background:${color}">${initials(name)}</div>`;
}

function buildAdminConfigTab(tab) {
  // activate tab
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', ['sport','society','team','category','users','settings'][i] === tab);
  });
  const c = document.getElementById('config-content');
  if (!c) return;
  switch(tab) {
    case 'sport': c.innerHTML = buildSportConfig(); break;
    case 'society': c.innerHTML = buildSocietyConfig(); break;
    case 'team': c.innerHTML = buildTeamConfig(); break;
    case 'category': c.innerHTML = buildCategoryConfig(); break;
    case 'users': c.innerHTML = buildUsersConfig(); break;
    case 'settings': c.innerHTML = buildSettingsConfig(); break;
    case 'activities': c.innerHTML = buildActivitiesConfig(); break;
    case 'seasons': c.innerHTML = buildSeasonsConfig(); break;
    case 'roles': c.innerHTML = buildRolesConfig(); break;
  }
}

async function saveCategory(id) {
  const name      = document.getElementById('cat-name').value.trim();
  const sportId   = document.getElementById('cat-sport')?.value || '';
  const societyId = document.getElementById('cat-soc')?.value  || '';
  const teamMultiEl = document.getElementById('cat-team-multi');
  const teamIds   = teamMultiEl ? Array.from(teamMultiEl.selectedOptions).map(o=>o.value) : [];
  const teamId    = teamIds[0] || '';
  const seasId    = S.activeSeason;

  if (!name) { toast('Nome obbligatorio','error'); return; }

  if (id) {
    const cat = S.categories.find(x=>x.id===id);
    Object.assign(cat, { name, sportId, societyId, teamId, teamIds });
    saveState();
    await dbUpsert('categories', { id, name, society_id: societyId||null });
    // Aggiorna team_category_season per questa stagione
    if (seasId) {
      // Rimuovi vecchie associazioni team della stagione
      const old = (S.teamCategorySeasons||[]).filter(r=>r.categoryId===id && r.seasonId===seasId);
      for (const o of old) { await dbDelete('team_category_season', o.id); }
      S.teamCategorySeasons = (S.teamCategorySeasons||[]).filter(r=>!(r.categoryId===id && r.seasonId===seasId));
      // Aggiungi nuove
      for (const tid of teamIds) {
        if (!tid) continue;
        const tcsEntry = { id: uid(), teamId: tid, categoryId: id, seasonId: seasId };
        S.teamCategorySeasons.push(tcsEntry);
        await dbUpsert('team_category_season', { id: tcsEntry.id, team_id: tid, category_id: id, season_id: seasId });
      }
      saveState();
    }
    toast('Categoria aggiornata ✅','success');
  } else {
    const newId = uid();
    S.categories.push({ id: newId, name, sportId, societyId, teamId, teamIds });
    saveState();
    await dbUpsert('categories', { id: newId, name, society_id: societyId||null });
    // team_category_season
    if (seasId) {
      for (const tid of teamIds) {
        if (!tid) continue;
        const tcsEntry = { id: uid(), teamId: tid, categoryId: newId, seasonId: seasId };
        if (!S.teamCategorySeasons) S.teamCategorySeasons=[];
        S.teamCategorySeasons.push(tcsEntry);
        await dbUpsert('team_category_season', { id: tcsEntry.id, team_id: tid, category_id: newId, season_id: seasId });
      }
      saveState();
    }
    toast('Categoria aggiunta ✅','success');
  }
  closeModal();
  buildAdminConfigTab('category');
}
function deleteCategory(id) {

  S.categories = S.categories.filter(x=>x.id!==id);

// Helper: get current category IDs assigned to user u with given role
function getUserCatIds(userId, role) {
  const key = {
    responsabile: 'managerIds', dirigente: 'directorIds',
    allenatore: 'coachIds', professionista: 'professionalIds'
  }[role];
  if (!key) return [];
  return S.categories.filter(c=>(c[key]||[]).includes(userId)).map(c=>c.id);
}

// Helper: update category arrays when user role/assignments change
function syncUserCatAssignments(userId, role, newCatIds) {
  const key = {
    responsabile: 'managerIds', dirigente: 'directorIds',
    allenatore: 'coachIds', professionista: 'professionalIds'
  }[role];
  if (!key) return;
  // Remove user from ALL categories for this role key first
  S.categories.forEach(c => { c[key] = (c[key]||[]).filter(i=>i!==userId); });
  // Add user to the selected categories
  newCatIds.forEach(cid => {
    const cat = S.categories.find(c=>c.id===cid);
    if (cat) { if (!cat[key]) cat[key]=[]; if(!cat[key].includes(userId)) cat[key].push(userId); }
  });
}

async function saveUser(id) {
  const name       = document.getElementById('usr-name').value.trim();
  const username   = document.getElementById('usr-uname').value.trim();
  const password   = document.getElementById('usr-pass')?.value.trim();
  const role       = document.getElementById('usr-role').value;
  const profession = document.getElementById('usr-prof')?.value.trim() || '';
  const phone      = document.getElementById('usr-phone')?.value.trim() || '';
  const email      = document.getElementById('usr-email')?.value.trim() || '';

  if (!name)     { toast('Nome obbligatorio','error'); return; }
  if (!username) { toast('Username obbligatorio','error'); return; }
  if (!id && !password) { toast('Password obbligatoria per nuovo utente','error'); return; }

  if (id) {
    const u = S.users.find(x=>x.id===id);
    if (!u) return;
    Object.assign(u, { name, username, role, profession, phone, email });
    saveState();
    await dbUpsert('users', { id, name, username, role, email: email||null });
    toast('Utente aggiornato ✅','success');
  } else {
    const newId = uid();
    const newU = { id: newId, name, username, role, profession, phone, email, password };
    S.users.push(newU);
    saveState();
    // In Supabase gli utenti si creano via Auth — qui salviamo solo il profilo
    await dbUpsert('users', { id: newId, name, username, role, email: email||null });
    toast('Utente aggiunto ✅','success');
  }
  closeModal();
  buildAdminConfigTab('users');
}
function deleteUser(id) {
  const u = S.users.find(x=>x.id===id);
  if (!u) return;
  if (u.role === 'admin') { toast('Non puoi eliminare questo utente','error'); return; }
  if (!confirm(`Eliminare l'utente "${u.name}"?`)) return;
  S.users = S.users.filter(x=>x.id!==id);
  S.categories.forEach(c => {
    c.directorIds    = (c.directorIds||[]).filter(i=>i!==id);
    c.managerIds     = (c.managerIds||[]).filter(i=>i!==id);
    c.coachIds       = (c.coachIds||[]).filter(i=>i!==id);
    c.professionalIds= (c.professionalIds||[]).filter(i=>i!==id);
  });
  saveState(); buildAdminConfigTab('users'); buildSidebarNav(); toast('Utente eliminato');
}
