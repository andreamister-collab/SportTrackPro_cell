/* --- GESTIONE LOGIN / LOGOUT --- */
document.getElementById('login-form').onsubmit = async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errDiv = document.getElementById('error-msg');

    // 1. Recupero dati utente dal DB
    const { data: userRow, error: userErr } = await client
        .from('users')
        .select('*')
        .eq('username', username)
        .maybeSingle();

    if (userErr || !userRow) { 
        errDiv.innerText = "Utente non trovato"; 
        errDiv.style.display="block"; 
        return; 
    }

    // 2. Autenticazione Supabase
    const { data: auth, error: authErr } = await client.auth.signInWithPassword({ 
        email: userRow.email, 
        password 
    });

    if (authErr) { 
        errDiv.innerText = "Password errata"; 
        errDiv.style.display="block"; 
        return; 
    }

    // 3. POPOLAMENTO VARIABILI GLOBALI (Fondamentale!)
    window._userRole = userRow.role;            // Es: 'admin', 'manager', 'user'
    window._currentSocietyId = userRow.society_id; // UUID o null
    window._userName = userRow.name;           // Comodo per i messaggi di benvenuto
    
    // Se vuoi mantenere anche la tua vecchia variabile per compatibilità
    CURRENT_USER = userRow;

    // 4. UI Switch
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    
    // Se hai un elemento per mostrare il nome dell'utente loggato:
    const userLabel = document.getElementById('user-display-name');
    if(userLabel) userLabel.innerText = userRow.name;

    loadPage('dashboard');
};

function templateStagioni() {
    return `
    <div class="card">
        <div class="header">
            <h2>GESTIONE STAGIONI</h2>
            <button class="btn" id="btn-add-stagione">+ Nuova Stagione</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Periodo</th>
                    <th>Stato</th>
                    <th style="text-align:right">Azioni</th>
                </tr>
            </thead>
            <tbody id="list-stagioni"></tbody>
        </table>
    </div>`;
}

async function initStagioni() {
    const { data, error } = await client.from('seasons').select('*').order('start_date', {ascending:false});
    const tbody = document.getElementById('list-stagioni');
    
    if (error) { tbody.innerHTML = `<tr><td colspan="4">Errore: ${error.message}</td></tr>`; return; }

    // Generiamo l'HTML senza usare onclick
    tbody.innerHTML = data?.map(s => `
        <tr>
            <td><strong>${s.name}</strong></td>
            <td>${s.start_date} → ${s.end_date}</td>
            <td><span class="badge ${s.is_active?'badge-active':'badge-inactive'}">${s.is_active?'ATTIVA':'INATTIVA'}</span></td>
            <td style="text-align:right">
                <button class="btn-sm btn-action-activate" data-id="${s.id}" data-active="${s.is_active}" style="background:${s.is_active ? '#64748b' : '#16a34a'}">
                    ${s.is_active ? 'Spegni' : 'Attiva'}
                </button>
                <button class="btn-sm btn-action-edit" data-id="${s.id}" data-name="${s.name}" style="background:var(--warning)">✏️</button>
                <button class="btn-sm btn-action-delete" data-id="${s.id}" style="background:var(--danger)">🗑️</button>
            </td>
        </tr>
    `).join('') || '<tr><td colspan="4">Nessuna stagione trovata.</td></tr>';

    // === ATTACCHIAMO I LISTENER AI BOTTONI (Metodo sicuro) ===
    
    // Bottoni Attiva/Spegni
    tbody.querySelectorAll('.btn-action-activate').forEach(btn => {
        btn.onclick = () => handleStagioneToggle(btn.dataset.id, btn.dataset.active === 'true');
    });

    // Bottoni Modifica (Matita)
    tbody.querySelectorAll('.btn-action-edit').forEach(btn => {
        btn.onclick = () => handleStagioneEdit(btn.dataset.id, btn.dataset.name);
    });

    // Bottoni Elimina (Cestino)
    tbody.querySelectorAll('.btn-action-delete').forEach(btn => {
        btn.onclick = () => handleStagioneDelete(btn.dataset.id);
    });

    // Bottone "Nuova Stagione" (quello in alto nella card)
    const btnAdd = document.getElementById('btn-add-stagione');
    if(btnAdd) {
        btnAdd.onclick = () => {
            modal.open('Nuova Stagione', `
                <p style="font-size:0.85rem; color:#666">Inserisci gli anni solari (es. 2025 e 2026)</p>
                <label>Anno Inizio</label><input type="number" id="y-start" value="2025">
                <label>Anno Fine</label><input type="number" id="y-end" value="2026">
            `);
            document.getElementById('btn-modal-save').onclick = async () => {
                const y1 = document.getElementById('y-start').value;
                const y2 = document.getElementById('y-end').value;
                await client.from('seasons').insert({ 
                    name: `${y1}/${y2}`, 
                    start_date: `${y1}-08-01`, 
                    end_date: `${y2}-07-31`, 
                    is_active: false 
                });
                modal.close();
                initStagioni();
            };
        };
    }
}

/* ============================================================
   SEZIONE: AZIONI LOGICHE STAGIONI
   ============================================================ */

async function handleStagioneToggle(id, isActive) {
    if (!isActive) {
        await client.from('seasons').update({ is_active: false }).eq('is_active', true);
        await client.from('seasons').update({ is_active: true }).eq('id', id);
    } else {
        await client.from('seasons').update({ is_active: false }).eq('id', id);
    }
    initStagioni();
}

async function handleStagioneEdit(id, currentName) {
    const newName = prompt("Modifica nome stagione (es. 2025/2026):", currentName);
    if (newName && newName !== currentName) {
        await client.from('seasons').update({ name: newName }).eq('id', id);
        initStagioni();
    }
}

async function handleStagioneDelete(id) {
    if (confirm("Sei sicuro di voler eliminare questa stagione?")) {
        const { error } = await client.from('seasons').delete().eq('id', id);
        if (error) alert("Errore: " + error.message);
        initStagioni();
    }
}

/* ============================================================
   SEZIONE: SPORT (Template + Init + Azioni)
   ============================================================ */

function templateSport() {
    return `
    <div class="card">
        <div class="header">
            <h2>GESTIONE SPORT</h2>
            <button class="btn" id="btn-add-sport">+ Nuovo Sport</button>
        </div>
        <table>
            <thead><tr><th>Icona</th><th>Nome</th><th style="text-align:right">Azioni</th></tr></thead>
            <tbody id="list-sport"></tbody>
        </table>
    </div>`;
}

async function initSport() {
    const { data } = await client.from('sports').select('*').order('name');
    const tbody = document.getElementById('list-sport');
    
    tbody.innerHTML = data?.map(s => `
        <tr>
            <td style="font-size:1.5rem">${s.icon || '🏐'}</td>
            <td><strong>${s.name}</strong></td>
            <td style="text-align:right">
                <button class="btn-sm btn-sport-edit" data-id="${s.id}" data-name="${s.name}" data-icon="${s.icon}" style="background:var(--warning)">✏️</button>
                <button class="btn-sm btn-sport-delete" data-id="${s.id}" style="background:var(--danger)">🗑️</button>
            </td>
        </tr>
    `).join('') || '<tr><td colspan="3">Nessun dato.</td></tr>';

    // Listener bottoni tabella Sport
    tbody.querySelectorAll('.btn-sport-edit').forEach(btn => {
        btn.onclick = () => handleSportEdit(btn.dataset.id, btn.dataset.name, btn.dataset.icon);
    });
    tbody.querySelectorAll('.btn-sport-delete').forEach(btn => {
        btn.onclick = () => handleSportDelete(btn.dataset.id);
    });

    // Bottone Nuovo Sport
    document.getElementById('btn-add-sport').onclick = () => {
        modal.open('Nuovo Sport', `
            <label>Nome Sport</label><input type="text" id="sp-name" placeholder="es. Calcio">
            <label>Icona (Emoji)</label><input type="text" id="sp-icon" placeholder="es. ⚽">
        `);
        document.getElementById('btn-modal-save').onclick = async () => {
            const name = document.getElementById('sp-name').value;
            const icon = document.getElementById('sp-icon').value;
            await client.from('sports').insert({ name, icon });
            modal.close();
            initSport();
        };
    };
}

async function handleSportEdit(id, oldName, oldIcon) {
    modal.open('Modifica Sport', `
        <label>Nome Sport</label><input type="text" id="up-sp-name" value="${oldName}">
        <label>Icona (Emoji)</label><input type="text" id="up-sp-icon" value="${oldIcon}">
    `);
    document.getElementById('btn-modal-save').onclick = async () => {
        const name = document.getElementById('up-sp-name').value;
        const icon = document.getElementById('up-sp-icon').value;
        await client.from('sports').update({ name, icon }).eq('id', id);
        modal.close();
        initSport();
    };
}

async function handleSportDelete(id) {
    if (confirm("Eliminare questo sport?")) {
        await client.from('sports').delete().eq('id', id);
        initSport();
    }
}

function templateSocieta() {
    return `
    <div class="card">
        <div class="header">
            <h2>GESTIONE SOCIETÀ</h2>
            <button class="btn" id="btn-add-societa">+ Nuova Società</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Nome Società</th>
                    <th>Sport Associato</th>
                    <th style="text-align:right">Azioni</th>
                </tr>
            </thead>
            <tbody id="list-societa">
                <tr><td colspan="3">Caricamento in corso...</td></tr>
            </tbody>
        </table>
    </div>`;
}

async function initSocieta() {
    const tbody = document.getElementById('list-societa');
    if (!tbody) return;

    const { data, error } = await client
        .from('societies')
        .select('*, sports!fk_soc_to_sport(name, icon)') 
        .order('name');
    
    if (error) { 
        tbody.innerHTML = `<tr><td colspan="3">Errore: ${error.message}</td></tr>`; 
        return; 
    }

    tbody.innerHTML = data?.map(s => {
        // Protezione per nomi con apostrofi
        const safeName = s.name.replace(/'/g, "\\'");
        return `
        <tr>
            <td><strong>${s.name}</strong></td>
            <td>${s.sports ? s.sports.icon + ' ' + s.sports.name : '-'}</td>
            <td style="text-align:right">
                <button class="btn-sm btn-warning" onclick="handleSocietaEdit('${s.id}', '${safeName}', '${s.sport_id}')">✏️</button>
                <button class="btn-sm btn-danger" onclick="handleSocietaDelete('${s.id}')">🗑️</button>
            </td>
        </tr>`;
    }).join('') || '<tr><td colspan="3">Nessuna società.</td></tr>';

    document.getElementById('btn-add-societa').onclick = async () => {
        const { data: sportsList } = await client.from('sports').select('*').order('name');
        const options = sportsList?.map(sp => `<option value="${sp.id}">${sp.icon} ${sp.name}</option>`).join('') || '';

        modal.open('Aggiungi Nuova Società', `
            <label>Nome della Società</label>
            <input type="text" id="new-soc-name" placeholder="es. A.C. Esempio">
            <label>Disciplina Sportiva</label>
            <select id="new-soc-sport">
                <option value="">-- Seleziona lo Sport --</option>
                ${options}
            </select>
        `);

        document.getElementById('btn-modal-save').onclick = async () => {
            const name = document.getElementById('new-soc-name').value.trim();
            const sport_id = document.getElementById('new-soc-sport').value;
            if(!name || !sport_id) return alert("Inserisci nome e seleziona uno sport!");

            const { error: insErr } = await client.from('societies').insert({ name, sport_id });
            if(!insErr) { modal.close(); initSocieta(); } else { alert(insErr.message); }
        };
    };
}

// ESPOSIZIONE GLOBALE FUNZIONI SOCIETÀ
window.handleSocietaEdit = async function(id, currentName, currentSportId) {
    const { data: sportsList } = await client.from('sports').select('*').order('name');
    const options = sportsList?.map(sp => 
        `<option value="${sp.id}" ${sp.id == currentSportId ? 'selected' : ''}>${sp.icon} ${sp.name}</option>`
    ).join('');

/**
 * Inizializza la tabella filtrando per la stagione impostata come 'is_active'
 */
async function initSquadra() {
    const tbody = document.getElementById('list-squadra');
    const infoBanner = document.getElementById('team-season-info');
    if (!tbody) return;

    // 1. Recupero la Stagione Attiva
    const { data: activeSeason, error: sErr } = await client
        .from('seasons')
        .select('*')
        .eq('is_active', true)
        .maybeSingle();
    
    if (!activeSeason) {
        if (infoBanner) infoBanner.innerHTML = "⚠️ Attenzione: nessuna stagione attiva impostata.";
        tbody.innerHTML = '<tr><td colspan="5">Seleziona una stagione attiva nelle impostazioni per vedere le squadre.</td></tr>';
        return;
    }
    
    if (infoBanner) infoBanner.innerText = `📅 Stagione Attiva: ${activeSeason.name}`;

    // 2. Query con join sulle tabelle collegate e filtro season_id
    const { data, error } = await client
        .from('teams')
        .select(`
            id,
            name,
            season_id,
            society_id,
            category_id,
            sport_id,
            societies (name),
            categories (name),
            sports (name, icon)
        `)
        .eq('season_id', activeSeason.id)
        .order('name');

    if (error) {
        console.error("Errore query teams:", error);
        tbody.innerHTML = `<tr><td colspan="5">Errore: ${error.message}</td></tr>`;
        return;
    }

    tbody.innerHTML = data?.map(t => {
        const safeName = t.name.replace(/'/g, "\\'");
        return `
        <tr>
            <td><strong>${t.name}</strong></td>
            <td>${t.societies?.name || '-'}</td>
            <td>${t.categories?.name || '-'}</td>
            <td>${t.sports ? t.sports.icon + ' ' + t.sports.name : '-'}</td>
            <td style="text-align:right">
                <button class="btn-sm btn-warning" onclick="handleEditSquadra('${t.id}')">✏️</button>
                <button class="btn-sm btn-danger" onclick="handleDeleteSquadra('${t.id}')">🗑️</button>
            </td>
        </tr>`;
    }).join('') || '<tr><td colspan="5">Nessuna squadra presente per questa stagione.</td></tr>';

    document.getElementById('btn-add-squadra').onclick = () => openSquadraModal(activeSeason.id);
}

/**
 * Modale per Nuova/Modifica Squadra
 */
async function openSquadraModal(activeSeasonId, editData = null) {
    const isEdit = !!editData;

    // Caricamento liste per i dropdown
    const [socRes, catRes, spoRes, seaRes] = await Promise.all([
        client.from('societies').select('id, name').order('name'),
        client.from('categories').select('id, name').order('name'),
        client.from('sports').select('id, name, icon').order('name'),
        client.from('seasons').select('name').eq('id', activeSeasonId).single()
    ]);

    modal.open(isEdit ? 'Modifica Squadra' : 'Nuova Squadra', `
        <div style="margin-bottom:15px; padding:10px; background:#f0fdf4; border-radius:6px; color:#166534; font-size:0.85em; border:1px solid #dcfce7;">
            Stai salvando nella stagione: <strong>${seaRes.data?.name || 'Attiva'}</strong>
        </div>
        
        <label>Nome Squadra</label>
        <input type="text" id="tm-name" value="${editData ? editData.name : ''}" placeholder="es. Giovanissimi 2010">
        
        <label>Società</label>
        <select id="tm-soc">
            <option value="">-- Seleziona Società --</option>
            ${socRes.data?.map(s => `<option value="${s.id}" ${editData?.society_id === s.id ? 'selected' : ''}>${s.name}</option>`).join('')}
        </select>

        <label>Categoria</label>
        <select id="tm-cat">
            <option value="">-- Seleziona Categoria --</option>
            ${catRes.data?.map(c => `<option value="${c.id}" ${editData?.category_id === c.id ? 'selected' : ''}>${c.name}</option>`).join('')}
        </select>

        <label>Sport</label>
        <select id="tm-spo">
            <option value="">-- Seleziona Sport --</option>
            ${spoRes.data?.map(p => `<option value="${p.id}" ${editData?.sport_id === p.id ? 'selected' : ''}>${p.icon} ${p.name}</option>`).join('')}
        </select>
    `);

    document.getElementById('btn-modal-save').onclick = async () => {
        const payload = {
            name: document.getElementById('tm-name').value.trim(),
            society_id: document.getElementById('tm-soc').value,
            category_id: document.getElementById('tm-cat').value,
            sport_id: document.getElementById('tm-spo').value,
            season_id: activeSeasonId // Collegamento automatico alla stagione
        };

        if(!payload.name || !payload.society_id || !payload.category_id || !payload.sport_id) {
            return alert("Compila tutti i campi obbligatori!");
        }

        const { error } = isEdit 
            ? await client.from('teams').update(payload).eq('id', editData.id)
            : await client.from('teams').insert(payload);

        if (!error) { 
            modal.close(); 
            initSquadra(); 
        } else { 
            alert("Errore nel salvataggio: " + error.message); 
        }
    };
}

/**
 * Inizializza la lista con logica di filtraggio per Ruolo
 */
async function initStaff() {
    const tbody = document.getElementById('list-staff');
    if (!tbody) return;

    const myRole = window._userRole;
    const mySociety = window._currentSocietyId;

    // 1. Query base (esclude l'admin supremo per sicurezza)
    let query = client
        .from('users')
        .select('*, societies(name)')
        .neq('username', 'admin');

    // 2. Filtro condizionale (Evita l'errore 400 society_id=eq.null)
    const isGlobalUser = (myRole === 'admin' || myRole === 'manager');
    
    if (!isGlobalUser) {
        if (!mySociety) {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#ef4444; padding:20px;">⚠️ Profilo non associato a una società.</td></tr>`;
            return;
        }
        query = query.eq('society_id', mySociety);
    }

    const { data, error } = await query.order('name');

    if (error) {
        console.error("Errore Query Staff:", error);
        tbody.innerHTML = `<tr><td colspan="4">Errore: ${error.message}</td></tr>`;
        return;
    }

    if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:20px;">Nessun utente trovato.</td></tr>';
        return;
    }

    // 3. Rendering Righe
    tbody.innerHTML = data.map(u => {
        const roleLabel = u.role === 'manager' ? '<strong>Manager (Sistema)</strong>' : (u.management_role || 'Tecnico');
        const socName = u.societies?.name || '<span style="color:#94a3b8; font-style:italic;">Accesso Globale</span>';

        return `
        <tr style="border-bottom: 1px solid #edf2f7;">
            <td style="padding:12px;"><strong>${u.name}</strong></td>
            <td style="padding:12px;">${u.username}</td>
            <td style="padding:12px; font-size:0.9em;">
                ${roleLabel}<br><small style="color:#64748b">${socName}</small>
            </td>
            <td style="padding:12px; text-align:right">
                <button class="btn-sm btn-warning" onclick="handleEditStaff('${u.id}')">✏️</button>
                <button class="btn-sm btn-danger" onclick="handleDeleteStaff('${u.id}')">🗑️</button>
            </td>
        </tr>`;
    }).join('');

    document.getElementById('btn-add-staff').onclick = () => openStaffModal();
}

/**
 * Modale per inserimento e modifica Staff
 */
async function openStaffModal(editData = null) {
    const isEdit = !!editData;
    const myRole = window._userRole;

    // Carichiamo le società solo per chi ha accesso globale
    let societies = [];
    if (myRole === 'admin' || myRole === 'manager') {
        const { data } = await client.from('societies').select('id, name').order('name');

    }

    modal.open(isEdit ? 'Modifica Staff' : 'Censimento Nuovo Staff', `

            <div>
                <label style="display:block; font-size:11px; font-weight:700; color:#475569;">NOME E COGNOME</label>

            </div>
            
            <div>
                <label style="display:block; font-size:11px; font-weight:700; color:#475569;">USERNAME (LOGIN)</label>
                <input type="text" id="st-user" value="${editData?.username || ''}" placeholder="es. m.rossi" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px;">
            </div>

            <div style="display:flex; gap:10px;">
                <div style="flex:1;">
                    <label style="display:block; font-size:11px; font-weight:700; color:#475569;">TIPO RUOLO</label>
                    <select id="st-role" onchange="toggleSocietyVisibility()" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px;">
                        <option value="user" ${editData?.role === 'user' ? 'selected' : ''}>Staff Societario</option>
                        ${myRole === 'admin' ? `<option value="manager" ${editData?.role === 'manager' ? 'selected' : ''}>Manager Sistema</option>` : ''}
                    </select>
                </div>
                <div style="flex:1;">
                    <label style="display:block; font-size:11px; font-weight:700; color:#475569;">QUALIFICA</label>
                    <select id="st-mrole" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px;">
                        <option value="">Seleziona...</option>
                        <option value="Allenatore" ${editData?.management_role === 'Allenatore' ? 'selected' : ''}>Allenatore</option>
                        <option value="Dirigente" ${editData?.management_role === 'Dirigente' ? 'selected' : ''}>Dirigente</option>
                        <option value="Presidente" ${editData?.management_role === 'Presidente' ? 'selected' : ''}>Presidente</option>
                        <option value="Segretario" ${editData?.management_role === 'Segretario' ? 'selected' : ''}>Segretario</option>
                        <option value="Medico" ${editData?.management_role === 'Medico' ? 'selected' : ''}>Staff Medico</option>
                    </select>
                </div>
            </div>

            <div id="div-society-container">
                <label style="display:block; font-size:11px; font-weight:700; color:#475569;">SOCIETÀ DI APPARTENENZA</label>
                <select id="st-society" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; background:${(myRole !== 'admin' && myRole !== 'manager') ? '#f3f4f6' : 'white'};" ${(myRole !== 'admin' && myRole !== 'manager') ? 'disabled' : ''}>
                    ${(myRole === 'admin' || myRole === 'manager') 
                        ? societies.map(s => `<option value="${s.id}" ${editData?.society_id === s.id ? 'selected' : ''}>${s.name}</option>`).join('')
                        : `<option value="${window._currentSocietyId}">Società Corrente</option>`
                    }
                </select>
            </div>
            
            ${!isEdit ? `
                <div>
                    <label style="display:block; font-size:11px; font-weight:700; color:#475569;">PASSWORD TEMPORANEA</label>
                    <input type="password" id="st-pass" placeholder="min. 6 caratteri" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px;">
                </div>
            ` : ''}
        </div>
    `);

    // Funzione interna per nascondere la società se si sceglie Manager
    window.toggleSocietyVisibility = function() {
        const role = document.getElementById('st-role').value;
        const container = document.getElementById('div-society-container');
        const qualifica = document.getElementById('st-mrole');
        if (role === 'manager') {
            container.style.display = 'none';
            qualifica.disabled = true;
            qualifica.value = "";
        } else {
            container.style.display = 'block';
            qualifica.disabled = false;
        }
    };
    toggleSocietyVisibility();

    document.getElementById('btn-modal-save').onclick = async () => {
        const name = document.getElementById('st-name').value.trim();
        const username = document.getElementById('st-user').value.trim();
        const role = document.getElementById('st-role').value;
        const qualifica = document.getElementById('st-mrole').value;
        const society_id = document.getElementById('st-society').value;
        
        if(!name || !username) return alert("Nome e Username sono obbligatori!");

        const payload = { 
            name, 
            username, 
            role,
            management_role: role === 'manager' ? 'Gestore Sistema' : (qualifica || null),

        };

        if(!isEdit) {
            const pass = document.getElementById('st-pass').value;
            if(!pass || pass.length < 6) return alert("Password obbligatoria (min. 6 caratteri).");
            payload.password = pass;
        }

        const { error } = isEdit 
            ? await client.from('users').update(payload).eq('id', editData.id)
            : await client.from('users').insert([payload]);

        if (!error) {
            modal.close();
            initStaff();
        } else {
            console.error("Errore Salva Staff:", error);
            alert("Errore: " + error.message);
        }
    };
}

window.deleteAtletaBase = async function(id) {
    const atleta = _atletiBase.find(a => a.id === id);
    if (!atleta || !confirm(`Archiviare definitivamente ${atleta.surname}?`)) return;

    try {
        // 1. Recupero dati attuali (da athlete_team_seasons)
        const { data: stagioni, error: errFetch } = await client
            .from('athlete_team_seasons')
            .select('*')
            .eq('athlete_id', id);
        
        if (errFetch) throw new Error("Errore recupero stagioni: " + errFetch.message);

        // 2. Inserimento in Archivio Anagrafica
        const { error: errArch } = await client
            .from('athletes_archive')
            .insert([{
                original_athlete_id: atleta.id,
                surname: atleta.surname,
                name: atleta.name,
                born_date: atleta.born_date,
                society_name: _socLook[atleta.society_id] || 'N.D.'
            }]);

        if (errArch) throw new Error("Errore inserimento archivio atleti: " + errArch.message);

        // 3. Inserimento in Archivio Stagioni (usando i nomi colonne definiti nell'SQL sopra)
        if (stagioni && stagioni.length > 0) {
            const payloadStagioni = stagioni.map(s => ({
                original_athlete_id: id,
                season_id: s.season_id,
                team_id: s.team_id,
                category_id: s.category_id,
                jersey_number: s.jersey_number,
                role: s.role
            }));

            const { error: errStag } = await client
                .from('athlete_seasons_archive')
                .insert(payloadStagioni);
            
            if (errStag) {
                console.error("Dettaglio errore stagioni:", errStag);
                console.warn("Lo storico stagioni non è stato migrato.");
            }
        }

        // 4. Cancellazione finale
        const { error: errDel } = await client
            .from('athletes')
            .delete()
            .eq('id', id);

        if (errDel) throw new Error("Errore durante la cancellazione finale: " + errDel.message);

        alert("Atleta archiviato correttamente.");
        await window.initAnagraficaPura();

    } catch (e) {
        console.error("Errore procedura:", e);
        alert("Impossibile completare: " + e.message);
    }
};

   ============================================================ */
window.importAtleti = async function(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = async (e) => {
        console.group("🚀 Debug Importazione Atleti");
        try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);

            console.log("Righe rilevate nell'Excel:", jsonData.length);

            // 1. Scarichiamo i riferimenti dal DB per trasformare i NOMI in ID
            const [socs, seas, cats, teams, existingAths] = await Promise.all([
                client.from('societies').select('id, name'),
                client.from('seasons').select('id, name'),
                client.from('categories').select('id, name'),
                client.from('teams').select('id, name'),
                client.from('athletes').select('id, name, surname')
            ]);

            const findId = (list, name, context) => {
                if (!name) return null;
                const match = list.find(i => i.name?.toString().trim().toLowerCase() === name.toString().trim().toLowerCase());
                if (!match) console.warn(`⚠️ "${name}" non trovato nel DB (${context})`);
                return match?.id;
            };

            const finalAssignments = [];
            let newAthletesCreated = 0;

            // 2. Elaborazione righe
            for (let i = 0; i < jsonData.length; i++) {
                const row = jsonData[i];
                const nRiga = i + 2;

                // Il campo Atleta contiene solo il cognome (anche composto es. "Trimboli Maciste")
                let surname = row.Atleta?.toString().trim() || "";
                if (!surname) continue;
                let name = null;

                // A. Cerchiamo l'atleta nell'anagrafica
                let athleteId = existingAths.data.find(a =>
                    a.surname?.trim().toLowerCase() === surname.toLowerCase()
                )?.id;

                if (!athleteId) {
                    console.log(`👤 Riga ${nRiga}: Atleta nuovo (${surname}). Creazione in corso...`);
                    const { data: newA, error: errA } = await client.from('athletes')
                        .insert([{ name, surname }]).select('id').single();

                    if (errA) {
                        console.error(`❌ Errore creazione atleta riga ${nRiga}:`, errA.message);
                        continue;
                    }
                    athleteId = newA.id;
                    newAthletesCreated++;
                    existingAths.data.push({ id: athleteId, name, surname });
                }

                // B. Trasformazione Nomi -> ID (UUID)
                const sId = findId(socs.data, row.Società, "Società");
                const seaId = findId(seas.data, row.Stagione, "Stagioni");
                const cId = findId(cats.data, row.Categoria, "Categorie");
                const tId = findId(teams.data, row.Squadra, "Squadre");

                if (athleteId && sId && seaId) {
                    finalAssignments.push({
                        athlete_id: athleteId,
                        society_id: sId,
                        season_id: seaId,
                        category_id: cId || null,
                        team_id: tId || null,
                        role: row.Ruolo || 'Atleta',
                        jersey_number: row['N°'] || row.Numero || null,
                        nickname: row.Nickname || null
                    });
                } else {
                    console.error(`❌ Riga ${nRiga}: Impossibile procedere. Società o Stagione mancanti o errate.`);
                }
            }

            // 3. Inserimento massivo finale
            if (finalAssignments.length > 0) {
                console.log(`📤 Invio di ${finalAssignments.length} record a Supabase...`);
                const { error: errIns } = await client.from('athlete_team_seasons').insert(finalAssignments);

                if (errIns) {
                    console.error("❌ ERRORE DATABASE:", errIns.message);
                    alert("Errore Database: " + errIns.message);
                } else {
                    console.log("✅ Importazione completata con successo!");
                    alert(`Import riuscito!\n- Nuovi atleti creati: ${newAthletesCreated}\n- Totale righe inserite: ${finalAssignments.length}`);
                }
            } else {
                alert("Nessun dato valido da importare. Controlla la console (F12) per i dettagli.");
            }

        } catch (err) {
            console.error("🔥 Errore critico script:", err);
        }
        console.groupEnd();
        if (window.loadAtletiData) await window.loadAtletiData();
        event.target.value = "";
    };
    reader.readAsArrayBuffer(file);
};

window.exportAtleti = function() {
    const table = document.querySelector("table");
    if (!table || table.rows.length <= 1) return alert("Tabella vuota!");

    // Esportiamo tutte le colonne tranne l'ultima ("Azioni")
    const rows = Array.from(table.querySelectorAll("tr"));
    const dataForExcel = rows.map(tr => {
        const cells = Array.from(tr.querySelectorAll("th, td"));
        return cells.slice(0, -1).map(c => c.innerText.trim());
    });

    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(dataForExcel);
    
    // Impostazione larghezza colonne per leggibilità
    ws['!cols'] = [{wch:25}, {wch:20}, {wch:15}, {wch:20}, {wch:20}, {wch:15}, {wch:8}];

    XLSX.utils.book_append_sheet(wb, ws, "Atleti_SportTrackPro");
    XLSX.writeFile(wb, "Export_Atleti_Completo.xlsx");
};

        const team = document.getElementById('f-staff-team')?.value;

        const filtered = _allAssignments.filter(a => {
            return (!name || a.users?.name?.toLowerCase().includes(name)) &&
                   (!soc || a.society_id == soc) &&
                   (!sea || a.season_id == sea) &&
                   (!team || a.team_id == team);
        });

        const tbody = document.getElementById('list-assignments');
        if (!tbody) return;

        tbody.innerHTML = filtered.map(a => `
            <tr>
                <td><strong>${a.users?.name || 'N/D'}</strong></td>
                <td><span style="color: #2563eb; font-weight:500;">${_lookupSocs[a.society_id] || '-'}</span></td>
                <td>${_lookupSeas[a.season_id] || '-'}</td>
                <td>${a.teams?.name || 'N/D'}</td>
                <td><span class="badge badge-active" style="background:#e0f2fe; color:#0369a1; padding:4px 8px; border-radius:6px; font-size:0.85em;">${a.role}</span></td>
                <td style="text-align:right">
                    <button class="btn-sm btn-warning" onclick="handleEditAssignment('${a.id}')">✏️</button>
                    <button class="btn-sm btn-danger" onclick="deleteAssignment('${a.id}')">🗑️</button>
                </td>
            </tr>
        `).join('') || '<tr><td colspan="6">Nessuna assegnazione trovata.</td></tr>';
    };

    // --- LOGICA MODALE (Invariata) ---
    window.openAssignmentModal = async function(activeSeasonId, editData = null) {
        const isEdit = !!editData;
        const [sRes, uRes, tRes] = await Promise.all([
            client.from('seasons').select('name').eq('id', activeSeasonId).single(),
            client.from('users').select('id, name').neq('username', 'admin').order('name'),
            client.from('teams').select('id, name, category_id, society_id').eq('season_id', activeSeasonId).order('name')
        ]);

        const ruoliValidi = ['Allenatore', 'Vice Allenatore', 'Collaboratore Tecnico', 'Preparatore Portieri', 'Preparatore Atletico', 'Dirigente', 'Fisioterapista'];

        modal.open(isEdit ? 'Modifica Staff' : 'Nuova Assegnazione Staff', `
            <div style="margin-bottom: 15px; padding: 10px; background: #f0f7ff; border-radius: 5px; color: #2563eb; border: 1px solid #dbeafe; font-size: 0.85em;">
                <strong>Stagione Attiva:</strong> ${sRes.data?.name || 'Corrente'}
            </div>
            <label>Membro Staff</label>
            <select id="as-user">
                <option value="">-- Seleziona Staff --</option>
                ${uRes.data?.map(u => `<option value="${u.id}" ${isEdit && editData.user_id === u.id ? 'selected' : ''}>${u.name}</option>`).join('')}
            </select>
            <label>Squadra (Team)</label>
            <select id="as-team">
                <option value="">-- Seleziona Squadra --</option>
                ${tRes.data?.map(t => `<option value="${t.id}" data-cat="${t.category_id}" data-soc="${t.society_id}" ${isEdit && editData.team_id === t.id ? 'selected' : ''}>${t.name}</option>`).join('')}
            </select>
            <label>Ruolo Tecnico</label>
            <select id="as-role">
                ${ruoliValidi.map(r => `<option value="${r}" ${isEdit && editData.role === r ? 'selected' : ''}>${r}</option>`).join('')}
            </select>
        `);

        document.getElementById('btn-modal-save').onclick = async () => {
            const teamSelect = document.getElementById('as-team');
            const payload = {
                user_id: document.getElementById('as-user').value,
                team_id: teamSelect.value,
                category_id: teamSelect.options[teamSelect.selectedIndex]?.getAttribute('data-cat'),
                society_id: teamSelect.options[teamSelect.selectedIndex]?.getAttribute('data-soc'),
                season_id: activeSeasonId,
                role: document.getElementById('as-role').value
            };
            if (!payload.user_id || !payload.team_id) return alert("Compila tutti i campi!");
            const { error } = isEdit 
                ? await client.from('user_category_seasons').update(payload).eq('id', editData.id)
                : await client.from('user_category_seasons').insert(payload);
            if (!error) { modal.close(); _fetchData(); } else { alert(error.message); }
        };
    };

    window.handleEditAssignment = async (id) => {
        const { data, error } = await client.from('user_category_seasons').select('*').eq('id', id).single();
        if (!error) openAssignmentModal(data.season_id, data);
    };

    window.deleteAssignment = async (id) => {
        if (confirm("Rimuovere questo incarico?")) {
            const { error } = await client.from('user_category_seasons').delete().eq('id', id);
            if (!error) _fetchData();
        }
    };
})();

                <div><label>N° Maglia</label><input type="number" id="m-atleta-jersey" value="${editData?.jersey_number || ''}"></div>

        const mTea = document.getElementById('m-atleta-team'); mTea.innerHTML = '<option value="">Intera Categoria</option>';
        if(!catId) return;
        const { data } = await client.from('teams').select('id, name').eq('category_id', catId).eq('season_id', seaId).order('name');
        data.forEach(t => mTea.innerHTML += `<option value="${t.id}">${t.name}</option>`);

    window.handleEditAtleta = (id) => window.openAtletaModal(id);
    window.deleteAtletaAssignment = async (id) => { if(confirm("Rimuovere dalla stagione?")) { await client.from('athlete_team_seasons').delete().eq('id', id); _fetchAtletiData(); } };

/**
 * 0. GESTORE MODALE (Auto-detect o Emergency Fallback)
 */
function getModal() {
    let m = window.modal || window.appModal || window.uiModal || window.ui;
    if (!m) {
        m = {
            open: (title, html) => {
                const overlay = document.createElement('div');
                overlay.id = 'emergency-modal';
                overlay.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10000; display:flex; align-items:center; justify-content:center; padding:20px;";
                overlay.innerHTML = `
                    <div style="background:white; width:100%; max-width:600px; border-radius:12px; padding:20px; position:relative; color:#333; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5);">
                        <h3 style="margin-top:0; border-bottom:1px solid #eee; padding-bottom:10px;">${title}</h3>
                        <div style="margin-bottom:20px; max-height:75vh; overflow-y:auto;">${html}</div>
                        <button onclick="document.getElementById('emergency-modal').remove()" style="position:absolute; top:10px; right:10px; border:none; background:none; font-size:24px; cursor:pointer;">&times;</button>
                    </div>`;
                document.body.appendChild(overlay);
            },
            close: () => { document.getElementById('emergency-modal')?.remove(); }
        };
    }
    return m;
}

/**
 * 2. INIZIALIZZAZIONE E LOGICA TABELLA
 */
async function initSessioni() {
    const tbody = document.getElementById('list-sessioni-body');
    if (!tbody) return;

    const myRole = (window._userRole || '').toLowerCase();
    const isAdmin = ['admin', 'manager', 'presidente', 'segretario'].includes(myRole);
    let targetSociety = window._currentSocietyId;

    if (isAdmin && document.getElementById('sess-filters-container')) {
        document.getElementById('sess-filters-container').style.display = 'block';
        const selSoc = document.getElementById('filter-society-sess');
        if (selSoc && selSoc.options.length === 0) {
            const { data: socs } = await client.from('societies').select('id, name').order('name');
            if (socs) {
                selSoc.innerHTML = socs.map(s => `<option value="${s.id}" ${s.id === targetSociety ? 'selected' : ''}>${s.name}</option>`).join('');
                if (myRole === 'admin' || myRole === 'manager') document.getElementById('wrapper-soc-filter').style.display = 'block';
                await reloadSubFilters();
                return;
            }
        }
        targetSociety = selSoc?.value || targetSociety;
    }

    let query = client.from('sessions').select(`*, session_types(name), teams(id, name, categories(name)), attendances(status)`).eq('society_id', targetSociety);
    
    // Applica filtri se selezionati
    const fCat = document.getElementById('filter-category-sess')?.value;
    const fTeam = document.getElementById('filter-team-sess')?.value;
    const fType = document.getElementById('filter-type-sess')?.value;

    if (fCat) query = query.eq('category_id', fCat);
    if (fTeam) query = query.eq('team_id', fTeam);
    if (fType) query = query.eq('type_id', fType);

    const { data } = await query.order('session_date', { ascending: false });

    tbody.innerHTML = (data || []).map(s => {
        const att = s.attendances || [];
        const stats = att.reduce((acc, a) => {
            if(a.status === 'presente') acc.p++;
            else if(a.status === 'assente') acc.a++;
            else if(a.status === 'giustificato') acc.g++;
            else if(a.status === 'infortunato') acc.i++;
            return acc;
        }, {p:0, a:0, g:0, i:0});

        const total = att.length;
        const perc = total > 0 ? Math.round((stats.p / total) * 100) : 0;
        const hasNotes = s.notes && s.notes.trim().length > 0;

        return `
        <tr style="border-bottom:1px solid #f1f5f9;">
            <td style="padding:10px;"><strong>${s.title}</strong><br><small>${new Date(s.session_date).toLocaleDateString()}</small></td>
            <td style="padding:10px;"><small>${s.session_types?.name}</small><br><strong>${s.teams?.name}</strong></td>
            <td style="padding:10px; text-align:center;">
                <button onclick="openSessionNotesModal('${s.id}', '${s.title.replace(/'/g, "\\'")}')" style="background:none; border:none; cursor:pointer; font-size:16px; opacity:${hasNotes ? '1' : '0.3'}">📝</button>
            </td>
            <td style="padding:10px; text-align:center; font-weight:bold; color:#10b981;">${stats.p}</td>
            <td style="padding:10px; text-align:center; font-weight:bold; color:#ef4444;">${stats.a}</td>
            <td style="padding:10px; text-align:center; font-weight:bold; color:#f59e0b;">${stats.g}</td>
            <td style="padding:10px; text-align:center; font-weight:bold; color:#8b5cf6;">${stats.i}</td>
            <td style="padding:10px; text-align:center;"><strong>${perc}%</strong></td>
            <td style="padding:10px; text-align:right;">
                <button class="btn-sm" style="background:#8b5cf6; color:white; border:none;" onclick="openAttendanceModal('${s.id}')">👥 Presenze</button>
                <button class="btn-sm" onclick="openSessionModal('${s.id}')">✏️</button>
                <button class="btn-sm" style="background:#ef4444; color:white; border:none;" onclick="deleteSession('${s.id}', '${s.title.replace(/'/g, "\\'")}')">🗑️</button>
            </td>
        </tr>`;
    }).join('') || '<tr><td colspan="9" style="text-align:center; padding:20px;">Nessuna sessione trovata.</td></tr>';
}

/**
 * 3. LOGICA FILTRI PROGRESSIVI
 */
async function reloadSubFilters() {
    const socId = document.getElementById('filter-society-sess').value;
    if (!socId) return;

    // Recupera squadre e categorie collegate per la società
    const { data: teamsInSoc } = await client
        .from('teams')
        .select('id, name, category_id, categories(id, name)')
        .eq('society_id', socId)
        .order('name');

    window._currentSocTeams = teamsInSoc || [];

    // Filtra categorie uniche
    const uniqueCats = [];
    const catMap = new Map();
    teamsInSoc?.forEach(t => {
        if (t.categories && !catMap.has(t.categories.id)) {
            catMap.set(t.categories.id, true);
            uniqueCats.push(t.categories);
        }
    });

    const { data: types } = await client.from('session_types').select('id, name').order('name');

    // Popola select categorie
    const selCat = document.getElementById('filter-category-sess');
    if (selCat) {
        selCat.innerHTML = '<option value="">Tutte Categorie</option>' + 
            uniqueCats.sort((a,b) => a.name.localeCompare(b.name))
                      .map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    }

    // Popola tipi sessione
    const selType = document.getElementById('filter-type-sess');
    if (selType) {
        selType.innerHTML = '<option value="">Tutti i Tipi</option>' + 
            (types || []).map(t => `<option value="${t.id}">${t.name}</option>`).join('');
    }

    await reloadTeamsOnly();
}

async function reloadTeamsOnly() {
    const catId = document.getElementById('filter-category-sess').value;
    const selTeam = document.getElementById('filter-team-sess');
    if (!selTeam) return;

    let filtered = window._currentSocTeams || [];
    if (catId) filtered = filtered.filter(t => t.category_id === catId);

    selTeam.innerHTML = '<option value="">Tutte Squadre</option>' + 
        filtered.map(t => `<option value="${t.id}">${t.name}</option>`).join('');

    initSessioni();
}

async function saveAttendances(sessionId, isGara) {
    const records = [];
    document.querySelectorAll('.att-status').forEach(sel => {
        const athId = sel.getAttribute('data-ath');
        const perfData = {};
        if (!isGara) {
            document.querySelectorAll(`.star-rating[data-ath="${athId}"]`).forEach(group => {
                perfData[group.getAttribute('data-key')] = parseInt(group.getAttribute('data-value')) || 0;
            });
        }
        records.push({
            session_id: sessionId, athlete_id: athId, status: sel.value,
            performance_data: perfData, is_called_up: isGara && sel.value === 'presente'
        });
    });
    const { error } = await client.from('attendances').upsert(records, { onConflict: 'session_id, athlete_id' });
    if (!error) { getModal().close(); initSessioni(); alert("Registro salvato!"); }
}

 */
async function saveMatchDetails(sessionId) {
    const gf = parseInt(document.getElementById('m-gf').value) || 0;
    const ga = parseInt(document.getElementById('m-ga').value) || 0;
    const isFriendly = document.getElementById('m-friendly').checked;
    
    let points = 0;
    if (!isFriendly) {
        if (gf > ga) points = 3;
        else if (gf === ga) points = 1;
    }

    const matchData = {
        session_id: sessionId,
        opponent_name: document.getElementById('m-opponent').value,
        meet_time: document.getElementById('m-meet-time').value,
        match_start_time: document.getElementById('m-start-time').value,
        address: document.getElementById('m-address').value,
        status: document.getElementById('m-status').value,
        is_friendly: isFriendly,
        goals_for: gf,
        goals_against: ga,
        points: points
    };

    const { error } = await client.from('match_details').upsert(matchData, { onConflict: 'session_id' });
    
    if (!error) {
        // Applichiamo la logica: non convocati = giustificati
        await syncNonCalledAsJustified(sessionId);
        alert("Dati partita salvati e presenze sincronizzate!");
        getModal().close();
        initSessioni();
    }
}

async function syncNonCalledAsJustified(sessionId) {
    // Recuperiamo tutti gli atleti della squadra che NON sono convocati per questa sessione
    const { data: session } = await client.from('sessions').select('team_id, season_id').eq('id', sessionId).single();
    const { data: allAthletes } = await client.from('athlete_team_seasons').select('athlete_id').eq('team_id', session.team_id).eq('season_id', session.season_id);
    const { data: currentAtt } = await client.from('attendances').select('athlete_id, is_called_up').eq('session_id', sessionId);

    const calledIds = (currentAtt || []).filter(a => a.is_called_up).map(a => a.athlete_id);
    const toUpdate = (allAthletes || []).filter(a => !calledIds.includes(a.athlete_id));

    const records = toUpdate.map(a => ({
        session_id: sessionId,
        athlete_id: a.athlete_id,
        status: 'giustificato',
        is_called_up: false
    }));

    if (records.length > 0) {
        await client.from('attendances').upsert(records, { onConflict: 'session_id, athlete_id' });
    }
}

/**
 * 7. EXPORT GRAFICO "CAMPO DA CALCIO" (Social Ready)
 */
async function exportConvocatiSocial(sessionId) {
    const { data: session } = await client.from('sessions').select('*, teams(name)').eq('id', sessionId).single();
    const { data: convocati } = await client.from('attendances')
        .select('athletes(name, surname, role)') // Assumendo che esista il campo role
        .eq('session_id', sessionId)
        .eq('is_called_up', true);

    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 1080;
    canvas.height = 1350; // Formato Portrait Social

    // 1. Sfondo Campo (Verde con sfumatura)
    const grad = ctx.createRadialGradient(540, 675, 100, 540, 675, 800);
    grad.addColorStop(0, '#2d5a27');
    grad.addColorStop(1, '#1e3d1a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 2. Disegno Linee Campo
    ctx.strokeStyle = "rgba(255,255,255,0.3)";
    ctx.lineWidth = 5;
    ctx.strokeRect(50, 50, 980, 1250); // Perimetro
    ctx.beginPath(); // Linea Mediana
    ctx.moveTo(50, 675); ctx.lineTo(1030, 675); ctx.stroke();
    ctx.beginPath(); // Cerchio centrale
    ctx.arc(540, 675, 150, 0, Math.PI * 2); ctx.stroke();

    // 3. Testi Intestazione
    ctx.fillStyle = "white";
    ctx.textAlign = "center";
    ctx.font = "bold 50px sans-serif";
    ctx.fillText("LISTA CONVOCATI", 540, 120);
    ctx.font = "italic 40px sans-serif";
    ctx.fillStyle = "#fbbf24";
    ctx.fillText(session.teams.name.toUpperCase(), 540, 180);

    // 4. Raggruppamento per Ruoli
    const roles = { 
        'Portieri': [], 'Difensori': [], 'Centrocampisti': [], 
        'Attaccanti': [], 'Staff': [] 
    };

    convocati.forEach(c => {
        const r = c.athletes.role?.toLowerCase() || '';
        if (r.includes('por')) roles['Portieri'].push(c.athletes);
        else if (r.includes('dif')) roles['Difensori'].push(c.athletes);
        else if (r.includes('cen')) roles['Centrocampisti'].push(c.athletes);
        else if (r.includes('att')) roles['Attaccanti'].push(c.athletes);
        else roles['Staff'].push(c.athletes);
    });

    // 5. Rendering Nomi sul Campo
    ctx.textAlign = "left";
    let y = 280;
    const xLeft = 150;
    const xRight = 600;

    Object.entries(roles).forEach(([roleName, list], index) => {
        if (list.length > 0) {
            ctx.font = "bold 35px sans-serif";
            ctx.fillStyle = "#38bdf8"; // Colore categoria
            ctx.fillText(roleName.toUpperCase(), (index % 2 === 0 ? xLeft : xRight), y);
            
            ctx.font = "30px sans-serif";
            ctx.fillStyle = "white";
            list.forEach((ath, i) => {
                ctx.fillText(`• ${ath.surname} ${ath.name}`, (index % 2 === 0 ? xLeft : xRight), y + 45 + (i * 40));
            });
            
            if (index % 2 !== 0) y += 250; // Vai a riga successiva ogni 2 ruoli
        }
    });

    // 6. Download
    const link = document.createElement('a');
    link.download = `Convocati_${session.teams.name}.png`;
    link.href = canvas.toDataURL("image/png");
    link.click();
}

    if (!socId || socId === "null" || socId === "undefined") {

    const selCat = document.getElementById('f-match-cat');

    // Carica Squadre
    const { data: teams } = await client.from('teams')
        .select('id, name, category_id')
        .eq('society_id', socId)
        .order('name');
    window._matchTeams = teams || [];
    
    window.reloadMatchTeamsOnly();
};

window.reloadMatchTeamsOnly = function() {
    const catId = document.getElementById('f-match-cat')?.value;
    const selTeam = document.getElementById('f-match-team');
    if (!selTeam) return;
    
    let filtered = window._matchTeams || [];
    if (catId) filtered = filtered.filter(t => String(t.category_id) === String(catId));

    let teamOpts = '<option value="">Tutte Squadre</option>';
    teamOpts += filtered.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
    selTeam.innerHTML = teamOpts;

    window.initPartite();
};

// Alias per compatibilità con sessioni
window.reloadSubFilters = window.reloadMatchSubFilters;

/**
 * 2. TEMPLATE HTML
 */
window.templatePartite = function() {
    return `
    <div class="card" id="main-match-card">
        <div class="header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 style="margin:0; color:#1e293b;">🏆 GESTIONE PARTITE</h2>
            <button class="btn" onclick="window.openMatchModal()" style="background:#059669; color:white;">+ Nuova Partita</button>
        </div>
        
        <div id="match-filters-container" style="background:#f8fafc; padding:15px; border-radius:8px; border:1px solid #e2e8f0; margin-bottom:15px;">
            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap:12px;">
                <div id="wrapper-match-soc" style="display:none;">
                    <select id="f-match-soc" onchange="window.reloadMatchSubFilters()" style="width:100%; padding:8px; border-radius:6px; border:1px solid #ddd;"></select>
                </div>
                <select id="f-match-cat" onchange="window.reloadMatchTeamsOnly()" style="padding:8px; border-radius:6px; border:1px solid #ddd;"><option value="">Tutte Categorie</option></select>
                <select id="f-match-team" onchange="window.initPartite()" style="padding:8px; border-radius:6px; border:1px solid #ddd;"><option value="">Tutte Squadre</option></select>
            </div>
        </div>

        <div class="table-container">
            <table style="width:100%; border-collapse:collapse; font-size:13px;">
                <thead>
                    <tr style="text-align:left; background:#f1f5f9; color:#475569;">
                        <th style="padding:12px;">Data</th>
                        <th style="padding:12px;">Partita / Squadra</th>
                        <th style="padding:12px; text-align:right;">Azioni</th>
                    </tr>
                </thead>
                <tbody id="list-partite-body"></tbody>
            </table>
        </div>
    </div>`;
};

/**
 * 3. INIZIALIZZAZIONE DATI (Solo post-login)
 */
window.initPartite = async function() {
    const tbody = document.getElementById('list-partite-body');
    if (!tbody) return;

    const socId = document.getElementById('f-match-soc')?.value || window._currentSocietyId;
    if (!socId || socId === "null") {
        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; padding:20px;">Effettua il login per visualizzare le partite.</td></tr>';
        return;
    }

    // Gestione selettore società per Admin
    const selSoc = document.getElementById('f-match-soc');
    if (selSoc && selSoc.options.length === 0) {
        const { data: socs } = await client.from('societies').select('id, name').order('name');
        if (socs) {
            selSoc.innerHTML = socs.map(s => `<option value="${s.id}" ${s.id == socId ? 'selected' : ''}>${s.name}</option>`).join('');
            if (['admin', 'manager'].includes((window._userRole || '').toLowerCase())) {
                document.getElementById('wrapper-match-soc').style.display = 'block';
            }
        }
    }

    // Trova i tipi sessione validi (Gara/Partita)
    const { data: types } = await client.from('session_types').select('id, name');
    const validIds = (types || [])
        .filter(t => t.name.toLowerCase().includes('partita') || t.name.toLowerCase().includes('gara'))
        .map(t => t.id);

    let query = client.from('sessions')
        .select('id, title, session_date, teams(name)')
        .eq('society_id', socId)
        .in('type_id', validIds);
    
    const fCat = document.getElementById('f-match-cat')?.value;
    const fTeam = document.getElementById('f-match-team')?.value;
    if (fCat) query = query.eq('category_id', fCat);
    if (fTeam) query = query.eq('team_id', fTeam);

    const { data, error } = await query.order('session_date', { ascending: false });

    tbody.innerHTML = (data || []).map(m => `
        <tr style="border-bottom:1px solid #f1f5f9;">
            <td style="padding:10px;">${new Date(m.session_date).toLocaleDateString()}</td>
            <td style="padding:10px;">
                <strong>${m.title || 'Partita'}</strong><br>
                <small style="color:#64748b;">${m.teams?.name || '---'}</small>
            </td>
            <td style="padding:10px; text-align:right;">
                <button class="btn-sm" style="background:#8b5cf6; color:white; border:none; margin-right:2px;">Convocazioni</button>
                <button class="btn-sm" style="background:#3b82f6; color:white; border:none; margin-right:2px;">Modifica</button>
                <button class="btn-sm" style="background:#ef4444; color:white; border:none;">Cancella</button>
            </td>
        </tr>
    `).join('') || '<tr><td colspan="3" style="text-align:center; padding:20px; color:#64748b;">Nessuna partita trovata.</td></tr>';
};

/**
 * 4. NUOVA PARTITA
 */
window.openMatchModal = async function() {
    const socId = document.getElementById('f-match-soc')?.value || window._currentSocietyId;
    if (!socId || socId === "null") return alert("Effettua il login.");

    window._currentSocietyId = socId;

    if (typeof window.openSessionModal === 'function') {
        await window.openSessionModal(); 
        setTimeout(() => {
            const selType = document.getElementById('sess-type');
            if (selType) {
                for (let opt of selType.options) {
                    if (opt.text.toLowerCase().includes('partita') || opt.text.toLowerCase().includes('gara')) {
                        selType.value = opt.value;
                        selType.disabled = true;
                        break;
                    }
                }
            }
        }, 300);
    }
};

// Inizializzazione controllata
setTimeout(() => { 
    if (window._currentSocietyId && document.getElementById('main-match-card')) {
        window.reloadMatchSubFilters(); 
    }
}, 500);
/* [QUI AGGIUNGEREMO LE FUNZIONI PER SPORT, SOCIETÀ, ECC. UNA ALLA VOLTA] */

</script>
