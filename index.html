    <script type="module">
    import { client } from './db.js';

    /* ============================================================
       STATO GLOBALE (Sincronizzato Build 2.01)
       ============================================================ */
    window._currentUserId = null;
    window._currentSocietyId = null;
    window._userRole = 'user'; 
    window.CURRENT_USER = null; // Gestito come proprietà di window per coerenza globale

    /* ============================================================
       LOGICA MODAL
       ============================================================ */
    const modal = {
        el: document.getElementById('modal-overlay'),
        title: document.getElementById('modal-title'),
        body: document.getElementById('modal-body'),
        open(title, html) {
            this.title.innerText = title;
            this.body.innerHTML = html;
            this.el.classList.add('modal-active');
        },
        close() { this.el.classList.remove('modal-active'); }
    };
    document.getElementById('btn-modal-close').onclick = () => modal.close();
/* ============================================================
       CONTROLLO SESSIONE ATTIVA (Anti-Logout al Refresh)
       ============================================================ */
    async function checkActiveSession() {
        // Recuperiamo la sessione corrente da Supabase Auth (token salvato nel browser)
        const { data: { session } } = await client.auth.getSession();

        if (session) {
            try {
                // Recuperiamo i dati dell'utente dalla tabella 'users' usando l'email della sessione
                const { data: userRow, error: userErr } = await client
                    .from('users')
                    .select('*')
                    .eq('email', session.user.email)
                    .maybeSingle();

                if (userRow) {
                    // Ripopoliamo lo Stato Globale
                    window._userRole = userRow.role;
                    window._currentSocietyId = userRow.society_id;
                    window._currentUserId = userRow.id;
                    window.CURRENT_USER = userRow;

                    // Prepariamo la UI (mostriamo l'app, nascondiamo il login)
                    document.getElementById('login-wrap').style.display = 'none';
                    document.getElementById('app').style.display = 'flex';
                    
                    const userInfo = document.getElementById('user-info');
                    if(userInfo) {
                        userInfo.innerText = `👤 ${userRow.name} (${userRow.role.toUpperCase()})`;
                    }

                    // Carichiamo la dashboard (o l'ultima pagina salvata)
                    loadPage('dashboard');
                    console.log("✅ Sessione ripristinata correttamente.");
                }
            } catch (err) {
                console.error("Errore nel ripristino sessione:", err);
            }
        }
    }

    // ESECUZIONE IMMEDIATA AL CARICAMENTO
    checkActiveSession();












    /* ============================================================
       LOGICA DI AUTENTICAZIONE E LOGIN
       ============================================================ */
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errDiv = document.getElementById('error-msg');
        errDiv.style.display = 'none';

        const usernameInput = document.getElementById('username').value.trim().toLowerCase();
        const password = document.getElementById('password').value;

        try {
            // 1. Verifica utente su tabella public.users
            const { data: userRow, error: userErr } = await client
                .from('users')
                .select('*')
                .eq('username', usernameInput)
                .maybeSingle();

            if (userErr) throw new Error("Errore database: " + userErr.message);
            if (!userRow) throw new Error(`Username '${usernameInput}' non trovato.`);

            // 2. Autenticazione Supabase Auth
            const { error: authError } = await client.auth.signInWithPassword({
                email: userRow.email,
                password: password
            });

            if (authError) throw new Error("Password errata o account non attivo.");

            // 3. Setup variabili globali di sessione (window)
            window._userRole = userRow.role;
            window._currentSocietyId = userRow.society_id;
            window._currentUserId = userRow.id;
            window.CURRENT_USER = userRow; // Popoliamo l'oggetto per la dashboard

            // 4. UI Setup
            document.documentElement.style.fontSize = "18px";
            document.getElementById('login-wrap').style.display = 'none';
            document.getElementById('app').style.display = 'flex'; // Usiamo flex per il layout a due colonne
            
            // Update Info Utente nel menu (se presente l'elemento nel tuo HTML)
            const userInfo = document.getElementById('user-info');
            if(userInfo) {
                userInfo.innerText = `👤 ${userRow.name} (${userRow.role.toUpperCase()})`;
                if(userRow.role === 'admin') userInfo.style.color = "#dc2626";
            }

            // 5. Navigazione iniziale
            loadPage('dashboard');

        } catch (err) {
            errDiv.innerText = "⚠️ " + err.message;
            errDiv.style.display = 'block';
        }
    });

    /* ============================================================
       NAVIGAZIONE (LOADER PAGINE)
       ============================================================ */
    window.loadPage = (section) => {
        // Gestione classi active nel sidebar
        document.querySelectorAll('#sidebar a').forEach(a => a.classList.remove('active'));
        const link = document.querySelector(`#sidebar a[data-section="${section}"]`);
        if (link) link.classList.add('active');

        const content = document.getElementById('content');
        if (!content) return;

        switch(section) {
/* --- NELLO SWITCH --- */
            case 'dashboard':
                // Il genitore ha una dashboard dedicata
                if ((window._effectiveRole || window._userRole || '').toLowerCase() === 'genitore') {
                    content.innerHTML = '<div class="card"><p style="color:#94a3b8;">⏳ Caricamento dashboard...</p></div>';
                    if (window.initGenitoreView) window.initGenitoreView();
                    break;
                }
                content.innerHTML = window.templateDashboard ? window.templateDashboard() : '<div class="card"><p>Caricamento...</p></div>';
                if (window.initDashboard) window.initDashboard();
                break;
    
    // Inizializzazione dati
    loadSeasons().then(() => initDashboard());
    break;

    
            case 'stagioni': 
                content.innerHTML = templateStagioni(); 
                initStagioni(); 
                break;

            case 'sport':
                content.innerHTML = templateSport();
                initSport();
                break;

            case 'societa':
                content.innerHTML = templateSocieta();
                initSocieta();
                break;

            case 'categoria':
                content.innerHTML = templateCategoria();
                initCategoria();
                break;

            case 'squadra':
                content.innerHTML = templateSquadra();
                initSquadra();
                break;

            case 'staff':
                content.innerHTML = templateStaff();
                initStaff();
                break;

            case 'anagrafica-pura':
                content.innerHTML = templateAnagraficaPura();
                initAnagraficaPura();
                break;

            case 'assegnazioni':
                content.innerHTML = templateAssignments();
                initAssignments();
                break;

            case 'atleti':
                content.innerHTML = templateAtleti();
                initAtleti();
                break;
                
            case 'sessioni':
                content.innerHTML = templateSessioni();
                initSessioni();
                break;

            case 'partite':
                content.innerHTML = templatePartite();
                initPartite();
                break;
             case 'import-atleti':
                content.innerHTML = templateImportAtleti();
                initImportAtleti();
                break;
            default: 
                content.innerHTML = `<div class="card"><h2>Sezione ${section}</h2><p>Modulo in fase di configurazione.</p></div>`;
        }
    };

    // Listener per i click sui link del sidebar
    document.querySelectorAll('#sidebar a').forEach(a => {
        a.onclick = (e) => {
            e.preventDefault();
            loadPage(a.dataset.section);
        };
    });

    // Gestione Logout
    document.getElementById('btn-logout').onclick = async () => {
        await client.auth.signOut();
        location.reload();
    };

/* ============================================================
   PAGINA: STAGIONI (Versione Definitiva)
   ============================================================ */

function templateStagioni() {
    return `
    <div class="card">
        <div class="header">
            <h2>GESTIONE STAGIONI</h2>
            <button class="btn" id="btn-add-stagione">+ Nuova Stagione</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Periodo</th>
                    <th>Stato</th>
                    <th style="text-align:right">Azioni</th>
                </tr>
            </thead>
            <tbody id="list-stagioni"></tbody>
        </table>
    </div>`;
}

async function initStagioni() {
    const { data: seasons, error } = await client
        .from('seasons')
        .select('*')
        .order('start_date', { ascending: false });

    if (error) {
        console.error("Errore fetch:", error.message);
        return;
    }

    const tbody = document.getElementById('list-stagioni'); 
    if (!tbody) return;

    tbody.innerHTML = seasons?.map(s => `
        <tr>
            <td><strong>${s.name}</strong></td>
            <td>${new Date(s.start_date).toLocaleDateString()} → ${new Date(s.end_date).toLocaleDateString()}</td>
            <td>
                <span class="badge ${s.is_active ? 'active' : 'inactive'}">
                    ${s.is_active ? 'ATTIVA' : 'INATTIVA'}
                </span>
            </td>
            <td style="text-align:right">
                <button class="btn-sm btn-action-activate" data-id="${s.id}" data-active="${s.is_active}" style="background:${s.is_active ? '#64748b' : '#16a34a'}">
                    ${s.is_active ? 'Spegni' : 'Attiva'}
                </button>
                <button class="btn-sm btn-action-edit" data-id="${s.id}" data-name="${s.name}" style="background:orange">✏️</button>
                <button class="btn-sm btn-action-delete" data-id="${s.id}" style="background:red">🗑️</button>
            </td>
        </tr>
    `).join('') || '<tr><td colspan="4" style="text-align:center">Nessuna stagione trovata.</td></tr>';

    // Listener Bottoni Tabella
    tbody.querySelectorAll('.btn-action-activate').forEach(btn => {
        btn.onclick = () => handleStagioneToggle(btn.dataset.id, btn.dataset.active === 'true');
    });

    tbody.querySelectorAll('.btn-action-edit').forEach(btn => {
        btn.onclick = () => handleStagioneEdit(btn.dataset.id, btn.dataset.name);
    });

    tbody.querySelectorAll('.btn-action-delete').forEach(btn => {
        btn.onclick = () => handleStagioneDelete(btn.dataset.id);
    });

    // Listener Bottone "Nuova Stagione"
    const btnAdd = document.getElementById('btn-add-stagione');
    if (btnAdd && typeof modal !== 'undefined') {
        btnAdd.onclick = () => {
            modal.open('Nuova Stagione', `
                <p style="font-size:0.85rem; color:#666; margin-bottom:10px">Inserisci gli anni solari (es. 2025 e 2026)</p>
                <div style="display:flex; flex-direction:column; gap:10px">
                    <label>Anno Inizio</label>
                    <input type="number" id="y-start" value="${new Date().getFullYear()}">
                    <label>Anno Fine</label>
                    <input type="number" id="y-end" value="${new Date().getFullYear() + 1}">
                </div>
            `);

            const btnSave = document.getElementById('btn-modal-save');
            if (btnSave) {
                btnSave.onclick = async () => {
                    const y1 = document.getElementById('y-start').value;
                    const y2 = document.getElementById('y-end').value;
                    const { error: insError } = await client.from('seasons').insert({ 
                        name: `${y1}/${y2}`, 
                        start_date: `${y1}-08-01`, 
                        end_date: `${y2}-07-31`, 
                        is_active: false 
                    });
                    if (insError) alert(insError.message);
                    else { modal.close(); initStagioni(); }
                };
            }
        };
    }
}

/* ============================================================
   AZIONI LOGICHE (Dichiarate una sola volta)
   ============================================================ */

async function handleStagioneToggle(id, isActiveNow) {
    if (!isActiveNow) {
        // Se vogliamo attivarne una, spegniamo prima tutte le altre
        await client.from('seasons').update({ is_active: false }).eq('is_active', true);
        await client.from('seasons').update({ is_active: true }).eq('id', id);
    } else {
        // Se è già attiva, la spegniamo e basta
        await client.from('seasons').update({ is_active: false }).eq('id', id);
    }
    initStagioni();
}

async function handleStagioneEdit(id, currentName) {
    const newName = prompt("Modifica nome stagione (es. 2025/2026):", currentName);
    if (newName && newName !== currentName) {
        const { error } = await client.from('seasons').update({ name: newName }).eq('id', id);
        if (error) alert(error.message);
        initStagioni();
    }
}

async function handleStagioneDelete(id) {
    if (confirm("Sei sicuro di voler eliminare questa stagione?")) {
        const { error } = await client.from('seasons').delete().eq('id', id);
        if (error) alert("Errore: " + error.message);
        initStagioni();
    }
}
/* ============================================================
   SEZIONE: SPORT (Template + Init + Azioni)
   ============================================================ */

function templateSport() {
    return `
    <div class="card">
        <div class="header">
            <h2>GESTIONE SPORT</h2>
            <button class="btn" id="btn-add-sport">+ Nuovo Sport</button>
        </div>
        <table>
            <thead><tr><th>Icona</th><th>Nome</th><th style="text-align:right">Azioni</th></tr></thead>
            <tbody id="list-sport"></tbody>
        </table>
    </div>`;
}

async function initSport() {
    const { data } = await client.from('sports').select('*').order('name');
    const tbody = document.getElementById('list-sport');
    
    tbody.innerHTML = data?.map(s => `
        <tr>
            <td style="font-size:1.5rem">${s.icon || '🏐'}</td>
            <td><strong>${s.name}</strong></td>
            <td style="text-align:right">
                <button class="btn-sm btn-sport-edit" data-id="${s.id}" data-name="${s.name}" data-icon="${s.icon}" style="background:var(--warning)">✏️</button>
                <button class="btn-sm btn-sport-delete" data-id="${s.id}" style="background:var(--danger)">🗑️</button>
            </td>
        </tr>
    `).join('') || '<tr><td colspan="3">Nessun dato.</td></tr>';

    // Listener bottoni tabella Sport
    tbody.querySelectorAll('.btn-sport-edit').forEach(btn => {
        btn.onclick = () => handleSportEdit(btn.dataset.id, btn.dataset.name, btn.dataset.icon);
    });
    tbody.querySelectorAll('.btn-sport-delete').forEach(btn => {
        btn.onclick = () => handleSportDelete(btn.dataset.id);
    });

    // Bottone Nuovo Sport
    document.getElementById('btn-add-sport').onclick = () => {
        modal.open('Nuovo Sport', `
            <label>Nome Sport</label><input type="text" id="sp-name" placeholder="es. Calcio">
            <label>Icona (Emoji)</label><input type="text" id="sp-icon" placeholder="es. ⚽">
        `);
        document.getElementById('btn-modal-save').onclick = async () => {
            const name = document.getElementById('sp-name').value;
            const icon = document.getElementById('sp-icon').value;
            await client.from('sports').insert({ name, icon });
            modal.close();
            initSport();
        };
    };
}

async function handleSportEdit(id, oldName, oldIcon) {
    modal.open('Modifica Sport', `
        <label>Nome Sport</label><input type="text" id="up-sp-name" value="${oldName}">
        <label>Icona (Emoji)</label><input type="text" id="up-sp-icon" value="${oldIcon}">
    `);
    document.getElementById('btn-modal-save').onclick = async () => {
        const name = document.getElementById('up-sp-name').value;
        const icon = document.getElementById('up-sp-icon').value;
        await client.from('sports').update({ name, icon }).eq('id', id);
        modal.close();
        initSport();
    };
}

async function handleSportDelete(id) {
    if (confirm("Eliminare questo sport?")) {
        await client.from('sports').delete().eq('id', id);
        initSport();
    }
}
/* ============================================================
   SEZIONE: SOCIETÀ (Versione Finale Anti-Errore)
   ============================================================ */

function templateSocieta() {
    return `
    <div class="card">
        <div class="header">
            <h2>GESTIONE SOCIETÀ</h2>
            <button class="btn" id="btn-add-societa">+ Nuova Società</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Nome Società</th>
                    <th>Sport Associato</th>
                    <th style="text-align:right">Azioni</th>
                </tr>
            </thead>
            <tbody id="list-societa">
                <tr><td colspan="3">Caricamento in corso...</td></tr>
            </tbody>
        </table>
    </div>`;
}

async function initSocieta() {
    const tbody = document.getElementById('list-societa');
    if (!tbody) return;

const { data, error } = await client
    .from('societies')
    .select('*, sports(name, icon)') // Rimosso !fk_soc_to_sport
    .order('name');
    
    if (error) { 
        tbody.innerHTML = `<tr><td colspan="3">Errore: ${error.message}</td></tr>`; 
        return; 
    }

    tbody.innerHTML = data?.map(s => {
        // Protezione per nomi con apostrofi
        const safeName = s.name.replace(/'/g, "\\'");
        return `

/**
 * Inizializza la tabella filtrando per la stagione impostata come 'is_active'
 */
async function initSquadra() {
    const tbody = document.getElementById('list-squadra');
    const infoBanner = document.getElementById('team-season-info');
    if (!tbody) return;

    // 1. Recupero la Stagione Attiva
    const { data: activeSeason, error: sErr } = await client
        .from('seasons')
        .select('*')
        .eq('is_active', true)
        .maybeSingle();
    
    if (!activeSeason) {
        if (infoBanner) infoBanner.innerHTML = "⚠️ Attenzione: nessuna stagione attiva impostata.";
        tbody.innerHTML = '<tr><td colspan="5">Seleziona una stagione attiva nelle impostazioni per vedere le squadre.</td></tr>';
        return;
    }
    
    if (infoBanner) infoBanner.innerText = `📅 Stagione Attiva: ${activeSeason.name}`;

    // 2. Query con join sulle tabelle collegate e filtro season_id
    const { data, error } = await client
        .from('teams')
        .select(`
            id,
            name,
            season_id,
            society_id,
            category_id,
            sport_id,
            societies (name),
            categories (name),
            sports (name, icon)
        `)
        .eq('season_id', activeSeason.id)
        .order('name');

    if (error) {
        console.error("Errore query teams:", error);
        tbody.innerHTML = `<tr><td colspan="5">Errore: ${error.message}</td></tr>`;
        return;
    }

    tbody.innerHTML = data?.map(t => {
        const safeName = t.name.replace(/'/g, "\\'");
        return `
        <tr>
            <td><strong>${t.name}</strong></td>
            <td>${t.societies?.name || '-'}</td>
            <td>${t.categories?.name || '-'}</td>
            <td>${t.sports ? t.sports.icon + ' ' + t.sports.name : '-'}</td>
            <td style="text-align:right">
                <button class="btn-sm btn-warning" onclick="handleEditSquadra('${t.id}')">✏️</button>
                <button class="btn-sm btn-danger" onclick="handleDeleteSquadra('${t.id}')">🗑️</button>
            </td>
        </tr>`;
    }).join('') || '<tr><td colspan="5">Nessuna squadra presente per questa stagione.</td></tr>';

    document.getElementById('btn-add-squadra').onclick = () => openSquadraModal(activeSeason.id);
}

/**
 * Modale per Nuova/Modifica Squadra
 */
async function openSquadraModal(activeSeasonId, editData = null) {
    const isEdit = !!editData;

    // Caricamento liste per i dropdown
    const [socRes, catRes, spoRes, seaRes] = await Promise.all([
        client.from('societies').select('id, name').order('name'),
        client.from('categories').select('id, name').order('name'),
        client.from('sports').select('id, name, icon').order('name'),
        client.from('seasons').select('name').eq('id', activeSeasonId).single()
    ]);

    modal.open(isEdit ? 'Modifica Squadra' : 'Nuova Squadra', `
        <div style="margin-bottom:15px; padding:10px; background:#f0fdf4; border-radius:6px; color:#166534; font-size:0.85em; border:1px solid #dcfce7;">
            Stai salvando nella stagione: <strong>${seaRes.data?.name || 'Attiva'}</strong>
        </div>
        
        <label>Nome Squadra</label>
        <input type="text" id="tm-name" value="${editData ? editData.name : ''}" placeholder="es. Giovanissimi 2010">
        
        <label>Società</label>
        <select id="tm-soc">
            <option value="">-- Seleziona Società --</option>
            ${socRes.data?.map(s => `<option value="${s.id}" ${editData?.society_id === s.id ? 'selected' : ''}>${s.name}</option>`).join('')}
        </select>

        <label>Categoria</label>
        <select id="tm-cat">
            <option value="">-- Seleziona Categoria --</option>
            ${catRes.data?.map(c => `<option value="${c.id}" ${editData?.category_id === c.id ? 'selected' : ''}>${c.name}</option>`).join('')}
        </select>

        <label>Sport</label>
        <select id="tm-spo">
            <option value="">-- Seleziona Sport --</option>
            ${spoRes.data?.map(p => `<option value="${p.id}" ${editData?.sport_id === p.id ? 'selected' : ''}>${p.icon} ${p.name}</option>`).join('')}
        </select>
    `);

    document.getElementById('btn-modal-save').onclick = async () => {
        const payload = {
            name: document.getElementById('tm-name').value.trim(),
            society_id: document.getElementById('tm-soc').value,
            category_id: document.getElementById('tm-cat').value,
            sport_id: document.getElementById('tm-spo').value,
            season_id: activeSeasonId // Collegamento automatico alla stagione
        };

        if(!payload.name || !payload.society_id || !payload.category_id || !payload.sport_id) {
            return alert("Compila tutti i campi obbligatori!");
        }

        const { error } = isEdit 
            ? await client.from('teams').update(payload).eq('id', editData.id)
            : await client.from('teams').insert(payload);

        if (!error) { 
            modal.close(); 
            initSquadra(); 
        } else { 
            alert("Errore nel salvataggio: " + error.message); 
        }
    };
}

/**
 * Inizializza la lista con logica di filtraggio e aggancio eventi
 */
async function initStaff() {
    const tbody = document.getElementById('list-staff');
    if (!tbody) return;

    const myRole = window._userRole;
    const mySociety = window._currentSocietyId;

    // 1. Query base (esclude l'admin supremo e ordina per nome)
    let query = client
        .from('users')
        .select('*, societies(name)')
        .neq('username', 'admin')
        .order('name');

    // 2. Filtro per utenti non globali
    const isGlobalUser = (myRole === 'admin' || myRole === 'manager');
    if (!isGlobalUser) {
        if (!mySociety) {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#ef4444; padding:20px;">⚠️ Profilo non associato a una società.</td></tr>`;
            return;
        }
        query = query.eq('society_id', mySociety);
    }

    const { data, error } = await query;

    if (error) {
        console.error("Errore Query Staff:", error);
        tbody.innerHTML = `<tr><td colspan="4">Errore: ${error.message}</td></tr>`;
        return;
    }

    // 3. Rendering Tabella
    tbody.innerHTML = data?.map(u => {
        const roleLabel = u.role === 'manager' ? '<strong>Manager Sistema</strong>' : (u.management_role || 'Staff');
        const socName = u.societies?.name || '<span style="color:#94a3b8; font-style:italic;">Accesso Globale</span>';

        return `
        <tr>
            <td><strong>${u.name}</strong></td>
            <td>${u.username}</td>
            <td>
                ${roleLabel}<br><small style="color:#64748b">${socName}</small>
            </td>
            <td style="text-align:right">
                <button class="btn-sm btn-warning" onclick="handleEditStaff('${u.id}')">✏️</button>
                <button class="btn-sm btn-danger" onclick="handleDeleteStaff('${u.id}')">🗑️</button>
            </td>
        </tr>`;
    }).join('') || '<tr><td colspan="4" style="text-align:center; padding:20px;">Nessun utente trovato.</td></tr>';

    // 4. Aggancio tasto nuovo utente
    const btnAdd = document.getElementById('btn-add-staff');
    if (btnAdd) {
        btnAdd.onclick = () => openStaffModal();
    }
}

/**
 * Modale per inserimento e modifica Staff
 */
async function openStaffModal(editData = null) {
    const isEdit = !!editData;
    const myRole = window._userRole;

    let societies = [];
    if (myRole === 'admin' || myRole === 'manager') {
        const { data } = await client.from('societies').select('id, name').order('name');
        societies = data || [];
    }

    modal.open(isEdit ? 'Modifica Staff' : 'Registra Nuovo Staff', `
        <div style="display:grid; gap:12px; margin-top:10px;">
            <div>
                <label>NOME E COGNOME</label>
                <input type="text" id="st-name" value="${editData?.name || ''}" class="modal-input">
            </div>
            
            <div>
                <label>USERNAME (LOGIN)</label>
                <input type="text" id="st-username" value="${editData?.username || ''}" class="modal-input">
            </div>

            <div style="display:flex; gap:10px;">
                <div style="flex:1;">
                    <label>RUOLO SISTEMA</label>
                    <select id="st-role" onchange="toggleStaffSocVisibility()" class="modal-input">
                        <option value="user" ${editData?.role === 'user' ? 'selected' : ''}>Staff Societario</option>
                        ${myRole === 'admin' ? `<option value="manager" ${editData?.role === 'manager' ? 'selected' : ''}>Manager Sistema</option>` : ''}
                    </select>
                </div>
                <div style="flex:1;">
                    <label>QUALIFICA</label>
                    <select id="st-mrole" class="modal-input">
                        <option value="Allenatore" ${editData?.management_role === 'Allenatore' ? 'selected' : ''}>Allenatore</option>
                        <option value="Dirigente" ${editData?.management_role === 'Dirigente' ? 'selected' : ''}>Dirigente</option>
                        <option value="Presidente" ${editData?.management_role === 'Presidente' ? 'selected' : ''}>Presidente</option>
                        <option value="Medico" ${editData?.management_role === 'Medico' ? 'selected' : ''}>Staff Medico</option>
                    </select>
                </div>
            </div>

            <div id="div-staff-soc">
                <label>SOCIETÀ DI APPARTENENZA</label>
                <select id="st-society_id" class="modal-input">
                    ${societies.map(s => `<option value="${s.id}" ${editData?.society_id === s.id ? 'selected' : ''}>${s.name}</option>`).join('')}
                </select>
            </div>
            
            <p style="font-size:0.8em; color:#666; margin-top:10px;">
                Nota: La password viene gestita tramite il sistema di autenticazione globale.
            </p>
        </div>
    `);

    window.toggleStaffSocVisibility = function() {
        const role = document.getElementById('st-role').value;
        const container = document.getElementById('div-staff-soc');
        if (container) container.style.display = (role === 'manager') ? 'none' : 'block';
    };
    toggleStaffSocVisibility();

    /* --- LOGICA DI SALVATAGGIO --- */
    document.getElementById('btn-modal-save').onclick = async () => {
        const name = document.getElementById('st-name').value.trim();
        const username = document.getElementById('st-username').value.trim();
        const role = document.getElementById('st-role').value;
        const mrole = document.getElementById('st-mrole').value;
        const soc_id = document.getElementById('st-society_id').value;

        if(!name || !username) return alert("Nome e Username obbligatori!");

        // Payload PULITO: Solo colonne esistenti nel DB public.users
        const payload = { 
            name: name, 
            username: username, 
            role: role,
            management_role: role === 'manager' ? 'Gestore Sistema' : mrole,
            society_id: role === 'manager' ? null : (soc_id || null) 
        };

        const { error } = isEdit 
            ? await client.from('users').update(payload).eq('id', editData.id)
            : await client.from('users').insert([payload]);

        if (!error) {
            modal.close();
            initStaff();
        } else {
            console.error("Errore Database:", error);
            alert("Errore salvataggio: " + error.message);
        }
    };
}

                <select id="f-bp-soc" onchange="window.applyAnagraficaFilters()" style="padding:10px; border:1px solid #cbd5e1; border-radius:8px;"></select>
                <input type="number" id="f-bp-year" placeholder="Anno Nascita" oninput="window.applyAnagraficaFilters()" style="padding:10px; border:1px solid #cbd5e1; border-radius:8px;">
            </div>

            <div style="overflow-x:auto;">
                <table style="width:100%; border-collapse: collapse;">
                    <thead>
                        <tr style="border-bottom: 2px solid #f1f5f9; color: #64748b; font-size: 12px; text-transform: uppercase;">
                            <th style="text-align:left; padding:15px;">Atleta</th>
                            <th style="text-align:left; padding:15px;">Nascita</th>
                            <th style="text-align:left; padding:15px;">Società</th>
                            <th style="text-align:right; padding:15px;">Azioni</th>
                        </tr>
                    </thead>
                    <tbody id="list-anagrafica-body"></tbody>
                </table>
            </div>
        </div>`;
    };

    // 3. CARICAMENTO DATI
    window.initAnagraficaPura = async function() {
        const [socs, atleti] = await Promise.all([
            client.from('societies').select('id, name').order('name'),
            client.from('athletes').select('*').order('surname')
        ]);
        _socLook = Object.fromEntries(socs.data.map(s => [s.id, s.name]));
        _atletiBase = atleti.data || [];
        
        const fSoc = document.getElementById('f-bp-soc');
        if(fSoc) fSoc.innerHTML = '<option value="">Tutte le Società</option>' + socs.data.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
        
        renderAnagraficaTable(_atletiBase);
    };

    // 4. RENDER TABELLA
    function renderAnagraficaTable(data) {
        const body = document.getElementById('list-anagrafica-body');
        if(!body) return;
        body.innerHTML = data.map(a => `
            <tr style="border-bottom: 1px solid #f1f5f9;">
                <td style="padding:15px;">
                    <div style="font-weight:800; color:#1e293b; text-transform: uppercase;">${a.surname}</div>
                    <div style="color:#64748b; font-size:13px;">${a.name}</div>
                </td>
                <td style="padding:15px;">${a.born_date ? new Date(a.born_date).toLocaleDateString('it-IT') : '-'}</td>
                <td style="padding:15px;"><span style="background:#f1f5f9; padding:5px 10px; border-radius:15px; font-size:11px;">${_socLook[a.society_id] || 'N.D.'}</span></td>
                <td style="padding:15px; text-align:right; white-space:nowrap;">
                    <button class="btn-icon-atleta link" onclick="window.openAssociaGiocatoreModal('${a.id}')" title="Associa">🔗</button>
                    <button class="btn-icon-atleta edit" onclick="window.openAtletaBaseModal('${a.id}')" title="Modifica">✏️</button>
                    <button class="btn-icon-atleta delete" onclick="window.deleteAtletaBase('${a.id}')" title="Archivia">🗑️</button>
                </td>
            </tr>
        `).join('');
    }

    // 5. FUNZIONE ASSOCIA CON LOGICA ANTI-DUPLICAZIONE (UPSERT)
    window.openAssociaGiocatoreModal = async function(atletaId) {
        const atleta = _atletiBase.find(a => a.id === atletaId);
        if(!atleta) return;

        const [seasonsRes, categoriesRes] = await Promise.all([
            client.from('seasons').select('*').order('name', { ascending: false }),
            client.from('categories').select('*').eq('society_id', atleta.society_id).order('name')
        ]);

        modal.open(`Associa ${atleta.surname}`, `
            <div style="display:grid; gap:15px; padding:10px 0;">
                <div style="background:#f0f9ff; padding:10px; border-radius:8px; border:1px solid #bae6fd; font-size:12px; color:#0369a1;">
                    <strong>Società:</strong> ${_socLook[atleta.society_id] || 'N.D.'}
                </div>
                <div>
                    <label style="font-weight:700; font-size:11px;">STAGIONE *</label>
                    <select id="m-ass-season" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;">
                        ${seasonsRes.data.map(s => `<option value="${s.id}" ${s.is_active ? 'selected' : ''}>${s.name}</option>`).join('')}
                    </select>
                </div>
                <div style="display:flex; gap:10px;">
                    <div style="flex:1;">
                        <label style="font-weight:700; font-size:11px;">CATEGORIA *</label>
                        <select id="m-ass-cat" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;">
                            <option value="">-- Seleziona --</option>
                            ${categoriesRes.data.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}
                        </select>
                    </div>
                    <div style="flex:1;">
                        <label style="font-weight:700; font-size:11px;">SQUADRA</label>
                        <select id="m-ass-team" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;">
                            <option value="">-- Seleziona Categoria --</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label style="font-weight:700; font-size:11px;">NUMERO MAGLIA</label>
                    <input type="number" id="m-ass-jersey" placeholder="Esempio: 10" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;">
                </div>
            </div>
        `);

        const refreshTeams = async () => {
            const catId = document.getElementById('m-ass-cat').value;
            const seaId = document.getElementById('m-ass-season').value;
            const teamSelect = document.getElementById('m-ass-team');
            
            if(!catId) {
                teamSelect.innerHTML = '<option value="">-- Seleziona Categoria --</option>';
                return;
            }

            const { data: teams } = await client.from('teams')
                .select('*')
                .eq('category_id', catId)
                .eq('season_id', seaId)
                .order('name');

            teamSelect.innerHTML = '<option value="">Intera Categoria</option>' + 
                (teams || []).map(t => `<option value="${t.id}">${t.name}</option>`).join('');
        };

        document.getElementById('m-ass-cat').onchange = refreshTeams;
        document.getElementById('m-ass-season').onchange = refreshTeams;

        document.getElementById('btn-modal-save').onclick = async () => {
            const catId = document.getElementById('m-ass-cat').value;
            const seaId = document.getElementById('m-ass-season').value;
            const teamId = document.getElementById('m-ass-team').value || null;
            const num = document.getElementById('m-ass-jersey').value;

            if(!catId) return alert("La categoria è obbligatoria!");

            const payload = {
                athlete_id: atletaId,
                society_id: atleta.society_id,
                season_id: seaId,
                category_id: catId,
                team_id: teamId,
                jersey_number: num === "" ? null : parseInt(num)
            };

            const { error } = await client
                .from('athlete_team_seasons')
                .upsert(payload, { onConflict: 'athlete_id,season_id,team_id' });

            if(!error) {
                alert("Salvataggio completato!");
                modal.close();
            } else {
                console.error(error);
                alert("Errore: " + error.message);
            }
        };
    };

    // 6. FILTRI E MODAL ANAGRAFICA BASE
    window.applyAnagraficaFilters = function() {
        const search = document.getElementById('f-bp-search').value.toLowerCase();
        const socId = document.getElementById('f-bp-soc').value;
        const year = document.getElementById('f-bp-year').value;
        const filtered = _atletiBase.filter(a => {
            const matchesName = (a.surname + ' ' + a.name).toLowerCase().includes(search);
            const matchesSoc = !socId || a.society_id === socId;
            const matchesYear = !year || (a.born_date && a.born_date.startsWith(year));
            return matchesName && matchesSoc && matchesYear;
        });
        renderAnagraficaTable(filtered);
    };

    window.openAtletaBaseModal = function(id = null) {
        let atleta = id ? _atletiBase.find(a => a.id === id) : { name: '', surname: '', born_date: '', society_id: '' };
        modal.open(id ? 'Modifica Atleta' : 'Nuovo Atleta', `
            <div style="display:grid; gap:15px;">
                <input type="text" id="m-bp-surname" value="${atleta.surname}" placeholder="COGNOME" style="padding:10px; border-radius:8px; border:1px solid #ddd; text-transform:uppercase;">
                <input type="text" id="m-bp-name" value="${atleta.name}" placeholder="NOME" style="padding:10px; border-radius:8px; border:1px solid #ddd;">
                <input type="date" id="m-bp-date" value="${atleta.born_date || ''}" style="padding:10px; border-radius:8px; border:1px solid #ddd;">
                <select id="m-bp-soc" style="padding:10px; border-radius:8px; border:1px solid #ddd;">
                    <option value="">-- Seleziona Società --</option>
                    ${Object.entries(_socLook).map(([sid, name]) => `<option value="${sid}" ${atleta.society_id === sid ? 'selected' : ''}>${name}</option>`).join('')}
                </select>
            </div>
        `);
        document.getElementById('btn-modal-save').onclick = async () => {
            const data = { 
                name: document.getElementById('m-bp-name').value.trim(), 
                surname: document.getElementById('m-bp-surname').value.trim().toUpperCase(), 
                born_date: document.getElementById('m-bp-date').value || null, 
                society_id: document.getElementById('m-bp-soc').value 
            };
            if(!data.name || !data.surname || !data.society_id) return alert("Tutti i campi sono obbligatori!");
            const { error } = id ? await client.from('athletes').update(data).eq('id', id) : await client.from('athletes').insert([data]);
            if(!error) { modal.close(); await window.initAnagraficaPura(); }
        };
    };

    // 7. FUNZIONE CANCELLAZIONE CON ARCHIVIAZIONE
    window.deleteAtletaBase = async function(id) {
        const atleta = _atletiBase.find(a => a.id === id);
        if(!atleta) return;

        if(!confirm(`Sei sicuro di voler eliminare ${atleta.surname}? Tutte le associazioni squadre verranno spostate in archivio.`)) return;

        try {
            // A. Recupero associazioni attuali
            const { data: associazioni } = await client
                .from('athlete_team_seasons')
                .select('*')
                .eq('athlete_id', id);

            // B. Archiviazione Anagrafica con Debug RLS
            const { error: errArchivioAtleta } = await client
                .from('athletes_deleted_archive')
                .insert([{
                    original_id: atleta.id,
                    name: atleta.name || null,
                    surname: atleta.surname || null,
                    born_date: atleta.born_date || null,
                    society_id: atleta.society_id
                }]);

            if (errArchivioAtleta) {
                console.error("Errore RLS/DB Atleta:", errArchivioAtleta);
                throw new Error("Errore archiviazione atleta: " + errArchivioAtleta.message);
            }

            // C. Archiviazione Associazioni (se presenti)
            if (associazioni && associazioni.length > 0) {
                const assoc_to_archive = associazioni.map(as => ({
                    original_id: as.id,
                    athlete_id: as.athlete_id,
                    society_id: as.society_id,
                    season_id: as.season_id,
                    category_id: as.category_id,
                    team_id: as.team_id,
                    jersey_number: as.jersey_number
                }));

                const { error: errArchivioAssoc } = await client
                    .from('athlete_team_seasons_archive')
                    .insert(assoc_to_archive);

                if (errArchivioAssoc) {
                    console.error("Errore RLS/DB Associazioni:", errArchivioAssoc);
                    throw new Error("Errore archiviazione associazioni: " + errArchivioAssoc.message);
                }
            }

            // D. Eliminazione definitiva (avviene solo se i passaggi precedenti sono ok)
            const { error: errDelete } = await client.from('athletes').delete().eq('id', id);
            if (errDelete) throw errDelete;

            alert("Archiviazione completata con successo.");
            await window.initAnagraficaPura();

        } catch (err) {
            console.error("DETTAGLI ERRORE FLOW:", err);
            alert("Si è verificato un errore: " + (err.message || "Errore sconosciuto"));
        }
    };
})(); // Chiusura IIFE corretta

/* ============================================================
   MODULO ASSEGNAZIONI TECNICHE - FILTRI PROGRESSIVI
   ============================================================ */

(function() {
    let _allAssignments = [];
    let _allTeams = []; // Memorizziamo tutte le squadre per il filtro progressivo
    let _lookupSocs = {};
    let _lookupSeas = {};

    window.templateAssignments = function() {
        return `
        <div class="card">
            <div class="header" style="display:flex; justify-content:space-between; align-items:center;">
                <h2>ASSEGNAZIONI TECNICHE</h2>
                <div class="actions">
                    <button class="btn" id="btn-add-assignment">+ Assegna Staff a Squadra</button>
                </div>
            </div>

            <div class="filter-bar" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; background: #f8fafc; padding: 15px; border-radius: 8px; margin: 20px 0; border: 1px solid #e2e8f0;">
                <div>
                    <label style="font-size: 11px; color: #64748b; font-weight:bold;">Cerca Staff</label>
                    <input type="text" id="f-staff-name" placeholder="Nome..." oninput="applyStaffFilters()" style="width:100%">
                </div>
                <div>
                    <label style="font-size: 11px; color: #64748b; font-weight:bold;">Società</label>
                    <select id="f-staff-soc" onchange="updateTeamFilter(); applyStaffFilters();" style="width:100%"><option value="">Tutte</option></select>
                </div>
                <div>
                    <label style="font-size: 11px; color: #64748b; font-weight:bold;">Stagione</label>
                    <select id="f-staff-sea" onchange="updateTeamFilter(); applyStaffFilters();" style="width:100%"></select>
                </div>
                <div>
                    <label style="font-size: 11px; color: #64748b; font-weight:bold;">Squadra</label>
                    <select id="f-staff-team" onchange="applyStaffFilters()" style="width:100%"><option value="">Tutte</option></select>
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Membro Staff</th>
                        <th>Società</th>
                        <th>Stagione</th>
                        <th>Squadra</th>
                        <th>Ruolo</th>
                        <th style="text-align:right">Azioni</th>
                    </tr>
                </thead>
                <tbody id="list-assignments">
                    <tr><td colspan="6">Caricamento in corso...</td></tr>
                </tbody>
            </table>
        </div>`;
    };

    window.initAssignments = async function() {
        try {
            const [socs, seas, teams] = await Promise.all([
                client.from('societies').select('*').order('name'),
                client.from('seasons').select('*').order('name'),
                client.from('teams').select('*').order('name')
            ]);

            _lookupSocs = Object.fromEntries(socs.data.map(s => [s.id, s.name]));
            _lookupSeas = Object.fromEntries(seas.data.map(s => [s.id, s.name]));
            _allTeams = teams.data || [];

            const fSoc = document.getElementById('f-staff-soc');
            const fSea = document.getElementById('f-staff-sea');

            if(fSoc) fSoc.innerHTML = '<option value="">Tutte</option>' + socs.data.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
            if(fSea) fSea.innerHTML = seas.data.map(s => `<option value="${s.id}" ${s.is_active ? 'selected' : ''}>${s.name}</option>`).join('');

            // Inizializza il filtro squadre in base alla stagione attiva
            updateTeamFilter();
            await _fetchData();
        } catch (err) { console.error("Init Error:", err); }
    };

    // --- LOGICA FILTRO PROGRESSIVO ---
    window.updateTeamFilter = function() {
        const selSoc = document.getElementById('f-staff-soc')?.value;
        const selSea = document.getElementById('f-staff-sea')?.value;
        const fTea = document.getElementById('f-staff-team');

        if (!fTea) return;

        // Filtriamo l'elenco delle squadre in base a Società e Stagione selezionate
        const filteredTeams = _allTeams.filter(t => {
            const matchSoc = !selSoc || t.society_id == selSoc;
            const matchSea = !selSea || t.season_id == selSea;
            return matchSoc && matchSea;
        });

        fTea.innerHTML = '<option value="">Tutte</option>' + 
            filteredTeams.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
    };

    async function _fetchData() {
        const { data: activeSeason } = await client.from('seasons').select('id').eq('is_active', true).maybeSingle();
        if (activeSeason && document.getElementById('btn-add-assignment')) {
            document.getElementById('btn-add-assignment').onclick = () => openAssignmentModal(activeSeason.id);
        }

        const { data, error } = await client
            .from('user_category_seasons')
            .select(`
                id, role, season_id, team_id, user_id, society_id,
                users!fk_staff_user (name),
                teams!fk_ucs_team (name)
            `);
        
        if (error) {
            console.error("Errore query:", error);
            return;
        }

        _allAssignments = data || [];
        window.applyStaffFilters();
    }

    window.applyStaffFilters = function() {
        const name = document.getElementById('f-staff-name')?.value.toLowerCase();
        const soc = document.getElementById('f-staff-soc')?.value;
        const sea = document.getElementById('f-staff-sea')?.value;
        const team = document.getElementById('f-staff-team')?.value;

        const filtered = _allAssignments.filter(a => {
            return (!name || a.users?.name?.toLowerCase().includes(name)) &&
                   (!soc || a.society_id == soc) &&
                   (!sea || a.season_id == sea) &&
                   (!team || a.team_id == team);
        });

        const tbody = document.getElementById('list-assignments');
        if (!tbody) return;

        tbody.innerHTML = filtered.map(a => `
            <tr>
                <td><strong>${a.users?.name || 'N/D'}</strong></td>
                <td><span style="color: #2563eb; font-weight:500;">${_lookupSocs[a.society_id] || '-'}</span></td>
                <td>${_lookupSeas[a.season_id] || '-'}</td>
                <td>${a.teams?.name || 'N/D'}</td>
                <td><span class="badge badge-active" style="background:#e0f2fe; color:#0369a1; padding:4px 8px; border-radius:6px; font-size:0.85em;">${a.role}</span></td>
                <td style="text-align:right">
                    <button class="btn-sm btn-warning" onclick="handleEditAssignment('${a.id}')">✏️</button>
                    <button class="btn-sm btn-danger" onclick="deleteAssignment('${a.id}')">🗑️</button>
                </td>
            </tr>
        `).join('') || '<tr><td colspan="6">Nessuna assegnazione trovata.</td></tr>';
    };

    // --- LOGICA MODALE (Invariata) ---
    window.openAssignmentModal = async function(activeSeasonId, editData = null) {
        const isEdit = !!editData;
        const [sRes, uRes, tRes] = await Promise.all([
            client.from('seasons').select('name').eq('id', activeSeasonId).single(),
            client.from('users').select('id, name').neq('username', 'admin').order('name'),
            client.from('teams').select('id, name, category_id, society_id').eq('season_id', activeSeasonId).order('name')
        ]);

        const ruoliValidi = ['Allenatore', 'Vice Allenatore', 'Collaboratore Tecnico', 'Preparatore Portieri', 'Preparatore Atletico', 'Dirigente', 'Fisioterapista'];

        modal.open(isEdit ? 'Modifica Staff' : 'Nuova Assegnazione Staff', `
            <div style="margin-bottom: 15px; padding: 10px; background: #f0f7ff; border-radius: 5px; color: #2563eb; border: 1px solid #dbeafe; font-size: 0.85em;">
                <strong>Stagione Attiva:</strong> ${sRes.data?.name || 'Corrente'}
            </div>
            <label>Membro Staff</label>
            <select id="as-user">
                <option value="">-- Seleziona Staff --</option>
                ${uRes.data?.map(u => `<option value="${u.id}" ${isEdit && editData.user_id === u.id ? 'selected' : ''}>${u.name}</option>`).join('')}
            </select>
            <label>Squadra (Team)</label>
            <select id="as-team">
                <option value="">-- Seleziona Squadra --</option>
                ${tRes.data?.map(t => `<option value="${t.id}" data-cat="${t.category_id}" data-soc="${t.society_id}" ${isEdit && editData.team_id === t.id ? 'selected' : ''}>${t.name}</option>`).join('')}
            </select>
            <label>Ruolo Tecnico</label>
            <select id="as-role">
                ${ruoliValidi.map(r => `<option value="${r}" ${isEdit && editData.role === r ? 'selected' : ''}>${r}</option>`).join('')}
            </select>
        `);

        document.getElementById('btn-modal-save').onclick = async () => {
            const teamSelect = document.getElementById('as-team');
            const payload = {
                user_id: document.getElementById('as-user').value,
                team_id: teamSelect.value,
                category_id: teamSelect.options[teamSelect.selectedIndex]?.getAttribute('data-cat'),
                society_id: teamSelect.options[teamSelect.selectedIndex]?.getAttribute('data-soc'),
                season_id: activeSeasonId,
                role: document.getElementById('as-role').value
            };
            if (!payload.user_id || !payload.team_id) return alert("Compila tutti i campi!");
            const { error } = isEdit 
                ? await client.from('user_category_seasons').update(payload).eq('id', editData.id)
                : await client.from('user_category_seasons').insert(payload);
            if (!error) { modal.close(); _fetchData(); } else { alert(error.message); }
        };
    };

    window.handleEditAssignment = async (id) => {
        const { data, error } = await client.from('user_category_seasons').select('*').eq('id', id).single();
        if (!error) openAssignmentModal(data.season_id, data);
    };

    window.deleteAssignment = async (id) => {
        if (confirm("Rimuovere questo incarico?")) {
            const { error } = await client.from('user_category_seasons').delete().eq('id', id);
            if (!error) _fetchData();
        }
    };
})();

        const refreshLists = async (socId) => {

                client.from('athletes').select('id, name, surname').eq('society_id', socId).order('surname'),

/**
 * 0. GESTORE MODALE (Auto-detect o Emergency Fallback)
 */
function getModal() {
    let m = window.modal || window.appModal || window.uiModal || window.ui;
    if (!m) {
        m = {
            open: (title, html) => {
                const overlay = document.createElement('div');
                overlay.id = 'emergency-modal';
                overlay.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10000; display:flex; align-items:center; justify-content:center; padding:20px;";
                overlay.innerHTML = `
                    <div style="background:white; width:100%; max-width:600px; border-radius:12px; padding:20px; position:relative; color:#333; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5);">
                        <h3 style="margin-top:0; border-bottom:1px solid #eee; padding-bottom:10px;">${title}</h3>
                        <div style="margin-bottom:20px; max-height:75vh; overflow-y:auto;">${html}</div>
                        <button onclick="document.getElementById('emergency-modal').remove()" style="position:absolute; top:10px; right:10px; border:none; background:none; font-size:24px; cursor:pointer;">&times;</button>
                    </div>`;
                document.body.appendChild(overlay);
            },
            close: () => { document.getElementById('emergency-modal')?.remove(); }
        };
    }
    return m;
}

/**
 * 2. INIZIALIZZAZIONE E LOGICA TABELLA
 */
async function initSessioni() {
    const tbody = document.getElementById('list-sessioni-body');
    if (!tbody) return;

    const myRole = (window._userRole || '').toLowerCase();
    const isAdmin = ['admin', 'manager', 'presidente', 'segretario'].includes(myRole);
    let targetSociety = window._currentSocietyId;

    if (isAdmin && document.getElementById('sess-filters-container')) {
        document.getElementById('sess-filters-container').style.display = 'block';
        const selSoc = document.getElementById('filter-society-sess');
        if (selSoc && selSoc.options.length === 0) {
            const { data: socs } = await client.from('societies').select('id, name').order('name');
            if (socs) {
                selSoc.innerHTML = socs.map(s => `<option value="${s.id}" ${s.id === targetSociety ? 'selected' : ''}>${s.name}</option>`).join('');
                if (myRole === 'admin' || myRole === 'manager') document.getElementById('wrapper-soc-filter').style.display = 'block';
                await reloadSubFilters();
                return;
            }
        }
        targetSociety = selSoc?.value || targetSociety;
    }

    let query = client.from('sessions').select(`*, session_types(name), teams(id, name, categories(name)), attendances(status)`).eq('society_id', targetSociety);
    
    const fCat = document.getElementById('filter-category-sess')?.value;
    const fTeam = document.getElementById('filter-team-sess')?.value;
    const fType = document.getElementById('filter-type-sess')?.value;

    if (fCat) query = query.eq('category_id', fCat);
    if (fTeam) query = query.eq('team_id', fTeam);
    if (fType) query = query.eq('type_id', fType);

    const { data } = await query.order('session_date', { ascending: false });

    tbody.innerHTML = (data || []).map(s => {
        const att = s.attendances || [];
        const stats = att.reduce((acc, a) => {
            const st = (a.status || '').toLowerCase();
            if(st === 'presente' || st === 'p') acc.p++;
            else if(st === 'assente' || st === 'a') acc.a++;
            else if(st === 'giustificato' || st === 'g') acc.g++;
            else if(st === 'infortunato' || st === 'i') acc.i++;
            return acc;
        }, {p:0, a:0, g:0, i:0});

        const total = att.length;
        const perc = total > 0 ? Math.round((stats.p / total) * 100) : 0;
        const hasNotes = s.notes && s.notes.trim().length > 0;

        return `
        <tr style="border-bottom:1px solid #f1f5f9;">
            <td style="padding:10px;"><strong>${s.title}</strong><br><small>${new Date(s.session_date).toLocaleDateString()}</small></td>
            <td style="padding:10px;"><small>${s.session_types?.name}</small><br><strong>${s.teams?.name}</strong></td>
            <td style="padding:10px; text-align:center;">
                <button onclick="openSessionNotesModal('${s.id}', '${s.title.replace(/'/g, "\\'")}')" style="background:none; border:none; cursor:pointer; font-size:16px; opacity:${hasNotes ? '1' : '0.3'}">📝</button>
            </td>
            <td style="padding:10px; text-align:center; font-weight:bold; color:#10b981;">${stats.p}</td>
            <td style="padding:10px; text-align:center; font-weight:bold; color:#ef4444;">${stats.a}</td>
            <td style="padding:10px; text-align:center; font-weight:bold; color:#f59e0b;">${stats.g}</td>
            <td style="padding:10px; text-align:center; font-weight:bold; color:#8b5cf6;">${stats.i}</td>
            <td style="padding:10px; text-align:center;"><strong>${perc}%</strong></td>
            <td style="padding:10px; text-align:right;">
                <button class="btn-sm" style="background:#8b5cf6; color:white; border:none;" onclick="openAttendanceModal('${s.id}')">👥 Presenze</button>
                <button class="btn-sm" onclick="openSessionModal('${s.id}')">✏️</button>

/**
 * 3. LOGICA FILTRI PROGRESSIVI
 */
async function reloadSubFilters() {
    const socId = document.getElementById('filter-society-sess').value;
    if (!socId) return;

    const { data: teamsInSoc } = await client
        .from('teams')
        .select('id, name, category_id, categories(id, name)')
        .eq('society_id', socId)
        .order('name');

    window._currentSocTeams = teamsInSoc || [];

    const uniqueCats = [];
    const catMap = new Map();
    teamsInSoc?.forEach(t => {
        if (t.categories && !catMap.has(t.categories.id)) {
            catMap.set(t.categories.id, true);
            uniqueCats.push(t.categories);
        }
    });

    const { data: types } = await client.from('session_types').select('id, name').order('name');

    const selCat = document.getElementById('filter-category-sess');
    if (selCat) {
        selCat.innerHTML = '<option value="">Tutte Categorie</option>' + 
            uniqueCats.sort((a,b) => a.name.localeCompare(b.name))
                      .map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    }

    const selType = document.getElementById('filter-type-sess');
    if (selType) {
        selType.innerHTML = '<option value="">Tutti i Tipi</option>' + 
            (types || []).map(t => `<option value="${t.id}">${t.name}</option>`).join('');
    }

    await reloadTeamsOnly();
}

async function reloadTeamsOnly() {
    const catId = document.getElementById('filter-category-sess').value;
    const selTeam = document.getElementById('filter-team-sess');
    if (!selTeam) return;

    let filtered = window._currentSocTeams || [];
    if (catId) filtered = filtered.filter(t => t.category_id === catId);

    selTeam.innerHTML = '<option value="">Tutte Squadre</option>' + 
        filtered.map(t => `<option value="${t.id}">${t.name}</option>`).join('');

    initSessioni();
}

async function saveSession(id) {
    const teamId = document.getElementById('sess-team')?.value;
    const team = window._teamsList.find(t => t.id === teamId);
    if (!team) return alert("Scegli una squadra!");

    const societyId = document.getElementById('filter-society-sess')?.value || window._currentSocietyId;
    const p = {
        title: document.getElementById('sess-title').value || "Allenamento",
        session_date: document.getElementById('sess-date').value,
        society_id: societyId,
        team_id: team.id, category_id: team.category_id, season_id: team.season_id, type_id: document.getElementById('sess-type').value
    };
    const { error } = id ? await client.from('sessions').update(p).eq('id', id) : await client.from('sessions').insert([p]);
    if (!error) { getModal().close(); initSessioni(); }
}

async function openAttendanceModal(sessionId) {
    const m = getModal();
    const { data: session } = await client.from('sessions').select('*, session_types(name), teams(id, name, season_id)').eq('id', sessionId).single();
    if(!session) return;
    const isGara = session.session_types?.name.toLowerCase().includes('gara');
    const { data: relations } = await client.from('athlete_team_seasons').select(`jersey_number, athletes(id, name, surname)`).eq('team_id', session.team_id).eq('season_id', session.season_id);
    const { data: existing } = await client.from('attendances').select('*').eq('session_id', sessionId);
    const attMap = {}; existing?.forEach(a => attMap[a.athlete_id] = a);

    m.open(isGara ? "Convocazioni" : "Registro Presenze", `
        <div style="background:#f8fafc; padding:10px; border-radius:8px; margin-bottom:15px; font-size:12px; border:1px solid #e2e8f0;">
            <strong>${session.title}</strong> (${new Date(session.session_date).toLocaleDateString()})
        </div>
        <div style="max-height:450px; overflow-y:auto; padding-right:5px;">
            ${(relations || []).map(r => {
                const ath = r.athletes;
                const reg = attMap[ath.id] || {};
                // UNIFORMATO A MAIUSCOLO PER COERENZA DB
                const p = reg.performance_data || {VEL:0, TEC:0, FIS:0, RES:0, COM:0};
                return `
                <div style="border:1px solid #eee; border-radius:8px; padding:12px; margin-bottom:10px; background:#fff;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                        <strong>${ath.surname} ${ath.name} <small style="color:#64748b;">${r.jersey_number ? '#'+r.jersey_number : ''}</small></strong>
                        <select class="att-status" data-ath="${ath.id}" style="padding:6px; border-radius:4px; border:1px solid #ccc;">
                            <option value="presente" ${reg.status==='presente'?'selected':''}>Presente</option>
                            <option value="assente" ${reg.status==='assente'?'selected':''}>Assente</option>
                            <option value="giustificato" ${reg.status==='giustificato'?'selected':''}>Giustificato</option>
                            <option value="infortunato" ${reg.status==='infortunato'?'selected':''}>Infortunato</option>
                        </select>
                    </div>
                    ${!isGara ? `
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; border-top:1px solid #f1f5f9; padding-top:10px;">
                        ${Object.entries({VEL:'VEL', TEC:'TEC', FIS:'FIS', RES:'RES', COM:'COM'}).map(([k, label]) => `
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <span style="font-size:11px; color:#64748b;">${label}</span>
                                <div class="star-rating" data-ath="${ath.id}" data-key="${k}" data-value="${p[k]||0}">
                                    ${[1,2,3,4,5].map(s => `<span onclick="setRating(this, ${s})" style="cursor:pointer; color:${s<=(p[k]||0)?'#f59e0b':'#cbd5e1'}; font-size:16px;">★</span>`).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>` : ''}
                </div>`;
            }).join('')}
        </div>
        <button onclick="saveAttendances('${sessionId}', ${isGara})" style="background:#10b981; color:white; width:100%; padding:15px; border:none; border-radius:8px; font-weight:bold; margin-top:15px; cursor:pointer;">SALVA REGISTRO</button>
    `);
}

async function saveAttendances(sessionId, isGara) {
    const records = [];
    document.querySelectorAll('.att-status').forEach(sel => {
        const athId = sel.getAttribute('data-ath');
        const perfData = {};
        if (!isGara) {
            document.querySelectorAll(`.star-rating[data-ath="${athId}"]`).forEach(group => {
                perfData[group.getAttribute('data-key')] = parseInt(group.getAttribute('data-value')) || 0;
            });
        }
        records.push({
            session_id: sessionId, 
            athlete_id: athId, 
            status: sel.value,
            performance_data: perfData, 
            is_called_up: isGara && sel.value === 'presente'
        });
    });
    
    // UPSERT gestisce sia creazione che aggiornamento (chiave: session_id + athlete_id)
    const { error } = await client.from('attendances').upsert(records, { onConflict: 'session_id, athlete_id' });
    if (!error) { 
        getModal().close(); 
        initSessioni(); 
        alert("Registro salvato!"); 
    } else {
        console.error("Errore salvataggio:", error);
    }
}

async function deleteSession(id, title) {
    if (confirm(`Eliminare "${title}"?`)) {
        const { error } = await client.from('sessions').delete().eq('id', id);
        if (!error) initSessioni();
    }
}

async function openSessionNotesModal(id, title) {
    const { data } = await client.from('sessions').select('notes').eq('id', id).single();
    getModal().open(`Note: ${title}`, `
        <textarea id="temp-notes" style="width:100%; height:180px; padding:12px; border-radius:8px; border:1px solid #ccc; font-family:inherit; box-sizing:border-box;">${data?.notes || ''}</textarea>
        <button onclick="saveSessionNotes('${id}')" style="width:100%; margin-top:12px; background:#2563eb; color:white; padding:12px; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">SALVA NOTE</button>
    `);
}

async function saveSessionNotes(id) {
    const notes = document.getElementById('temp-notes').value;
    await client.from('sessions').update({ notes }).eq('id', id);
    getModal().close();
    initSessioni();
}

window.setRating = function(el, value) {
    const container = el.parentElement;
    const stars = container.querySelectorAll('span');
    stars.forEach((s, idx) => s.style.color = (idx < value) ? '#f59e0b' : '#cbd5e1');
    container.setAttribute('data-value', value);
};

/**
 * 2. LOGICA INIZIALIZZAZIONE (Puntando alla tabella 'users')
 */
async function initPartite() {
    const tbody = document.getElementById('list-partite-body');
    if (!tbody) return;

    const selSoc = document.getElementById('f-match-soc');
    
    if (selSoc && (selSoc.value === "" || selSoc.options[0].text.includes("Caricamento"))) {
        try {
            const { data: { user: authUser } } = await client.auth.getUser();
            if (!authUser) throw new Error("Utente non autenticato");

            // --- LETTURA DALLA TABELLA USERS ---
            const { data: userData, error: userError } = await client.from('users')
                .select('role, society_id')
                .eq('id', authUser.id)
                .single();

            const role = userData?.role || 'manager';
            const societyId = userData?.society_id;

            if (role === 'admin') {
                // ADMIN: Carica tutte le società in ordine alfabetico
                const { data: socs } = await client.from('societies').select('id, name').order('name', { ascending: true });
                if (socs && socs.length > 0) {
                    selSoc.innerHTML = socs.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
                    // Se l'admin ha una society_id specifica la usa, altrimenti la prima della lista
                    window._currentSocietyId = societyId || socs[0].id;
                    selSoc.value = window._currentSocietyId;
                }
            } else {
                // MANAGER: Nasconde filtro e forza società
                const container = document.getElementById('soc-filter-container');
                if (container) container.style.display = 'none';

                if (societyId) {
                    selSoc.innerHTML = `<option value="${societyId}" selected>Società corrente</option>`;
                    window._currentSocietyId = societyId;
                } else {
                    selSoc.innerHTML = `<option value="">Nessuna società</option>`;
                    tbody.innerHTML = '<tr><td colspan="5" style="padding:20px; text-align:center;">Utente senza società assegnata.</td></tr>';
                    return;
                }
            }
            return reloadMatchSubFilters();
        } catch (err) {
            console.error("Errore initPartite:", err);
            // Fallback estremo se la tabella users fallisce: prova a caricare come admin se possibile
            const { data: socs } = await client.from('societies').select('id, name').order('name');
            if (socs?.length > 0) {
                selSoc.innerHTML = socs.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
                window._currentSocietyId = socs[0].id;
                return reloadMatchSubFilters();
            }
        }
    }

    const socId = selSoc?.value || window._currentSocietyId;
    if (!socId) return;

    // --- FILTRI E QUERY SESSIONS ---
    const dateFrom = document.getElementById('f-match-from')?.value;
    const dateTo = document.getElementById('f-match-to')?.value;
    const teamFilter = document.getElementById('f-match-team')?.value;

    const { data: types } = await client.from('session_types').select('id, name');
    const validIds = (types || []).filter(t => 
        t.name.toLowerCase().includes('partita') || t.name.toLowerCase().includes('gara')
    ).map(t => t.id);

    let query = client.from('sessions')
        .select('id, title, session_date, team_id, teams(name)')
        .eq('society_id', socId)
        .in('type_id', validIds);

    if (teamFilter) query = query.eq('team_id', teamFilter);
    if (dateFrom) query = query.gte('session_date', dateFrom);
    if (dateTo) query = query.lte('session_date', dateTo);

    const { data: matches } = await query.order('session_date', { ascending: false });

    tbody.innerHTML = (matches || []).map(m => `
        <tr style="border-bottom:1px solid #f1f5f9;">
            <td style="padding:12px;">${new Date(m.session_date).toLocaleDateString()}</td>
            <td style="padding:12px;"><strong>${m.title || 'Gara'}</strong></td>
            <td style="padding:12px;"><span style="color:#64748b;">${m.teams?.name || '---'}</span></td>
            <td style="padding:12px; text-align:center; display:flex; gap:6px; justify-content:center;">
                <button class="btn-sm" onclick="window.openConvocazioni('${m.id}')" style="background:#2563eb; color:white; border:none; padding:6px 10px; border-radius:4px; cursor:pointer; font-weight:600;">📋 CONVOCA</button>
                <button class="btn-sm" onclick="window.openTabellino('${m.id}')" style="background:#f59e0b; color:white; border:none; padding:6px 10px; border-radius:4px; cursor:pointer; font-weight:600;">⚽ TABELLINO</button>
                <button class="btn-sm" onclick="window.openStatistiche('${m.id}')" style="background:#6366f1; color:white; border:none; padding:6px 10px; border-radius:4px; cursor:pointer; font-weight:600;">📊 STATS</button>
				<button onclick="window.exportConvocazioniIMG('${m.id}')"style="background:#10b981; color:white; border:none; padding:6px 10px; border-radius:4px; cursor:pointer; font-size:12px; font-weight:600;">🖼️ IMMAGINE</button>
			</td>
        </tr>`).join('') || '<tr><td colspan="5" style="text-align:center; padding:30px; color:#94a3b8;">Nessun match trovato.</td></tr>';
}

window.selezionaTuttiConvocati = function() {
    const radios = document.querySelectorAll('.conv-radio[value="presente"]');
    radios.forEach(r => {
        const row = r.closest('div');
        const isSqualificato = row.querySelector('input[value="squalificato"]').checked;
        if (!isSqualificato) r.checked = true;
    });
};
// --- 3.1 LOGICA SALVATAGGIO CONVOCAZIONI (Versione Ottimizzata) ---
window.saveConvocazioni = async function(sessionId) {
    // 1. Recuperiamo tutti i radio button selezionati (class "conv-radio")
    const radios = document.querySelectorAll('.conv-radio:checked');
    const attendanceData = [];

    radios.forEach(radio => {
        const athleteId = radio.getAttribute('data-id');
        const statusValue = radio.value; // 'presente', 'assente', 'squalificato'

        attendanceData.push({
            session_id: sessionId,
            athlete_id: athleteId,
            status: statusValue,
            // Per la tua tabella: true se presente, altrimenti false
            is_called_up: statusValue === 'presente',
            // Impostiamo valori di default per evitare problemi di cache se necessario
            is_justified: statusValue === 'assente' 
        });
    });

    if (attendanceData.length === 0) {
        alert("Nessun dato da salvare.");
        return;
    }

    try {
        // Feedback visivo sul pulsante di invio
        const btn = event?.target || document.querySelector('button[onclick*="saveConvocazioni"]');
        const originalText = btn ? btn.innerText : "SALVA";
        if (btn) {
            btn.innerText = "⏳ SALVATAGGIO...";
            btn.disabled = true;
        }

        // 2. Sincronizzazione con Supabase
        // Utilizziamo l'identificatore unico (session_id, athlete_id) definito nel tuo DDL
        const { error } = await client
            .from('attendances')
            .upsert(attendanceData, { 
                onConflict: 'session_id, athlete_id' 
            });

        if (error) throw error;

        alert("✅ Convocazioni salvate con successo!");
        
        // 3. Pulizia interfaccia
        const subContainer = document.getElementById('sub-section-container');
        if (subContainer) subContainer.innerHTML = '';
        
        // Ricarica la lista principale se la funzione esiste
        if (typeof initPartite === 'function') initPartite(); 

    } catch (err) {
        console.error("Errore salvataggio convocazioni:", err);
        alert("Errore durante il salvataggio: " + (err.message || "Problema di connessione"));
    } finally {
        // Ripristino pulsante
        const btn = document.querySelector('button[onclick*="saveConvocazioni"]');
        if (btn) {
            btn.innerText = "SALVA";
            btn.disabled = false;
        }
    }
};
